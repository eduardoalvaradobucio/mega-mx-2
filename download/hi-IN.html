े वीडियो और ऐच्छिक कॉस्मेटिक सर्जरी की चर्चा करने वाले मैसेज जिनमें जोखिम की चेतावनी नहीं होती - 18 साल से कम उम्र के सभी उपयोगकर्ताओं की 'आपके लिए' फ़ीड के लिए अयोग्य है।","vid_mod_analytics_penalty_reason_unoriginal_title":"अमौलिक, निम्न-गुणवत्ता और QR कोड कॉन्टेंट","vid_mod_analytics_penalty_reason_unoriginal_desc":"TikTok को हमारे उपयोगकर्ताओं के लिए सकारात्मक और मनोरंजक बनाए रखने के लिए, ऐसी कॉन्टेंट जो अअसली है या कम क्वालिटी वाली है, अनुशंसा के अयोग्य है। अअसली कॉन्टेंट में ऐसे वीडियो शामिल होते हैं जो किसी नए क्रिएटिव संपादन के बिना दूसरे स्रोतों (जैसे कि दूसरे प्लेटफ़ॉर्म, टीवी शो, फ़िल्मों या वेबकास्ट) से आयात या अपलोड किए जाते हैं। वॉटरमार्क या सुपरइंपोज़्ड लोगो होने पर हम यह बता सकते हैं कि कोई वीडियो असली है या नहीं। कम गुणवत्ता वाली कॉन्टेंट में बहुत ही छोटे वीडियो, स्टैटिक इमेज और ऐसे वीडियो शामिल होते हैं जो सिर्फ़ GIF से बने हैं। QR कोड वाली कॉन्टेंट आमतौर पर आपके लिए फ़ीड के लिए अयोग्य होती है क्योंकि यह उपयोगकर्ताओं को हानिकारक वेबसाइटों या ऐप पर ले जा सकती है, भले ही हम उन परिस्थितियों में अपवाद बनाते हैं जहाँ जोखिम कम होता है (उदाहरण के लिए, ई-कॉमर्स के लिए)।","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"अमौलिक, निम्न-गुणवत्ता और QR कोड कॉन्टेंट","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"सकारात्मक अनुभव को बनाए रखने के लिए हमारे उपयोगकर्ता TikTok प्लेटफ़ॉर्म से अपेक्षा रखते हैं, नकली और निम्न-गुणवत्ता वाला कॉन्टेंट सुझाव के अयोग्य है। नकली कॉन्टेंट वह कॉन्टेंट है जो बिना किसी नए, क्रिएटिव एडीशन के अन्य स्रोतों से आयात या कॉपी किया जाता है। यदि किसी वीडियो में वॉटरमार्क या लोगो है तो वह असली नहीं हो सकता है। कम गुणवत्ता वाले कॉन्टेंट में बहुत ही छोटे वीडियो, स्टैटिक इमेज और ऐसे वीडियो शामिल होते हैं जो सिर्फ़ GIF से बने हैं।","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"फिर से बनाया गया खाता","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"आपके खाते में ऐसी पोस्ट हैं जो मौलिक नहीं हैं और 'आपके लिए' फ़ीड के लिए योग्य नहीं हैं। ज़्यादा जानकारी के लिए, हमारे समुदाय दिशानिर्देश \u003E आपके लिए फ़ीड के लिए उपयुक्त नहीं है \u003E अमौलिक, निम्न-गुणवत्ता और QR कोड कॉन्टेंट देखें","vid_mod_analytics_penalty_reason_spam_title":"स्पैम, अप्रामाणिक, या गुमराह करने वाली कॉन्टेंट","vid_mod_analytics_penalty_reason_spam_desc":"ऐसी कॉन्टेंट जो प्लेटफ़ॉर्म पर ज़्यादा फ़ॉलोअर, लाइक पाने या प्लेटफ़ॉर्म के अन्य सहभागिता मेट्रिक्स के लिए उपयोगकर्ताओं को धोखा देने या हेरफेर करने की कोशिश करती है, वह 'आपके लिए' फ़ीड के योग्य नहीं है। इसमें ऐसी कॉन्टेंट शामिल है जो उपयोगकर्ताओं को एक-दूसरे को फ़ॉलो या लाइक करने के लिए बढ़ावा देती है या ऐसी कॉन्टेंट जो उपयोगकर्ताओं को लाइक या साझा करें बटनों पर क्लिक करने का झाँसा देती है। इसके अलावा, ऐसी कॉन्टेंट जो साजिश के सिद्धांतों को बढ़ावा देती है और वर्तमान घटनाओं और उन घटनाओं के बारे में झूठी या हानिकारक जानकारी फैलाती है, जहाँ विवरण अभी भी पूरी तरह से तैयार नहीं हुए हैं, वे भी 'आपके लिए' फ़ीड के लिए अयोग्य हैं।","vid_mod_analytics_penalty_reason_sexual_title":"अत्यधिक यौन संबंधी कॉन्टेंट","vid_mod_analytics_penalty_reason_sexual_desc":"एक सुखद अनुभव बनाए रखने में मदद करने के लिए, अत्यधिक कामुकता वाला कॉन्टेंट, सुझाव के योग्य नहीं हो सकता। इसमें ऐसा कॉन्टेंट भी शामिल है जो निहित नग्नता दर्शाते हैं, शरीर के अंगों का यौनकरण करते हैं या साफ़ तौर पर कामुक या सेंशुअल (यानी, स्ट्रिप टीज़) है।","vid_mod_analytics_penalty_reason_tobacco_title":"तंबाकू और अल्कोहल उत्पाद","vid_mod_analytics_penalty_reason_tobacco_desc":"कानूनी रूप से शराब पीने की उम्र के व्यक्तियों द्वारा उपभोग किए गए शराब उत्पादों का प्रचार, उल्लेख या चित्रण करने वाली कॉन्टेंट, लेकिन ख़तरनाक तरीके से ऐसा किया जाना सुझाव के योग्य नहीं हो सकता है। वयस्कों द्वारा तम्बाकू उत्पादों के इस्तेमाल को दर्शाने वाला या नियंत्रित पदार्थों का उल्लेख करने वाली कॉन्टेंट सुझाव के योग्य नहीं है।","vid_mod_analytics_penalty_reason_stunts_title":"ख़तरनाक स्टंट और खेल","vid_mod_analytics_penalty_reason_stunts_desc":"सुरक्षा संबंधी सावधानियों के बिना दोहराए जाने पर, कुछ गतिविधियाँ जोखिम भरी या ख़तरनाक हो सकती हैं, जिनसे शारीरिक नुकसान हो सकता है। ऐसा कंटेंट जिसमें गैर-पेशेवर लोगों द्वारा किए गए ख़तरनाक स्टंट, या एक्सट्रीम स्पोर्ट्स शामिल हैं, अयोग्य हो सकता है।","vid_mod_analytics_penalty_reason_graphic_title":"हिंसात्मक और ग्राफ़िक कॉन्टेंट","vid_mod_analytics_penalty_reason_graphic_desc":"ऐसा कॉन्टेंट जिसकी वजह से दर्शकों को असुविधा होती है, आघात पहुँचता है या निराशा होती है, वह 'आपके लिए' फ़ीड हेतु अयोग्य हो सकता है, इसके अंतर्गत डरावने प्रभाव, कूदने का डर, ऐसा मेक-अप जो खून भरे घावों को असली रूप में तैयार करता है और शारीरिक कामों के चित्रण शामिल हैं। TikTok पर अधिकांश हिंसक और ग्राफ़िक कॉन्टेंट की अनुमति नहीं होती है। हालाँकि, हम कुछ ऐसे कॉन्टेंट की अनुमति दे सकते हैं, जिसमें मृत्यु, दुर्घटनाओं या असली घटनाओं से जुड़ी डॉक्यूमेंट करने वाले झगड़ों के ग्राफ़िक इमेज मौजूद हों और जिसे आम लोगों के हित का माना जाता है। चूँकि हो सकता है कि यह कॉन्टेंट सभी ऑडियंस के लिए सुविधाजनक न हो, इसलिए यह सुझाव के योग्य नहीं होगी और कॉन्टेंट पर एक \"ऑप्ट-इन करें\" स्क्रीन या चेतावनी दिखाई देगी।","vid_mod_analytics_penalty_reason_fyf_title":"आपके लिए फ़ीड हेतु अयोग्य","vid_mod_analytics_penalty_reason_fyf_desc":"आपके वीडियो ने 'आपके लिए' फ़ीड के हमारे योग्यता मानकों को पूरा नहीं किया है। ज़्यादा जानकारी के लिए TikTok समुदाय दिशानिर्देश \u003E 'आपके लिए' फ़ीड के लिए अयोग्य देखें","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"उपयोगकर्ता और तृतीय-पक्ष हमें नीति उल्लंघनों के बारे में रिपोर्ट कर सकते हैं। हमने एक ऐसी रिपोर्ट के आधार पर इस नीति के उल्लंघन का पता लगाया है जिसके अंतर्गत बताया गया है कि इस कॉन्टेंट ने हमारे समुदाय दिशानिर्देशों का उल्लंघन किया है।","vidModAnalytics_detailPg_sectionVideoDetails_sectionLabel":"वीडियो का विवरण","vid_mod_analytics_appeal_detailpg_reason_title":"उल्लंघन का कारण","vid_mod_analytics_detail_pg_title":"वीडियो योग्य नहीं है","vid_mod_analytics_detail_pg_desc":"यह वीडियो 'आपके लिए' फ़ीड के योग्य नहीं है क्योंकि यह हमारे समुदाय दिशानिर्देश का उल्लंघन करता है।","vidModAnalytics_detailPg_sectionSuccess_header":"अपील स्वीकार की गई","vid_mod_analytics_appeal_success_detail_pg_desc":"हमने आपकी अपील की समीक्षा कर ली है और आपके वीडियो को रीस
