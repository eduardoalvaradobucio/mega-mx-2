3Etəqdimetmə qaydaları\u003C\u002FredLink\u003E ilə diqqətlə tanış olun və bütün tələb olunan sənədləri təqdim edin. Fayl formatları JPEG, JPG və ya PNG olmalı, ölçü isə 20 MB-dan kiçik olmalıdır.","idpa_attachment_sec1":"Bölmə 1:","idpa_identification_document_title":"İddiaçı ilə bağlı sənədlər","idpa_identification_document_instruction_IP":"Zəhmət olmasa, rəsmi şəxsiyyəti təsdiq edən sənədlər təqdim edin. Nümunələrə aşağıdakılar daxildir: sürücülük vəsiqəsi (ön və arxa), pasport (fotoşəkilli səhifə və sahibinin adını və təcili əlaqə məlumatlarını göstərən səhifə), Mənim Nömrə Kartım (yalnız ön tərəf) və s. Bundan əlavə, zəruri hallarda agentliyin səlahiyyətini təsdiq edən sənədləri, qəyyum kimi qanuni nümayəndənin razılığını təsdiq edən sənədləri və təqdimetmənin şəxsin özünə aid olduğunu göstərən sənədləri təqdim etməlisiniz. Həmçinin hüquqi şəxssinizsə, Korporativ Qeydiyyat Sertifikatı və nümayəndənin etibarnaməsi kimi sənədləri təqdim etməlisiniz. \u003CredLink\u003EƏtraflı məlumat\u003C\u002FredLink\u003E","idpa_identification_document_instruction_nonIP":"Zəhmət olmasa, rəsmi şəxsiyyəti təsdiq edən sənədlər təqdim edin. Nümunələrə aşağıdakılar daxildir: sürücülük vəsiqəsi (ön və arxa), pasport (fotoşəkilli səhifə və sahibinin adını və təcili əlaqə məlumatlarını göstərən səhifə), Mənim Nömrə Kartım (yalnız ön tərəf) və s. Bundan əlavə, zəruri hallarda agentliyin səlahiyyətini təsdiq edən sənədləri, qəyyum kimi qanuni nümayəndənin razılığını təsdiq edən sənədləri və təqdimetmənin şəxsin özünə aid olduğunu göstərən sənədləri təqdim etməlisiniz. \u003CredLink\u003EƏtraflı məlumat\u003C\u002FredLink\u003E","attachment_upload_limit":"Every single file must be less than 20MB","idpa_attachment_sec2":"Bölmə 2:","idpa_right_holder_status_title":"Hüquq sahibinin statusunu təsdiqləyən sənədlər","idpa_ric_proof_title":"Hüquqların pozulması ilə bağlı sənədlər","idpa_right_holder_status_instruction_1":"(Əqli mülkiyyət hüquqlarının pozulması)","idpa_right_holder_status_instruction_2":"Zəhmət olmasa, pozulduğunu düşündüyünüz əqli mülkiyyət hüquqlarını müəyyən edən sənədləri və iddia edilən əqli mülkiyyətin sahibi olduğunuzu göstərən sənədləri təqdim edin. \u003CredLink\u003EƏtraflı məlumat\u003C\u002FredLink\u003E","idpa_right_holder_status_instruction_3":"(Biznes maraqlarının pozulması)","idpa_right_holder_status_instruction_4":"Tələb olunan sənədlər pozulduğu iddia edilən biznes maraqlarından asılı olaraq dəyişir (məsələn, məhsul etiketlərinin nüfuzunu və ya şöhrətini nümayiş etdirən materiallar, paylaşımın istehlakçıları keyfiyyət barədə yanıltdığını göstərən materiallar). Zəhmət olmasa, \u003CredLink\u003Etəfərrüatları\u003C\u002FredLink\u003E nəzərdən keçirin və müvafiq sənədləri təqdim edin. Hər birinin ölçüsü 20 MB-dan kiçik olan JPEG, JPG və ya PNG formatında maksimum 3 fayl yükləyə bilərsiniz.","idpa_ric_proof_instruction":"Zəhmət olmasa, paylaşılan kontentin hüquqlarınızı pozduğunu düşündüyünüz hissəsini göstərən skrinşot və ya oxşar dəlil təqdim edin. Hər birinin ölçüsü 20 MB-dan kiçik olan JPEG, JPG və ya PNG formatında maksimum 3 fayl yükləyə bilərsiniz. \u003CredLink\u003EƏtraflı məlumat\u003C\u002FredLink\u003E","idpa_attachment_sec3":"Bölmə 3:","idpa_other_document_title":"Digər təsdiqləyici sənədlər","idpa_other_document_instruction":"Zəhmət olmasa, işin böhtan istisnalarına aid olmadığını göstərən materiallar kimi hər hansı təsdiqləyici sənəd təqdim edin. Hər birinin ölçüsü 20 MB-dan kiçik olan JPEG, JPG və ya PNG formatında maksimum 3 fayl yükləyə bilərsiniz. \u003CredLink\u003EƏtraflı məlumat\u003C\u002FredLink\u003E","idpa_disclaimer":"Nəzərə alın ki, qəsdən yalan və ya yanıldıcı şikayət etmək qanunvericiliyə əsasən cəzalandırıla bilər. Əgər tez-tez açıq-aşkar əsassız şikayətlər edirsinizsə, sizin şikayət etmək imkanınızı dayandırmaq və ya hesabınızı həmişəlik qadağan etmək hüququmuzu özümüzdə saxlayırıq. \u003CredLink\u003EƏtraflı məlumat\u003C\u002FredLink\u003E","ad_report_detail_placeholder_75_uk":"Xahiş edirik,  mesajlar – 18 yaşdan kiçik bütün istifadəçilərin Sizin üçün lenti üçün uyğun deyil.","vid_mod_analytics_penalty_reason_unoriginal_title":"Orijinal olmayan, keyfiyyətsiz və QR kod kontenti","vid_mod_analytics_penalty_reason_unoriginal_desc":"TikTok tətbiqini istifadəçilərimiz üçün pozitiv və zövqlü saxlamaq üçün orijinal olmayan və ya keyfiyyətsiz kontent tövsiyə üçün uyğun deyil. Qeyri-orijinal kontentə başqa mənbələrdən (məsələn, digər platformalar, TV şouları, filmlər və ya veb yayımlar) yeni, kreativ redaktələr olmadan idxal edilmiş və ya yüklənmiş videolar daxildir. Videonun orijinal olmadığını onun üzərində su nişanı və ya üst-üstə qoyulmuş loqotip olduqda deyə bilərik. Aşağı keyfiyyətli kontentə çox qısa videolar, statik şəkillər və yalnız GIF-lərdən hazırlanmış videolar daxildir. QR kodları olan kontent adətən Sizin üçün lentinə uyğun deyil, çünki riskin aşağı olduğu hallarda (məsələn, e-ticarət üçün) istisnalar ediriksə də, o, istifadəçiləri zərərli veb-saytlara və ya tətbiqlərə apara bilər.","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"Orijinal olmayan, keyfiyyətsiz və QR kod kontenti","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"İstifadəçilərimizin TikTok platformasından gözlədiyi müsbət təcrübəni qorumaq üçün orijinal olmayan və keyfiyyətsiz kontent tövsiyə üçün uyğun deyil. Qeyri-orijinal kontent yeni, yaradıcı redaktə olmadan başqa mənbələrdən sadəcə idxal edilən və ya kopyalanan kontentdir. Əgər onun üzərində su nişanı və ya loqo varsa, video orijinal ola bilər. Aşağı keyfiyyətli kontentə çox qısa videolar, statik şəkillər və yalnız GIF-lərdən hazırlanmış videolar daxildir.","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"Təkrarlanan hesab","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"Hesabınızda orijinal olmayan və Sizin üçün lentinə uyğun olmayan postlar var. Ətraflı məlumat üçün İcma təlimatları \u003E Sizin üçün lentinə uyğun deyil \u003E Orijinal, aşağı keyfiyyətli QR kod kontenti bölmələrini nəzərdən keçirin","vid_mod_analytics_penalty_reason_spam_title":"Spam, orijinal olmayan və ya aldadıcı kontent","vid_mod_analytics_penalty_reason_spam_desc":"Platformada daha çox izləyici, bəyənmə, baxış və ya digər nişan göstəriciləri əldə etmək üçün istifadəçiləri aldatmağa və ya manipulyasiya etməyə çalışan kontent Sizin üçün lentinə uyğun deyil. Buraya istifadəçiləri bir-birini izləməyə və ya bəyənməyə təşviq edən kontent və ya istifadəçiləri bəyənməyə və ya paylaşma düymələrinə basmağa sövq edən kontent daxildir. Əlavə olaraq, sui-qəsd nəzəriyyələrini təbliğ edən və cari hadisələr və təfərrüatların hələ də inkişaf etdiyi hadisələr haqqında yalan və ya zərərli məlumat yayan kontent də Sizin üçün lentinə uyğun deyil.","vid_mod_analytics_penalty_reason_sexual_title":"Açıq seksual kontent","vid_mod_analytics_penalty_reason_sexual_desc":"Rahat təcrübəni davam etdirmək üçün açıq şəkildə seksual xarakter daşıyan kontent tövsiyə üçün uyğun olmaya bilər. Buraya çılpaqlığı əks etdirən, bədən hissələrini seksuallaşdıran və ya açıq-aşkar erotik və ya şəhvətli (yəni, striptiz) kontent daxildir.","vid_mod_analytics_penalty_reason_tobacco_title":"Tütün və alkoqol məhsulları","vid_mod_analytics_penalty_reason_tobacco_desc":"İçmə icazəsinin verildiyi yaşda olan şəxslər tərəfindən istehlak edilən, lakin təhlükəli şəkildə edilən spirtli məhsulları təbliğ edən, xatırladan və ya təsvir edən kontent tövsiyə üçün uyğun olmaya bilər. Tütün məmulatlarının böyüklər tərəfindən istifadəsini əks etdirən və ya nəzarət edilən maddələrdən bəhs edən kontent tövsiyə üçün uyğun deyil.","vid_mod_analytics_penalty_reason_stunts_title":"Təhlükəli kaskadyorluq və idman","vid_mod_analytics_penalty_reason_stunts_desc":"Təhlükəsizlik tədbirləri olmadan təkrarlandıqda, müəyyən fəaliyyətlər riskli və ya təhlükəli ola bilər ki, bu da fiziki zərərə səbəb ola bilər. Təhlükəli kaskadyorlar və ya qeyri-peşəkarlar tərəfindən həyata keçirilən ekstremal idman növlərini ehtiva edən kontent uyğun olmaya bilər.","vid_mod_analytics_penalty_reason_graphic_title":"Zorakı və qrafik kontent","vid_mod_analytics_penalty_reason_graphic_desc":"İzləyicilərdə narahatlığa, şoka və ya iyrəncliyə səbəb olan kontent, o cümlədən qorxulu effektlər, sıçrama qorxuları, qanlı yaraları real şəkildə canlandıran qrim və bədən funksiyalarının təsvirləri \"Sizin üçün\" lentinə uyğun olmaya bilər. TikTok-da əksər zorakı və bariz kontentlərə icazə verilmir. Lakin ölüm, qəza və ya döyüşün bariz təsvirləri kimi bəzi kontent növlərinə o zaman icazə verə bilərik ki, real dünya hadisələrinin sənədləşdirilməsi kimi xidmət etsin və ictimai maraqlara uyğun hesab edilsin. Bu kontent bütün auditoriyalar tərəfindən rahat qarşılanmayacağına görə tövsiyə üçün uyğun olmayacaq və kontentdə \"seçin\" ekranı və ya xəbərdarlığı olacaq.","vid_mod_analytics_penalty_reason_fyf_title":"Sizin üçün lentinə uyğun deyil","vid_mod_analytics_penalty_reason_fyf_desc":"Videonuz Sizin üçün lentinin uyğunluq standartlarına uyğun deyildi. Əlavə məlumat üçün TikTok İcma təlimatlarınızı nəzərdən keçirin \u003E Sizin üçün lent üçün uyğun deyil","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"İstifadəçilər və üçüncü tərəflər bizə siyasət pozuntularını bildirə bilərlər. Biz bu siyasət pozuntusunu kontentin İcma Təlimatlarımızı pozduğuna dair bildiriş əsasında aşkar etdik.","vidModAnalytics_detailPg_sectionVideoDetails_sectionLabel":"Video təfərrüatları","vid_mod_analytics_appeal_detailpg_reason_title":"Pozuntu səbəbi","vid_mod_analytics_detail_pg_title":"Video uyğun deyil","vid_mod_analytics_detail_pg_desc":"Bu video İcma təlimatlarımızı pozduğu üçün Sizin üçün lentinə uyğun deyil.","vidModAnalytics_detailPg_sectionSuccess_header":"Etiraz qəbul edildi","vid_mod_analytics_appeal_success_detail_pg_desc":"Etirazınızı nəzərdən keçirdik və videonuzu bərpa etdik. Bunun səbəb ola biləcəyi hər hansı narahatlığa görə üzr istəyirik. TikTok icmasının bir hissəsi olduğunuz üçün təşəkkür edirik!","vid_mod_analytics_appeal_detail_pg_title":"V
