riscí a chur i leataobh ort nó d'fhealltóireacht buan a chur ar do chuntas. Féach ar ár Ionad Soilseacht le haghaidh tuilleadh eolais.","Web_report_reason_select":"Report reason:","dsa_illegal_report_email":"Do sheoladh ríomhphost","dsa_illegal_cite_law_optional":"(Roghnach)","dsa_illegal_report_fill_email":"Líon isteach do sheoladh ríomhphoist","cseReasons_reportPg_emailAddForm_body":"D'fhéadfá an tuarisc seo a chur isteach gan ainm. Ní thabharfar fógra duit faoin toradh, áfach, ná ní bheidh an rogha agat achomharc a dhéanamh.","dsa_illegal_report_trustedflagger_fill_email":"Iontráil seoladh ríomhphoist bailí","dsa_illegal_detail_country":"Dlínse dhlíthiúil","dsa_illegal_detail_law":"Dlí ábhartha","dsa_illegal_cite_law_desc":"Tabhair sonraí an dlí a líomhnaítear a sháraíonn an t-ábhar. Bí chomh sonrach agus is féidir le go mbeimid in ann measúnú ceart a dhéanamh ar do thuairisc.","dsa_illegal_detail_explanation":"Tuairiscigh Míniú","dsa_illegal_report_explanation_desc":"Déan cur síos ar an gcaoi a sháraíonn an t-ábhar an dlí ábhartha. Ní fhéadfar tuairiscí nach bhfuil dóthain faisnéise iontu a mheas mar thuairiscí bailí. Más ábhartha, sonraigh le do thoil an bhfuil an t-iarratas seo á chur isteach agat féin nó thar ceann duine eile.","dsa_illegal_appeal_signature":"Síniú","dsa_illegal_sign_legal_name":"Sínigh d’ainm dlíthiúil anseo.","dsa_illegal_confirm_accuracy":"Dearbhaím go gcreideann mé go bhfuil ábhar na tuarascála seo fíor, cruinn agus iomlán.","idpa_attachment":"Ceangaltáin","idpa_attachment_instruction":"Ní mór don sealbhóir cearta a bhfuil a chearta sáraithe, nó d’ionadaí údaraithe, an tuarascáil a chur isteach. Léigh \u003CredLink\u003Ena treoirlínte maidir le haighneachtaí\u003C\u002FredLink\u003E go cúramach agus cuir isteach an doiciméadacht riachtanach go léir. Ní mór na formáidí comhaid a bheith JPEG, JPG, nó PNG, agus ní mór dóibh a bheith faoi bhun 20 MB.","idpa_attachment_sec1":"Alt 1:","idpa_identification_document_title":"Doiciméid maidir leis an éilitheoir","idpa_identification_document_instruction_IP":"Cuir isteach doiciméid aitheantais oifigiúla. I measc na samplaí tá: ceadúnas tiomána (taobh tosaigh agus taobh cúil), pas (leathanach grianghraf agus leathanach ina bhfuil ainm an tsealbhóra agus faisnéis teagmhála éigeandála), My Number Card (taobh tosaigh amháin), srl. Ina theannta sin, de réir mar is gá, ní mór duit doiciméid a chur isteach a chruthaíonn údarás gníomhaireachta, doiciméid a chruthaíonn toiliú ó ionadaí dlíthiúil amhail caomhnóir, chomh maith le doiciméid a léiríonn gur leis an duine aonair féin an t-aighneacht. Lena chois sin, i gcás gur duine dlítheanach thú, ní mór duit doiciméid amhail Deimhniú Clárúcháin Chorparáidigh, agus Cumhacht Aturnae ó ionadaí a chur isteach. \u003CredLink\u003ETuilleadh Faisnése\u003C\u002FredLink\u003E","idpa_identification_document_instruction_nonIP":"Cuir isteach doiciméid aitheantais oifigiúla. I measc na samplaí, tá: ceadúnas tiomána (taobh tosaigh agus taobh cúil), pas (leathanach grianghraf agus leathanach ina bhfuil ainm an tsealbhóra agus faisnéis teagmhála éigeandála), My Number Card (taobh tosaigh amháin), srl. Ina theannta sin, de réir mar is gá, ní mór duit doiciméid a chur isteach a chruthaíonn údarás gníomhaireachta, doiciméid a chruthaíonn toiliú ó ionadaí dlíthiúil amhail caomhnóir, chomh maith le doiciméid a léiríonn gur leis an duine aonair féin an t-aighneacht. \u003CredLink\u003ETuilleadh faisnéise\u003C\u002FredLink\u003E","attachment_upload_limit":"Every single file must be less than 20MB","idpa_attachment_sec2":"Alt 2:","idpa_right_holder_status_title":"Doiciméid a chruthaíonn stádas sealbhóra cearta","idpa_ric_proof_title":"Doiciméid maidir leis an sárú ceart","idpa_right_holder_status_instruction_1":"(Sárú ar chearta maoine intleachtúla)","idpa_right_holder_status_instruction_2":"Cuir isteach doiciméid a shainaithníonn na cearta maoine intleachtúla a chreideann tú a sáraíodh, chomh maith le doiciméid a léiríonn gur tusa úinéir na maoine intleachtúla a líomhnaíodh. \u003CredLink\u003ETuilleadh faisnéise\u003C\u002FredLink\u003E","idpa_right_holder_status_instruction_3":"(Sárú ar leas gnó)","idpa_right_holder_status_instruction_4":"Athraíonn an doiciméadacht riachtanach ag brath ar na leasanna gnó a líomhnaítear a sáraíodh (m.sh., ábhair a léiríonn cáil nó clú lipéid táirgí, ábhair a léiríonn go gcuireann an postáil tomhaltóirí amú faoi cháilíocht). Léigh \u003CredLink\u003Ena sonraí\u003C\u002FredLink\u003E agus cuir isteach an doiciméadacht chuí. Féadfaidh tú suas le trí chomhad a uaslódáil i bhformáid JPEG, JPG nó PNG, gach ceann faoi bhun 20 MB.","idpa_ric_proof_instruction":"Cuir isteach pictiúr scáileáin nó fianaise eile a thaispeánann an chuid den ábhar postáilte a chreideann tú a sháraíonn do chearta. Is féidir leat suas le trí chomhad a uaslódáil i bhformáid JPEG, JPG, nó PNG, gach ceann faoi bhun 20 MB. \u003CredLink\u003ETuilleadh faisnéise\u003C\u002FredLink\u003E","idpa_attachment_sec3":"Alt 3:","idpa_other_document_title":"Doiciméid tacaíochta eile","idpa_other_document_instruction":"Cuir isteach aon doiciméid tacaíochta amhail ábhair a léiríonn nach dtagann an cás faoi na heisceachtaí maidir le clúmhilleadh. Féadfaidh tú suas le trí chomhad a uaslódáil i bhformáid JPEG, JPG nó PNG, gach ceann faoi bhun 20 MB. \u003CredLink\u003ETuilleadh faisnéise\u003C\u002FredLink\u003E","idpa_disclaimer":"Tabhair faoi deara go bhféadfadh sé a ngabhann pionós leis faoin dlí tuairisc bhréagach nó mhíthreorach a dhéanamh d’aon ghnó. Má chuireann tú tuairiscí isteach go minic atá gan bhunús soiléir, coimeádaimid ár gceart chun do chumas tuairiscí a chur isteach a chur ar fionraí nó cosc ​​buan a chur ar do chuntas. \u003CredLink\u003ETuilleadh faisnéise\u003C\u002FredLink\u003E","ad_report_detail_placeholder_75_uk":"Tabhair sonraí faoi do thaithí leis an bhfógra seo le cabhrú linn na gníomhartha riachtanacha a dhéanamh. Seo a leanas samplaí d’ábhar atá díobhálach do pháistí faoin OSA sa Ríocht Aon n","pc_web_less_btn":"níos lú","collectionsProfilePage_favoritesPage_newModal_errorMessage":"Sáraíodh an teorainn charachtair","pcWeb_add_reply":"Cuir freagra leis...","comment_tray_default":"Cuir trácht...","vid_mod_analytics_penalty_reason_minor_title":"Sábháilteacht leanaí","vid_mod_analytics_penalty_reason_minor_desc":"Chun seomra breise a chur ar fáil do dhéagóirí chun iniúchadh agus léiriú aitheantais a dhéanamh i spásanna digiteacha, níl ábhar a uaslódálann úsáideoirí faoi bhun 16 bliana d'aois incháilithe le haghaidh moladh. D'fhéadfadh rátaí níos airde míshástachta coirp a bheith mar thoradh ar mháinliacht chosmaideach a chur chun cinn do mhionaoisigh. Dá réir sin, tá ábhar den sórt sin - lena n-áirítear físeáin roimh agus tar éis, físeáin de nósanna imeachta máinliachta, agus teachtaireachtaí a phléann máinliacht chosmaideach roghnach gan rabhadh faoi rioscaí - neamh-incháilithe d'Fhíd Duit de gach úsáideoir faoi 18.","vid_mod_analytics_penalty_reason_unoriginal_title":"Ábhar cód neamh-bhunaidh, ar chaighdeán íseal, agus QR","vid_mod_analytics_penalty_reason_unoriginal_desc":"Chun TikTok a choinneáil dearfach agus taitneamhach do na húsáideoirí againn, ní féidir le hábhar seanchaite nó ar chaighdeán íseal a bheith incháilithe do mholtaí. Ina measc tá físeáin a iompórtáiltear nó a uaslódáiltear go díreach ó fhoinsí eile (cosúil le hardáin eile, cláir teilifíse, scannáin, nó craoltaí gréasáin) gan aon eagarthóireacht chruthaitheach nua déanta orthu. Is féidir linn a rá má tá físeán seanchaite má tá comhartha uisce digiteach nó lógó forleagtha air. Is ionann ábhar ar chaighdeán íseal agus físeáin an-ghearr, íomhánna statacha, agus físeáin a dhéantar de GIFanna amháin. De ghnáth ní bhíonn ábhar a bhfuil códanna QR mar chuid dó incháilithe d'fhotha For You toisc gurbh fhéidir leis úsáideoirí a chur i dtreo suíomhanna gréasáin nó aipeanna díobhálacha, cé go ndéanaimid eisceacht i gcásanna a bhfuil baol íseal ag baint leo (mar shampla, i gcás ríomhthráchtála).","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"Ábhar cód neamh-bhunaidh, ar chaighdeán íseal, agus QR","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"Chun an taithí dhearfach lena mbíonn ár n-úsáideoirí ag súil ó ardán TikTok a choinneáil, níl ábhar seanchaite agus ar chaighdeán íseal incháilithe le moladh. Is éard is ábhar seanchaite ann ná ábhar a iompórtáiltear nó a chóipeáiltear ó fhoinsí eile gan aon athruithe cruthaitheacha nua déanta orthu. D’fhéadfadh físeán a bheith seanchaite má tá comhartha uisce nó lógó air. Áirítear le hábhar ar chaighdeán íseal físeáin an-ghearr, íomhánna statacha, agus físeáin déanta as GIFanna amháin.","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"Cuntas atáirgthe","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"Tá postálacha sa chuntas agat nach bhfuil iad Bhunaithe agus nach bhfuil iad incháilithe don A lán duit. Chun tuillidh eolais a fháil, d’athbhreithnigh ár Dtreoirlínte Pobail \u003E Aschur neamh oiriúnach don A lán \u003E Ábhar Neamh Bhunaithe, Lag Chaighdeáin, agus Cód QR","vid_mod_analytics_penalty_reason_spam_title":"Ábhar turscair, ábhar barántúil nó míthreorach","vid_mod_analytics_penalty_reason_spam_desc":"Ní cheadaítear ar an bhfotha For You ábhar a bhfuil mar chuspóir aige cleas a imirt ar úsáideoirí nó iad a ionramháil chun níos mó leantóirí, 'is maith liom', amharc nó méadrachtaí rannpháirtíochta a fháil ar an ardán. Áirítear leis seo ábhar a spreagann úsáideoirí leanúint a chéile nó 'is maith liom' a thabhairt dá chéile, nó ábhar a spreagann úsáideoirí na cnaipeanna 'is maith liom' nó 'comhroinn' a chliceáil trí chleasaíocht. Chomh maith leis sin, ní cheadaítear ar an bhfotha For You ábhar a chuireann teoiricí comhcheilge chun cinn agus ábhar a scaipeann eolas bréagach nó díobhálach faoi imeachtaí reatha agus imeachtaí faoina bhfuil forbairt ag teacht ar na sonraí fós.","vid_mod_analytics_penalty_reason_sexual_title":"Ábhar ró-ghnéasach","vid_mod_analytics_penalty_reason_sexual_desc":"Chun cabhrú le taithí chompordach a choinneáil, d'fhéadfadh sé nach mbeadh ábhar atá ró-mholtach go gnéasach incháilithe le haghaidh moladh. Áirítear leis seo ábhar a léiríonn nochtacht intuigthe, a dhéanann codanna coirp a ghnéasú, nó atá earótach go soiléir nó céadfach (m.sh. struipeáil).","vid_mod_analytics_penalty_reason_tobacco_title":"Táirgí tobac agus alcóil","vid_mod_analytics_penalty_reason_tobacco_desc":"Ní bhfuairfhéadfadh ábhar a spreagann, a lua nó a léiríonn táirgí alcóil a thógann daoine a bhfuil an aois phósta acu ach déantar é i modh a chuireann iad féin i mbaol a bheith incháilithe le himeacht ama cáiliúil. Níl ábhar a léiríonn úsáid ar tháirgí toitbhearta ag daoine fásta nó a luaitear substaintí rialaithe ar fáil le himeacht ama cáiliúil incháilithe le himeacht ama cáiliúil.","vid_mod_analytics_penalty_reason_stunts_title":"Cleasanna contúirteacha agus spóirt","vid_mod_analytics_penalty_reason_stunts_desc":"Nuair a mhacasamhlú gan réamhchúraimí sábháilteachta, is féidir le gníomhaíochtaí áirithe a bheith baolach nó contúirteach, rud a d'fhéadfadh dochar fisiciúil a bheith mar thoradh orthu. D'fhéadfadh ábhar lena n-áirítear cleasanna contúirteacha, nó spóirt fhoircneacha a dhéanann neamhghairmithe, a bheith neamh-incháilithe.","vid_mod_analytics_penalty_reason_graphic_title":"Ábhar foréigneach agus grafach","vid_mod_analytics_penalty_reason_graphic_desc":"D'fhéadfadh ábhar a chuireann míchompord, scéin nó déistin ar an lucht féachana a bheith neamh-incháilithe don bhFíd Duit, lena n-áirítear éifeachtaí scanrúla, ábhar a chuirfidh eagla ar dhaoine gan choinne, smideadh a athchruthaíonn créachtaí fuilteacha go réalaíoch, agus léirithe feidhmeanna coirp. Ní cheadaítear an chuid is mó d'ábhar foréigneach agus grafach ar TikTok. Mar sin féin, d'fhéadfaimis cineálacha áirithe ábhair a cheadú, amhail íomhánna grafacha den bhás, de thimpistí nó de throdanna nuair atá feidhm doiciméadaithe aige maidir le himeachtaí a thiteann amach sa
