c":"เพื่อให้วัยรุ่นมีพื้นที่เพิ่มในการสำรวจอัตลักษณ์และการแสดงออกบนพื้นที่ดิจิทัล เนื้อหาที่อัปโหลดโดยผู้ใช้อายุต่ำกว่า 16 ปีจะไม่มีสิทธิ์ได้รับการแนะนำ การส่งเสริมให้ผู้เยาว์ทำศัลยกรรมเสริมความงามอาจทำให้อัตราความไม่พึงพอใจรูปลักษณ์ตนเองสูงขึ้น ดังนั้น เนื้อหาดังกล่าว รวมถึงวิดีโอก่อนและหลัง วิดีโอขั้นตอนการศัลยกรรม และข้อความที่กล่าวถึงศัลยกรรมเสริมความงามแบบทางเลือกโดยไม่มีคำเตือนถึงความเสี่ยง ไม่เข้าเกณฑ์สำหรับฟีด \"สำหรับคุณ\" ของผู้ใช้ทุกคนที่อายุต่ำกว่า 18 ปี","vid_mod_analytics_penalty_reason_unoriginal_title":"เนื้อหาไม่ใช่ต้นฉบับ คุณภาพต่ำ และเป็นคิวอาร์โค้ด","vid_mod_analytics_penalty_reason_unoriginal_desc":"เพื่อให้ TikTok ก่อให้เกิดประโยชน์และสนุกสนานสำหรับผู้ใช้ของเรา เนื้อหาที่ไม่ใช่ต้นฉบับหรือมีคุณภาพต่ำจะไม่เข้าเกณฑ์สำหรับการแนะนำ เนื้อหาที่ไม่ใช่ต้นฉบับรวมถึงวิดีโอที่เพิ่งนำเข้าหรืออัปโหลดจากแหล่งอื่น (เช่น แพลตฟอร์มอื่น รายการทีวี ภาพยนตร์ หรือเว็บคาสต์) โดยไม่มีการแก้ไขใหม่อย่างสร้างสรรค์ เราสามารถบอกได้ว่าวิดีโอนั้นไม่ใช่ต้นฉบับหากมีลายน้ำหรือโลโก้ทับซ้อนอยู่ เนื้อหาคุณภาพต่ำรวมถึงวิดีโอที่สั้นมาก ภาพนิ่ง และวิดีโอที่สร้างจาก GIF เพียงอย่างเดียว โดยทั่วไปแล้ว เนื้อหาที่มีคิวอาร์โค้ดจะไม่เข้าเกณฑ์สำหรับฟีด \"สำหรับคุณ\" เนื่องจากอาจนำผู้ใช้ไปยังเว็บไซต์หรือแอปที่เป็นอันตราย แม้ว่าเราจะมีข้อยกเว้นในสถานการณ์ที่มีความเสี่ยงต่ำก็ตาม (เช่น สำหรับอีคอมเมิร์ซ)","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"เนื้อหาไม่ใช่ต้นฉบับ คุณภาพต่ำ และเป็นคิวอาร์โค้ด","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"เพื่อให้ผู้ใช้ของเราได้รับประสบการณ์ที่ดีอย่างต่อเนื่องจากแพลตฟอร์ม TikTok ตามความคาดหวัง เนื้อหาที่ไม่ใช่ต้นฉบับและมีคุณภาพต่ำจะไม่เข้าเกณฑ์สำหรับการแนะนำ เนื้อหาที่ไม่ใช่ต้นฉบับคือเนื้อหาที่เพิ่งนำเข้าหรือคัดลอกมาจากแหล่งอื่นโดยไม่มีการแก้ไขใหม่อย่างสร้างสรรค์ วิดีโออาจไม่ใช่ต้นฉบับหากมีลายน้ำหรือโลโก้ เนื้อหาคุณภาพต่ำรวมถึงวิดีโอที่สั้นมาก ภาพนิ่ง และวิดีโอที่สร้างจาก GIF เพียงอย่างเดียว","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"บัญชีที่ทำซ้ำ","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"บัญชีของคุณมีโพสต์ที่ไม่ใช่ต้นฉบับและไม่เข้าเกณฑ์สำหรับฟีดสำหรับคุณ หากต้องการข้อมูลเพิ่มเติม โปรดอ่านหลักเกณฑ์สำหรับชุมชนของเรา \u003E ไม่เหมาะสมกับฟีดสำหรับคุณ \u003E เนื้อหาไม่ใช่ต้นฉบับ คุณภาพต่ำ และเป็นคิวอาร์โค้ด","vid_mod_analytics_penalty_reason_spam_title":"เนื้อหาที่เป็นสแปม ไม่เป็นจริง หรือทำให้เข้าใจผิด","vid_mod_analytics_penalty_reason_spam_desc":"เนื้อหาที่พยายามหลอกลวงหรือควบคุมผู้ใช้เพื่อเพิ่มจำนวนผู้ติดตาม ยอดถูกใจ ยอดการดู หรือตัววัดการมีส่วนร่วมอื่น ๆ บนแพลตฟอร์มจะไม่เข้าเกณฑ์การแสดงบนฟีด \"สำหรับคุณ\" รวมถึงเนื้อหาที่กระตุ้นให้ผู้ใช้ติดตามหรือถูกใจกันเอง หรือเนื้อหาที่หลอกลวงให้ผู้ใช้คลิกปุ่มถูกใจหรือแชร์ นอกจากนี้ เนื้อหาที่ส่งเสริมทฤษฎีสมคบคิดและเผยแพร่ข้อมูลที่เป็นเท็จหรือเป็นอันตรายเกี่ยวกับเหตุการณ์ปัจจุบันและเหตุการณ์ที่รายละเอียดยังคงดำเนินอยู่จะไม่เข้าเกณฑ์สำหรับฟีด \"สำหรับคุณ\"","vid_mod_analytics_penalty_reason_sexual_title":"เนื้อหาเกี่ยวกับเรื่องเพศอย่างเปิดเผย","vid_mod_analytics_penalty_reason_sexual_desc":"เพื่อช่วยรักษาประสบการณ์การใช้งานที่สะดวกสบาย เนื้อหาที่มีการชี้นำทางเพศอย่างโจ่งแจ้งอาจไม่เข้าเกณฑ์สำหรับการแนะนำ รวมถึงเนื้อหาที่สื่อถึงการเปลือยกายโดยแฝง สัดส่วนต่าง ๆ ของร่างกายเกี่ยวข้องในทางเพศ หรือมีความเร้าอารมณ์หรือกระตุ้นความรู้สึกอย่างโจ่งแจ้ง (เช่น การเย้ายวนโดยการเปลื้องผ้า)","vid_mod_analytics_penalty_reason_tobacco_title":"ผลิตภัณฑ์ยาสูบและเครื่องดื่มแอลกอฮอล์","vid_mod_analytics_penalty_reason_tobacco_desc":"เนื้อหาที่ส่งเสริม เอ่ยถึง หรือแสดงภาพผลิตภัณฑ์เครื่องดื่มแอลกอฮอล์ที่บริโภคโดยบุคคลที่บรรลุนิติภาวะแล้วแต่กระทำในลักษณะที่เป็นอันตราย อาจไม่เข้าเกณฑ์สำหรับการแนะนำ เนื้อหาที่แสดงถึงการใช้ผลิตภัณฑ์ยาสูบโดยผู้ใหญ่หรือกล่าวถึงสารควบคุม ไม่เข้าเกณฑ์สำหรับการแนะนำ","vid_mod_analytics_penalty_reason_stunts_title":"การแสดงผาดโผนและการเล่นกีฬาที่เป็นอันตราย","vid_mod_analytics_penalty_reason_stunts_desc":"เมื่อทำซ้ำโดยไม่มีการป้องกันความปลอดภัย กิจกรรมบางอย่างอาจมีความเสี่ยงหรือเป็นอันตราย ซึ่งอาจนำไปสู่อันตรายทางร่างกายได้ เนื้อหาที่มีการแสดงผาดโผนอันตรายหรือกีฬาผาดโผนโดยผู้ที่ไม่ใช่มืออาชีพ อาจไม่เข้าเกณฑ์","vid_mod_analytics_penalty_reason_graphic_title":"เนื้อหาที่มีความรุนแรงและโจ่งแจ้ง","vid_mod_analytics_penalty_reason_graphic_desc":"เนื้อหาที่ทำให้ผู้ชมรู้สึกไม่สบายใจ ตกใจ หรือขยะแขยงอาจไม่เข้าเกณฑ์สำหรับฟีด \"สำหรับคุณ\" รวมถึงเอฟเฟกต์ที่น่ากลัว ทำให้ตกใจกลัวอย่างแรง การแต่งหน้าที่จำลองบาดแผลที่นองเลือดอย่างสมจริง และการแสดงการทำงานของร่างกาย เราไม่อนุญาตเนื้อหาที่มีความรุนแรงและดูสยดสยองบน TikTok อย่างไรก็ตาม เราอาจอนุญาตเนื้อหาบางประเภท เช่น ภาพกราฟิกของความตาย อุบัติเหตุ หรือการต่อสู้ เมื่อเป็นเอกสารประกอบสำหรับเหตุการณ์จริงและถือว่าเป็นประโยชน์ต่อสาธารณะ เนื่องจากเนื้อหานี้อาจทำให้ผู้ชมรู้สึกไม่สบายใจ จึงไม่เข้าเกณฑ์สำหรับการแนะนำและเนื้อหาจะมีหน้าจอหรือคำเตือน \"เลือกรับ\"","vid_mod_analytics_penalty_reason_fyf_title":"ไม่เข้าเกณฑ์สำหรับฟีดสำหรับคุณ","vid_mod_analytics_penalty_reason_fyf_desc":"วิดีโอของคุณไม่เป็นไปตามมาตรฐานการเข้าเกณฑ์ของเราสำหรับฟีด \"สำหรับคุณ\" โปรดตรวจดูหลักเกณฑ์สำหรับชุมชน TikTok สำหรับข้อมูลเพิ่มเติม \u003E ไม่เข้าเกณฑ์สำหรับฟีด \"สำหรับคุณ\"","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"ผู้ใช้และบุคคลที่สามสามารถรายงานการละเมิดนโยบายให้เราทราบได้ เราตรวจจับการละเมิดนโยบายนี้จากการรายงานเนื้อหาที่ละเมิดหลักเกณฑ์สำหรับชุมชนของเรา","vidModAnalytics_detailPg_sectionVideoDetails_sectionLabel":"รายละเอียดวิดีโอ","vid_mod_analytics_appeal_detailpg_reason_title":"เหตุผลที่ละเมิด","vid_mod_analytics_detail_pg_title":"วิดีโอไม่เข้าเกณฑ์","vid_mod_analytics_detail_pg_desc":"วิดีโอนี้ไม่เข้าเกณฑ์การแสดงบนฟีดสำหรับคุณเนื่องจากละเมิดหลักเกณฑ์สำหรับชุมชนของเรา","vidModAnalytics_detailPg_sectionSuccess_header":"คำร้องได้รับการอนุมัติแล้ว","vid_mod_analytics_appeal_success_detail_pg_desc":"เราได้ตรวจสอบคำร้องและกู้คืนวิดีโอของคุณแล้ว เราขออภัยในความไม่สะดวกใด ๆ ที่อาจเกิดขึ้น ขอบคุณที่ร่วมเป็นส่วนหนึ่งของชุมชน TikTok","vid_mod_analytics_appeal_detail_pg_title":"ลบวิดีโอออกแล้ว","vid_mod_analytics_appeal_detail_pg_desc":"วิดีโอนี้ละเมิดหลักเกณฑ์สำหรับชุมชนของเรา","vidModAnalytics_appealSubmitted_sectionTitle_header":"ได้รับคำขอแล้ว","vid_mod_ana
