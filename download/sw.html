natoa taarifa ambazo hazina msingi, tuna haki ya kusimamisha uwezo wako wa kutoa taarifa au kupiga marufuku kabisa akaunti yako.","dsa_illegal_report_penalty_reminder":"Tafadhali kumbuka kwamba kupiga ripoti za uwongo au za kupotosha kimakusudi kuhusu maudhui haramu kunaweza kuadhibiwa chini ya sheria. Ukiwasilisha ripoti mara nyingi ambazo hazina misingi yoyote, tunahifadhi haki zetu za kusitisha uwezo wako wa kuwasilisha ripoti au kupiga marufuku akaunti yako kabisa. Tazama Kituo chetu cha Uwazi ili kupata maelezo zaidi.","Web_report_reason_select":"Report reason:","dsa_illegal_report_email":"Anwani yako ya barua pepe","dsa_illegal_cite_law_optional":"(Ya hiari)","dsa_illegal_report_fill_email":"Weka anwani yako ya barua pepe","cseReasons_reportPg_emailAddForm_body":"Unaweza kutuma ripoti hii bila kufichua utambulisho wako. Hata hivyo, hutaarifiwa kuhusu matokeo au una chaguo la kukata rufaa.","dsa_illegal_report_trustedflagger_fill_email":"Weka anwani sahihi ya barua pepe","dsa_illegal_detail_country":"Mamlaka ya kisheria","dsa_illegal_detail_law":"Sheria husika","dsa_illegal_cite_law_desc":"Tafadhali weka maelezo ya sheria ambayo maudhui yanadaiwa kukiuka. Tafadhali eleza kwa kina iwezekanavyo ili kutuwezesha kutathmini ripoti yako ipasavyo.","dsa_illegal_detail_explanation":"Ufafanuzi wa Ripoti","dsa_illegal_report_explanation_desc":"Tafadhali eleza jinsi maudhui yanakiuka sheria husika. Ripoti ambazo hazina maelezo ya kutosha haziwezi kuzingatiwa kuwa halali. Panapofaa, tafadhali bainisha kama unawasilisha ombi hili kwa niaba yako au kwa niaba ya mtu mwingine.","dsa_illegal_appeal_signature":"Saini","dsa_illegal_sign_legal_name":"Weka jina lako la kisheria hapa.","dsa_illegal_confirm_accuracy":"Ninathibitisha imani yangu kwamba maudhui yaliyo kwenye ripoti hii ni ya kweli, ni sahihi na ni kamili.","idpa_attachment":"Viambatisho","idpa_attachment_instruction":"Ripoti lazima iwasilishwe na mwenye haki ambaye haki zake zimekiukwa, au na mwakilishi aliyeidhinishwa. Tafadhali kagua \u003CredLink\u003Emiongozo ya uwasilishaji\u003C\u002FredLink\u003E kwa uangalifu na uwasilishe nyaraka zote zinazohitajika. Miundo ya faili lazima iwe JPEG, JPG, au PNG, na lazima iwe chini ya MB 20.","idpa_attachment_sec1":"Sehemu ya 1:","idpa_identification_document_title":"Nyaraka kuhusu mdai","idpa_identification_document_instruction_IP":"Tafadhali wasilisha hati rasmi za utambulisho. Mifano ni pamoja na: leseni ya udereva (mbele na nyuma), pasipoti (ukurasa wa picha na ukurasa ulio na jina la mmiliki na maelezo ya mawasiliano ya dharura), Kadi Yangu ya Nambari (mbele pekee), n.k. Zaidi ya hayo, inapohitajika, lazima uwasilishe hati zinazothibitisha mamlaka ya wakala, hati zinazothibitisha idhini kutoka kwa mwakilishi wa kisheria kama vile mlezi, na hati zinazoonyesha kwamba uwasilishaji unahusu mtu binafsi mwenyewe. Zaidi ya hayo, ikiwa wewe ni mwanasheria, lazima uwasilishe hati kama vile Cheti cha Usajili wa Shirika, na Mamlaka ya Wakili kutoka kwa mwakilishi.\u003CredLink\u003EPata maelezo zaidi\u003C\u002FredLink\u003E","idpa_identification_document_instruction_nonIP":"Tafadhali wasilisha hati rasmi za utambulisho. Mifano ni pamoja na: leseni ya udereva (mbele na nyuma), pasipoti (ukurasa wa picha na ukurasa ulio na jina la mmiliki na maelezo ya mawasiliano ya dharura), Kadi Yangu ya Nambari (mbele pekee), n.k. Zaidi ya hayo, inapohitajika, lazima uwasilishe hati zinazothibitisha mamlaka ya wakala, hati zinazothibitisha idhini kutoka kwa mwakilishi wa kisheria kama vile mlezi, na hati zinazoonyesha kwamba uwasilishaji unahusu mtu binafsi mwenyewe. \u003CredLink\u003EPata maelezo zaidi\u003C\u002FredLink\u003E","attachment_upload_limit":"Kila faili sharti iwe chini ya 20MB","idpa_attachment_sec2":"Sehemu ya 2:","idpa_right_holder_status_title":"Nyaraka zinazothibitisha hali ya mwenye haki","idpa_ric_proof_title":"Nyaraka kuhusu ukiukaji wa haki","idpa_right_holder_status_instruction_1":"(Ukiukaji wa haki ya mali ya akili au maslahi ya biashara)","idpa_right_holder_status_instruction_2":"Tafadhali wasilisha hati zinazobainisha haki ya mali ya akili unazoamini kuwa zimekiukwa, na hati zinazoonyesha kuwa wewe ndiye mmiliki wa hakimiliki inayodaiwa. \u003CredLink\u003EPata maelezo zaidi\u003C\u002FredLink\u003E","idpa_right_holder_status_instruction_3":"(Ukiukaji wa maslahi ya biashara)","idpa_right_holder_status_instruction_4":"Nyaraka zinazohitajika hutofautiana kulingana na maslahi ya biashara yanayodaiwa kukiukwa (k.m., nyenzo zinazoonyesha sifa au sifa mbaya ya lebo za bidhaa, nyenzo zinazoonyesha kuwa chapisho hilo huwapotosha watumiaji kuhusu ubora). Tafadhali kagua \u003CredLink\u003Emaelezo\u003C\u002FredLink\u003E na uwasilishe nyaraka zinazofaa. Unaweza kupakia hadi faili tatu katika umbizo la JPEG, JPG, au PNG, kila moja isiyozidi MB 20.","idpa_ric_proof_instruction":"Tafadhali wasilisha picha ya skrini au ushahidi sawia unaoonyesha sehemu ya maudhui yaliyochapishwa ambayo unaamini yanakiuka haki zako. Unaweza kupakia hadi faili tatu katika umbizo la JPEG, JPG, au PNG, kila moja chini ya MB 20. \u003CredLink\u003EPata maelezo zaidi\u003C\u002FredLink\u003E","idpa_attachment_sec3":"Sehemu ya 3:","idpa_other_document_title":"Nyaraka nyingine za uthibitisho","idpa_other_document_instruction":"Tafadhali wasilisha hati zozote za uthibitisho kama vile nyenzo zinazoonyesha kesi hiyo haiko chini ya vighairi vya kashfa. Unaweza kupakia hadi faili tatu katika umbizo la JPEG, JPG, au PNG, kila moja chini ya MB 20. \u003CredLink\u003EPata maelezo zaidi\u003C\u002FredLink\u003E","idpa_disclaimer":"Tafadhali fahamu kwamba kutoa ripoti ya uongo au ya kupotosha kwa kujua kunaweza kuadhibiwa chini ya sheria. Ikiwa mara kwa mara unawasilisha ripoti ambazo hazina msingi, tunahifadhi haki zetu za kusimamisha uwezo wako wa kuwasilisha ripoti au kupiga marufuku kabisa akaunti yako. \u003CredLink\u003EPata maelezo zaidi\u003C\u002FredLink\u003E","ad_report_detail_placeholder_75_uk":"Tafadhali toa maelezo kuhusu uzoefu wako na tangazo hili ili kutusaidia kuchukua hatua zinazohitajika. Maudhui ambayo yana madhara kwa watoto chini ya UK OSA ni pamoja na ponografia na shughuli za ngono, kujiua na kujiumiza, matatizo ya kula, unyanyasaji na chuki, vurugu, uonevu, vitendo hatari na changamoto hatari, vitu vyenye madhara, maoni yasiyofaa kuhusu mwili na maudhui ya kufadhaisha. Tafadhali tambua kategoria ikiwa unaweza.","ad_report_detail_placeholder_75_eea_row":"Tafadhali toa maelezo kuhusu uzoefu wako na tangazo hili ili kutusaidia kuchukua hatua muhimu.","ad_report_reason_L1Misinfo_L2aigc_v2_0":"Tangazo hili linaweza kuwa na maudhui yaliyozalishwa na AI au yaliyohaririwa ambayo yametumika vibaya, hayajaidhinishwa au yaliyowekwa lebo vibaya. Hii inaweza kujumuisha:","ad_report_reason_L1Misinfo_L2aigc_v2_1":"Maudhui yanayozalishwa na AI ambayo hayajawekwa lebo au kufichuliwa. Tangazo hutumia AI kuundaa maudhui, lakini halisemi hivyo.","ad_report_reason_L1Misinfo_L2aigc_v2_2":"Kutumia mfano wa mtu halisi, sauti, au utambulisho bila ruhusa yake. Tangazo linaonyesha au linasikika kama mtu halisi, lakini mtu huyo hakukubaliana nalo (kwa mfano, kuifanya ionekane kama anaunga mkono wazo au bidhaa ya kisiasa wakati hafanyi hivyo).","Web_report_description":"Report description (Optional):","report_details_toast":"Toa maelezo kuhusu matumizi ya tangazo hili ili kutusaidia kuchukua hatua zinazohitajika.","report_img_toast":"Pakia picha za maelezo ya oda na bidhaa zilizopokelewa.","dsa_illegal_select_country_optional":"Mamlaka ya kisheria","get_tt_desktop":"Pakua TikTok kwenye kompyuta ya mezani","get_tt_app":"Pakua programu ya TikTok","Web_leftNav_getCoins_toolTip":"Okoa 25% sasa","desktopWeb_dynamicBottom_installTikTok":"Weka TikTok kwenye kifaa","desktopWeb_dynamicBottom_installTikTok_desc":"Weka programu ya TikTok ya kompyuta ya mezani kwenye kifaa ili uwe na utendaji bora","desktopWeb_dynamicBottom_installTikTok_Cta":"Weka kwenye kifaa","desktopWeb_dynamicBottom_right_logIn":"Ingia kwenye alyticsPage_infoPopup_topicsTitle":"Mada","pgc_aiComments_commentCategories_insufficientComments":"Mada zilizofupishwa kwa AI zitapatikana kutakapokuwa na maoni mengi.","pgc_aiComments_commentCategories_emptyState":"Hakuna maoni yanayolingana na aina hii.","pm_web_fullpage_entry":"Click to watch LIVE","webLIVE_personalPage_LIVEbanner_numViewerDesc":"Itazame sasa pamoja na watazamaji {num}","Webapp_tooltips_play":"cheza","pm_web_fullpage_error_button":"Jaribu tena","ttlive_previewSubtitle_tag_highlight":"Angazio","weblive_following_btn":"Unafuata","pm_mt_liveWeb_friend_tag":"Rafiki","ttlive_AIsummary_tag":"Muhtasari","subLiveShare_webLivePage_chatTextfield_subOnlyNote":"Waliojisajili tu","pc_web_less_btn":"chache","collectionsProfilePage_favoritesPage_newModal_errorMessage":"Umepita kikomo cha herufi","pcWeb_add_reply":"Ongeza jibu...","comment_tray_default":"Weka maoni...","vid_mod_analytics_penalty_reason_minor_title":"Usalama wa watoto","vid_mod_analytics_penalty_reason_minor_desc":"Ili kuwapa vijana nafasi ya ziada ya kugundua utambulisho wao na kujieleza katika mazingira ya mtandaoni, maudhui yaliyowekwa na watumiaji walio na umri wa chini ya miaka 16 hayastahiki kupendekezwa. Kutangaza upasuaji kwa ajili ya urembo kwa watoto kunaweza kusababisha viwango vya juu vya kutoridhika kimwili. Pia, maudhui kama hayo - ikiwa ni pamoja na video za kabla na baada ya upasuaji, video za upasuaji, na ujumbe unaojadili upasuaji maalum kwa ajili ya urembo bila onyo la hatari - hayastahiki kwenye mpasho wa Kwa Ajili Yako kwa watumiaji wote walio na umri wa chini ya miaka 18.","vid_mod_analytics_penalty_reason_unoriginal_title":"Maudhui yasiyo ya asili, ya ubora wa chini na ya msimbo wa QR","vid_mod_analytics_penalty_reason_unoriginal_desc":"Ili kudumisha mazingira mazuri na ya kufurahisha kwenye TikTok kwa ajili ya watumiaji wetu, maudhui ambayo si ya asili au ya ubora wa chini hayatastahiki kupendekezwa. Maudhui yasiyo ya asili yanajumuisha video ambazo zimewekwa au kupakiwa kutoka kwenye vyanzo vingine (kama vile mifumo mingine, vipindi vya televisheni, filamu au maonyesho ya wavuti) bila mabadiliko yoyote mapya na bunifu. Tunaweza kujua ikiwa video si ya asili ikiwa ina alama tambulishi au nembo iliyowekwa juu yake. Maudhui ya ubora wa chini yanajumuisha video fupi sana, picha tuli na video zinazoundwa kwa GIF pekee. Maudhui ambayo yanajumuisha misimbo ya QR kwa kawaida hayastahiki kwenye mpasho wa Kwa Ajili Yako kwa sababu yanaweza kuelekeza watumiaji kwenye tovuti au programu hatari, ingawa tunaruhusu hali za kipekee ambapo hamna hatari kubwa (kwa mfano, kwa biashara za mtandaoni).","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"Maudhui yasiyo ya asili, ya ubora wa chini na ya msimbo wa QR","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"Ili kudumisha huduma nzuri ambayo watumiaji wetu wanatarajia kwenye mfumo wa TikTok, maudhui yasiyo ya asili na ya ubora wa chini hayastahiki kupendekezwa. Maudhui yasiyo ya asili ni maudhui ambayo yameingizwa tu au kunakiliwa kutoka kwenye vyanzo vingine bila mabadiliko yoyote mapya na bunifu. Video inaweza kukosa kuwa ya asili ikiwa ina alama tambulishi au nembo juu yake. Maudhui ya ubora wa chini yanajumuisha video fupi sana, picha tuli na video zinazoundwa kwa GIF pekee.","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"Akaunti isiyo halisi","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"Akaunti yako ina machapisho yasiyo ya asili na hayastahiki kwenye mpasho wa Kwa Ajili Yako. Kwa maelezo zaidi, kagua Mwongozo wa Jumuiya yetu \u003E Haifai kwenye mpasho wa Kwa Ajili Yako \u003E Maudhui yasiyo ya asili, ya ubora wa chini na ya msimbo wa QR","vid_mod_analytics_penalty_reason_spam_title":"Maudhui taka, yasiyo halisi au ya kupotosha","vid_mod_analytics_penalty_reason_spam_desc":"Maudhui ambayo yanajaribu kuwahadaa au kuwadanganya watumiaji ili kupata wafuasi, Likes zaidi, au utazamaji zaidi au vipimo vingine vya kushirikishwa kwenye mfumo hayastahiki kwenye mpasho wa Kwa Ajili Yako. Hii ni pamoja na maudhui ambayo yanahimiza watumiaji kufuatana au kupeana Likes, au maudhui ambayo huwalaghai watumiaji kubofya vitufe vya Like au vya kusambaza. Pia, maudhui ambayo yanaendeleza nadharia za njama na kueneza taarifa za uwongo au hatari kuhusu matukio ya sasa na matukio ambapo maelezo yake bado yanaibuka pia hayastahiki kwenye mpasho wa Kwa Ajili Yako.","vid_mod_analytics_penalty_reason_sexual_title":"Maudhui yanayochochea ngono dhahiri","vid_mod_analytics_penalty_reason_sexual_desc":"Ili kusaidia kudumisha hali nzuri ya utumiaji, maudhui ambayo yanachochea ngono yanaweza kukosa kustahiki kupendekezwa. Hii ni pamoja na maudhui ambayo yanaonyesha uchi unaodokezwa, yanaonyesha sehemu za mwili kingono, au ni ya ashiki au ya kuchochea uchu (kama matukio ya kuvua nguo).","vid_mod_analytics_penalty_reason_tobacco_title":"Bidhaa za tumbaku na pombe","vid_mod_analytics_penalty_reason_tobacco_desc":"Maudhui yanayoendeleza, kutaja au kuonyesha bidhaa za pombe zinazotumiwa na watu wa umri unaoruhusiwa kutumia vileo lakini wakifanya hivyo kwa njia hatari huenda yasistahiki kupendekezwa. Maudhui yanayoonyesha matumizi ya bidhaa za tumbaku kwa watu wazima au kutaja bidhaa zinazodhibitiwa hayastahiki kupendekezwa.","vid_mod_analytics_penalty_reason_stunts_title":"Matukioi na michezo hatari","vid_mod_analytics_penalty_reason_stunts_desc":"Baadhi ya vitendo vikiigwa bila tahadhari za usalama, vinaweza kuwa hatari, na vinaweza kusababisha madhara ya kimwili. Maudhui ambayo yanajumuisha matukio hatari, au michezo hatari inayofanywa na watu wasio wataalamu, huenda hayatastahiki.","vid_mod_analytics_penalty_reason_graphic_title":"Maudhui ya kuhofisha au ya vurugu","vid_mod_analytics_penalty_reason_graphic_desc":"Maudhui ambayo yanasababisha usumbufu, mshtuko au kuchukiza watazamaji hayastahiki kwenye mpasho wa Kwa Ajili Yako, ikiwa ni pamoja na madoido ya kutisha, kushtua, vipodozi vinavyofanana na majeraha ya kutisha na maonyesho ya matendo ya kimwili. Maudhui mengi ya kutisha na ya vurugu hayaruhusiwi kwenye TikTok. Hata hivyo, tunaweza kuruhusu aina fulani za maudhui, kama vile picha za vifo, ajali au mapigano zinapotumika kama rekodi za matukio ya ulimwengu halisi na zina manufaa kwa umma. Kwa sababu maudhui haya hayafai hadhira zote, hayatatimiza masharti ya kupendekezwa, na maudhui hayo yataonyesha skrini ya ilani au onyo kabla ya \"kuyafungua\".","vid_mod_analytics_penalty_reason_fyf_title":"Haistahiki kwenye mpasho wa Kwa Ajili Yako","vid_mod_analytics_penalty_reason_fyf_desc":"Video yako haikutimiza viwango vyetu vya ustahiki kwenye mpasho wa Kwa Ajili Yako. Kagua Mwongozo ya Jumuiya ya TikTok kwa maelezo zaidi \u003E Haifai kwenye mpasho wa Kwa Ajili Yako","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"Watumiaji na wahusika wengine wanaweza kuripoti kwetu ukiukaji wa sera. Tumegundua kwamba sera hii imekiukwa kulingana na ripoti inayosema kwamba maudhui yalikiuka Mwongozo wa Jumuiya yetu.","vidModAnalytics_detailPg_sectionVideoDetails_sectionLabel":"Maelezo ya video","vid_mod_analytics_appeal_detailpg_reason_title":"Sababu ya ukiukaji","vid_mod_analytics_detail_pg_title":"Video haistahiki","vid_mod_analytics_detail_pg_desc":"Video hii haistahiki kwenye mpasho wa Kwa Ajili Yako kwa sababu inakiuka Mwongozo wa Jumuiya yetu.","vidModAnalytics_detailPg_sectionSuccess_header":"Rufaa imekubaliwa","vid_mod_analytics_appeal_success_detail_pg_desc":"Tumekagua ombi lako na kurejesha video yako. Tunaomba radhi kwa usumbufu wowote ambao huenda ulisababishwa. Asante kwa kujisajili kwenye TikTok!","vid_mod_analytics_appeal_detail_pg_title":"Video imeondolewa","vid_mod_analytics_appeal_detail_pg_desc":"Video hii inakiuka Mwongozo wa Jumuiya yetu.","vidModAnalytics_appealSubmitted_sectionTitle_header":"Tumepokea ombi","vid_mod_analytics_appeal_rcv_detail_pg_desc":"Tumepokea ombi lako na tutakujulisha pindi matokeo ya rufaa yako yatakapopatikana.","rIC_detailPg_violationReason_title":"Sababu ya uki
