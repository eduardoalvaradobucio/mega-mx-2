обліковий запис. Докладні відомості див. у Центрі прозорості даних.","Web_report_reason_select":"Причина скарги:","dsa_illegal_report_email":"Твоя адреса ел. пошти","dsa_illegal_cite_law_optional":"(необовʼязково)","dsa_illegal_report_fill_email":"Укажи адресу електронної пошти","cseReasons_reportPg_emailAddForm_body":"Ти можеш відправити цей звіт анонімно. Однак, тобі не надійде повідомлення щодо результатів і буде відсутня можливість надіслати апеляцію.","dsa_illegal_report_trustedflagger_fill_email":"Введи дійсну ел. адресу","dsa_illegal_detail_country":"Юрисдикція","dsa_illegal_detail_law":"Застосовне законодавство","dsa_illegal_cite_law_desc":"Укажи відомості про законодавство, яке, на твою думку, порушує контент. Надай якомога більше подробиць. Це допоможе нам належним чином розглянути твою скаргу.","dsa_illegal_detail_explanation":"Пояснення щодо скарги","dsa_illegal_report_explanation_desc":"Укажи, як саме контент порушує відповідне законодавство. Скарги, що не містять потрібної інформації, можуть не розглядатися. У разі необхідності зазнач, як саме ти надсилаєш цей запит: від себе особисто чи від імені іншої особи.","dsa_illegal_appeal_signature":"Підпис","dsa_illegal_sign_legal_name":"Укажи своє повне імʼя.","dsa_illegal_confirm_accuracy":"Я підтверджую, що, за наявною в мене інформацією, зміст цієї скарги є правдивим, точним і вичерпним.","idpa_attachment":"Прикріплені файли","idpa_attachment_instruction":"Скаргу має подати правовласник, чиї права було порушено, або його уповноважений представник. Уважно ознайомся з \u003CredLink\u003Eінструкціями щодо подання\u003C\u002FredLink\u003E та надай усі необхідні документи. Формати файлів: JPEG, JPG або PNG; розмір кожного файлу не має перевищувати 20 МБ.","idpa_attachment_sec1":"Розділ 1.","idpa_identification_document_title":"Документи заявника","idpa_identification_document_instruction_IP":"Надай офіційні документи, що посвідчують особу. Наприклад: водійське посвідчення (лицьовий і зворотний бік), паспорт (сторінка з фотокарткою та сторінка з ім’ям власника й контактною інформацією для надзвичайних випадків), картка My Number (лицьовий бік) тощо. За потреби також необхідно надати документи, що підтверджують повноваження представника, документи, які підтверджують згоду законного представника (наприклад, опікуна), а також документи, що підтверджують, що подання стосується безпосередньо цієї особи. Крім того, якщо ти є юридичною особою, необхідно надати такі документи, як свідоцтво про реєстрацію юридичної особи та довіреність, видану представником. \u003CredLink\u003EДокладніше\u003C\u002FredLink\u003E","idpa_identification_document_instruction_nonIP":"Надай офіційні документи, що посвідчують особу. Наприклад: водійське посвідчення (лицьовий і зворотний бік), паспорт (сторінка з фотокарткою та сторінка з ім’ям власника й контактною інформацією для надзвичайних випадків), картка My Number (лицьовий бік) тощо. За потреби також необхідно надати документи, що підтверджують повноваження представника, документи, які підтверджують згоду законного представника (наприклад, опікуна), а також документи, що підтверджують, що подання стосується безпосередньо цієї особи. \u003CredLink\u003EДокладніше\u003C\u002FredLink\u003E","attachment_upload_limit":"Розмір одного файлу має становити до 20 МБ","idpa_attachment_sec2":"Розділ 2.","idpa_right_holder_status_title":"Документи, що підтверджують статус правовласника","idpa_ric_proof_title":"Документи, що підтверджують порушення прав","idpa_right_holder_status_instruction_1":"(Порушення прав інтелектуальної власності)","idpa_right_holder_status_instruction_2":"Надай документи, що засвідчують, які права інтелектуальної власності, на твою думку, порушено, а також документи, що підтверджують твоє право власності на відповідний об’єкт. \u003CredLink\u003EДокладніше\u003C\u002FredLink\u003E","idpa_right_holder_status_instruction_3":"(Порушення комерційних інтересів)","idpa_right_holder_status_instruction_4":"Перелік документів, які потрібно нада ристувачів молодше 16 років не потрапляє до стрічки «Для тебе». Реклама пластичних операцій для підлітків може призвести до збільшення випадків невдоволеності власним тілом. Відповідно, такий контент, включно з відео «до і після», відео операцій і публікації, у яких пластичні операції обговорюються без попереджень про супутні ризики, не потрапляє до стрічки «Для тебе» користувачів віком до 18 років.","vid_mod_analytics_penalty_reason_unoriginal_title":"Неоригінальний контент, контент низької якості або контент із QR-кодом","vid_mod_analytics_penalty_reason_unoriginal_desc":"Щоб усі користувачі TikTok отримували задоволення від користування застосунком, у стрічку «Для тебе» не потрапляє неоригінальний контент і контент низької якості. Неоригінальним контентом є контент, який імпортовано або скопійовано з інших джерел (наприклад, з інших платформ, телешоу, фільмів або вебтрансляцій) без творчої обробки. Якщо відео містить водяний знак або логотип, ми вважаємо його неоригінальним. Контентом низької якості вважаються дуже короткі відео, статичні зображення і відео, що містять лише GIF-анімацію. Контент із QR-кодами зазвичай не потрапляє в стрічку «Для тебе», оскільки QR-коди можуть вести на шкідливі вебсайти або застосунки. Виняток становлять випадки, коли ризик дуже низький (наприклад, відео від інтернет-магазинів).","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"Неоригінальний контент, контент низької якості або контент із QR-кодом","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"Щоб усі користувачі TikTok отримували задоволення від користування платформою TikTok, у стрічку «Рекомендації» не потрапляє неоригінальний контент і контент низької якості. Неоригінальним контентом є контент, який імпортовано або скопійовано з інших джерел без творчої обробки. Якщо відео містить водяний знак або логотип, ми вважаємо його неоригінальним. Контентом низької якості вважаються дуже короткі відео, статичні зображення і відео, що містять лише GIF-анімацію.","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"Акаунт із неоригінальним контентом","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"Твій акаунт містить публікації, що не є оригінальними й не відповідають стандартам для стрічки «Для тебе». Докладну інформацію див. тут: Правила спільноти \u003E Не допускається в стрічку «Для тебе» \u003E Неоригінальний контент, контент низької якості або контент із QR-кодом","vid_mod_analytics_penalty_reason_spam_title":"Спам, несправжній контент або контент, що вводить в оману","vid_mod_analytics_penalty_reason_spam_desc":"У стрічку «Для тебе» не потрапляє контент, що має на меті збільшення кількості слідкувачів, уподобайок, переглядів чи інших показників залученості на платформі в шахрайський спосіб чи шляхом маніпулювання (зокрема контент, що містить заклики почати взаємне слідкування або поставити вподобайки одне одному, а також контент, у якому користувачів змушують натискати на кнопки «Уподобати» або «Поділитися» шляхом обману). Крім того, у стрічку «Для тебе» не потрапляє контент, що підтримує теорії змови або розповсюджує неправдиву або шкідливу інформацію про поточні події та події, про які наразі замало інформації.","vid_mod_analytics_penalty_reason_sexual_title":"Надмірно сексуальний контент","vid_mod_analytics_penalty_reason_sexual_desc":"Щоб кожен користувач бачив у застосунку контент, який відповідає його світогляду, відео сексуального характеру не потрапляють у стрічку «Рекомендації». Це стосується в тому числі контенту, у якому натякають на оголеність, демонструються частини тіла в сексуалізованому вигляді або виконуються відверто еротичні або чуттєві дії (наприклад, стриптиз).","vid_mod_analytics_penalty_reason_tobacco_title":"Тютюнова й алкогольна продукція","vid_mod_analytics_penalty_reason_tobacco_desc":"У стрічку «Рекомендації» може не допускатися контент, у якому пропагується, згадується чи демонструється небезпечне вживання алкоголю повнолітніми особами. Також у стрічку «Рекомендації» не потрапляє контент, у якому дорослі вживають тютюнові вироби чи згадують заборонені речовини.","vid_mod_analytics_penalty_reason_stunts_title":"Небезпечні трюки або заняття спортом","vid_mod_analytics_penalty_reason_stunts_desc":"Деякі дії можуть бути небезпечними й призвести до травм, якщо їх виконувати без відповідних запобіжних заходів. Контент із небезпечними трюками й контент, у якому непрофесіонали займаються екстремальними видами спорту, може не допускатися.","vid_mod_analytics_penalty_reason_graphic_title":"Сцени насильства й жорстокості","vid_mod_analytics_penalty_reason_graphic_desc":"У стрічку «Для тебе» не потрапляє контент, який може спричинити дискомфорт, шок чи огиду, зокрема відео зі страшними ефектами, скримерами, реалістичним гримом у вигляді кривавих ран і зображеннями фізіологічних випорожнень. Як правило, у TikTok заборонено публікувати контент, що містить елементи жорстокості й насильства. Однак у деяких випадках ми дозволяємо публікацію такого контенту (наприклад, зображення смертей, катастроф і військових дій), якщо він становить суспільну цінність і записаний із метою документування реальних подій. Оскільки такий контент може бути неприйнятним для деяких користувачів, ми не додаємо його в стрічку «Для тебе». Перед переглядом такого відео глядач побачить попередження і має підтвердити своє бажання переглянути його.","vid_mod_analytics_penalty_reason_fyf_title":"Не допускається в стрічку «Для тебе»","vid_mod_analytics_penalty_reason_fyf_desc":"Твоє відео не відповідає стандартам для стрічки «Для тебе». Докладну інформацію див. тут: Правила спільноти TikTok \u003E Не допускається в стрічку «Для тебе»","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"Користувачі й сторонні особи можуть поскаржитися нам на порушення правил. Ми виявили це порушення, отримавши скаргу про те, що контент порушує наші Правила спільноти.","vidModAnalytics_detailPg_sectionVideoDetails_sectionLabel":"Відомості про відео","vid_mod_analytics_appeal_detailpg_reason_ti
