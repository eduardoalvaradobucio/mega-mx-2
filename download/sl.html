ih videoposnetkov.","Web_report_show_video":"Prikaži videoposnetek","sticker_create_main_setinfo_last":"Zadnja posodobitev","pgc_aiComments_commentCategories_all":"Vse","pgc_aiComments_analyticsPage_commentsCount":"{num, plural, one {{num} komentar} two {{num} komentarja} few {{num} komentarji} other {{num} komentarjev}}","pgc_aiComments_analyticsPage_infoPopup_topicsTitle":"Teme","pgc_aiComments_commentCategories_insufficientComments":"Teme, povzete z umetno inteligenco, bodo na voljo, ko bo več komentarjev.","pgc_aiComments_commentCategories_emptyState":"Tej kategoriji ne ustreza noben komentar.","pm_web_fullpage_entry":"Click to watch LIVE","webLIVE_personalPage_LIVEbanner_numViewerDesc":"Oglej si zdaj s toliko gledalci: {num}","Webapp_tooltips_play":"predvajaj","pm_web_fullpage_error_button":"Poskusi znova","ttlive_previewSubtitle_tag_highlight":"Poudarek","weblive_following_btn":"Slediš","pm_mt_liveWeb_friend_tag":"Prijatelj","ttlive_AIsummary_tag":"Povzetek","subLiveShare_webLivePage_chatTextfield_subOnlyNote":"Samo za naročnike","pc_web_less_btn":"manj","collectionsProfilePage_favoritesPage_newModal_errorMessage":"Omejitev znakov je presežena","pcWeb_add_reply":"Dodaj odgovor ...","comment_tray_default":"Dodaj komentar ...","vid_mod_analytics_penalty_reason_minor_title":"Varnost mladoletnikov","vid_mod_analytics_penalty_reason_minor_desc":"Da bi najstnikom zagotovili dodaten prostor za raziskovanje identitete in izražanje v digitalnem prostoru, vsebina, ki jo naložijo uporabniki, mlajši od 16 let, ni primerna za priporočanje. Promocija lepotne kirurgije pri mladoletni osebi lahko povzroči večje nezadovoljstvo s svojim telesom. V skladu s tem taka vsebina, vključno z videoposnetki pred in po tovrstnem posegu, videoposnetki kirurških posegov in sporočili, v katerih se razpravlja o izbirnih lepotnih operacijah brez opozorila na tveganja, ni primerna za vir Zate uporabnikov, mlajših od 18 let.","vid_mod_analytics_penalty_reason_unoriginal_title":"Neizvirna, nekakovostna vsebina in vsebina s kodo QR","vid_mod_analytics_penalty_reason_unoriginal_desc":"Ker želimo, da bi bil TikTok pozitiven in prijeten za naše uporabnike, vsebina, ki je neizvirna ali slabe kakovosti, ne more biti priporočena. Neizvirna vsebina vključuje videoposnetke, ki so samo uvoženi ali naloženi iz drugih virov (kot so druge platforme, televizijske oddaje, filmi ali spletne oddaje) brez novih, ustvarjalnih popravkov. Neizvirnost videoposnetka lahko ugotovimo, če ima vodni žig ali nadgrajen logotip. Med vsebino nizke kakovosti spadajo zelo kratki videoposnetki, statične slike in videoposnetki, ki so sestavljeni samo iz slik GIF. Vsebina, ki vključuje kode QR, običajno ni primerna za vir Zate, ker lahko uporabnike preusmeri na škodljiva spletna mesta ali aplikacije, čeprav v okoliščinah, ko je tveganje majhno (na primer pri e-trgovini), lahko naredimo izjemo.","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"Neizvirna, nekakovostna vsebina in vsebina s kodo QR","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"Ker želimo ohraniti pozitivno izkušnjo, ki jo naši uporabniki pričakujejo od platforme TikTok, neizvirna in nekakovostna vsebina ni primerna za priporočanje. Neizvirna vsebina je vsebina, ki je samo uvožena ali kopirana iz drugih virov brez novih, ustvarjalnih popravkov. Videoposnetek je lahko neizviren, če ima vodni žig ali logotip. Vsebina nizke kakovosti vključuje zelo kratke videoposnetke, statične slike in videoposnetke, sestavljene samo iz slik GIF.","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"Neizvirni račun","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"Tvoj račun vsebuje objave, ki niso izvirne in niso primerne za vir Zate. Za več informacij si oglej naše Smernice skupnosti \u003E Neprimerno za vir Zate \u003E Neizvirna vsebina, vsebina nizke kakovosti in vsebina s kodo QR","vid_mod_analytics_penalty_reason_spam_title":"Neželena, nepristna ali zavajajoča vsebina","vid_mod_analytics_penalty_reason_spam_desc":"Vsebina, ki poskuša prevarati ali manipulirati z uporabniki, da bi pridobila več sledilcev, všečkov, ogledov ali drugih kazalnikov vključenosti na platformi, ni primerna za vir Zate. To vključuje vsebino, ki uporabnike spodbuja, naj si sledijo ali všečkajo eden drugega, ali vsebino, ki uporabnike prepričuje, naj kliknejo gumbe za všečkanje ali deljenje. Poleg tega za vir Zate ni primerna niti vsebina, ki spodbuja teorije zarote in širi napačne ali škodljive informacije o trenutnih dogodkih in dogodkih, ki se še pripravljajo.","vid_mod_analytics_penalty_reason_sexual_title":"Očitno seksualizirana vsebina","vid_mod_analytics_penalty_reason_sexual_desc":"Da bi bili z našimi storitvami še naprej zadovoljni, bomo vsebini, ki nazorno prikazuje spolnost, onemogočili možnost priporočanja. To vključuje vsebino, ki prikazuje goloto, seksualizirajo dele telesa ali je eskplicitno erotične ali senzualne narave (npr. striptiz).","vid_mod_analytics_penalty_reason_tobacco_title":"Tobačni in alkoholni izdelki","vid_mod_analytics_penalty_reason_tobacco_desc":"Vsebina, ki promovira, omenja ali prikazuje alkoholne izdelke, ki jih uživajo polnoletne osebe, vendar na nevaren način, ni primerna za priporočanje. Vsebina, ki prikazuje uporabo tobačnih izdelkov s strani odraslih oseb ali omenja nadzorovane snovi, ni primerna za priporočanje.","vid_mod_analytics_penalty_reason_stunts_title":"Nevarni podvigi in športi","vid_mod_analytics_penalty_reason_stunts_desc":"Nekatere dejavnosti, ki se izvajajo brez varnostnih ukrepov, so lahko tvegane ali nevarne, kar lahko povzroči telesne poškodbe. Vsebina, ki vključuje nevarne podvige ali ekstremne športe, ki jih izvajajo amaterji, je lahko neprimerna.","vid_mod_analytics_penalty_reason_graphic_title":"Nasilna in nazorna vsebina","vid_mod_analytics_penalty_reason_graphic_desc":"Vsebina, ki gledalcem povzroča nelagodje, šok ali gnus, je lahko neprimerna za vir Zate, vključno s strašljivimi učinki, preplahi, sredstvi, ki realistično poustvarijo krvave rane, in prikazi telesnih funkcij. Večina nasilne in grafične vsebine na TikToku ni dovoljena. Dovoljene so določene vrste vsebine, denimo grafične podobe smrti, nesreč ali spopadov, če služijo kot dokumentacija resničnih dogodkov in so v javnem interesu. Ker ta vsebina morda ne bo primerna za vse občinstvo, je ne bo mogoče priporočiti, vsebina pa bo prikazovala možnost »želim videti vsebino« ali opozorilo.","vid_mod_analytics_penalty_reason_fyf_title":"Neprimerno za vir Zate","vid_mod_analytics_penalty_reason_fyf_desc":"Tvoj videoposnetek ni izpolnil naših standardov za primernost za vir Zate. Za več informacij si preberi Smernice skupnosti TikTok \u003E Neprimerno za vir Zate","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"Uporabniki in tretje osebe nam lahko prijavijo kršitve pravilnika. To kršitev pravilnika smo odkrili na podlagi prijave, da vsebina krši naše Smernice skupnosti.","vidModAnalytics_detailPg_sectionVideoDetails_sectionLabel":"Podrobnosti videoposnetka","vid_mod_analytics_appeal_detailpg_reason_title":"Razlog kršitve","vid_mod_analytics_detail_pg_title":"Videoposnetek ne izpolnjuje pogoja upravičenosti","vid_mod_analytics_detail_pg_desc":"Ta videoposnetek ne more biti vključen v vir Zate, ker krši naše Smernice skupnosti.","vidModAnalytics_detailPg_sectionSuccess_header":"Pritožba je odobrena","vid_mod_analytics_appeal_success_detail_pg_desc":"Pregledali smo tvojo pritožbo in obnovili tvoj videoposnetek. Opravičujemo se za nevšečnosti, ki so morda nastale zaradi tega. Hvala, ker si del skupnosti TikTok!","vid_mod_analytics_appeal_detail_pg_title":"Videoposnetek odstranjen","vid_mod_analytics_appeal_detail_pg_desc":"Ta videoposnetek V ŽIVO krši naše Smernice skupnosti.","vidModAnalytics_appealSubmitted_sectionTitle_header":"Zahteva prejeta","vid_mod_analytics_appeal_rcv_detail_pg_desc":"Prejeli smo tvojo zahtevo in te bomo obvestili, ko bo odločitev glede pritožbe na voljo.","rIC_detailPg_violationReason_title":"Razlog krš
