e failu formāti ir JPEG, JPG vai PNG, un viena faila lielums nedrīkst pārsniegt 20 MB.","idpa_attachment_sec1":"1. sadaļa:","idpa_identification_document_title":"Ar sūdzības iesniedzēju saistītie dokumenti","idpa_identification_document_instruction_IP":"Iesniedz oficiāli izsniegtus identifikācijas dokumentus. Piemēram: autovadītāja apliecība (priekšpuse un aizmugure), pase (lapa ar fotogrāfiju un lapa ar īpašnieka vārdu un ārkārtas kontaktinformāciju), My Number Card identifikācijas karte (tikai priekšpuse) utt. Turklāt vajadzības gadījumā jāiesniedz arī dokumenti, kas apliecina tiesības pieņemt lēmumus, likumīgā pārstāvja, piemēram, aizbildņa, atļauja, un dokumenti, kas norāda, ka iesniegums attiecas tieši uz pašu iesniedzēju. Savukārt juridiskām personām ir jāiesniedz tādi dokumenti kā uzņēmuma reģistrācijas apliecība un pilnvara no pārstāvja. \u003CredLink\u003EUzzināt vairāk\u003C\u002FredLink\u003E","idpa_identification_document_instruction_nonIP":"Iesniedz oficiāli izsniegtus identifikācijas dokumentus. Piemēram: autovadītāja apliecība (priekšpuse un aizmugure), pase (lapa ar fotogrāfiju un lapa ar īpašnieka vārdu un ārkārtas kontaktinformāciju), My Number Card identifikācijas karte (tikai priekšpuse) utt. Turklāt vajadzības gadījumā jāiesniedz arī dokumenti, kas apliecina tiesības pieņemt lēmumus, likumīgā pārstāvja, piemēram, aizbildņa, atļauja, un dokumenti, kas norāda, ka iesniegums attiecas tieši uz pašu iesniedzēju. \u003CredLink\u003EUzzināt vairāk\u003C\u002FredLink\u003E","attachment_upload_limit":"Katra faila izmēram jābūt mazākam par 20 MB","idpa_attachment_sec2":"2. sadaļa:","idpa_right_holder_status_title":"Dokumenti, kas pierāda tiesību īpašnieka statusu","idpa_ric_proof_title":"Ar tiesību pārkāpumu saistītie dokumenti","idpa_right_holder_status_instruction_1":"(Intelektuālā īpašuma tiesību pārkāpums)","idpa_right_holder_status_instruction_2":"Iesniedz dokumentus, kas pierāda intelektuālā īpašuma tiesības, kas, tavuprāt, ir pārkāptas, kā arī dokumentus, kas pierāda, ka tev pieder attiecīgais intelektuālais īpašums. \u003CredLink\u003EUzzināt vairāk\u003C\u002FredLink\u003E","idpa_right_holder_status_instruction_3":"(Uzņēmējdarbības interešu pārkāpums)","idpa_right_holder_status_instruction_4":"Nepieciešamie dokumenti atšķiras atkarībā no uzņēmējdarbības interesēm, kuras, tavuprāt, ir pārkāptas (piemēram, materiāli, kas parāda produktu etiķešu atpazīstamību un popularitāti, vai materiāli, kas parāda, ka publicētais ieraksts maldina patērētājus par kvalitāti). Pārskati \u003CredLink\u003Einformāciju\u003C\u002FredLink\u003E un iesniedz vajadzīgos dokumentus. Vari augšupielādēt līdz trim failiem JPEG, JPG vai PNG formātā; katra faila maksimālais lielums ir 20 MB.","idpa_ric_proof_instruction":"Iesniedz ekrānuzņēmumu vai līdzīgu pierādījumu, kurā redzama tā publiskotā satura daļa, kas, tavuprāt, pārkāpj tavas tiesības. Vari augšupielādēt līdz trim failiem JPEG, JPG vai PNG formātā; katra faila maksimālais lielums ir 20 MB. \u003CredLink\u003EUzzināt vairāk\u003C\u002FredLink\u003E","idpa_attachment_sec3":"3. sadaļa:","idpa_other_document_title":"Citi apliecinoši dokumenti","idpa_other_document_instruction":"Iesniedz visus pārējos apliecinošos dokumentus, piemēram, materiālus, kas pierāda, ka uz lietu neattiecas izņēmumi attiecībā uz neslavas celšanu. Vari augšupielādēt līdz trim failiem JPEG, JPG vai PNG formātā; katra faila maksimālais lielums ir 20 MB. \u003CredLink\u003EUzzināt vairāk\u003C\u002FredLink\u003E","idpa_disclaimer":"Ņem vērā, ka par apzinātu nepatiesu vai maldinošu ziņojumu sniegšanu var iestāties juridiska atbildība. Ja bieži iesniegsi nepārprotami nepamatotus ziņojumus, mēs paturam tiesības apturēt tavu iespēju iesniegt ziņojumus vai pastāvīgi bloķēt tavu kontu. \u003CredLink\u003EUzzināt vairāk\u003C\u002FredLink\u003E","ad_report_detail_placeholder_75_uk":"Lūdzu, sniedz informāciju par savu saskarsmi ar šo reklāmu, lai palīdzētu mums atbilstoši rīkoties. Saskaņā ar AK Tiešsaistes drošības ak otāju plūsmai, kas ir jaunāki par 18 gadiem.","vid_mod_analytics_penalty_reason_unoriginal_title":"Neoriģināls, zemas kvalitātes un kvadrātkoda saturs","vid_mod_analytics_penalty_reason_unoriginal_desc":"Lai TikTok būtu pozitīvs un patīkams mūsu lietotājiem, neoriģināls vai zemas kvalitātes saturs nav piemērots ieteikumam. Neoriģināls saturs ietver videoklipus, kas ir tikko importēti vai augšupielādēti no citiem avotiem (piemēram, citām platformām, TV šoviem, filmām vai tīmekļa pārraidēm) bez jauniem, radošiem labojumiem. Mēs varam noteikt, vai videoklips ir neoriģināls, ja uz tā ir ūdenszīme vai logotips. Zemas kvalitātes saturs ietver ļoti īsus videoklipus, statiskus attēlus un videoklipus, kas veidoti tikai no GIF attēliem. Saturs, kurā ir iekļauti kvadrātkodi, parasti nav piemērots plūsmai “Tieši tev”, jo tas var novirzīt lietotājus uz kaitīgām vietnēm vai lietotnēm, lai gan mēs pieļaujam izņēmumus apstākļos, kad risks ir zems (piemēram, e-komercijai).","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"Neoriģināls, zemas kvalitātes un kvadrātkoda saturs","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"Lai saglabātu pozitīvo pieredzi, ko lietotāji sagaida no TikTok platformas, neoriģināls un zemas kvalitātes saturs nav piemērots ieteikumam. Neoriģināls saturs ir saturs, kas ir tikko importēts vai kopēts no citiem avotiem bez jauniem, radošiem labojumiem. Video var būt neoriģināls, ja uz tā ir ūdenszīme vai logotips. Zemas kvalitātes saturs ietver ļoti īsus video, statiskus attēlus un video, kas veidoti tikai no GIF attēliem.","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"Reproducēts konts","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"Tavā kontā ir ziņas, kas nav oriģinālas un nav piemērotas plūsmai “Tieši tev”. Lai iegūtu plašāku informāciju, pārskati mūsu Kopienas vadlīnijas \u003E Neatbilst plūsmas “Tieši tev” kritērijiem \u003E Neoriģināls, zemas kvalitātes un kvadrātkoda saturs","vid_mod_analytics_penalty_reason_spam_title":"Surogātpasts, neautentisks vai maldinošs saturs","vid_mod_analytics_penalty_reason_spam_desc":"Saturs, kas mēģina apmānīt lietotājus vai manipulēt ar tiem, lai platformā iegūtu vairāk sekotāju, atzīmju Patīk, skatījumu vai citu iesaistes rādītāju, nav piemērots plūsmai “Tieši tev”. Tas ietver saturu, kas mudina lietotājus savstarpēji sekot vai atstāt atzīmes Patīk, vai saturu, kas mudina lietotājus noklikšķināt uz pogas Patīk vai Dalīties. Turklāt saturs, kas popularizē sazvērestības teorijas un izplata nepatiesu vai kaitīgu informāciju par pašreizējiem notikumiem un notikumiem, par kuriem vēl nav zināma visa informācija, nav piemērots plūsmai “Tieši tev”.","vid_mod_analytics_penalty_reason_sexual_title":"Atklāti seksualizēts saturs","vid_mod_analytics_penalty_reason_sexual_desc":"Lai palīdzētu sniegt lietotājiem patīkamu pieredzi, saturs, kas ir atklāti seksuāli divdomīgs, var nebūt piemērots ieteikšanai. Tas ietver saturu, kurā attēlots netiešs kailums vai seksualizētas ķermeņa daļas, kā arī klaji erotisku vai juteklisku saturu (t. i., striptīzu).","vid_mod_analytics_penalty_reason_tobacco_title":"Tabaka un alkohola izstrādājumi","vid_mod_analytics_penalty_reason_tobacco_desc":"Saturs, kurā tiek reklamēti, pieminēti vai attēloti alkohola produkti, ko patērē personas, kuras ir sasniegušas atļauto vecumu, taču tas tiek darīts bīstamā veidā, var nebūt piemērots ieteikumam. Ieteikumam nav piemērots saturs, kurā attēlota pieaugušo tabakas izstrādājumu lietošana vai pieminētas ierobežojamās vielas.","vid_mod_analytics_penalty_reason_stunts_title":"Bīstami triki un sports","vid_mod_analytics_penalty_reason_stunts_desc":"Atkārtojot bez drošības pasākumiem, noteiktas darbības var būt riskantas vai bīstamas, kas var izraisīt fizisku kaitējumu. Saturs, kurā ietverti bīstami triki vai ekstrēmi sporta veidi, ko veic neprofesionāļi, var būt nepiemērots.","vid_mod_analytics_penalty_reason_graphic_title":"Vardarbīgs un grafisks saturs","vid_mod_analytics_penalty_reason_graphic_desc":"Plūsmai “Tieši tev” var nebūt piemērots saturs, kas izraisa skatītāju diskomfortu, šoku vai riebumu, tostarp biedējoši efekti, satrūkšanos izraisoši pārsteigumi, grims, kas reālistiski atjauno asiņainas brūces, un ķermeņa funkciju attēlojums. Lielākā daļa vardarbīga un nepatīkama satura vietnē TikTok nav atļauta. Tomēr mēs varam atļaut noteikta veida saturu, piemēram, detalizētu nāves gadījumu, negadījumu vai kautiņu atspoguļojumu, ja tas dokumentē reālus notikumus un kalpo sabiedrības interesēm. Tā kā šis saturs var nebūt patīkams visām auditorijām, tas nebūs piemērots ieteikšanai, un pirms satura tiks rādīts “piekrišanas” ekrāns vai brīdinājums.","vid_mod_analytics_penalty_reason_fyf_title":"Neatbilst plūsmas “Tieši tev” kritērijiem","vid_mod_analytics_penalty_reason_fyf_desc":"Tavs video neatbilda mūsu piemērotības standartiem plūsmai “Tieši tev”. Lai iegūtu plašāku informāciju, pārskati TikTok Kopienas vadlīnijas \u003E Neatbilst plūsmas “Tieši tev” kritērijiem","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"Lietotāji un trešās puses var mums ziņot par politikas pārkāpumiem. Mēs esam konstatējuši šo politikas pārkāpumu, balstoties uz ziņojumu par to, ka saturs pārkāpj mūsu Kopienas vadlīnijas.","vidModAnalytics_detailPg_sectionVideoDetails_sectionLabel":"Informācija par video","vid_mod_analytics_appeal_detailpg_reason_title":"Pārkāpuma iemesls","vid_mod_analytics_detail_pg_title":"Video nav piemērots","vid_mod_analytics_detail_pg_desc":"Šis video nav piemērots plūsmai “Tieši tev”, jo tas pārkāpj Kopienas vadlīnijas.","vidModAnalytics_detailPg_sectionSuccess_header":"Apelācija apstiprināta","vid_mod_analytics_appeal_success_detail_pg_desc":"Mēs izskatījām tavu apelāciju un atjaunojām video. Atvaino par sagādātajām neērtībām. Paldies, ka esi daļa no TikTok kopienas!","vid_mod_analytics_appeal_detail_pg_title":"Video ir noņemts","vid_mod_analytics_appeal_detail_pg_desc":"Šis video pārkāpj Kopienas vadlīnijas.","vidModAnalytics_appealS
