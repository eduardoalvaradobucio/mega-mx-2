,"osa_illegal_detail_reminder":"Vedomé podanie nepravdivého alebo zavádzajúceho hlásenia nezákonného obsahu môže byť podľa zákona trestné. Ak často odosielate hlásenia, ktoré sú zjavne neopodstatnené, vyhradzujeme si právo pozastaviť vašu možnosť predkladať hlásenia alebo natrvalo zakázať váš účet.","dsa_illegal_report_penalty_reminder":"Upozorňujeme, že vedome nepravdivé alebo zavádzajúce nahlásenie nezákonného obsahu môže byť trestné podľa zákona. Ak často odosielaš zjavne neopodstatnené hlásenia, vyhradzujeme si právo pozastaviť ti možnosť odosielať hlásenia alebo natrvalo zablokovať tvoj účet. Viac informácií nájdeš v našom Centre transparentnosti.","Web_report_reason_select":"Dôvod hlásenia:","dsa_illegal_report_email":"Tvoja e-mailová adresa","dsa_illegal_cite_law_optional":"(nepovinné)","dsa_illegal_report_fill_email":"Vyplň svoju e-mailovú adresu","cseReasons_reportPg_emailAddForm_body":"Toto hlásenie môžeš odoslať anonymne. Výsledok ti však nebude oznámený a nebudeš môcť podať námietku.","dsa_illegal_report_trustedflagger_fill_email":"Zadaj platnú e-mailovú adresu","dsa_illegal_detail_country":"Právna príslušnosť","dsa_illegal_detail_law":"Príslušné právne predpisy","dsa_illegal_cite_law_desc":"Uveď podrobnosti o zákone, ktorý obsah údajne porušuje. Skús všetko popísať čo najkonkrétnejšie, aby sme mohli tvoje hlásenie správne posúdiť.","dsa_illegal_detail_explanation":"Vysvetlenie nahlásenia","dsa_illegal_report_explanation_desc":"Opíš, ako obsah porušuje príslušné právne predpisy. Správy, ktoré neobsahujú dostatočné informácie, nemusia byť považované za platné. Ak je to relevantné, uveď, či túto žiadosť predkladáš za seba alebo v mene niekoho iného.","dsa_illegal_appeal_signature":"Podpis","dsa_illegal_sign_legal_name":"Tu sa podpíš svojím zákonným menom.","dsa_illegal_confirm_accuracy":"Potvrdzujem svoje presvedčenie, že obsah tejto správy je pravdivý, presný a úplný.","idpa_attachment":"Prílohy","idpa_attachment_instruction":"Hlásenie musí predložiť držiteľ práv, ktorého práva boli porušené, alebo splnomocnený zástupca. Pozorne si prečítajte \u003CredLink\u003Epokyny na odoslanie\u003C\u002FredLink\u003E a predložte všetku požadovanú dokumentáciu. Súbory musia byť vo formáte JPEG, JPG alebo PNG a musia mať menej ako 20 MB.","idpa_attachment_sec1":"Oddiel 1:","idpa_identification_document_title":"Dokumenty týkajúce sa žiadateľa","idpa_identification_document_instruction_IP":"Predložte úradné identifikačné doklady. Patria sem napríklad: vodičský preukaz (predná a zadná strana), pas (strana s fotografiou a strana obsahujúca meno držiteľa a núdzové kontaktné údaje), karta My Number Card (iba predná strana) a podobne. V prípade potreby musíte predložiť aj dokumenty preukazujúce oprávnenie agentúry, dokumenty preukazujúce súhlas zákonného zástupcu, napríklad opatrovníka, a dokumenty dokazujúce, že podanie sa týka samotnej osoby. Ak ste právnická osoba, musíte predložiť aj dokumenty, ako je osvedčenie o registrácii spoločnosti a plná moc od zástupcu. \u003CredLink\u003EViac informácií\u003C\u002FredLink\u003E","idpa_identification_document_instruction_nonIP":"Predložte úradné identifikačné doklady. Patria sem napríklad: vodičský preukaz (predná a zadná strana), pas (strana s fotografiou a strana obsahujúca meno držiteľa a núdzové kontaktné údaje), karta My Number Card (iba predná strana) a podobne. V prípade potreby musíte predložiť aj dokumenty preukazujúce oprávnenie agentúry, dokumenty preukazujúce súhlas zákonného zástupcu, napríklad opatrovníka, a dokumenty dokazujúce, že podanie sa týka samotnej osoby. \u003CredLink\u003EViac informácií\u003C\u002FredLink\u003E","attachment_upload_limit":"Jednotlivé súbory musia byť menšie než 20 MB","idpa_attachment_sec2":"Oddiel 2:","idpa_right_holder_status_title":"Dokumentácia preukazujúca status držiteľa práv","idpa_ric_proof_title":"Dokumentácia týkajúca sa porušenia práv","idpa_right_holder_status_instruction_1":"(Porušenie práv duševného vlastníctva)","idpa_right_holder_status_instruction_2":"Odošlite dokumenty, ktoré identifikujú práva duševného vlastníctva, o ktorých sa domnievate, že boli porušené, a dokumenty, ktoré preukazujú, že ste vlastníkom údajného duševného vlastníctva. \u003CredLink\u003EViac informácií\u003C\u002FredLink\u003E","idpa_right_holder_status_instruction_3":"(Porušenie obchodných záujmov)","idpa_right_holder_status_instruction_4":"Požadovaná dokumentácia sa líši v závislosti od obchodných záujmov, ktoré boli údajne porušené (napríklad materiály preukazujúce povesť alebo povesť štítkov výrobkov, materiály preukazujúce, že príspevok zavádza spotrebiteľov v súvislosti s kvalitou). Prečítajte si \u003CredLink\u003Epodrobnosti\u003C\u002FredLink\u003E a odošlite príslušnú dokumentáciu. Môžete nahrať najviac tri súbory vo formáte JPEG, JPG alebo PNG, pričom každý musí mať menej ako 20 MB.","idpa_ric_proof_instruction":"Odošlite snímku obrazovky alebo podobný dôkaz zobrazujúci časť zverejneného obsahu, o ktorom sa domnievate, že porušuje vaše práva. Môžete nahrať najviac tri súbory vo formáte JPEG, JPG alebo PNG, pričom každý musí mať menej ako 20 MB. \u003CredLink\u003EViac informácií\u003C\u002FredLink\u003E","idpa_attachment_sec3":"Oddiel 3:","idpa_other_document_title":"Ďalšie podporné dokumenty","idpa_other_document_instruction":"Odošlite všetky podporné dokumenty, ako sú napríklad materiály, ktoré preukazujú, že prípad nespadá pod výnimky z ohovárania. Môžete nahrať najviac tri súbory vo formáte JPEG, JPG alebo PNG, pričom každý musí mať menej ako 20 MB. \u003CredLink\u003EViac informácií\u003C\u002FredLink\u003E","idpa_disclaimer":"Upozorňujeme, že vedomé odoslanie nepravdivého alebo zavádzajúceho hlásenia môže byť podľa zákona trestné. Ak často odosielate hlásenia, ktoré sú zjavne neopodstatnené, vyhradzujeme si právo pozastaviť vašu schopnosť odosielať hlásenia alebo natrvalo zakázať váš účet. \u003CredLink\u003EViac informácií\u003C\u002FredLink\u003E","ad_report_detail_placeholder_75_uk":"Uveďte podrobnosti átane videí pred a po, videí chirurgických zákrokov a správ o elektívnej kozmetickej chirurgii bez varovania pred rizikami – nie je vhodný pre kanál Pre teba u všetkých používateľov mladších ako 18 rokov.","vid_mod_analytics_penalty_reason_unoriginal_title":"Neoriginálne, nízka kvalita a QR kód v obsahu","vid_mod_analytics_penalty_reason_unoriginal_desc":"Aby bolo používanie TikToku pozitívnou a príjemnou skúsenosťou pre našich používateľov, obsah, ktorý je neoriginálny alebo má nízku kvalitu, nie je vhodný na odporúčanie. Neoriginálny obsah zahŕňa videá, ktoré sú len importované alebo nahraté z iných zdrojov (napríklad z iných platforiem, televíznych relácií, filmov alebo webových vysielaní) bez akýchkoľvek nových tvorivých úprav. Neoriginálne video poznáme podľa toho, že obsahuje vodoznak alebo prekryté logo. Obsah nízkej kvality zahŕňa veľmi krátke videá, statické obrázky a videá vytvorené iba zo súborov GIF. Obsah, ktorý obsahuje kódy QR, je zvyčajne nevhodný pre kanál Pre teba, pretože môže viesť používateľov na škodlivé webové stránky alebo aplikácie, aj keď robíme výnimky za okolností, kedy je riziko nízke (napríklad v prípade elektronického obchodu).","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"Neoriginálne, nízka kvalita a QR kód v obsahu","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"Aby sme zachovali pozitívny zážitok, ktorý naši používatelia od platformy TikTok očakávajú, neoriginálny a nekvalitný obsah nie je vhodný na odporúčanie. Neoriginálny obsah je obsah, ktorý je len importovaný alebo skopírovaný z iných zdrojov bez akýchkoľvek nových, kreatívnych úprav. Video môže byť neoriginálne, ak je na ňom vodoznak alebo logo. Medzi obsah nízkej kvality patria veľmi krátke videá, statické obrázky a videá vytvorené len z GIFov.","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"Reprodukovaný účet","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"Na tvojom účte sú príspevky, ktoré nie sú originálne a nespĺňajú podmienky pre kanál Pre teba. Ďalšie informácie nájdeš v našich Pravidlách komunity \u003E Nevhodné pre kanál Pre teba \u003E Neoriginálne, nízka kvalita a QR kód v obsahu","vid_mod_analytics_penalty_reason_spam_title":"Spam, nepravdivý alebo zavádzajúci obsah","vid_mod_analytics_penalty_reason_spam_desc":"Obsah, ktorý sa snaží oklamať alebo manipulovať používateľov s cieľom získať viac sledovateľov, lajkov, zobrazení alebo iných ukazovateľov zapojenia na platforme, nie je oprávnený pre kanál Pre teba. Patrí sem obsah, ktorý nabáda používateľov, aby sa navzájom sledovali alebo lajkovali, alebo obsah, ktorý používateľov oklame, aby klikali na tlačidlá lajkovania alebo zdieľania. Okrem toho je pre kanál Pre teba nevhodný aj obsah, ktorý podporuje konšpiračné teórie a šíri nepravdivé alebo škodlivé informácie o aktuálnych udalostiach a udalostiach, ktorých podrobnosti sa ešte len vyvíjajú.","vid_mod_analytics_penalty_reason_sexual_title":"Zjavne sexualizovaný obsah","vid_mod_analytics_penalty_reason_sexual_desc":"Chceme, aby TikTok ponúkal príjemnú skúsenosť, a preto obsah, ktorý má očividne sexuálny podtext, nemusí spĺňať podmienky na odporúčanie. To zahŕňa obsah, ktorý zobrazuje implicitnú nahotu, sexualizuje časti tela alebo je zjavne erotický či zmyselný (napr. striptíz).","vid_mod_analytics_penalty_reason_tobacco_title":"Tabakové a alkoholické produkty","vid_mod_analytics_penalty_reason_tobacco_desc":"Obsah propagujúci, spomínajúci alebo zobrazujúci alkoholické výrobky, ktoré konzumujú osoby vo veku, keď sú schopné požívať alkohol, no bolo tak urobené nebezpečným spôsobom, nemusí spĺňať podmienky na odporúčanie. Obsah znázorňujúci používanie tabakových výrobkov dospelými osobami alebo zmieňujúci regulované látky nespĺňa podmienky na odporúčanie.","vid_mod_analytics_penalty_reason_stunts_title":"Nebezpečné akrobatické kúsky a športy","vid_mod_analytics_penalty_reason_stunts_desc":"Pri replikácii bez bezpečnostných opatrení môžu byť určité činnosti riskantné alebo nebezpečné, čo môže viesť k fyzickému zraneniu. Obsah, ktorý zahŕňa nebezpečné kaskadérske kúsky alebo extrémne športy vykonávané neprofesionálmi, môže byť nevhodný.","vid_mod_analytics_penalty_reason_graphic_title":"Násilný a nepríjemný obsah","vid_mod_analytics_penalty_reason_graphic_desc":"Obsah, ktorý divákom spôsobuje nepohodlie, šok alebo znechutenie, vrátane strašidelných efektov, ľakania, mejkapu, ktorý realisticky vytvára krvavé rany, a zobrazenia telesných funkcií, nemusí byť vhodný pre kanál Pre teba. Väčšina násilného a grafického obsahu nie je na TikToku povolená. Môžeme však povoliť určité typy obsahu, napríklad grafické zobrazenia úmrtí, nehôd alebo bitiek, ak slúžia ako dokumentácia skutočných udalostí a považujú sa za verejný záujem. Keďže tento obsah nemusí byť vhodný pre všetkých divákov, nebude vhodný na odporúčanie a zobrazí sa pri ňom obrazovka na vyjadrenie súhlasu alebo varovanie.","vid_mod_analytics_penalty_reason_fyf_title":"Nevhodné pre kanál Pre teba","vid_mod_analytics_penalty_reason_fyf_desc":"Tvoje video nespĺňa naše normy spôsobilosti pre kanál Pre teba. Ďalšie informácie nájdeš v Pravidlách komunity pre TikTok \u003E Nevhodné pre kanál Pre teba","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"Používatelia a tretie strany nám môžu nahlásiť porušenie podmienok. Toto porušenie podmienok sme zistili na základe hlásenia, že obsah porušuje naše Pravidlá komunity.","vidModAnalytics_detailPg_sectionVideoDetails_sectionLabel":"Údaje o videu","vid_mod_analytics_appeal_detailpg_reason_title":"Dôvod porušenia","vid_mod_analytics_detail_pg_title":"Video nespĺňa podmienky","vid_mod_analytics_detail_pg_desc":"Toto video nie je spôsobilé byť v kanáli Pre teba, pretože porušuje naše Pravidlá komunity.","vidModAnalytics_detailPg_sectionSuccess_header":"Námietka schválená","vid_mod_analytics_appeal_success_detail_pg_desc":"Preskúmali sme tvoju námietku a obnovil tvoje video. Ospravedlňujeme sa za nepríjemnosti, ktoré ti to mohlo spôsobiť. Ďakujeme, že si súčasťou komunity TikTok!","vid_mod_analytics_appeal_detail_pg_title":"Video odstránené","vid_mod_analytics_appeal_detail_pg_desc":"Toto video porušuje naše Pravidlá komunity.","vidModAnalytics_appealSubmitted_sectionTitle_header":"Žiadosť prijatá","vid_mod_analytics_appeal_rcv_detail_pg_desc":"Dostali sme tvoju žiadosť a dáme ti vedieť, keď bude výsledok námietky k dispozícii.","rIC_detailPg_violationReason_title":"Dôvod porušenia","dsaCGWebapp_detailPg_sectionCG_link":"Pravidlá komunity","dsaCGWebapp_appealExpired_emptyState_body":"Voči tomuto rozhodnutiu sa už nedá odvolať, pretože uplynul termín na podanie odvolania.","appeal_btn_new":"Námietka","reasonForAppeal_appealPg_appealReasonCard_title":"Dôvod podania námietky proti rozhodnutiu","oSA_appealPg_appealExplain_title":"Vysvetlenie odvolania","rIC_appealPg_appealExplain_title":"Vysvetlenie odvolania","oSA_appealPg_appealExplain_desc":"Uveď čo najviac podrobností o tom, prečo s rozhodnutím nesúhlasíš, aby sme mohli tvoje odvolanie riadne posúdiť.","rIC_appealPg_appealExplain_desc":"Uveď čo najviac podrobností o tom, prečo s rozhodnutím nesúhlasíš, aby sme mohli tvoje odvolanie riadne posúdiť.","dsa_illegal_uploader_vio_appeal_exp_desc":"Uveď čo najviac podrobností o tom, prečo s obmedzením nesúhlasíš, aby sme mohli tvoju námietku riadne posúdiť.","common_registration_phone_input_error":"Zadaj platné telefónne číslo","common_login_email_error":"Nesprávny účet alebo heslo","common_login_reset_phone_input_error":"Telefónne číslo zatiaľ nie je zaregistrované","common_login_reset_email_input_error":"E-mailová adresa zatiaľ nie je registrovaná","common_registration_password_error":"Použi 8 až 20 znakov najmenej z 2 kategórií: písmená, číslice, špeciálne znaky.","incorrect_code":"Nesprávny kód. Skús to znova.","err_service":"Interná chyba servera. Skús to neskôr.","pc_web_speed_btn":"Rýchlosť","web_login_seeRecommended_title":"Pozri si videá odporúčané pre teba","web_login_login_btn":"Prihlásiť sa","web_log
