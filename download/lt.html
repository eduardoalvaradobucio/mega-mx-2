 šį prašymą pateiki savo ar kito žmogaus vardu.","dsa_illegal_appeal_signature":"Parašas","dsa_illegal_sign_legal_name":"Čia parašyk savo oficialų vardą ir pavardę.","dsa_illegal_confirm_accuracy":"Patvirtinu, jog tikiu, kad šio pranešimo turinys yra teisingas, tikslus ir išsamus.","idpa_attachment":"Priedai","idpa_attachment_instruction":"Ataskaitą turi pateikti teisių turėtojas, kurio teisės buvo pažeistos, arba įgaliotas atstovas. Atidžiai peržiūrėk \u003CredLink\u003E pateikimo rekomendacijas\u003C\u002FredLink\u003E ir pateik visus reikalingus dokumentus. Failų formatai turi būti JPEG, JPG arba PNG, jie turi būti mažesni nei 20 MB.","idpa_attachment_sec1":"1 skirsnis:","idpa_identification_document_title":"Ieškovo dokumentai","idpa_identification_document_instruction_IP":"Pateik oficialius asmens tapatybės dokumentus. Pavyzdžiai: vairuotojo pažymėjimas (priekinė ir galinė pusės), pasas (nuotraukos puslapis ir puslapis, kuriame yra turėtojo vardas, pavardė ir kontaktinė informacija), asmens tapatybės kortelė (tik priekinė pusė) ir kt. Be to, jei reikia, turi pateikti dokumentus, įrodančius agentūros įgaliojimą, dokumentus, įrodančius teisėto atstovo, pavyzdžiui, globėjo, sutikimą, ir dokumentus, nurodančius, kad pateikimas susijęs su pačiu asmeniu. Be to, jei esi juridinis asmuo, turi pateikti tokius dokumentus kaip Registracijos pažymėjimas ir atstovo Įgaliojimas. \u003CredLink\u003ESužinok daugiau\u003C\u002FredLink\u003E","idpa_identification_document_instruction_nonIP":"Pateik oficialius asmens tapatybės dokumentus. Pavyzdžiai: vairuotojo pažymėjimas (priekinė ir galinė pusės), pasas (nuotraukos puslapis ir puslapis, kuriame yra turėtojo vardas, pavardė ir kontaktinė informacija), asmens tapatybės kortelė (tik priekinė pusė) ir kt. Be to, jei reikia, turi pateikti dokumentus, įrodančius agentūros įgaliojimą, dokumentus, įrodančius teisėto atstovo, pavyzdžiui, globėjo, sutikimą, ir dokumentus, nurodančius, kad pateikimas susijęs su pačiu asmeniu. \u003CredLink\u003ESužinok daugiau\u003C\u002FredLink\u003E","attachment_upload_limit":"Kiekvienas failas turi būti mažesnis nei 20 MB","idpa_attachment_sec2":"2 skirsnis:","idpa_right_holder_status_title":"Teisių turėtojo statusą patvirtinanti dokumentacija","idpa_ric_proof_title":"Dokumentacija dėl teisių pažeidimo","idpa_right_holder_status_instruction_1":"(Intelektinės nuosavybės teisių pažeidimas)","idpa_right_holder_status_instruction_2":"Pateik dokumentus, identifikuojančius intelektinės nuosavybės teises, kurios, tavo manymu, buvo pažeistos, ir dokumentus, kurie rodo, kad esi tariamos intelektinės nuosavybės savininkas. \u003CredLink\u003ESužinok daugiau\u003C\u002FredLink\u003E","idpa_right_holder_status_instruction_3":"(Verslo interesų pažeidimas)","idpa_right_holder_status_instruction_4":"Reikalinga dokumentacija skiriasi priklausomai nuo verslo interesų, kurie, kaip įtariama, buvo pažeisti (pvz., medžiagos, įrodančios gaminių etikečių reputaciją ar žinomumą, medžiagos, rodančios, kad įrašas klaidina naudotojus dėl kokybės). Peržiūrėk \u003CredLink\u003E išsamią informaciją\u003C\u002FredLink\u003E ir pateik atitinkamą dokumentaciją. Gali įkelti iki trijų failų JPEG, JPG arba PNG formatu, kurių kiekvienas yra mažesnis nei 20 MB.","idpa_ric_proof_instruction":"Pateik ekrano kopiją ar panašius įrodymus, rodančius paskelbto turinio dalį, kuri, tavo manymu, pažeidžia tavo teises. Gali įkelti iki trijų failų JPEG, JPG arba PNG formatu, kurių kiekvienas yra mažesnis nei 20 MB. \u003CredLink\u003ESužinok daugiau\u003C\u002FredLink\u003E","idpa_attachment_sec3":"3 skirsnis:","idpa_other_document_title":"Kiti pagrindžiantys dokumentai","idpa_other_document_instruction":"Pateik bet kokius patvirtinamuosius dokumentus, pvz., medžiagą, kuri įrodo, kad atvejis nepatenka į šmeižto išimtis. Gali įkelti iki trijų failų JPEG, JPG arba PNG formatu, kurių kiekvienas yra mažesnis nei 20 MB. \u003CredLink\u003ESužinok daugiau\u003C\u002FredLink\u003E","idpa_disclaimer":"Žinok, kad sąmoni tina kosmetinė operacija neįspėjant apie riziką, yra netinkamas visų jaunesnių nei 18 metų naudotojų srautui „Tau“.","vid_mod_analytics_penalty_reason_unoriginal_title":"Neoriginalus, žemos kokybės ir QR kodo turinys","vid_mod_analytics_penalty_reason_unoriginal_desc":"Tam, kad TikTok aplinka būtų pozityvi ir maloni mūsų naudotojams, turinys, kuris yra neoriginalus arba žemos kokybės, rekomenduoti netinkamas. Neoriginaliam turiniui priskiriami video, kurie yra tik importuoti arba įkelti iš kitų šaltinių (pvz., kitų platformų, televizijos laidų, filmų ar internetinių transliacijų) be jokių naujų kūrybinių pakeitimų. Galime suprasti, kad video yra neoriginalus, jei ant jo yra vandens ženklas arba logotipas. Žemos kokybės turinys apima labai trumpus video, statinius vaizdus ir video, sudarytus tik iš GIF. Srautui „Tau“ taip pat paprastai nėra tinkamas turinys su QR kodais, nes jis naudotojus gali nukreipti į žalingas svetaines ar programėles, o išimtis darome tik tokiomis aplinkybėmis, kai rizika yra maža (pavyzdžiui, el. prekybos tikslais).","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"Neoriginalus, žemos kokybės ir QR kodo turinys","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"Siekiant išlaikyti teigiamą patirtį, kurios iš TikTok platformos tikisi mūsų naudotojai, neoriginalus ir žemos kokybės turinys negali būti rekomenduojamas. Neoriginalus turinys – tai turinys, kuris tik importuojamas arba nukopijuojamas iš kitų šaltinių be jokių naujų kūrybinių pakeitimų. Video gali būti neoriginalus, jei ant jo yra vandens ženklas arba logotipas. Žemos kokybės turinys – tai labai trumpi video, statiniai vaizdai ir video, kuriuos sudaro tik GIF.","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"Atkurta paskyra","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"Tavo paskyroje yra įrašų, kurie nėra originalūs ir netinka srautui Tau. Daugiau informacijos rasi mūsų Bendruomenės gairėse \u003E Netinka srautui Tau \u003E Neoriginalus, žemos kokybės ir QR kodo turinys","vid_mod_analytics_penalty_reason_spam_title":"Šlamštas, neautentiškas arba klaidinantis turinys","vid_mod_analytics_penalty_reason_spam_desc":"Turinys, kuriuo bandoma apgauti naudotojus ar jais manipuliuoti siekiant sulaukti platformoje daugiau stebėtojų, patiktukų, peržiūrų ar kitokių įsitraukimo metrikų, nėra tinkamas srautui „Tau“. Tai apima turinį, skatinantį naudotojus stebėti vienas kitą arba skirti vienas kitam patiktukus, arba turinį, kuris verčia naudotojus spustelėti patiktukų arba bendrinimo mygtuką. Be to, srautui „Tau“ taip pat nėra tinkamas turinys, kuriame propaguojamos sąmokslo teorijos ir skleidžiama klaidinga ar žalinga informacija apie dabartinius įvykius ir įvykius, kurie dar klostosi.","vid_mod_analytics_penalty_reason_sexual_title":"Atviras seksualinio pobūdžio turinys","vid_mod_analytics_penalty_reason_sexual_desc":"Siekiant padėti išlaikyti priimtiną patirtį, turinys, kuris yra atvirai seksualiai dviprasmiškas, gali būti netinkamas rekomenduoti. Tai apima turinį, kuriame vaizduojamos numanomos nuogybės, seksualizuotos kūno dalys arba kuris yra akivaizdžiai erotiškas ar gašlus (pvz., striptizas).","vid_mod_analytics_penalty_reason_tobacco_title":"Tabako ir alkoholio gaminiai","vid_mod_analytics_penalty_reason_tobacco_desc":"Turinys, kuriame reklamuojami, minimi arba vaizduojami alkoholio produktai, kuriuos vartoja asmenys, sulaukę amžiaus, nuo kurio juos vartoti legalu, tačiau tai daroma pavojingu būdu, gali būti netinkamas rekomenduoti. Turinys, kuriame vaizduojamas suaugusiųjų tabako gaminių vartojimas arba minimos kontroliuojamos medžiagos, nėra tinkamas rekomenduoti.","vid_mod_analytics_penalty_reason_stunts_title":"Pavojingi triukai ir sporto veikla","vid_mod_analytics_penalty_reason_stunts_desc":"Kai atkartojama nesiimant atsargumo priemonių, kai kuri veikla gali būti rizikinga arba pavojinga, todėl gresia fizinė žala. Turinys, kuriame yra pavojingų triukų ar vaizduojamas ne profesionalų dalyvavimas ekstremaliajame sporte, gali būti netinkamas.","vid_mod_analytics_penalty_reason_graphic_title":"Smurtinis ir žiaurus turinys","vid_mod_analytics_penalty_reason_graphic_desc":"Turinys, sukeliantis žiūrovams diskomfortą, šoką ar pasibjaurėjimą, gali būti netinkamas srautui „Tau“, tai apima baisius efektus, gąsdinimus, makiažą, tikroviškai atkuriantį kruvinas žaizdas, ir kūno funkcijų vaizdavimą. Dauguma smurtinio ir žiauraus turinio TikTok nėra leidžiama. Visgi galime leisti tam tikro tipo turinį, pvz., mirčių, nelaimingų atsitikimų ar muštynių vaizdavimą dokumentuojant tikrus įvykius, jei tai atitinka viešąjį interesą. Kadangi šis turinys gali būti nemalonus kai kurioms auditorijoms, jis nebus tinkamas rekomenduoti ir turės pasirinkimo ekraną arba įspėjimą.","vid_mod_analytics_penalty_reason_fyf_title":"Netinka srautui „Tau“","vid_mod_analytics_penalty_reason_fyf_desc":"Tavo video neatitiko srautui „Tau“ mūsų taikomų tinkamumo standartų. Daugiau informacijos rasi TikTok Bendruomenės gairėse \u003E „Netinka srautui „Tau“","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"Naudotojai ir 3-iosios šalys mums gali pranešti apie politikos pažeidimus. Aptikome šį politikos pažeidimą gavę pranešimą, kad turinys pažeidžia mūsų bendruomenės gaires.","vidModAnalytics_detailPg_sectionVideoDetails_sectionLabel":"Video informacija","vid_mod_analytics_appeal_detailpg_reason_title":"Pažeidimo priežastis","vid_mod_analytics_detail_pg_title":"Video netinkamas","vid_mod_analytics_detail_pg_desc":"Šis video netinkamas srautui Tau, nes jis pažeidžia mūsų Bendruomenės gaires.","vidModAnalytics_detailPg_sectionSuccess_header":"Skundas patvirtintas","vid_mod_analytics_appeal_success_detail_pg_desc":"Peržiūrėjome tavo skundą ir atkūrėme tavo video. Atsiprašome už galimus nepatogumus. Dėkojame, kad esi TikTok bendruomenės dalis!","vid_mod_analytics_appeal_detail_pg_title":"Video pašalintas","vid_mod_analytics_appeal_detail_pg_desc":"Šis video pažeidžia mūsų Bendruomenės gaires.","vidModAna
