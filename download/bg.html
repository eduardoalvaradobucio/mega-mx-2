д","dsa_illegal_report_explanation_desc":"Моля, опишете как съдържанието нарушава съответния закон. Сигнали, които не съдържат достатъчно информация, може да не се считат за валидни. Ако е уместно, моля, посочете дали изпращате тази заявка от свое име или от името на някой друг.","dsa_illegal_appeal_signature":"Подпис","dsa_illegal_sign_legal_name":"Подпишете юридическото си име тук.","dsa_illegal_confirm_accuracy":"Потвърждавам убеждението си, че съдържанието на този доклад е вярно, точно и пълно.","idpa_attachment":"Прикачени файлове","idpa_attachment_instruction":"Докладът трябва да бъде изпратен от притежателя на правата, които са нарушени, или от упълномощен представител. Моля, прегледайте внимателно \u003CredLink\u003Eуказанията за подаване\u003C\u002FredLink\u003E и изпратете всички необходими документи. Файловете трябва да са във формат JPEG, JPG или PNG и да са по-малки от 20 MB.","idpa_attachment_sec1":"Секция 1:","idpa_identification_document_title":"Документи, свързани със заявителя","idpa_identification_document_instruction_IP":"Моля, изпратете официални документи за самоличност. Примери за такива: шофьорска книжка (лице и гръб), паспорт (страницата със снимката и тази с името на притежателя и информацията за връзка при спешни случаи), карта My Number (само лице) и др. Освен това при необходимост трябва да изпратите документи, доказващи право на представителство, документи, доказващи съгласие от законен представител, като например настойник, както и такива, че изпратените материали са свързани със самото лице. Също така, ако сте юридическо лице, трябва да изпратите документи като удостоверение за регистрация на дружеството и пълномощно от представител. \u003CredLink\u003EНаучете повече\u003C\u002FredLink\u003E","idpa_identification_document_instruction_nonIP":"Моля, изпратете официални документи за самоличност. Примери за такива: шофьорска книжка (лице и гръб), паспорт (страницата със снимката и тази с името на притежателя и информацията за връзка при спешни случаи), карта My Number (само лице) и др. Освен това при необходимост трябва да изпратите документи, доказващи право на представителство, документи, доказващи съгласие от законен представител, като например настойник, както и такива, че изпратените материали са свързани със самото лице. \u003CredLink\u003EНаучете повече\u003C\u002FredLink\u003E","attachment_upload_limit":"Всеки отделен файл трябва да е по-малък от 20 MB","idpa_attachment_sec2":"Секция 2:","idpa_right_holder_status_title":"Документи, доказващи статута на притежателя на правата","idpa_ric_proof_title":"Документи, свързани с нарушаването на права","idpa_right_holder_status_instruction_1":"(Нарушаване на права на интелектуална собственост)","idpa_right_holder_status_instruction_2":"Моля, изпратете документи, които посочват правата на интелектуална собственост, които според вас са нарушени, и документи, които показват, че сте притежателят на съответната интелектуална собственост. \u003CredLink\u003EНаучете повече\u003C\u002FredLink\u003E","idpa_right_holder_status_instruction_3":"(Нарушаване на бизнес интереси)","idpa_right_holder_status_instruction_4":"Необходимите документи варират в зависимост от бизнес интересите, за които се твърди, че са нарушени (напр. материали, демонстриращи репутацията или известността на марките на продуктите, или материали, показващи, че публикацията заблуждава потребителите относно качеството). Моля, прегледайте \u003CredLink\u003Eподробностите\u003C\u002FredLink\u003E и изпратете подходящите документи. Може да качите до три файла във формат JPEG, JPG или PNG, всеки под 20 MB.","idpa_ric_proof_instruction":"Моля, изпратете екранна снимка или подобни доказателства, показващи частта от публикуваното съдържание, която според вас нарушава правата ви. Може да качите до три файла във формат JPEG, JPG или PNG, всеки под 20 MB. \u003CredLink\u003EНаучете повече\u003C\u002FredLink\u003E","idpa_attachment_sec3":"Секция 3:","idpa_other_document_title":"Други подкрепящи документи","idpa_other_document_instruction":"Моля, изпратете документи в подкрепа на доклада, като например материали, които показват, че случаят не попада сред изключенията за клевета. Може да качите до три файла във формат JPEG, JPG или PNG, всеки под 20 MB. \u003CredLink\u003EНаучете повече\u003C\u002FredLink\u003E","idpa_disclaimer":"Имайте предвид, че съзнателното изпращане на фалшив или подвеждащ доклад може да бъде наказуемо съгласно закона. Ако често изпращате доклади, които са очевидно неоснователни, си запазваме правото да спрем възможността ви за изпращане на доклади или да забраним за постоянно акаунта ви. \u003CredLink\u003EНаучете повече\u003C\u002FredLink\u003E","ad_report_detail_placeholder_75_uk":"Моля, предоставете подробности за опита си с тази реклама, за да ни помогнете да предприемем необходимите действия. Съдържанието, което е вредно за деца съгласно Закона на Обединеното кралство за безопасността онлайн, включва порнография и сексуални действия, самоубийство и самонараняване, нарушено хранене, злоупотреба и омраза, насилие, тормоз, опасни каскади и предизвикателства, вредни вещества, нездравословен образ на тялото и депресивно съдържание. Моля, определете категория, ако е възможно.","ad_report_detail_placeholder_75_eea_row":"Моля, предоставете подробности за опита си с тази реклама, за да ни помогнете да предприемем необходимите действия.","ad_report_reason_L1Misinfo_L2aigc_v2_0":"Тази реклама може да съдържа генерирано или редактирано от AI съдържание, което включва злоупотреба, не е разрешено или е неправилно обозначено. Това може да включва:","ad_report_reason_L1Misinfo_L2aigc_v2_1":"Съдържание, генерирано от AI, което не е обозначено или разкрито като такова. Рекламата използва AI за създаване на съдържание, но не го посочва.","ad_report_reason_L1Misinfo_L2aigc_v2_2":"Използване на образ, глас или самоличност на реален човек без негово разрешение. Рекламата показва или звучи като реален човек, но този човек не е дал съгласие за това (например кат _commentCategories_insufficientComments":"Темите, обобщени от ИИ, ще бъдат налични, когато има повече коментари.","pgc_aiComments_commentCategories_emptyState":"Няма коментари, съответстващи на тази категория.","pm_web_fullpage_entry":"Щракнете, за да гледате LIVE","webLIVE_personalPage_LIVEbanner_numViewerDesc":"Гледайте сега с {num} зрители","Webapp_tooltips_play":"пускане","pm_web_fullpage_error_button":"Повторен опит","ttlive_previewSubtitle_tag_highlight":"Акцент","weblive_following_btn":"Следвате","pm_mt_liveWeb_friend_tag":"Приятел","ttlive_AIsummary_tag":"Обобщена информация","subLiveShare_webLivePage_chatTextfield_subOnlyNote":"Само за абонати","pc_web_less_btn":"по-малко","collectionsProfilePage_favoritesPage_newModal_errorMessage":"Надвишен е лимитът за брой знаци","pcWeb_add_reply":"Добавяне на отговор...","comment_tray_default":"Добавете коментар...","vid_mod_analytics_penalty_reason_minor_title":"Безопасност на непълнолетни","vid_mod_analytics_penalty_reason_minor_desc":"За да се предостави на тийнейджърите допълнително пространство за изследване на самоличността и изразяване в цифровото пространство, съдържанието, качено от потребители на възраст под 16 години, не отговаря на условията за препоръчване. Промотирането на козметичната хирургия сред непълнолетните може да доведе до по-високи нива на неудовлетвореност от тялото. Съответно такова съдържание – включително видеа „преди и след“, видеа с хирургически процедури и съобщения, в които се обсъжда планова козметична хирургия без предупреждение за рисковете – не е допустимо за канала „За вас“ на всички потребители на възраст под 18 години.","vid_mod_analytics_penalty_reason_unoriginal_title":"Неоригинално съдържание, нискокачествено съдържание и съдържание с QR код","vid_mod_analytics_penalty_reason_unoriginal_desc":"За да поддържаме TikTok позитивен и приятен за нашите потребители, съдържание, което е неоригинално или с ниско качество, не може да бъде препоръчвано. Неоригиналното съдържание включва видеа, които са току-що импортирани или качени от други източници (като други платформи, телевизионни предавания, филми или уеб предавания) без нови, творчески редакции. Можем да разберем дали дадено видео е неоригинално, ако има воден знак или е с наложено лого. Нискокачественото съдържание включва много кратки видеа, статични изображения и видеа, съставени само от GIF файлове. Съдържание, което включва QR кодове, обикновено не отговаря на условията за канала „За вас“, тъй като може да отведе потребителите до опасни уеб сайтове или приложения, въпреки че правим изключения при обстоятелства, при които рискът е нисък (например за електронна търговия).","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"Неоригинално съдържание, нискокачествено съдържание и съдържание с QR код","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"За да поддържаме положителното преживяване, което нашите потребители очакват от платформата TikTok, неоригиналното и нискокачествено съдържание не отговаря на условията за препоръчване. Неоригиналното съдържание е съдържание, което просто е импортирано или копирано от други източници без нови, творчески редакции. Едно видео може да е неоригинално, ако върху него има воден знак или лого. Съдържанието с ниско качество включва много кратки видеа, статични изображения и видеоклипове, направени само от GIF файлове.","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"Пресъздаден акаунт","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"Вашият акаунт съдържа публикации, които не са оригинални и не са подходящи за канала „За вас“. За повече информация прегледайте нашите Насоки на общността \u003E Неподходящо за канала „За вас“ \u003E Неоригинално съдържание, нискокачествено съдържание и съдържание с QR код","vid_mod_analytics_penalty_reason_spam_title":"Спам, неавтентично или подвеждащо съдържание","vid_mod_analytics_penalty_reason_spam_desc":"Съдържание, което се опитва да измами или манипулира потребителите, за да се привлекат повече последователи, харесвания, гледания или други показатели за ангажираност в платформата, не отговаря на условията за канала „За вас“. Това включва съдържание, което насърчава потребителите да се следват или харесват един друг, или съдържание, което подмамва потребителите да щракнат върху бутоните за харесване или споделяне. Освен това съдържание, което насърчава теории на конспирацията и разпространява невярна или вредна информация за текущи събития, където детайлите все още се разработват, също не отговаря на условията за канала „За вас“.","vid_mod_analytics_penalty_reason_sexual_title":"Откровено сексуално съдържание","vid_mod_analytics_penalty_reason_sexual_desc":"За да поддържаме комфортно преживяване, съдържание, което съдържа откровени сексуални намеци, може да не отговаря на условията за препоръчване. Това включва съдържание, което изобразява загатване на голота, сексуализира части от тялото или е откровено еротично или чувствено (напр. стриптийз).","vid_mod_analytics_penalty_reason_tobacco_title":"Тютюневи и алкохолни изделия","vid_mod_analytics_penalty_reason_tobacco_desc":"Съдържание, което промотира, споменава или изобразява алкохолни продукти, консумирани от лица в законна възраст за консумация на алкохол, но по опасен начин, може да не отговаря на условията за препоръка. Съдържание, изобразяващо употребата на тютюневи изделия от пълнолетни лица или споменаващо контролирани вещества, не отговаря на условията за препоръчване.","vid_mod_analytics_penalty_reason_stunts_title":"Опасни каскади и спортове","vid_mod_analytics_penalty_reason_stunts_desc":"Когато се възпроизвеждат без предпазни мерки, някои дейности могат да бъдат рискови или опасни, което може да доведе до физическо нараняване. Съдържание, което включва опасни каскади или екстремни спортове, изпълнявани от непрофесионалисти, може да не отговаря на условията.","vid_mod_analytics_penalty_reason_graphic_title":"Съдържание с насилие и шокиращи подробности","vid_mod_analytics_penalty_reason_graphic_desc":"Съдържание, което предизвиква дискомфорт, шок или отвращение в зрителите, може да не отговаря на условията за канала „За вас“, включително страховити ефекти, изненадващи стряскания, грим, който реалистично пресъздава кървави рани, както и изображения на телесни функции. Най-насилственото и графично съдържание не е разрешено в TikTok. В определени ситуации обаче можем да разрешим определени типове съдържание, като например графични изображения на смърт, злополуки или битки, когато то служи като документация на събития от реалния свят и се счита, че е от обществен интерес. Тъй като това съдържание може да не е удобно за всички аудитории, то няма да може да бъде препоръчвано, а съдържанието ще има екран за „включване“ или предупреждение.","vid_mod_analytics_penalty_reason_fyf_title":"Неподходящо за канала „За вас“","vid_mod_analytics_penalty_reason_fyf_desc":"Вашето видео не отговаря на нашите стандарти за допустимост за канала „За вас“. Прегледайте Насоките на общността на TikTok за повече информация \u003E Неподходящо за канала „За вас“","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"Потребителите и третите страни могат да ни докладват за нарушения на правилата. Открихме това нарушение на правилата въз основа на доклад, че съдържанието нарушава нашите Насоки на общността.","vidModAnalytics_detailPg_sectionVideoDetails_sectionLabel":"Подробности за видеото","vid_mod_analytics_appeal_detailpg_reason_title":"Причина за нарушение","vid_mod_analytics_detail_pg_title":"Видеото не отговаря на условията","vid_mod_analytics_detail_pg_desc":"Това видео не отговаря на условията за канала „За вас“, тъй като нарушава нашите Насоки на общността.","vidModAnalytics_detailPg_sectionSuccess_header":"Възражението е одобрено","vid_mod_analytics_appeal_success_detail_pg_desc":"Разгледахме възражението ви и възстановихме вашето видео. Извиняваме се за причиненото неудобство. Благодарим ви, че сте част от общността на TikTok!","vid_mod_analytics_appeal_deta
