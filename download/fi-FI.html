in päivitys:","pgc_aiComments_commentCategories_all":"Kaikki","pgc_aiComments_analyticsPage_commentsCount":"{num, plural, one {{num} kommentti} other {{num} kommenttia}}","pgc_aiComments_analyticsPage_infoPopup_topicsTitle":"Aiheet","pgc_aiComments_commentCategories_insufficientComments":"Tekoälyn koostamat aiheet ovat käytettävissä, kun kommentteja on enemmän.","pgc_aiComments_commentCategories_emptyState":"Kategoriassa ei ole yhtään kommenttia.","pm_web_fullpage_entry":"Katso LIVEä napsauttamalla","webLIVE_personalPage_LIVEbanner_numViewerDesc":"Liity {num} katsojan joukkoon","Webapp_tooltips_play":"toista","pm_web_fullpage_error_button":"Yritä uudelleen","ttlive_previewSubtitle_tag_highlight":"Kohokohta","weblive_following_btn":"Seurataan","pm_mt_liveWeb_friend_tag":"Kaveri","ttlive_AIsummary_tag":"Yhteenveto","subLiveShare_webLivePage_chatTextfield_subOnlyNote":"Vain tilaajille","pc_web_less_btn":"vähemmän","collectionsProfilePage_favoritesPage_newModal_errorMessage":"Merkkiraja ylitetty","pcWeb_add_reply":"Vastaa...","comment_tray_default":"Lisää kommentti...","vid_mod_analytics_penalty_reason_minor_title":"Alaikäisen turvallisuus","vid_mod_analytics_penalty_reason_minor_desc":"Jotta teineillä olisi lisää tilaa identiteettinsä tutkimiseen ja ilmaisuun digitaalisissa tiloissa, alle 16-vuotiaiden käyttäjien lataamaa sisältöä ei voida suositella. Kauneusleikkausten mainostaminen alaikäisille voi johtaa suurempaan tyytymättömyyteen omasta kehosta. Näin ollen tällaista sisältöä – mukaan lukien ennen ja jälkeen -videot, kauneusleikkausvideot ja viestit, joissa keskustellaan elektiivisestä kauneusleikkauksesta varoittamatta riskeistä – ei voida näyttää alle 18-vuotiaiden käyttäjien Sinulle-syötteessä.","vid_mod_analytics_penalty_reason_unoriginal_title":"Ei alkuperäinen, heikkolaatuinen ja QR-koodeja käsittävä sisältö","vid_mod_analytics_penalty_reason_unoriginal_desc":"Jotta TikTok pysyisi positiivisena ja mukavana käyttäjillemme, epäoriginaalinen tai heikkolaatuinen sisältö ei kelpaa suositeltavaksi. Epäoriginaalinen sisältö kattaa videot, jotka on tuotu tai lähetetty muista lähteistä (kuten muilta alustoilta, TV-ohjelmista, elokuvista tai webcasteista) ilman uusia, luovia muokkauksia. Tunnistamme videon epäoriginaaliseksi, jos siinä on vesileima tai logo. Heikkolaatuinen sisältö kattaa hyvin lyhyet videot, staattiset kuvat ja videot, jotka ovat pelkkiä GIF-tiedostoja. Sisältö, joka sisältää QR-koodeja, ei tavallisesti ole kelvollinen Sinulle-syötteeseen, koska se voi johtaa käyttäjät haittasivustoille tai -sovelluksiin, mutta teemme poikkeuksia tilanteissa, jossa riski on matala (esimerkiksi verkkokauppa).","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"Ei alkuperäinen, heikkolaatuinen ja QR-koodeja käsittävä sisältö","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"Ylläpitääksemme käyttäjiemme TikTok-alustalta odottamaa positiivista kokemusta ei-originaalia ja heikkolaatuista sisältöä ei voida suositella. Ei-originaalinen sisältö tarkoittaa sisältöä, joka on yksinkertaisesti tuotu tai kopioitu muista lähteistä ilman uusia, luovia muokkauksia. Video voi olla ei-originaalinen, jos siinä on vesileima tai logo. Heikkolaatuinen sisältö kattaa erittäin lyhyet videot, staattiset kuvat ja videot, jotka ovat pelkkiä GIF-tiedostoja.","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"Ei-alkuperäinen tili","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"Tililläsi on julkaisuja, jotka eivät ole alkuperäisiä eivätkä kelpaa Sinulle-syötteeseen. Saat lisätietoja tutustumalla Yhteisön suuntaviivojen syötteelle kelpaamattomien julkaisujen kategoriaan \"Ei alkuperäinen, heikkolaatuinen ja QR-koodeja käsittävä sisältö\".","vid_mod_analytics_penalty_reason_spam_title":"Roskasisältöä tai väärennettyä tai harhaanjohtavaa sisältöä","vid_mod_analytics_penalty_reason_spam_desc":"Sisältö, jolla pyritään huijaamaan tai manipuloimaan käyttäjiä tarkoituksena saada lisää seuraajia, tykkäyksiä tai katselukertoja tai jolla pyritään kasvattamaan muiden vuorovaikutusmittarien lukemia alustalla, ei kelpaa Sinulle-syötteeseen. Tämä kattaa sisällön, joka kannustaa käyttäjiä seuraamaan toinen toistaan tai tykkäämään toinen toisestaan ja joka huijaa käyttäjiä napsauttamaan tykkäys- tai jakopainiketta. Lisäksi sisältö, joka edistää salaliittoteorioita tai levittää väärää tai haitallista tietoa nykytapahtumista tai vasta meneillään olevista tapahtumista, ei kelpaa Sinulle-syötteeseen.","vid_mod_analytics_penalty_reason_sexual_title":"Selvästi seksuaalista sisältöä","vid_mod_analytics_penalty_reason_sexual_desc":"Jotta TikTokin käyttökokemus pysyisi mukavana kaikille, avoimesti seksuaalista sisältöä ei voida suositella. Tämä kattaa sisällön, jossa kuvataan vihjattua alastomuutta tai esitetään kehon osia seksuaalisessa mielessä, tai joka on selvästi eroottista tai sensuellia (kuten striptease-tanssi).","vid_mod_analytics_penalty_reason_tobacco_title":"Tupakka ja alkoholituotteet","vid_mod_analytics_penalty_reason_tobacco_desc":"Sisältö, joka mainostaa, mainitsee tai kuvaa täysi-ikäisten henkilöiden alkoholijuomien kulutusta niin, että kulutus tapahtuu vaarallisesti, ei kelpaa suositeltavaksi. Myöskään sisältö, jossa kuvataan täysi-ikäisiä käyttämässä tupakkatuotteita tai jossa mainitaan säädeltyjä aineita, ei kelpaa suositeltavaksi.","vid_mod_analytics_penalty_reason_stunts_title":"Vaaralliset temput ja urheilusuoritukset","vid_mod_analytics_penalty_reason_stunts_desc":"Kun tiettyjä toimia kopioidaan ilman varotoimia, ne voivat olla vaarallisia ja niistä voi seurata loukkaantuminen. Sisältö, johon kuuluu vaarallisia temppuja tai extreme-urheilua muilta kuin ammattilaisilta, ei välttämättä täytä edellytyksiä.","vid_mod_analytics_penalty_reason_graphic_title":"Väkivaltainen ja kuvaannollinen sisältö","vid_mod_analytics_penalty_reason_graphic_desc":"Sisältö, joka aiheuttaa katsojille epämukavuuden tunteita, järkyttää tai herättää inhoa, ei välttämättä kelpaa Sinulle-syötteeseen. Mainitun kaltainen sisältö käsittää pelottavat tehosteet, yllätyspelotteet, realistiset verisiltä haavoilta näyttävät meikkaukset ja kehon toimintojen kuvaukset. Useimpia väkivaltaisia ja järkyttäviä sisältöjä ei sallita TikTokissa. Joissain tilanteissa – eli kun sisältö kuvaa todellisia tapahtumia ja sen jakamisesta on yleistä etua – saatamme kuitenkin sallia tietyn tyyppistä sisältöä, joka kuvaa esimerkiksi kuolemantapauksia, onnettomuuksia tai tappeluita. Koska sisältö ei välttämättä sovi kaikille yleisöille, sitä ei voida suositella TikTokin käyttäjille, ja sisällön ohessa esitetään valintaruutu tai varoitus.","vid_mod_analytics_penalty_reason_fyf_title":"Sisältö ei ole kelvollista Sinulle-syötteeseen","vid_mod_analytics_penalty_reason_fyf_desc":"Videosi ei täyttänyt Sinulle-syötteen vaatimuksia. Lue lisätietoja TikTokin yhteisön suuntaviivoista ja kohdasta Sisältö ei ole kelvollista Sinulle-syötteeseen","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"Käyttäjät ja kolmannet osapuolet voivat ilmoittaa meille käytäntörikkomuksista. Havaitsimme tämän sääntörikkomuksen siitä tehdyn ilmoituksen perusteella; ilmoituksen mukaan sisältö rikkoo Yhteisömme suuntaviivoja.","vidModAnalytics_detailPg_sectionVideoDetails_sectionLabel":"Videon tiedot","vid_mod_analytics_appeal_detailpg_reason_title":"Rikkeen perustelut","vid_mod_analytics_detail_pg_title":"Video ei kelpaa","vid_mod_analytics_detail_pg_desc":"Tämä video rikkoo Yhteisömme suuntaviivoja, eikä täten kelpaa Sinulle-syötteeseen.","vidModAnalytics_detailPg_sectionSuccess_header":"Valitus hyväksyttiin","vid_mod_analytics_appeal_success_detail_pg_desc":"Arvioimme valituksesi ja palautimme videosi. Pahoittelemme tästä mahdollisesti aiheutunutta haittaa. Kiitos siitä, että olet osa TikTok-yhteisöä!","vid_mod_analytics_appeal_detail_pg_title":"Video poistettiin","vid_mod_analytics_appeal_detail_pg_desc":"Tämä video rikkoo Yhteisömme suuntaviivoja.","vidModAnalytics_appealSubmitted_sectionTitle_header":"Pyyntö vastaanotet
