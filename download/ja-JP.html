ary_tag":"要約","subLiveShare_webLivePage_chatTextfield_subOnlyNote":"サブスク登録者限定","pc_web_less_btn":"表示を減らす","collectionsProfilePage_favoritesPage_newModal_errorMessage":"文字数制限を超えています","pcWeb_add_reply":"返信する...","comment_tray_default":"すてきなコメントを書く...","vid_mod_analytics_penalty_reason_minor_title":"未成年者の安全","vid_mod_analytics_penalty_reason_minor_desc":"デジタル空間におけるアイデンティティの探求と表現の余地を未成年者にさらに提供するため、16歳未満のユーザーがアップロードしたコンテンツはおすすめの対象外となっています。未成年者に美容整形を勧めることは、身体への不満を高めることにつながる可能性があります。したがって、ビフォーアフター動画、外科手術の動画、リスクを警告せずに選択的な美容整形手術を論じるメッセージなどを含むコンテンツは、18歳未満のすべてのユーザーのおすすめフィードには表示されません。","vid_mod_analytics_penalty_reason_unoriginal_title":"オリジナルではないコンテンツ、低品質のコンテンツ、QRコードのコンテンツ","vid_mod_analytics_penalty_reason_unoriginal_desc":"ユーザーにとってTikTokをポジティブで楽しいものにするため、オリジナルでないコンテンツや低品質のコンテンツはおすすめの対象にはなりません。オリジナルでないコンテンツには、他のソース（他のプラットフォーム、テレビ番組、映画、ウェブキャストなど）からインポートまたはアップロードされただけで、新しいクリエイティブな編集が施されていない動画が含まれます。ウォーターマークやスーパーインポーズされたロゴがあれば、オリジナルでない動画であることが分かります。低品質のコンテンツには、非常に短い動画、静止画像、GIFのみで構成された動画などがあります。また、QRコード付きのコンテンツは、ユーザーを有害なウェブサイトやアプリに誘導する可能性があるため、基本的におすすめフィードへの表示が許可されていませんが、リスクが低い場合（Eコマースなど）には例外を設けています。","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"オリジナルではないコンテンツ、低品質のコンテンツ、QRコードのコンテンツ","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"ユーザーがTikTokプラットフォームに期待するポジティブな体験を維持するため、オリジナルでない低品質なコンテンツはおすすめの対象外となります。オリジナルでないコンテンツとは、他のソースからインポートまたはコピーしただけのコンテンツで、新しいクリエイティブな編集が施されていないものを指します。動画にウォーターマークやロゴがある場合は、オリジナルではない可能性があります。低品質コンテンツには、非常に短い動画、静止画像、GIFのみで構成された動画が含まれます。","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"複製されたアカウント","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"あなたのアカウントには、オリジナルではない、おすすめフィードに不適格な投稿が含まれています。詳しくは、コミュニティガイドラインを確認してください\u003Eおすすめフィードに不適格なコンテンツ\u003Eオリジナルではないコンテンツ、低品質のコンテンツ、QRコードのコンテンツ","vid_mod_analytics_penalty_reason_spam_title":"スパム、不正、または誤解を招くようなコンテンツ","vid_mod_analytics_penalty_reason_spam_desc":"プラットフォーム上でフォロワー、「いいね」、視聴数、またはその他のエンゲージメントの指標を増やすためにユーザーを騙したり操作しようとしたりするコンテンツは、「おすすめ」フィードの対象にはなりません。これには、ユーザーに相互フォローや「いいね」を促すコンテンツや、ユーザーを騙して「いいね」や「シェア」ボタンをクリックさせるコンテンツが含まれます。また、陰謀論を助長するコンテンツや、時事問題または詳細が判明していない事件に関する誤情報や有害な情報を広めるコンテンツも、「おすすめ」フィードの対象にはなりません。","vid_mod_analytics_penalty_reason_sexual_title":"露骨な性描写のあるコンテンツ","vid_mod_analytics_penalty_reason_sexual_desc":"快適な視聴環境を維持するため、性的に露骨な描写を含むコンテンツは、おすすめの対象外となる場合があります。これには、暗示的にヌードを描写したり、身体の一部を性的に表現したりするコンテンツ、または明らかにエロティックあるいは官能的なコンテンツ（例：ストリップショー）が含まれます。","vid_mod_analytics_penalty_reason_tobacco_title":"タバコおよびアルコール製品","vid_mod_analytics_penalty_reason_tobacco_desc":"アルコール製品を宣伝、描写したり、そうした製品に言及したりするコンテンツは、法定で飲酒可能な年齢の人によるものであっても、危険な方法で行われている場合はおすすめの対象にならないことがあります。成人によるタバコ製品の使用を描写するコンテンツや、規制薬物に言及するコンテンツは、おすすめの対象にはなりません。","vid_mod_analytics_penalty_reason_stunts_title":"危険な行為やスポーツ","vid_mod_analytics_penalty_reason_stunts_desc":"安全対策なしに再現された場合、特定のアクティビティは身体的危害につながる危険なものとなる可能性があります。危険なスタントや、プロでない人が行うエクストリームスポーツを含むコンテンツは、不適格となる場合があります。","vid_mod_analytics_penalty_reason_graphic_title":"暴力的または衝撃的なコンテンツ","vid_mod_analytics_penalty_reason_graphic_desc":"恐ろしいエフェクト、ジャンプスケア、血みどろの傷をリアルに再現したメイク、身体機能の描写など、視聴者に不快感、ショック、嫌悪感を与える内容は、おすすめフィードの対象外となる場合があります。TikTokでは、ほとんどの暴力的で生々しいコンテンツは許可されていません。ただし、現実世界の出来事の記録として機能し、公共の利益があるとみなされる場合、死、事故、戦闘などの生々しい画像など、特定の種類の内容が許可される場合があります。この内容はすべての視聴者に適していない可能性があるため、おすすめの対象にはならず、内容には「オプトイン」画面または警告が表示されます。","vid_mod_analytics_penalty_reason_fyf_title":"おすすめフィードに不適格","vid_mod_analytics_penalty_reason_fyf_desc":"あなたの動画は「おすすめ」フィードの適合性の基準を満たしていません。詳細についてはTikTokのコミュニティガイドラインで、\u003E「おすすめフィードの不適切なコンテンツ」を確認してください","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"ユーザーとサードパーティはTikTokにポリシー違反を報告できます。このポリシー違反は、コンテンツがTikTokのコミュニティガイドラインに違反していたという報告に基づいて検知されました。","vidModAnalytics_detailPg_sectionVideoDetails_sectionLabel":"動画の詳細情報","vid_mod_analytics_appeal_detailpg_reason_title":"違反の理由","vid_mod_analytics_detail_pg_title":"動画は不適格です","vid_mod_analytics_detail_pg_desc":"この動画は、コミュニティガイドラインに違反しているため、おすすめフィードには不適格です。","vidModAnalytics_detailPg_sectionSuccess_header":"異議申し立てが承認されました","vid_mod_analytics_appeal_success_detail_pg_desc":"異議申し立てを審査した結果、あなたの動画は復元されました。ご迷惑をおかけしましたことをお詫び申し上げます。今後ともTikTokをよろしくお願いいたします。","vid_mod_analytics_appeal_detail_pg_title":"この動画は非公開に設定されました","vid_mod_analytics_appeal_detail_pg_desc":"この動画は、TikTokのコミュニティガイドラインに違反しています。","vidModAnalytics_appealSubmitted_sectionTitle_header":"リクエストが受理されました","vid_mod_analytics_appeal_rcv_detail_pg_desc":"リクエストを受け付けました。異議申し立ての結果がわかり次第、お知らせします。","rIC_detailPg_violationReason_title":"違反の理由","dsaCGWebapp_detailPg_sectionCG_link":"コミュニティガイドライン","dsaCGWebapp_appealExpired_emptyState_body":"異議申し立ての期限を過ぎたため、この決定に対して異議を申し立てることはできなくなりました。","appeal_btn_new":"異議申し立て","reasonForAppeal_appealPg_appealReasonCard_title":"この決定に異議を申し立てる理由","oSA_appealPg_appealExplain_title":"異議申し立ての内容","rIC_appealPg_appealExplain_title":"異議申し立ての内容","oSA_appealPg_appealExplain_desc":"決定に同意しない理由をできる限り詳しく説明してください。そうすれば、TikTokがあなたの異議申し立てを適切に評価できます。","rIC_appealPg_appealExplain_desc":"制限に同意しない理由をできる限り詳しく説明してください。そうすれば、TikTokがあなたの異議申し立てを適切に評価できます。","dsa_illegal_uploader_vio_appeal_exp_desc":"制限に同意しない理由をできる限り詳しく説明していただければ、TikTokがあなたの異議申し立てを適切に評価できます。","common_registration_phone_input_error":"有効な電話番号を入力してください","common_login_email_error":"アカウントまたはパスワードが正しくありません","common_login_reset_phone_input_error":"電話番号がまだ登録されていません","common_login_reset_email_input_error":"メールアドレスがまだ登録されていません","common_registration_password_error":"文字、数字、特殊文字のうち、2種類以上を組み合わせて、8～20文字で設定してください。","incorrect_code":"コードが正しくありません。もう一度お試しください。","err_service":"内部のサーバーエラーです。後ほどもう一度お試しください。","pc_web_speed_btn":"変速モード：オン","web_login_seeRecommended_title":"おすすめの動画を見よう","web_login_login_btn":"ログイン","web_login_notNow_btn":"後で","pcWeb_UpNextMoreVidsFromCreator_title":"次：このクリエイターの他の動画","pcWeb_moreVidsFromCreator_title":"このクリエイターの他の動画","pcWeb_seeAllVids":"すべての動画を見る","web_visitExplorePage_upNext_exploreNow":"今すぐ見る","web_visitExplorePage_upNext_moreTrending":"次：人気上昇中の他の動画","web_visitExplorePage_upNext_moreCategoryVids":"次：人気上昇中の他の{category}動画","save_collection_btn":"保存","favorites_collection_toast_manage":"管理","fc_add_toast_
