a possibilidade de recorrer.","dsa_illegal_report_trustedflagger_fill_email":"Introduz um endereço de e-mail válido","dsa_illegal_detail_country":"Jurisdição legal","dsa_illegal_detail_law":"Legislação relevante","dsa_illegal_cite_law_desc":"Fornece detalhes sobre a lei que o conteúdo supostamente viola. Sê o mais específico possível para que possamos avaliar adequadamente a tua denúncia.","dsa_illegal_detail_explanation":"Explicação da denúncia","dsa_illegal_report_explanation_desc":"Descreve como o conteúdo viola a lei relevante. As denúncias que não contiverem informações suficientes poderão não ser consideradas válidas. Se for relevante, especifica se estás a enviar esta solicitação para ti mesmo ou em nome de outra pessoa.","dsa_illegal_appeal_signature":"Assinatura","dsa_illegal_sign_legal_name":"Assina o teu nome legal aqui.","dsa_illegal_confirm_accuracy":"Confirmo a minha convicção de que o conteúdo desta denúncia é verdadeiro, preciso e completo.","idpa_attachment":"Anexos","idpa_attachment_instruction":"O relatório tem de ser enviado pelo titular dos direitos cujos direitos tenham sido infringidos ou por um representante autorizado. Revê as \u003CredLink\u003Ediretrizes de envio\u003C\u002FredLink\u003E cuidadosamente e envia toda a documentação necessária. Os ficheiros têm de estar no formato JPEG, JPG ou PNG e devem ser inferiores a 20 MB.","idpa_attachment_sec1":"Secção 1:","idpa_identification_document_title":"Documentos relativos ao requerente","idpa_identification_document_instruction_IP":"Envia documentos de identificação oficiais. Por exemplo: carta de condução (frente e verso), passaporte (página da fotografia e página que contém o nome do titular e as informações do contacto de emergência), My Number Card (apenas frente), entre outros. Adicionalmente, conforme necessário, tens de enviar documentos que comprovem a autoridade da agência, documentos que forneçam consentimento de um representante legal, como um guardião legal, e documentos que indiquem que o envio diz respeito ao próprio. Mais ainda, se fores uma pessoa jurídica, deves enviar documentos como o Certificado de registo comercial e a Procuração do representante. \u003CredLink\u003ESaber mais\u003C\u002FredLink\u003E","idpa_identification_document_instruction_nonIP":"Envia documentos de identificação oficiais. Por exemplo: carta de condução (frente e verso), passaporte (página da fotografia e página que contém o nome do titular e as informações do contacto de emergência), My Number Card (apenas frente), entre outros. Adicionalmente, conforme necessário, tens de enviar documentos que comprovem a autoridade da agência, documentos que forneçam consentimento de um representante legal, como um guardião legal, e documentos que indiquem que o envio diz respeito ao próprio. \u003CredLink\u003ESaber mais\u003C\u002FredLink\u003E","attachment_upload_limit":"Every single file must be less than 20MB","idpa_attachment_sec2":"Secção 2:","idpa_right_holder_status_title":"Documentos que comprovem o estado do titular dos direitos","idpa_ric_proof_title":"Documentos relativos à infração dos direitos","idpa_right_holder_status_instruction_1":"(Infração de direitos de propriedade intelectual)","idpa_right_holder_status_instruction_2":"Envia documentos que identifiquem os direitos de propriedade intelectual que acreditas que foram infringidos e documentos que mostrem que és o proprietário da alegada propriedade intelectual. \u003CredLink\u003ESaber mais\u003C\u002FredLink\u003E","idpa_right_holder_status_instruction_3":"(Infração de interesses comerciais)","idpa_right_holder_status_instruction_4":"A documentação necessária varia conforme os interesses comerciais alegadamente infringidos (por exemplo, materiais que comprovem a reputação ou notoriedade das etiquetas dos produtos, materiais que mostrem que a publicação engana os consumidores em relação à qualidade). Revê os \u003CredLink\u003Edetalhes\u003C\u002FredLink\u003E e envia a documentação adequada. Podes carrega os nossos utilizadores, o conteúdo que não é original ou é de baixa qualidade não é elegível para recomendação. O conteúdo não original inclui vídeos que são apenas importados ou enviados de outras fontes (como outras plataformas, programas de TV, filmes ou webcasts), sem nenhuma edição nova e criativa. É possível identificar se um vídeo não é original se ele tiver uma marca d'água ou um logotipo sobreposto. O conteúdo de baixa qualidade inclui vídeos muito curtos, imagens estáticas e vídeos feitos apenas de GIFs. O conteúdo que inclui códigos QR geralmente não se qualifica para o feed Para ti porque pode levar os utilizadores a sites ou aplicações nocivos, embora abramos exceções em circunstâncias em que o risco é baixo (por exemplo, para comércio eletrónico).","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"Conteúdo não original, de baixa qualidade e de código QR","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"Para manter a experiência positiva que os nossos utilizadores esperam da plataforma TikTok, o conteúdo não original e de baixa qualidade é inelegível para recomendação. Conteúdo não original é o conteúdo que é apenas importado ou copiado de outras fontes, sem nenhuma nova edição criativa. Um vídeo pode não ser original se tiver uma marca d'água ou logotipo. O conteúdo de baixa qualidade inclui vídeos muito curtos, imagens estáticas e vídeos feitos apenas com GIFs.","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"Conta não original","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"A tua conta contém publicações que não são originais e são inelegíveis para o feed Para Ti. Para obteres mais informações, consulta as nossas Diretrizes da Comunidade \u003E Não adequado para feed Para ti \u003E Conteúdo não original, de baixa qualidade e de conteúdo de códigos QR","vid_mod_analytics_penalty_reason_spam_title":"Conteúdo de spam, não autêntico ou enganoso","vid_mod_analytics_penalty_reason_spam_desc":"O conteúdo que tenta enganar ou manipular os utilizadores para obter mais seguidores, gostos, visualizações ou outras métricas de envolvimento na plataforma não se qualifica para o feed Para Ti. Isto inclui conteúdo que incentiva os utilizadores a seguir ou gostar uns aos outros, ou conteúdo que induz os utilizadores a clicarem em botões de gostar ou partilhar. Além disso, conteúdo que promova teorias da conspiração e divulgue informações falsas ou prejudiciais sobre eventos atuais e eventos em que os detalhes ainda estão em desenvolvimento também não se qualificam para o feed Para Ti.","vid_mod_analytics_penalty_reason_sexual_title":"Conteúdo abertamente sexual","vid_mod_analytics_penalty_reason_sexual_desc":"Para ajudar a manter uma experiência confortável, o conteúdo que é abertamente sugestivo sexualmente pode não se qualificar para recomendação. Isto inclui conteúdo que retrata nudez implícita, sexualiza partes do corpo ou é descaradamente erótico ou sensual (por exemplo, stripteases).","vid_mod_analytics_penalty_reason_tobacco_title":"Tabaco e produtos alcoólicos","vid_mod_analytics_penalty_reason_tobacco_desc":"Conteúdo que promova, mencione ou descreva produtos alcoólicos consumido por pessoas em idade legal para consumo, mas que beba de forma perigosa, pode não ser elegível para recomendação. Conteúdo que descreva o uso de produtos de tabaco por adultos ou que mencione substâncias controladas não é elegível para recomendação.","vid_mod_analytics_penalty_reason_stunts_title":"Brincadeiras e desportos perigosos","vid_mod_analytics_penalty_reason_stunts_desc":"Quando são imitadas sem precauções de segurança, certas atividades podem ser arriscadas ou perigosas, o que pode levar a danos físicos. Conteúdo que inclui acrobacias perigosas ou desportos radicais realizados por amadores, pode ser inelegível.","vid_mod_analytics_penalty_reason_graphic_title":"Conteúdo violento e explícito","vid_mod_analytics_penalty_reason_graphic_desc":"Conteúdo que causa desconforto, choque ou nojo aos espectadores pode ser inelegível para o Feed Para Ti, incluindo efeitos assustadores, sustos, maquilhagem que recria feridas sangrentas de forma realista e representações de funções corporais. A maioria do conteúdo violento e explícito não é permitido no TikTok. No entanto, poderemos permitir certos tipos de conteúdo, tal como imagens explícitas de mortes, acidentes ou lutas, quando servem como documentação de acontecimentos do mundo real e são considerados de interesse público. Como este conteúdo pode não ser confortável para todos os públicos, não será elegível para recomendação e terá um ecrã ou aviso de \"aceitação\".","vid_mod_analytics_penalty_reason_fyf_title":"Inelegível para o feed Para Ti","vid_mod_analytics_penalty_reason_fyf_desc":"O teu vídeo não segue os nossos padrões de elegibilidade para o feed Para Ti. Consulta as Diretrizes da Comunidade do TikTok para obteres mais informações \u003E Inelegível para o feed Para Ti","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"Os utilizadores e terceiros podem enviar-nos denúncias de infrações às nossas políticas. Detetámos esta infração das nossas políticas na sequência de uma denúncia de que o conteúdo infringia as nossas Diretrizes da Comunidade.","vidModAnalytics_detailPg_sectionVideoDetails_sectionLabel":"Detalhes do vídeo","vid_mod_analytics_appeal_detailpg_reason_title":"Motivo da infração","vid_mod_analytics_detail_pg_title":"Vídeo não elegível","vid_mod_analytics_detail_pg_desc":"Este vídeo não é elegível para o feed Para Ti porque infringe as nossas Diretrizes da Comunidade.","vidModAnalytics_detailPg_sectionSuccess_header":"Recurso aprovado","vid_mod_analytics_appeal_success_detail_pg_desc":"Analisámos o teu recurso e restaurámos a tua conta. Pedimos desculpa por qualquer incómodo que isto possa ter causado. Obrigado por fazeres parte da comunidade TikTok!","vid_mod_analytics_appeal_detail_pg_title":"Vídeo removido","vid_mod_analytics_appeal_detail_pg_desc":"Este vídeo infringe as nossas Dir
