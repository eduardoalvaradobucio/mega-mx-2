etager en falsk eller misvisende anmeldelse af ulovligt indhold. Hvis du ofte indsender anmeldelser, der er åbenlyst ubegrundede, forbeholder vi os retten til at suspendere din mulighed for at indsende anmeldelser eller permanent udelukke din konto. Se vores Center for transparens for flere oplysninger.","Web_report_reason_select":"Årsag til anmeldelse:","dsa_illegal_report_email":"Din e-mailadresse","dsa_illegal_cite_law_optional":"(valgfrit)","dsa_illegal_report_fill_email":"Udfyld din e-mailadresse","cseReasons_reportPg_emailAddForm_body":"Du kan indsende denne anmeldelse anonymt. Du vil imidlertid ikke blive underrettet om resultatet eller have mulighed for at anke.","dsa_illegal_report_trustedflagger_fill_email":"Indtast en gyldig e-mailadresse","dsa_illegal_detail_country":"Jurisdiktion","dsa_illegal_detail_law":"Relevant lovgivning","dsa_illegal_cite_law_desc":"Angiv detaljer om den lov, som indholdet angiveligt overtræder. Vær så specifik som muligt, så vi kan vurdere din anmeldelse korrekt.","dsa_illegal_detail_explanation":"Forklaring på anmeldelsen","dsa_illegal_report_explanation_desc":"Beskriv hvordan indholdet overtræder den relevante lov. Rapporter, der ikke indeholder tilstrækkelige oplysninger, vil muligvis ikke blive betragtet som gyldige. Hvis det er relevant, bedes du angive, om du indsender denne anmodning på egne vegne eller på vegne af en anden.","dsa_illegal_appeal_signature":"Underskrift","dsa_illegal_sign_legal_name":"Underskriv med dit juridiske navn her.","dsa_illegal_confirm_accuracy":"Jeg bekræfter min overbevisning om, at indholdet i denne rapport er sandt, nøjagtigt og fuldstændigt.","idpa_attachment":"Vedhæftede filer","idpa_attachment_instruction":"Rapporten skal indsendes af den rettighedshaver, hvis rettigheder er blevet krænket, eller af en autoriseret repræsentant. Gennemgå venligst \u003CredLink\u003Eretningslinjerne for indsendelse\u003C\u002FredLink\u003E omhyggeligt, og indsend al nødvendig dokumentation. Filformater skal være JPEG, JPG eller PNG, og filstørrelsen skal være under 20 MB.","idpa_attachment_sec1":"Afsnit 1:","idpa_identification_document_title":"Dokumenter vedrørende sagsøgeren","idpa_identification_document_instruction_IP":"Indsend officielle identifikationsdokumenter. Eksempler inkluderer: kørekort (forside og bagside), pas (fotoside og side, der viser indehaverens navn og nødkontaktoplysninger), My Number Card (kun forside) osv. Derudover skal du efter behov indsende dokumenter, der beviser fuldmagt, dokumenter, der beviser samtykke fra en juridisk repræsentant såsom en værge, og dokumenter, der indikerer, at indsendelsen vedrører den pågældende person selv. Derudover skal du, hvis du er en juridisk person, desuden indsende dokumenter såsom et certifikat for virksomhedsregistrering og en fuldmagt fra en repræsentant. \u003CredLink\u003EFå mere at vide\u003C\u002FredLink\u003E","idpa_identification_document_instruction_nonIP":"Indsend officielle identifikationsdokumenter. Eksempler inkluderer: kørekort (forside og bagside), pas (fotoside og side, der viser indehaverens navn og nødkontaktoplysninger), My Number Card (kun forside) osv. Derudover skal du efter behov indsende dokumenter, der beviser fuldmagt, dokumenter, der beviser samtykke fra en juridisk repræsentant såsom en værge, og dokumenter, der indikerer, at indsendelsen vedrører den pågældende person selv. \u003CredLink\u003EFå mere at vide\u003C\u002FredLink\u003E","attachment_upload_limit":"Hver enkelt fil skal fylde mindre end 20 MB","idpa_attachment_sec2":"Afsnit 2:","idpa_right_holder_status_title":"Dokumentation, der beviser rettighedshaverens status","idpa_ric_proof_title":"Dokumentation vedrørende krænkelsen af rettigheder","idpa_right_holder_status_instruction_1":"(Krænkelse af intellektuelle ejendomsrettigheder)","idpa_right_holder_status_instruction_2":"Indsend dokumenter, der identificerer de intellektuelle ejendomsrettigheder, der efter din opfattelse er blevet krænket, og dokumenter, der viser, at du er ejer af den påståede intellektuelle ejendomsret. \u003CredLink\u003EFå mere at vide\u003C\u002FredLink\u003E","idpa_right_holder_status_instruction_3":"(Krænkelse af forretningsinteresser)","idpa_right_holder_status_instruction_4":"Den påkrævede dokumentation varierer afhængigt af, hvilke forretningsinteresser der påstås at være blevet krænket (f.eks. materialer, der viser ry eller omdømme for produktmærker, eller materialer, der viser, at opslaget vildleder forbrugerne om kvalitet). Gennemgå venligst \u003CredLink\u003Edetaljerne\u003C\u002FredLink\u003E, og indsend den relevante dokumentation. Du kan uploade op til tre filer i formaterne JPEG, JPG eller PNG, hvor hver af filerne er under 20 MB.","idpa_ric_proof_instruction":"Indsend et skærmbillede eller tilsvarende dokumentation, der viser den del af det opslåede indhold, som du mener krænker dine rettigheder. Du kan uploade op til tre filer i formaterne JPEG, JPG eller PNG, der hver er under 20 MB. \u003CredLink\u003EFå mere at vide\u003C\u002FredLink\u003E","idpa_attachment_sec3":"Afsnit 3:","idpa_other_document_title":"Yderligere dokumentation","idpa_other_document_instruction":"Indsend alle yderligere dokumenter såsom materialer, der viser, at sagen ikke falder ind under undtagelser for ærekrænkelse. Du kan uploade op til tre filer i formaterne JPEG, JPG eller PNG, hvor hver af filerne er under 20 MB. \u003CredLink\u003EFå mere at vide\u003C\u002FredLink\u003E","idpa_disclaimer":"Vær opmærksom på, at hvis du bevidst indsender en falsk eller vildledende rapport, er det strafbart i henhold til loven. Hvis du ofte indsender rapporter, der er åbenlyst ubegrundede, forbeholder vi os retten til at suspendere din mulighed for at indsende rapporter eller permanent forbyde din konto. \u003CredLink\u003EFå mere at vide\u003C\u002FredLink\u003E","ad_report_detail_placeholder_75_uk":"Angiv detaljer om din oplevelse med denne annonce for at hjælpe os med at gribe til handling. Indhold, der er skadeligt for børn under rede emner vil være tilgængelige, når der er flere kommentarer.","pgc_aiComments_commentCategories_emptyState":"Ingen kommentarer passer til denne kategori.","pm_web_fullpage_entry":"Klik for at se LIVE","webLIVE_personalPage_LIVEbanner_numViewerDesc":"Se nu med {num} seere","Webapp_tooltips_play":"afspil","pm_web_fullpage_error_button":"Prøv igen","ttlive_previewSubtitle_tag_highlight":"Højdepunkt","weblive_following_btn":"Følger","pm_mt_liveWeb_friend_tag":"Ven","ttlive_AIsummary_tag":"Opsummering","subLiveShare_webLivePage_chatTextfield_subOnlyNote":"Kun for abonnenter","pc_web_less_btn":"mindre","collectionsProfilePage_favoritesPage_newModal_errorMessage":"Det maksimale antal tegn er nået","pcWeb_add_reply":"Tilføj et svar ...","comment_tray_default":"Tilføj kommentar ...","vid_mod_analytics_penalty_reason_minor_title":"Sikkerhed for mindreårige","vid_mod_analytics_penalty_reason_minor_desc":"For at give teenagere ekstra plads til at udforske og udtrykke identitet i digitale rum er indhold uploadet af brugere under 16 ikke berettiget anbefaling. Promovering af kosmetisk kirurgi til mindreårige kan føre til højere grad af utilfredshed med kroppen. Derfor er sådant indhold – inklusive før og efter-videoer, videoer af kirurgiske indgreb og beskeder, der diskuterer selvvalgt kosmetisk kirurgi uden advarsel om risici – ikke berettiget til Til dig-feedet for alle brugere under 18 år.","vid_mod_analytics_penalty_reason_unoriginal_title":"Uoriginalt indhold af lav kvalitet og med QR-kode","vid_mod_analytics_penalty_reason_unoriginal_desc":"For at holde TikTok positivt og underholdende for vores brugere kan indhold, der er uoriginalt eller af lav kvalitet, ikke anbefales. Uoriginalt indhold omfatter videoer, der blot er importeret eller uploadet fra andre kilder (f. eks. andre platforme, tv-udsendelser, film eller webcasts) uden nye, kreative redigeringer. Vi kan se, om en video er uoriginal, hvis den har et vandmærke eller et overlejret logo på den. Indhold af lav kvalitet omfatter meget korte videoer, statiske billeder og videoer, der kun består af GIF'er. Indhold, der indeholder QR-koder, er normalt ikke berettiget til Til dig-feedet, fordi det kan føre brugerne til skadelige websteder eller apps, selv om vi gør undtagelser under omstændigheder, hvor risikoen er lav (f. eks. i forbindelse med e-handel).","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"Uoriginalt indhold af lav kvalitet og med QR-kode","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"For at bevare den positive oplevelse, som vores brugere forventer af TikTok-platformen, kan uoriginalt indhold af lav kvalitet ikke anbefales. Uoriginalt indhold er indhold, der blot er importeret eller kopieret fra andre kilder uden nye, kreative redigeringer. En video kan være uoriginal, hvis den har et vandmærke eller et logo på den. Indhold af lav kvalitet omfatter meget korte videoer, statiske billeder og videoer, der udelukkende består af GIF'er.","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"Reproduceret konto","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"Din konto indeholder opslag, der ikke er originale og derfor er uegnede for Til dig-feedet. For yderligere oplysninger kan du se vores Retningslinjer for Fællesskabet \u003E Ikke egnet til Til dig-feedet \u003E Uoriginalt indhold af lav kvalitet og med QR-kode","vid_mod_analytics_penalty_reason_spam_title":"Spam, uautentisk eller vildledende indhold","vid_mod_analytics_penalty_reason_spam_desc":"Indhold, der forsøger at snyde eller manipulere brugere for at få flere følgere, likes, visninger eller andre engagementsparametre på platformen, er ikke egnet til Til dig-feedet. Dette omfatter indhold, der opfordrer brugere til at følge eller synes godt om hinanden, eller indhold, der narrer brugere til at klikke på like- eller del-knapper. Derudover er indhold, der promoverer konspirationsteorier og spreder falske eller skadelige oplysninger om aktuelle begivenheder, og begivenheder, hvor detaljerne stadig er under udvikling, heller ikke egnet til Til dig-feedet.","vid_mod_analytics_penalty_reason_sexual_title":"Åbenlyst seksualiseret indhold","vid_mod_analytics_penalty_reason_sexual_desc":"For at sikre en behagelig oplevelse kan indhold, der er åbenlyst seksuelt antydende, muligvis ikke anbefales. Dette omfatter indhold, der viser antydet nøgenhed, seksualiserer kropsdele eller er åbenlyst erotisk eller sensuelt (f.eks. striptease).","vid_mod_analytics_penalty_reason_tobacco_title":"Tobak og alkohol","vid_mod_analytics_penalty_reason_tobacco_desc":"Indhold, der promoverer, omtaler eller afbilder alkohol, der indtages af myndige personer, men på en farlig måde, vil muligvis ikke være egnet til anbefaling. Indhold, der afbilder voksnes brug af tobaksvarer eller nævner kontrollerede stoffer, er ikke egnet til anbefaling.","vid_mod_analytics_penalty_reason_stunts_title":"Farlige stuntnumre og sportsgrene","vid_mod_analytics_penalty_reason_stunts_desc":"Visse aktiviteter kan, når de efterlignes uden sikkerhedsforanstaltninger, være risikable eller farlige, hvilket kan føre til fysisk skade. Indhold, der inkluderer farlige stunts eller ekstremsport udført af ikke-professionelle, er muligvis ikke berettigede.","vid_mod_analytics_penalty_reason_graphic_title":"Voldeligt eller stødende indhold","vid_mod_analytics_penalty_reason_graphic_desc":"Indhold, der forårsager ubehag, chok eller afsky hos seere, er muligvis ikke egnet til Til dig-feedet, herunder skræmmeeffekter, chokeffekter, makeup, der genskaber blodige sår realistisk og gengiver kropsfunktioner. Det meste voldelige og grafiske indhold er ikke tilladt på TikTok. Vi kan dog tillade visse typer indhold, såsom billeder af død, ulykker eller slagsmål, når det tjener som dokumentation på begivenheder fra den virkelige verden og anses som værende i offentlighedens interesse. Fordi alle målgrupper muligvis ikke vil føle sig bekvemme ved synet af dette indhold, vil det ikke være berettiget til anbefaling, og indholdet vil have en \"tilvælg\"-skærm eller -advarsel.","vid_mod_analytics_penalty_reason_fyf_title":"Ikke egnet til Til dig-feedet","vid_mod_analytics_penalty_reason_fyf_desc":"Din video opfyldte ikke vores standarder for egenethed til Til dig-feedet. Gennemse TikTok Retningslinjer for Fællesskabet for yderligere oplysninger \u003E Ikke egnet til Til dig-feedet","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"Brugere og tredjeparter kan indberette overtrædelser af retningslinjerne til os. Vi har registreret denne overtrædelse baseret på en rapport om, at indholdet overtræder vores retningslinjer for fællesskabet.","vidModAnalytics_detailPg_sectionVideoDetails_sectionLabel":"Videooplysninger","vid_mod_analytics_appeal_detailpg_reason_title":"Årsager til overtrædelse","vid_mod_analytics_detail_pg_title":"Video ikke berettiget","vid_mod_analytics_detail_pg_desc":"Videoen er ikke berettiget til Til dig-feedet, fordi den overtræder vores retningslinjer for fællesskabet.","vidModAnalytics_detailPg_sectionSuccess_header":"Anken er godkendt","vid_mod_analytics_appeal_success_detail_pg_desc":"Vi har gennemgået din anke og gendannet din video. Vi beklager den ulejlighed, dette kan have medført. Tak, fordi du er en del af TikToks fællesskab!","vid_mod_analytics_appeal_detail_pg_title":"Videoen er fjernet","vid_mod_analytics_appeal_detail_pg_desc":"Denne video overtræder vores Retningslinjer for fællesskabet.","vidModAnalytics_appealSubmitted_sectionTitle_header":"Anmodning modtaget","vid_mod_analytics_appeal_rcv_detail_pg_desc":"Vi har modtaget din anmodning og giver dig besked, når dit ankeresultat er tilgængeligt.","rIC_detailPg_violationReason_title":"Årsag til overtrædelse","dsaCGWebapp_detailPg_sectionCG_link":"Retningslinjer for fællesskabet","dsaCGWebapp_appealExpired_emptyState_body":"Du kan ikke længere anke denne beslutning, fordi fristen for at anke er udløbet.","appeal_btn_new":"Anke","reasonForAppeal_appealPg_appealReasonCard_title":"Årsag ti
