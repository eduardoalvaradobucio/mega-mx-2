2FredLink\u003E","idpa_disclaimer":"Hafðu í huga að vísvitandi falskar eða misvísandi tilkynningar geta verið refsihæfar samkvæmt lögum. Ef þú sendir oft tilkynningar sem eru staðhæfulausar áskiljum við okkur rétt til að taka til baka getu þína til að senda tilkynningar eða banna reikninginn þinn varanlega. \u003CredLink\u003ENánari upplýsingar\u003C\u002FredLink\u003E","ad_report_detail_placeholder_75_uk":"Lýstu upplifun þinni af þessari auglýsingu til að hjálpa okkur að grípa til nauðsynlegra aðgerða. Efni sem er skaðlegt börnum samkvæmt UK OSA er meðal annars klám og kynferðislegar athafnir, sjálfsmorð og sjálfsskaði, átröskun, misnotkun og hatur, ofbeldi, einelti, hættulegt athæfi og áskoranir, skaðleg efni, óheilbrigð líkamsmynd og efni sem getur ýtt undir þunglyndi. Vinsamlegast taktu fram flokk ef þú getur það.","ad_report_detail_placeholder_75_eea_row":"Lýstu upplifun þinni af þessari auglýsingu til að hjálpa okkur að grípa til nauðsynlegra aðgerða.","ad_report_reason_L1Misinfo_L2aigc_v2_0":"Þessi auglýsing getur innihaldið efni búið til með gervigreind eða ritstýrt efni sem er misnotað, óleyfilegt eða rangt merkt. Þetta getur meðal annars verið:","ad_report_reason_L1Misinfo_L2aigc_v2_1":"Efni búið til með gervigreind sem er ómerkt eða ekki skilgreint sem slíkt. Auglýsingin notar gervigreind til að búa til efni en lætur ekki vita af því.","ad_report_reason_L1Misinfo_L2aigc_v2_2":"Notkun á útliti, rödd eða auðkenni raunverulegrar manneskju án leyfis. Auglýsingin sýnir eða hljómar eins og raunveruleg manneskja en sú manneskja samþykkti það ekki (t.d. til að láta líta út fyrir að manneskjan styðji pólitíska hugmynd eða vöru sem hún styður ekki í raun og veru).","Web_report_description":"Report description (Optional):","report_details_toast":"Gefðu upplýsingar um upplifun þína af þessari auglýsingu til að hjálpa okkur að grípa til nauðsynlegra aðgerða.","report_img_toast":"Hladdu upp myndum af pöntunarupplýsingum og mótteknum vörum.","dsa_illegal_select_country_ te_main_setinfo_last":"Síðast uppfært","pgc_aiComments_commentCategories_all":"Allar","pgc_aiComments_analyticsPage_commentsCount":"{num, plural, one {{num} athugasemd} other {{num} athugasemdir}}","pgc_aiComments_analyticsPage_infoPopup_topicsTitle":"Umræðuefni","pgc_aiComments_commentCategories_insufficientComments":"Umræðuefni samantekin af gervigreind verða núna í boði þegar komnar eru fleiri athugasemdir.","pgc_aiComments_commentCategories_emptyState":"Engar athugasemdir passa við þennan flokk.","pm_web_fullpage_entry":"Click to watch LIVE","webLIVE_personalPage_LIVEbanner_numViewerDesc":"Horfa á núna með {num} áhorfendum","Webapp_tooltips_play":"spila","pm_web_fullpage_error_button":"Reyna aftur","ttlive_previewSubtitle_tag_highlight":"Hápunktur","weblive_following_btn":"Fylgir","pm_mt_liveWeb_friend_tag":"Vinur","ttlive_AIsummary_tag":"Samantekt","subLiveShare_webLivePage_chatTextfield_subOnlyNote":"Aðeins áskrifendur","pc_web_less_btn":"minna","collectionsProfilePage_favoritesPage_newModal_errorMessage":"Farið yfir stafamörk","pcWeb_add_reply":"Bættu við svari...","comment_tray_default":"Bæta við athugasemd...","vid_mod_analytics_penalty_reason_minor_title":"Öryggi ólögráða barna","vid_mod_analytics_penalty_reason_minor_desc":"Til að veita unglingum aukið svigrúm til að kanna sjálfsmynd og tjá sig í stafrænum rýmum er efni sem notendur yngri en 16 ára hlaða upp ekki gjaldgengt fyrir meðmæli. Kynning fegrunaraðgerða fyrir ólögráða börn getur leitt til meiri óánægju með líkamann. Í samræmi við það er slíkt efni - þar á meðal fyrir og eftir myndbönd, vídeó af skurðaðgerðum og skilaboð sem fjalla um valfrjálsar fegrunaraðgerðir án viðvörunar um áhættu - ekki gjaldgengt í Fyrir þig streymi allra notenda undir 18 ára.","vid_mod_analytics_penalty_reason_unoriginal_title":"Ófrumlegt, lélegt og QR-kóða efni","vid_mod_analytics_penalty_reason_unoriginal_desc":"Til að halda TikTok jákvæðu og skemmtilegu fyrir notendur okkar er efni sem er ófrumlegt eða hefur lítil gæði ekki gjaldgengt fyrir meðmæli. Ófrumlegt efni inniheldur vídeó sem eru bara innflutt eða hlaðið upp frá öðrum uppruna (eins og öðrum vettvöngum, sjónvarpsþáttum, kvikmyndum eða vefútsendingum) án nýrra, skapandi breytinga. Við getum sagt til um hvort vídeó sé ófrumlegt ef það er með vatnsmerki eða kennimerki á því. Efni í lágum gæðum inniheldur mjög stutt vídeó, kyrrstæðar myndir og vídeó eingöngu gerð úr GIF. Efni sem inniheldur QR-kóða er venjulega ekki gjaldgengt í Fyrir þig streymið vegna þess að það getur leitt notendur á skaðleg vefsvæði eða öpp, jafnvel þó við gerum undantekningar við aðstæður þar sem áhættan er lítil (til dæmis fyrir rafræn viðskipti).","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"Ófrumlegt, lélegt og QR-kóða efni","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"Til að viðhalda þeirri jákvæðu upplifun sem notendur okkar búast við af TikTok vettvangnum er ófrumlegt og lággæða efni ekki gjaldgengt fyrir meðmæli. Ófrumlegt efni er efni sem er bara flutt inn eða afritað frá öðrum aðilum án nýrra, skapandi breytinga. Vídeó gæti verið ófrumlegt ef það er með vatnsmerki eða kennimerki á því. Efni í lágum gæðum inniheldur mjög stutt vídeó, kyrrstæðar myndir og vídeó eingöngu gerð úr GIF.","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"Afritaður reikningur","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"Reikningurinn þinn inniheldur færslur sem eru ekki frumlegar og óhæfar í Fyrir þig streymið. Fyrir frekari upplýsingar, skoðaðu viðmiðunarreglur fyrir samfélagið \u003E Hentar ekki í Fyrir þig streymið \u003E Ófrumlegt, lággæða og QR-kóða efni","vid_mod_analytics_penalty_reason_spam_title":"Ruslpóstur, falsað eða misvísandi efni","vid_mod_analytics_penalty_reason_spam_desc":"Efni sem reynir að plata eða stjórna notendum til að fá fleiri fylgjendur, læk, áhorf eða aðrar mælingar á athygli á vettvangnum er ekki gjaldgengt í Fyrir þig streymið. Þetta felur í sér efni sem hvetur notendur til að fylgja eða líka við hvern annan, eða efni sem blekkir notendur til að smella á líkar eða deila hnappa. Að auki er efni sem ýtir undir samsæriskenningar og dreifir röngum eða skaðlegum upplýsingum um atburði líðandi stundar og viðburði þar sem upplýsingar eru enn að þróast, einnig óhæft í Fyrir þig streymið.","vid_mod_analytics_penalty_reason_sexual_title":"Augljóslega kynferðislegt efni","vid_mod_analytics_penalty_reason_sexual_desc":"Til að hjálpa til við að viðhalda þægilegri upplifun getur verið að efni sem er augljóslega kynferðislegt gæti ekki verið gjaldgengt fyrir meðmæli. Þetta felur í sér efni sem sýnir óbeina nekt, kyngerir líkamshluta eða er bersýnilega erótískt eða líkamlegt (þ.e. stripp).","vid_mod_analytics_penalty_reason_tobacco_title":"Tóbaks- og áfengisvörur","vid_mod_analytics_penalty_reason_tobacco_desc":"Efni sem kynnir, nefnir eða sýnir áfengisvörur sem einstaklingar á löglegum aldri neyta en gera það á hættulegan hátt gæti ekki verið gjaldgengt fyrir meðmæli. Efni sem sýnir notkun fullorðinna á tóbaksvörum eða nefnir takmörkuð efni er ekki gjaldgengt fyrir meðmæli.","vid_mod_analytics_penalty_reason_stunts_title":"Hættuleg glæfrabrögð og íþróttir","vid_mod_analytics_penalty_reason_stunts_desc":"Þegar athafanir eru endurteknar án öryggisráðstafana getur ákveðnar athafnir verið áhættusamar eða hættulegar sem gæti leitt til líkamlegs skaða. Efni sem inniheldur hættuleg glæfrabrögð eða jaðaríþróttir sem stundaðar eru af öðrum en fagfólki getur verið óheimilt.","vid_mod_analytics_penalty_reason_graphic_title":"Ofbeldisfullt og myndrænt efni","vid_mod_analytics_penalty_reason_graphic_desc":"Efni sem veldur óþægindum, losti eða viðbjóði áhorfenda gæti verið óhæft í Fyrir þig streymið, þar á meðal skelfileg áhrif, óvæntir skelkir, förðun sem endurskapar á raunhæfan hátt blóðug sár og lýsingar á líkamsstarfsemi. Flest ofbeldisfullt og myndrænt efni er ekki leyft á TikTok. Hins vegar gætum við leyft ákveðnar tegundir efnis, svo sem grafískar myndir af dauða, sl
