ve_following_btn":"Жазылымдар","pm_mt_liveWeb_friend_tag":"Дос","ttlive_AIsummary_tag":"Қысқаша мазмұн","subLiveShare_webLivePage_chatTextfield_subOnlyNote":"Тек жазылушыларға арналған","pc_web_less_btn":"азырақ","collectionsProfilePage_favoritesPage_newModal_errorMessage":"Таңбалар шегінен асты","pcWeb_add_reply":"Жауап қосу...","comment_tray_default":"Пікір қалдыру...","vid_mod_analytics_penalty_reason_minor_title":"Кәмелетке толмағандардың қауіпсіздігі","vid_mod_analytics_penalty_reason_minor_desc":"Жасөспірімдерге цифрлық кеңістікте өзін-өзі көрсету және жеке басын тану үшін қосымша мүмкіндіктер ұсыну үшін 16 жасқа толмаған пайдаланушылар жүктеп салған контент ұсыныстар лентасында көрсетілмейді. Кәмелетке толмаған пайдаланушылар арасында косметикалық хирургияны насихаттау денемен қанағаттанбаушылығының ушығуына әкелуі мүмкін. Тиісінше, мұндай контентті, соның ішінде «Дейін және кейін» бейнелерін, хирургиялық бейнелерді және тәуекел туралы ескертусіз косметикалық хирургияны таңдауды талқылайтын хабарламаларды 18 жасқа толмаған барлық пайдаланушылар ұсыныстар лентасында көре алмайды.","vid_mod_analytics_penalty_reason_unoriginal_title":"Түпнұсқа емес, сапасы төмен және бейнеде QR кодын қамтитын контент","vid_mod_analytics_penalty_reason_unoriginal_desc":"TikTok қолданбасын пайдаланушыларымыз үшін жағымды және жылы шырайлы ету үшін түпнұсқа емес немесе сапасыз контент ұсынылмайды. Түпнұсқа емес контентке жаңа шығармашылық өңдеулерсіз жай ғана импортталған немесе басқа көздерден (мысалы, басқа платформалар, телешоулар, фильмдер немесе веб-эфирлер) жүктеп салынған бейнелер жатады. Бейненің түпнұсқа емес екенін оның сутаңбасынан немесе үстемеленген логотипінен анықтауға болады. Төмен сапалы контентке өте қысқа бейнелер, қозғалмайтын кескіндер және тек GIF-анимациялардан құралған бейнелер кіреді. QR-кодтары бар контентті әдетте ұсыныстар лентасында пайдалану мүмкін емес, себебі ол пайдаланушыларды зиянды веб-сайттарға немесе қолданбаларға өткізуі мүмкін, дегенмен біз тәуекелі төмен жерлерде оларды пайдалануға рұқсат береміз (мысалы, электрондық коммерция үшін).","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"Түпнұсқа емес, сапасы төмен және бейнеде QR кодын қамтитын контент","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"Барлық TikTok пайдаланушылары бейнелерді көргеннен тек жақсы әсер алуы үшін түпнұсқа емес және сапасыз контент ұсыныстар бөлімінде көрсетілмейді. Түпнұсқа емес контент ешқандай шығармашылық өңдеусіз басқа көздерден импортталған немесе көшірілген бейнелер болып саналады. Бейнеде сутаңба немесе логотип болса, ол түпнұсқа емес болып саналады. Төмен сапалы контентке өте қысқа бейнелер, статикалық кескіндер және тек GIF-анимациялары жатады.","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"Қайталама аккаунт","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"Сіздің аккаунтыңызда түпнұсқа емес және ұсыныстар лентасына сай келмейтін жазбалар бар. Толығырақ білу үшін біздің Қауымдастық ережелерімізді қараңыз: \u003E Ұсыныстар арнасына сай келмейді \u003E Түпнұсқа емес, сапасы төмен және бейнеде QR кодын қамтитын контент","vid_mod_analytics_penalty_reason_spam_title":"Спам, жалған немесе жаңылыстыратын контент","vid_mod_analytics_penalty_reason_spam_desc":"Платформада көбірек жазылушылар, лайктар, көрілімдер немесе басқа белсенділік көрсеткіштерін иелену үшін пайдаланушыларды алдауға немесе айла-шарғы жасауға әрекеттенетін контент ұсыныстар лентасына шықпайды. Бұған пайдаланушыларды бір-біріне жазылуға немесе лайк қоюға шақыратын контент немесе пайдаланушыларды «лайк» немесе «бөлісу» түймелерін басуға итермелейтін контент жатады. Бұған қоса, қастандық теорияларын насихаттайтын және ағымдағы оқиғалар мен әлі де толыққанды тексерілмеген оқиғалар туралы жалған немесе зиянды ақпаратты тарататын контент ұсыныстар лентасына шықпайды.","vid_mod_analytics_penalty_reason_sexual_title":"Шамадан тыс сексуализацияланған контент","vid_mod_analytics_penalty_reason_sexual_desc":"Пайдаланушылардың қолайлы әсерлерін қамтамасыз ету үшін сексуалдық тұспалдарды анық түрде қамтитын контент көрсетілуге ұсынылмайды. Мұндай контент түрлеріне жалаңаштықты бейнелейтін, дене мүшелерін сексуалды тұрғыдан насихаттайтын немесе ашық эротикалық не елеулі контент жатады (мысалы, стриптиз).","vid_mod_analytics_penalty_reason_tobacco_title":"Темекі және алкоголь өнімдері","vid_mod_analytics_penalty_reason_tobacco_desc":"Кәмелетке толған адамдар тұтынатын, бірақ қауіпті түрде жасалған алкоголь өнімдерін насихаттайтын, атап өтетін немесе бейнелейтін контентті ұсынуға болмайды. Ересектердің темекі өнімдерін пайдалануын немесе бақыланбалы өнімдер сілтемелерін бейнелейтін контент ұсыныстар лентасына сай келмейді.","vid_mod_analytics_penalty_reason_stunts_title":"Қауіпті трюктер және спорт түрлері","vid_mod_analytics_penalty_reason_stunts_desc":"Экранда қауіпсіздік ескертулері көрсетілмей ойнатылған жағдайда, кейбір әрекеттер қауіпті болуы және физикалық зақым келтіруі мүмкін. Кәсіпқой емес адамдар орындаған қауіпті трюктерді немесе экстремалды спортты қамтитын контент платформаның ережелеріне сай келмеуі мүмкін.","vid_mod_analytics_penalty_reason_graphic_title":"Зорлық-зомбылық және жан түршігерлік контент","vid_mod_analytics_penalty_reason_graphic_desc":"Көрермендерде ыңғайсыздық, шок немесе жиіркеніш сезімдерін тудыратын контент, сондай-ақ қорқынышты әсерлер, трюктер, қанды жараларды шынайы түрде жаңадан жасайтын макияж және дене мүмкіндіктерін сипаттайтын суреттер ұсыныстар лентасына жіберілмеуі мүмкін. TikTok қолданбасында аса қатал және графикалық контентті орналастыруға болмайды. Дегенмен, біз белгілі бір контент түрлеріне, мысалы, өлімнің, жазатайым оқиғалардың немесе шайқастардың графикалық кескіндері нақты оқиғаларды құжаттайтын болса және контент қауымдастық мүдделеріне сай келсе, рұқсат бере аламыз. Осындай контент түрі барлық көрермендер үшін қолайлы болмағандықтан, оны көп адам көрмейді және жазбаға «Бас тарту экраны» немесе ескерту орнатылады.","vid_mod_analytics_penalty_reason_fyf_title":"Ұсыныстар лентасы үшін жарамсыз мазмұн","vid_mod_analytics_penalty_reason_fyf_desc":"Сіздің бейнеңіз ұсыныстар лентасының сәйкестік талаптарына сай келмеді. Толығырақ білу үшін біздің TikTok Қауымдастық ережесін қараңыз \u003E «Ұсыныстар арнасына сай келмейді»","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"Пайдаланушылар мен үшінші тарап тұлғалары бізге ережелердің бұзылғандығы туралы хабарлай алады. Біз бұл саясат бұзушылығын контент біздің Қауымдастық ережелерін бұзады деген шағымға сүйене отырып таптық.","vidModAnalytics_detailPg_sectionVideoDetails_sectionLabel":"Бейне сипаттамасы","vid_mod_analytics_appeal_detailpg_reason_title":"Ережені бұзу себебі","vid_mod_analytics_detail_pg_title":"Бейне бұғатталды","vid_mod_analytics_detail_pg_desc":"Бұл бейне ұсыныстар лентасына сай келмейді, өйткені ол біздің Қауымдастық ережелерімізге нұқсан келтіреді.","vidModAnalytics_detailPg_sectionSuccess_header":"Апелляция мақұлданды","vid_mod_analytics_appeal_success_detail_pg_desc":"Апелляцияңызды қарап, сіздің бейнеңізді қайтардық. Келтірілген қолайсыздықтар үшін кешірім сұраймыз. TikTok қауымдастығымен бірге болғаныңыз үшін рақмет!","vid_mod_analytics_appeal_detail_pg_title":"Бейне жойылды","vid_mod_analytics_appeal_detail_pg_desc":"Бұл бейне Қауымдастықтың ережелерін бұзады.","vidModAnalytics_appealSubmitted_sectionTitle_header":"Сұрау алынды","vid_mod_analytics_appeal_rcv_detail_pg_desc":"Біз сіздің сұрауыңызды алдық және апелляцияны қарастыру нәтижелері туралы сізге хабарлайтын боламыз.","rIC_detailPg_violationReason_title":"Ережені бұзу себебі","dsaCGWebapp_detailPg_sectionCG_link":"Қауымдастық ережелері","dsaCGWebapp_appealExpired_emptyState_body":"Бұл шешімге апелляция беру мерзімі өтіп кеткендіктен, апелляция беруге болмайды.","appeal_btn_new":"Апелляция беру","reasonForAppeal_appealPg_appealReasonCard_title":"Шешімге апелляция беру себебі","oSA_appealPg_appealExplain_title":"Апелляция түсіндірмесі","rIC_appealPg_appealExplain_titl
