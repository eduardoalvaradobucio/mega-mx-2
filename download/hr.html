p_notif_view":"Prikaži","cs_webapp_notif_ticketClosed":"Zahtjev je zatvoren. Ocijeni svoje iskustvo.","web_inappNotifs_Notification_header":"Obavijest","Web_report_hide_video":"Ovaj je videozapis skriven radi poboljšanja tvojeg iskustva. Prikazivat ćemo ti manje takvih videozapisa.","Web_report_show_video":"Prikaži videozapis","sticker_create_main_setinfo_last":"Posljednje ažuriranje","pgc_aiComments_commentCategories_all":"Sve","pgc_aiComments_analyticsPage_commentsCount":"{num, plural, one {{num} komentar} few {{num} komentara} other {{num} komentara}}","pgc_aiComments_analyticsPage_infoPopup_topicsTitle":"Teme","pgc_aiComments_commentCategories_insufficientComments":"Teme koje je sažeo AI bit će dostupne kad bude više komentara.","pgc_aiComments_commentCategories_emptyState":"Nijedan komentar ne odgovara ovoj kategoriji.","pm_web_fullpage_entry":"Klikni za gledanje prijenosa UŽIVO","webLIVE_personalPage_LIVEbanner_numViewerDesc":"Gledaj sada s {num} gledatelja","Webapp_tooltips_play":"reproduciraj","pm_web_fullpage_error_button":"Ponovi","ttlive_previewSubtitle_tag_highlight":"Istaknuti trenutak","weblive_following_btn":"Pratim","pm_mt_liveWeb_friend_tag":"Prijatelj","ttlive_AIsummary_tag":"Sažetak","subLiveShare_webLivePage_chatTextfield_subOnlyNote":"Samo za pretplatnike","pc_web_less_btn":"manje","collectionsProfilePage_favoritesPage_newModal_errorMessage":"Premašeno ograničenje broja znakova","pcWeb_add_reply":"Dodaj odgovor...","comment_tray_default":"Dodaj komentar...","vid_mod_analytics_penalty_reason_minor_title":"Zaštita maloljetnika","vid_mod_analytics_penalty_reason_minor_desc":"Kako bismo tinejdžerima pružili dodatni prostor za istraživanje identiteta i izražavanje u digitalnim prostorima, sadržaj koji su prenijeli korisnici mlađi od 16 godina ne ispunjava uvjete za preporuku. Promicanje estetske kirurgije maloljetnicima može dovesti do viših stopa nezadovoljstva vlastitim tijelom. Sukladno tome, takav sadržaj – uključujući videozapise „prije i poslije”, videozapise kirurških zahvata i poruke koje govore o elektivnoj estetskoj kirurgiji bez upozorenja o rizicima – nije prihvatljiv za sažetak novosti Za tebe svih korisnika mlađih od 18 godina.","vid_mod_analytics_penalty_reason_unoriginal_title":"Neoriginalan, nekvalitetan sadržaj i sadržaj s QR kodom","vid_mod_analytics_penalty_reason_unoriginal_desc":"Kako bismo TikTok održali pozitivnim i kako bi naši korisnici mogli uživati u njemu, sadržaj koji je neoriginalan ili loše kvalitete ne ispunjava uvjete za preporuku. Neoriginalni sadržaj uključuje videozapise koji su samo uvezeni ili preneseni iz drugih izvora (kao što su druge platforme, TV emisije, filmovi ili emitiranja putem interneta) bez novih, kreativnih izmjena. Možemo prepoznati je li videozapis neoriginalan ako na sebi ima vodeni žig ili logotip. Sadržaj loše kvalitete uključuje vrlo kratke videozapise, statične slike i videozapise napravljene samo od GIF-ova. Sadržaj s QR kodovima u sažetku novosti Za tebe obično ne dopuštamo jer može odvesti korisnike na štetna mrežna mjesta ili aplikacije, iako radimo iznimke u okolnostima u kojima je rizik nizak (npr. kod e-trgovine).","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"Neoriginalan, nekvalitetan sadržaj i sadržaj s QR kodom","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"U cilju održavanja pozitivnog iskustva koje naši korisnici očekuju od TikTok platforme, neoriginalni i niskokvalitetni sadržaj nije prihvatljiv za preporuku. Neoriginalni sadržaj je sadržaj koji se samo uvozi ili kopira iz drugih izvora bez ikakvih novih, kreativnih izmjena. Video može biti neoriginalan ako uključuje vodeni žig ili logotip. Sadržaj niske kvalitete uključuje vrlo kratke videozapise, statične slike i videozapise napravljene samo od GIF-ova.","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"Neoriginalan račun","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"Tvoj račun sadrži objave koje nisu originalne i ne ispunjavaju uvjete za sažetak novosti Za tebe. Za više informacija pogledaj naše Smjernice zajednice \u003E Nije prikladno za sažetak novosti Za tebe\u003E Neoriginalan, nekvalitetan sadržaj i sadržaj s QR kodom","vid_mod_analytics_penalty_reason_spam_title":"Neželjeni, neautentični ili obmanjujući sadržaj","vid_mod_analytics_penalty_reason_spam_desc":"Sadržaj koji pokušava prevariti korisnike ili manipulirati njima s ciljem povećanja broja pratitelja, oznaka „Sviđa mi se”, pregleda ili drugih pokazatelja uključenosti na platformi ne ispunjava uvjete za sažetak novosti Za tebe. To uključuje sadržaj koji potiče korisnike da prate ili označavaju sa „Sviđa mi se” jedni druge ili sadržaj koji vara korisnike da kliknu gumbe za označavanje sa „Sviđa mi se” ili dijeljenje. Osim toga, sadržaj koji promiče teorije zavjere i širi lažne ili štetne informacije o aktualnim događajima i događajima koji su još u tijeku također ne ispunjava uvjete za sažetak novosti Za tebe.","vid_mod_analytics_penalty_reason_sexual_title":"Otvoreno seksualiziran sadržaj","vid_mod_analytics_penalty_reason_sexual_desc":"Kako bi se očuvalo ugodno iskustvo, sadržaj koji je otvoreno seksualno sugestivan možda neće ispunjavati uvjete za preporuku. To uključuje sadržaj koji prikazuje impliciranu golotinju, seksualizira dijelove tijela ili je očito erotičan ili senzualan (tj. striptiz).","vid_mod_analytics_penalty_reason_tobacco_title":"Duhanski i alkoholni proizvodi","vid_mod_analytics_penalty_reason_tobacco_desc":"Sadržaj koji promiče, spominje ili prikazuje alkoholne proizvode koje konzumiraju osobe zakonske dobi za konzumaciju alkohola, ali na opasan način, možda neće ispunjavati uvjete za preporuku. Sadržaj koji prikazuje odrasle osobe koje koriste duhanske proizvode ili u kojem se spominju kontrolirane tvari ne ispunjava uvjete za preporuku.","vid_mod_analytics_penalty_reason_stunts_title":"Opasne vratolomije i sportovi","vid_mod_analytics_penalty_reason_stunts_desc":"Kada se izvode bez sigurnosnih mjera opreza, određene aktivnosti mogu biti rizične ili opasne, što može dovesti do fizičkih ozljeda. Sadržaj koji uključuje opasne vratolomije ili ekstremne sportove koje izvode osobe koje nisu profesionalci možda neće ispunjavati uvjete.","vid_mod_analytics_penalty_reason_graphic_title":"Nasilan i eksplicitan sadržaj","vid_mod_analytics_penalty_reason_graphic_desc":"Sadržaj koji kod gledatelja izaziva nelagodu, šok ili gađenje može biti neprikladan za sažetak novosti Za tebe, uključujući zastrašujuće efekte, iznenadne zastrašujuće pojave, šminku koja realistično rekreira krvave rane i prikaze tjelesnih funkcija. Većina nasilnog i eksplicitnog sadržaja nije dopuštena na TikToku. Međutim, možemo dopustiti određene vrste sadržaja kao što su eksplicitni prikazi smrti, nesreća ili tučnjava kad se dokumentiraju stvarni događaji i sadržaj se smatra od javnog interesa. Budući da ovaj sadržaj ne mora biti prihvatljiv svoj publici, neće ispunjavati kriterije za preporuku, a sadržaj će uključivati zaslon za uključivanje ili upozorenje.","vid_mod_analytics_penalty_reason_fyf_title":"Ne ispunjava uvjete za sažetak novosti Za tebe","vid_mod_analytics_penalty_reason_fyf_desc":"Tvoj videozapis ne ispunjava naše standarde prihvatljivosti za sažetak novosti Za tebe. Pogledaj TikTokove Smjernice zajednice za više informacija \u003E Ne ispunjava uvjete za sažetak novosti Za tebe","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"Korisnici i treće strane mogu nam prijaviti kršenja pravila. Otkrili smo ovo kršenje pravila na temelju prijave da sadržaj krši naše Smjernice zajednice.","vidModAnalytics_detailPg_sectionVideoDetails_sectionLabel":"Pojedinosti videozapisa","vid_mod_analytics_appeal_detailpg_reason_title":"Razlog kršenja","vid_mod_analytics_detail_pg_title":"Videozapis ne ispunjava uvjete","vid_mod_analytics_detail_pg_desc":"Ovaj videozapis ne ispunjava uvjete za sažetak novosti Za tebe jer krši naše Smjernice zajednice.","vidModAnalytics_detailPg_sectionSuccess_header":"Prigovor je odo
