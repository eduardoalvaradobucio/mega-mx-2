 Recurso","dsa_illegal_report_explanation_desc":"Descreva como o conteúdo viola a lei relevante. As denúncias que não contiverem informações suficientes poderão não ser consideradas válidas. Se for relevante, especifique se está enviando esta solicitação para si mesmo ou em nome de outra pessoa.","dsa_illegal_appeal_signature":"Assinatura","dsa_illegal_sign_legal_name":"Assine seu nome legal aqui.","dsa_illegal_confirm_accuracy":"Confirmo minha convicção de que o conteúdo desta denúncia é verdadeiro, preciso e completo.","idpa_attachment":"Anexos","idpa_attachment_instruction":"A denúncia deve ser enviada pelo detentor dos direitos que foram violados ou por um representante autorizado. Analise as \u003CredLink\u003Ediretrizes de envio\u003C\u002FredLink\u003E com cuidado e envie toda a documentação necessária. Os formatos dos arquivos devem ser JPEG, JPG ou PNG e devem ter menos de 20 MB.","idpa_attachment_sec1":"Seção 1:","idpa_identification_document_title":"Documentos relativos ao solicitante","idpa_identification_document_instruction_IP":"Envie documentos de identificação oficiais. Exemplos: carteira de habilitação (frente e verso), passaporte (página com foto e página com o nome do titular e informações de contato de emergência), My Number Card (apenas frente), etc. Além disso, conforme necessário, você deve enviar documentos que comprovem a autoridade da agência, documentos que comprovem o consentimento de um representante legal, como um responsável, e documentos que indiquem que o envio diz respeito ao próprio indivíduo. Ainda, se você estiver agindo em nome de uma pessoa jurídica, deverá enviar documentos como um certificado de registro da empresa e uma procuração de seu representante. \u003CredLink\u003ESaiba mais\u003C\u002FredLink\u003E","idpa_identification_document_instruction_nonIP":"Envie documentos de identificação oficiais. Exemplos: carteira de habilitação (frente e verso), passaporte (página com foto e página com o nome do titular e informações de contato de emergência), My Number Card (apenas frente), etc. Além disso, conforme necessário, você deve enviar documentos que comprovem a autoridade da agência, documentos que comprovem o consentimento de um representante legal, como um responsável, e documentos que indiquem que o envio diz respeito ao próprio indivíduo. \u003CredLink\u003ESaiba mais\u003C\u002FredLink\u003E","attachment_upload_limit":"Cada arquivo deve ter menos de 20MB","idpa_attachment_sec2":"Seção 2:","idpa_right_holder_status_title":"Documentação que comprove o status de detentor dos direitos","idpa_ric_proof_title":"Documentação relativa à violação de direitos","idpa_right_holder_status_instruction_1":"(Violação de direitos de propriedade intelectual)","idpa_right_holder_status_instruction_2":"Envie documentos identificando os direitos de propriedade intelectual que você acredita terem sido violados e documentos comprovando que você é o proprietário da referida propriedade intelectual. \u003CredLink\u003ESaiba mais\u003C\u002FredLink\u003E","idpa_right_holder_status_instruction_3":"(Violação de interesses comerciais)","idpa_right_holder_status_instruction_4":"A documentação necessária varia dependendo dos interesses comerciais que se presume terem sido violados (ex.: materiais comprovando a reputação ou notoriedade das etiquetas dos produtos, materiais indicando que a publicação engana os consumidores em relação à qualidade). Analise os \u003CredLink\u003Edetalhes\u003C\u002FredLink\u003E e envie a documentação adequada. Você pode carregar até três arquivos nos formatos JPEG, JPG ou PNG, cada um com menos de 20 MB.","idpa_ric_proof_instruction":"Envie uma captura de tela ou evidência semelhante indicando a parte do conteúdo publicado que você acredita ter violado seus direitos. Você pode carregar até três arquivos nos formatos JPEG, JPG ou PNG, cada um com menos de 20 MB. \u003CredLink\u003ESaiba mais\u003C\u002FredLink\u003E","idpa_attachment_sec3":"Seção 3:","idpa_other_document_title":"Out iewerDesc":"Assistir agora com {num} espectadores","Webapp_tooltips_play":"reproduzir","pm_web_fullpage_error_button":"Tentar novamente","ttlive_previewSubtitle_tag_highlight":"Destaque","weblive_following_btn":"Seguindo","pm_mt_liveWeb_friend_tag":"Amigo","ttlive_AIsummary_tag":"Resumo","subLiveShare_webLivePage_chatTextfield_subOnlyNote":"Somente para inscritos","pc_web_less_btn":"menos","collectionsProfilePage_favoritesPage_newModal_errorMessage":"Limite de caracteres excedido","pcWeb_add_reply":"Adicionar uma resposta...","comment_tray_default":"Adicionar comentário...","vid_mod_analytics_penalty_reason_minor_title":"Segurança de menores","vid_mod_analytics_penalty_reason_minor_desc":"Para dar aos adolescentes espaço adicional para exploração e expressão de identidade em espaços digitais, o conteúdo carregado por usuários menores de 16 anos não é elegível para recomendação. Promover a cirurgias estéticas para menores pode levar a maiores taxas de insatisfação corporal. Assim, tal conteúdo - incluindo vídeos de antes e depois, vídeos de procedimentos cirúrgicos e mensagens discutindo cirurgia estética eletiva sem aviso de riscos - não é elegível para o feed Para Você de todos os usuários com menos de 18 anos.","vid_mod_analytics_penalty_reason_unoriginal_title":"Conteúdo não original, de baixa qualidade e de QR Code","vid_mod_analytics_penalty_reason_unoriginal_desc":"Para manter o TikTok positivo e agradável para nossos usuários, o conteúdo que não é original ou é de baixa qualidade não é elegível para recomendação. O conteúdo não original inclui vídeos que são apenas importados ou enviados de outras fontes (como outras plataformas, programas de TV, filmes ou webcasts), sem nenhuma edição nova e criativa. É possível identificar se um vídeo não é original se ele tiver uma marca d'água ou um logotipo sobreposto. O conteúdo de baixa qualidade inclui vídeos muito curtos, imagens estáticas e vídeos feitos apenas de GIFs. O conteúdo que inclui códigos QR geralmente não se qualifica para o feed Para Você porque pode levar os usuários a sites ou aplicativos nocivos, embora abramos exceções em circunstâncias em que o risco é baixo (por exemplo, para comércio eletrônico).","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"Conteúdo não original, de baixa qualidade e de QR Code","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"Para manter a experiência positiva que nossos usuários esperam da plataforma TikTok, conteúdo não original e de baixa qualidade não se qualifica para recomendação. Conteúdo não original é o conteúdo que é apenas importado ou copiado de outras fontes, sem nenhuma nova edição criativa. Um vídeo pode não ser original se tiver uma marca d'água ou logotipo. O conteúdo de baixa qualidade inclui vídeos muito curtos, imagens estáticas e vídeos feitos apenas com GIFs.","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"Conta não original","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"Sua conta contém publicações que não são originais e são inelegíveis para o feed Para Você. Para obter mais informações, revise nossas Diretrizes da Comunidade \u003E Não adequado para feed Para Você \u003E Conteúdo não original, de baixa qualidade e de QR Code","vid_mod_analytics_penalty_reason_spam_title":"Conteúdo de spam, não autêntico ou enganoso","vid_mod_analytics_penalty_reason_spam_desc":"O conteúdo que tenta enganar ou manipular os usuários para obter mais seguidores, curtidas, visualizações ou outras métricas de engajamento na plataforma não se qualifica para o feed Para você. Isso inclui conteúdo que incentiva os usuários a seguir ou curtir uns aos outros, ou conteúdo que induz os usuários a clicarem em botões de curtir ou compartilhar. Além disso, conteúdo que promova teorias da conspiração e divulgue informações falsas ou prejudiciais sobre eventos atuais e eventos em que os detalhes ainda estão em desenvolvimento também não se qualificam para o feed Para Você.","vid_mod_analytics_penalty_reason_sexual_title":"Conteúdo abertamente sexual","vid_mod_analytics_penalty_reason_sexual_desc":"Para ajudar a manter uma experiência confortável, o conteúdo que é abertamente sugestivo sexualmente pode não se qualificar para recomendação. Isso inclui conteúdo que retrata nudez implícita, sexualiza partes do corpo ou é descaradamente erótico ou sensual (por exemplo, strip-teases).","vid_mod_analytics_penalty_reason_tobacco_title":"Tabaco e produtos alcoólicos","vid_mod_analytics_penalty_reason_tobacco_desc":"Conteúdo que promova, mencione ou descreva produtos alcoólicos consumido por pessoas em idade legal para consumo, mas que beba de forma perigosa, pode não ser elegível para recomendação. Conteúdo que descreva o uso de produtos de tabaco por adultos ou que mencione substâncias controladas não é elegível para recomendação.","vid_mod_analytics_penalty_reason_stunts_title":"Brincadeiras e esportes perigosos","vid_mod_analytics_penalty_reason_stunts_desc":"Quando replicadas sem precauções de segurança, certas atividades podem ser arriscadas ou perigosas, o que pode levar a danos físicos. Conteúdo que inclui acrobacias perigosas, ou esportes radicais realizados por amadores, pode ser inelegível.","vid_mod_analytics_penalty_reason_graphic_title":"Conteúdo violento e explícito","vid_mod_analytics_penalty_reason_graphic_desc":"Conteúdo que cause desconforto, choque ou nojo ao espectador pode ser inelegível para o feed Para Você, incluindo efeitos assustadores, sustos, maquiagem que recria feridas sangrentas de forma realista e representações de funções corporais. Conteúdos muito violentos e gráficos não são permitidos no TikTok. No entanto, podemos permitir certos tipos de conteúdo, como imagens gráficas de mortes, acidentes ou brigas, quando servem como documentação de eventos do mundo real e são considerados de interesse público. Como esse conteúdo pode não ser confortável para todos os públicos, ele não se qualifica para recomendação e terá uma tela ou aviso para aceitar a visualização.","vid_mod_analytics_penalty_reason_fyf_title":"Não qualificado para o feed Para você","vid_mod_analytics_penalty_reason_fyf_desc":"Seu vídeo não atende aos nossos padrões de elegibilidade para o feed Para Você. Reveja as Diretrizes da Comunidade do TikTok para obter mais informações \u003E Inelegível para o feed Para Você","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"Usuários e terceiros podem denunciar violações de política para nós. Descobrimos essa violação de política após uma denúncia de que o conteúdo violava nossas Diretrizes da Comunidade.","vidModAnalytics_detailPg_sectionVideoDetails_sectionLabel":"Detalhes do vídeo","vid_mod_analytics_appeal_detailpg_reason_title":"Motivo da violação","vid_mod_analytics_detail_pg_title":"Vídeo não elegível","vid_mod_analytics_detail_pg_desc":"Este vídeo não é elegível para o feed Para Você porque ele viola nossas Diretrizes da Comunidade.","vidModAnalytics_detailPg_sectionSuccess_header":"Recurso aprovado","vid_mod_analytics_appeal_success_detail_pg_desc":"Analisamos seu recurso e restauramos seu vídeo. Pedimos desculpas por qualquer inconveniente que isso possa ter causado. Agradecemos por fazer parte da comunidade do TikTok!","vid_mod_analytics_appeal_detail_pg_title":"Vídeo removido","vid_mod_analytics_appeal_detail_pg_desc":"Este vídeo viola nossas Diretrizes da Comunidade.","vidModAnalytics_appealSubmitted_sectionTitle_header":"Solicitação recebida","vid_mod_analytics_appeal_rcv_detail_pg_desc":"Recebemos sua solicitação e notificaremos você assim que o resultado de seu recurso estiver disponível.","rIC_detailPg_violationReason_title":"Motivo da violação","dsaCGWebapp_detailPg_sectionCG_link":"Diretrizes da Comunidade","dsaCGWebapp_appealExpired_emptyState_body":"O prazo para recurso contra essa decisão expirou e ela não pode mais ser contestada.","appeal_btn_new":"Recurso","reasonForAppeal_appealPg_appealReasonCard_title":"Motivo para recorrer da decisão","oSA_appealPg_appealExp
