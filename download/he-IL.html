ה. תוכן לא מקורי כולל סרטונים שזה עתה יובאו או הועלו ממקורות אחרים (כמו למשל פלטפורמות אחרות, תוכניות טלוויזיה, סרטים או שידורי אינטרנט) ללא שום עריכות חדשות ויצירתיות. ניתן לזהות שסרטון אינו מקורי אם יש עליו סימן מים או לוגו. תוכן באיכות נמוכה כולל סרטונים קצרים מאוד, תמונות סטטיות וסרטונים המורכבים מקובצי GIF בלבד. בדרך כלל תוכן המכיל קודי QR אינו ראוי לתצוגה בפיד For You, מכיוון שהוא עלול להוביל משתמשים לאפליקציות או לאתרים מזיקים. עם זאת, אנו מתירים חריגים בנסיבות שבהן הסיכון הוא נמוך (לדוגמה, למסחר אלקטרוני).","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"תוכן לא מקורי, באיכות נמוכה ותוכן המכיל קוד QR","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"לשמירה על החוויה החיובית שהמשתמשים שלנו מצפים מפלטפורמת TikTok, תוכן לא מקורי ובאיכות נמוכה אינו ראוי להמלצה. תוכן לא מקורי הוא תוכן שיובא או הועתק ממקורות אחרים, ללא שום עריכות חדשות ויצירתיות. סרטון עשוי להיות לא מקורי אם הוא כולל סימן מים או לוגו. תוכן באיכות נמוכה כולל סרטונים קצרים מאוד, תמונות סטטיות וסרטונים המורכבים מקובצי GIF בלבד.","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"חשבון משועתק","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"חשבונך מכיל פוסטים לא מקוריים שאינם ראויים לתצוגה בפיד For You. למידע נוסף, ניתן לעיין ב״הנחיות הקהילה״ שלנו \u003E ״לא מתאים לפיד For You״ \u003E ״תוכן לא מקורי, באיכות נמוכה ותוכן המכיל קוד QR״","vid_mod_analytics_penalty_reason_spam_title":"ספאם, תוכן לא אותנטי או מטעה","vid_mod_analytics_penalty_reason_spam_desc":"תוכן שמנסה להערים או לתמרן משתמשים במטרה להשיג יותר עוקבים, לייקים צפיות או מדדי מעורבות אחרים בפלטפורמה אינו ראוי לתצוגה בפיד For You. זה כולל תוכן שמעודד משתמשים לעקוב זה אחר זה או לסמן זה לזה לייקים, או תוכן שמערים על משתמשים בצורה כזאת שהם ילחצו על כפתור ה״לייק״ או ה״שיתוף״. בנוסף לכך, תוכן שמקדם תיאוריות קונספירציה ומפיץ מידע שקרי או מזיק על אירועים אקטואליים ואירועים שעדיין לא קיימים פרטים מדויקים לגביהם, אינו ראוי לתצוגה בפיד For You.","vid_mod_analytics_penalty_reason_sexual_title":"תוכן מיני מפורש","vid_mod_analytics_penalty_reason_sexual_desc":"כדי לעזור בשמירה על חוויה נוחה, ייתכן שתוכן בעל רמיזות מיניות מפורשות לא יהיה ראוי להמלצה. זה כולל תוכן המציג עירום מרומז, המקנה אופי מיני לחלקי גוף שונים או תוכן ארוטי או חושני בעליל (כלומר, סטריפטיז).","vid_mod_analytics_penalty_reason_tobacco_title":"מוצרי טבק ואלכוהול","vid_mod_analytics_penalty_reason_tobacco_desc":"תוכן המקדם, מאזכר או מציג כיצד אנשים שהגיעו לגיל השתייה החוקי צורכים מוצרי אלכוהול בצורה מסוכנת, עשוי שלא להיות ראוי להמלצה. תוכן המציג מבוגרים המשתמשים במוצרי טבק או המאזכר חומרים ממכרים אינו ראוי להמלצה.","vid_mod_analytics_penalty_reason_stunts_title":"פעילויות ספורט ופעלולים מסוכנים","vid_mod_analytics_penalty_reason_stunts_desc":"חיקוי פעילויות מסוימות ללא אמצעי זהירות עלול להיות דבר מזיק או מסוכן, וזה עלול להוביל לפגיעה גופנית. תוכן הכולל פעלולים מסוכנים או ספורט אתגרי המבוצע על ידי אנשים שאינם מקצוענים, עשוי שלא להיות ראוי לתצוגה.","vid_mod_analytics_penalty_reason_graphic_title":"תוכן גרפי אלים","vid_mod_analytics_penalty_reason_graphic_desc":"תוכן הגורם לצופים אי-נוחות, זעזוע או גועל עשוי להיות לא כשיר להופעה בפיד \"For You\", כולל אפקטים מפחידים, הפחדות פתאומיות (\"jump scares\"), איפור המדמה באופן ריאליסטי פציעות מדממות ותיאורים של הפרשות גוף. רוב התוכן האלים והגרפי אסור ב-TikTok. עם זאת, אנו עשויים לאפשר סוגים מסוימים של תוכן, כגון תמונות גרפיות של מוות, תאונות או עימותים, כאשר אלו מתעדים אירועים מהעולם האמיתי וקיימת חשיבות ציבורית בפרסומם. מאחר שתוכן מסוג זה עשוי להיות לא נוח עבור כל הצופים, הוא לא יהיה כשיר להמלצה, ויוצג לפניו מסך אזהרה או דרישה לאישור הצפייה (\"opt-in\").","vid_mod_analytics_penalty_reason_fyf_title":"לא ראוי לפרסום בפיד For You","vid_mod_analytics_penalty_reason_fyf_desc":"הסרטון שלך לא עמד בתקני הכשירות שלנו לפיד For You. ניתן לעיין בהנחיות הקהילה של TikTok לקבלת מידע נוסף \u003E ״לא ראוי לפרסום בפיד For You״","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"משתמשים וצדדים שלישיים יכולים לדווח לנו על הפרות מדיניות. זיהינו את הפרת המדיניות הזאת על סמך דיווח על כך
