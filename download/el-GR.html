nbox_resubmit":"Εκ νέου υποβολή αναφοράς","tiktok_series_appeal_request_review_series_details_title":"Αίτημα περαιτέρω εξέτασης","filterKeywordsWeb_fypEntry_modal_desc1":"Η συμμετοχή σας στο TikTok αντικατοπτρίζει αυτό που βλέπετε. Όσο περισσότερο αλληλεπιδράτε, τόσο πιο εξατομικευμένη θα είναι η εμπειρία σας. Μπορείτε πάντα να προσαρμόζετε τις συστάσεις με τη λειτουργία {s_keywordLink}.","filterKeywordsWeb_fypEntry_manageFeeds_popup":"Φιλτράρισμα με λέξεις-κλειδιά","filterKeywordsWeb_fypEntry_modal_desc2":"Μπορείτε επίσης να απενεργοποιήσετε τις εξατομικευμένες ροές οποιαδήποτε στιγμή. Αυτό θα αλλάξει ως έναν βαθμό την εμπειρία σας, όπως αλλαγή της ροής Για εσάς σε Δημοφιλή, ωστόσο δεν θα επηρεάσει την εξατομίκευση των διαφημίσεων. {s_learnLink}","nonpersonalizedFeeds_turnOn_modal_toggle_bodyFull":"Η ενασχόλησή σας με το TikTok καθορίζει το τι βλέπετε. Όσο περισσότερο αλληλεπιδράτε, τόσο πιο εξατομικευμένες θα είναι οι ροές σας.\n\nΜπορείτε να ενεργοποιήσετε τις εξατομικευμένες ροές οποιαδήποτε στιγμή. Αυτό θα αλλάξει ορισμένα μέρη της εμπειρίας σας, συμπεριλαμβανομένης της αλλαγής των Δημοφιλών στη ροή Για εσάς, ωστόσο δεν θα επηρεάσει την εξατομίκευση των διαφημίσεων. Μπορείτε να απενεργοποιήσετε ξανά τις εξατομικευμένες ροές οποιαδήποτε στιγμή για να αναιρέσετε αυτές τις αλλαγές.","personalisedSearch_searchResults_actionSheet_bodyPara1":"Η ενασχόλησή σας με το TikTok συμβάλλει στη διαμόρφωση αυτού που βλέπετε. Όσο περισσότερο αλληλεπιδράτε, τόσο πιο εξατομικευμένη θα είναι η εμπειρία αναζήτησης.\n\nΜπορείτε να απενεργοποιήσετε την εξατομικευμένη αναζήτηση οποιαδήποτε στιγμή. Αυτό θα αλλάξει ορισμένα τμήματα της εμπειρίας σας, συμπεριλαμβανομένων των προτεινόμενων ερωτημάτων αναζήτησης και του τρόπου κατάταξης των αποτελεσμάτων αναζήτησης. Ωστόσο, δεν θα επηρεάσει την εξατομίκευση των διαφημίσεων της αναζήτησης. Μπορείτε να ενεργοποιήσετε ξανά την εξατομικευμένη αναζήτηση οποιαδήποτε στιγμή για να ακυρώσετε αυτές τις αλλαγές.","personalisedSearch_searchResults_ac πομπές, ταινίες ή διαδικτυακές εκπομπές) χωρίς καμία νέα, δημιουργική επεξεργασία. Μπορούμε να διακρίνουμε εάν ένα βίντεο δεν είναι πρωτότυπο αν έχει υδατογράφημα ή ένα λογότυπο πάνω από την εικόνα. Το περιεχόμενο χαμηλής ποιότητας περιλαμβάνει πολύ σύντομα βίντεο, στατικές εικόνες και βίντεο που αποτελούνται μόνο από GIF. Περιεχόμενο που περιλαμβάνει κωδικούς QR δεν είναι συνήθως επιλέξιμο για τη ροή Για εσάς, επειδή μπορεί να οδηγήσει τους χρήστες σε επιβλαβείς ιστότοπους ή εφαρμογές, αν και κάνουμε εξαιρέσεις σε περιπτώσεις όπου ο κίνδυνος είναι χαμηλός (για παράδειγμα, για το ηλεκτρονικό εμπόριο).","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"Μη πρωτότυπο, χαμηλής ποιότητας περιεχόμενο και περιεχόμενο κωδικού QR","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"Για να διατηρήσουμε τη θετική εμπειρία που περιμένουν οι χρήστες μας από την πλατφόρμα TikTok, κάθε μη πρωτότυπο και χαμηλής ποιότητας περιεχόμενο δεν είναι επιλέξιμο για σύσταση. Το μη πρωτότυπο περιεχόμενο αποτελεί περιεχόμενο που απλώς εισάγεται ή αντιγράφεται από άλλες πηγές χωρίς καμία νέα, δημιουργική επεξεργασία. Ένα βίντεο μπορεί να μην είναι πρωτότυπο εάν έχει υδατογράφημα ή λογότυπο. Το περιεχόμενο χαμηλής ποιότητας περιλαμβάνει πολύ σύντομα βίντεο, στατικές εικόνες και βίντεο που αποτελούνται μόνο από GIF.","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"Μη αυθεντικός λογαριασμός","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"Ο λογαριασμός σας περιέχει δημοσιεύσεις οι οποίες δεν είναι πρωτότυπες και επιλέξιμες για την ροή Για εσάς. Για περισσότερες πληροφορίες, ανατρέξτε στις Οδηγίες κοινότητας \u003E Ακατάλληλο για την ροή Για εσάς \u003E Μη πρωτότυπο, χαμηλής ποιότητας περιεχόμενο και περιεχόμενο κωδικού QR","vid_mod_analytics_penalty_reason_spam_title":"Spam, μη αυθεντικό ή παραπλανητικό περιεχόμενο","vid_mod_analytics_penalty_reason_spam_desc":"Περιεχόμενο που προσπαθεί να ξεγελάσει ή να χειραγωγήσει τους χρήστες για να αποκτήσει περισσότερους ακολούθους, επισημάνσεις Μου αρέσει, προβολές ή άλλες μετρήσεις συμμετοχής στην πλατφόρμα δεν είναι επιλέξιμο για την ροή Για εσάς. Αυτό περιλαμβάνει περιεχόμενο που ενθαρρύνει τους χρήστες να ακολουθούν ή να πατήσουν Μου αρέσει ο ένας στον άλλον, ή περιεχόμενο που εξαπατά τους χρήστες να κάνουν κλικ στα κουμπιά Μου αρέσει ή Κοινοποίηση. Επιπλέον, το περιεχόμενο που προωθεί θεωρίες συνωμοσίας και διαδίδει ψευδείς ή επιβλαβείς πληροφορίες σχετικά με τρέχοντα γεγονότα και γεγονότα των οποίων οι λεπτομέρειες δεν έχουν ακόμη διευκρινιστεί, δεν είναι ούτε και αυτό επιλέξιμο για τη ροή Για εσάς.","vid_mod_analytics_penalty_reason_sexual_title":"Απροκάλυπτα σεξουαλικό περιεχόμενο","vid_mod_analytics_penalty_reason_sexual_desc":"Για να βοηθήσουμε στη διατήρηση μιας άνετης εμπειρίας, περιεχόμενο που είναι εμφανώς σεξουαλικά προκλητικό ενδέχεται να μην είναι επιλέξιμο για σύσταση. Αυτό περιλαμβάνει περιεχόμενο που απεικονίζει εμμέσως γυμνό, σεξουαλικοποιεί μέρη του σώματος ή είναι απροκάλυπτα ερωτικό ή αισθησιακό (π.χ., στριπτίζ).","vid_mod_analytics_penalty_reason_tobacco_title":"Προϊόντα καπνού και αλκοόλ","vid_mod_analytics_penalty_reason_tobacco_desc":"Περιεχόμενο που προωθεί, αναφέρει ή απεικονίζει αλκοολούχα προϊόντα τα οποία καταναλώνονται από άτομα σε νόμιμη ηλικία κατανάλωσης, αλλά με επικίνδυνο τρόπο, μπορεί να μην είναι επιλέξιμο για σύσταση. Περιεχόμενο που απεικονίζει τη χρήση προϊόντων καπνού από ενήλικες ή αναφέρει ελεγχόμενες ουσίες δεν είναι επιλέξιμο για σύσταση.","vid_mod_analytics_penalty_reason_stunts_title":"Επικίνδυνα ακροβατικά και αθλήματα","vid_mod_analytics_penalty_reason_stunts_desc":"Όταν αναπαράγονται χωρίς προφυλάξεις ασφαλείας, ορισμένες δραστηριότητες μπορεί να είναι ριψοκίνδυνες ή επικίνδυνες, γεγονός που μπορεί να οδηγήσει σε σωματική βλάβη. Περιεχόμενο που περιλαμβάνει επικίνδυνα ακροβατικά ή αθλήματα που εκτελούνται από μη επαγγελματίες μπορεί να μην είναι επιλέξιμο.","vid_mod_analytics_penalty_reason_graphic_title":"Βίαιο και σκληρό περιεχόμενο","vid_mod_analytics_penalty_reason_graphic_desc":"Περιεχόμενο που προκαλεί στους θεατές δυσφορία, σοκ ή απέχθεια μπορεί να μην είναι επιλέξιμο για τη ροή Για εσάς, συμπεριλαμβανομένων τρομακτικών εφέ, τρομακτικών σκηνών, μακιγιάζ που αναπαριστούν ρεαλιστικά ματωμένες πληγές και απεικονίσεις σωματικών λειτουργιών. Δεν επιτρέπεται στο TikTok εξαιρετικά βίαιο και παραστατικό περιεχόμενο. Ωστόσο, ενδέχεται να επιτρέψουμε ορισμένους τύπους περιεχομένου, όπως παραστατικές εικόνες θανάτου, ατυχημάτων ή συγκρούσεων, όταν χρησιμεύουν για τεκμηρίωση πραγματικών γεγονότων και θεωρείται ότι εξυπηρετούν το δημόσιο συμφέρον. Δεδομένου ότι το συγκεκριμένο περιεχόμενο ενδέχεται να μην είναι κατάλληλο για όλα τα ακροατήρια, δεν θα είναι επιλέξιμο για σύσταση και το περιεχόμενο θα διαθέτει οθόνη ή προειδοποίηση «έγκρισης».","vid_mod_analytics_penalty_reason_fyf_title":"Δεν πληροί τα κριτήρια για τη ροή Για εσάς","vid_mod_analytics_penalty_reason_fyf_desc":"Το βίντεό σας δεν πληροί τα κριτήρια επιλεξιμότητας για τη ροή Για εσάς. Ανατρέξτε στις Οδηγίες κοινότητας του TikTok για περισσότερες πληροφορίες σχετικά με το \u003E Μη επιλέξιμο για τη ροή Για εσάς","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"Χρήστες και τρίτα μέρη μπορούν να μας αναφέρουν παραβιάσεις πολιτικής. Εντοπίσαμε αυτήν την παραβίαση πολιτικής βάσει αναφοράς ότι το περιεχόμενο παραβίαζε τις Οδηγίες κοινότητας.","vidModAnalytics_detailPg_sectionVideoDetails_sectionLabel":"Λεπτομέρειες βίντεο","vid_mod_analytics_appeal_detailpg_reason_title":"Λόγος παραβίασης","vid_mod_analytics_detail_pg_title":"Το βίντεο δεν είναι επιλέξιμο","vid_mod_analytics_detail_pg_desc":"Αυτό το βίντεο δεν είναι επιλέξιμο για τη ροή Για εσάς, επειδή παραβιάζει τις Οδηγίες κοινότητας.","vidModAnalytics_detailPg_sectionSuccess_header":"Η ένσταση εγκρίθηκε","vid_mod_analytics_appeal_success_detail_pg_desc":"Εξετάσαμε την ένστασή σας και επαναφέραμε το βίντεό σας. Ζητούμε συγγνώμη για την όποια ταλαιπωρία. Ευχαριστούμε που είστ
