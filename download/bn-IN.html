nalty_reason_graphic_title":"সহিংস এবং গ্রাফিক কন্টেন্ট","vid_mod_analytics_penalty_reason_graphic_desc":"ভীতিকর প্রভাব, লাফ দেওয়ার ভয়, বাস্তবিকভাবে রক্তাক্ত ক্ষতের দৃশ্য পুনরায় সৃষ্টি করা মেক-আপ এবং শারীরিক কার্যকলাপের চিত্রণ সহ দর্শকদের অস্বস্তি, শক বা বিতৃষ্ণার কারণ হতে পারে এমন কন্টেন্ট আপনার জন্য ফিডের অযোগ্য হতে পারে। খুব বেশি সহিংসা এবং গ্রাফিক কন্টেন্টও TikTok-এ অনুমোদিত নয়। তবে, বাস্তব জগতের ঘটনার নথিকরণ হিসাবে রাখতে এবং জনস্বার্থ হিসাবে বিবেচনা করার সময়, আমরা মৃত্যু, দুর্ঘটনা বা মারামারির গ্রাফিক ছবির মতো নির্দিষ্ট কিছু ধরনের কন্টেন্টের অনুমতি দিতে পারি। তবে এই কন্টেন্টে সমস্ত দর্শক স্বচ্ছন্দ নাও হতে পারেন, তাই এটি সুপারিশের যোগ্য হবে না এবং কন্টেন্টটিতে একটি \"অপ্ট-ইন\" স্ক্রিন বা সতর্কবার্তা থাকবে।","vid_mod_analytics_penalty_reason_fyf_title":"আপনার জন্য ফিড-এর জন্য অযোগ্য","vid_mod_analytics_penalty_reason_fyf_desc":"আপনার ভিডিও আপনার জন্য ফিডের ক্ষেত্রে আমাদের যোগ্যতার মানদন্ডগুলি পূরণ করেনি। আরও তথ্যের জন্য TikTok-এর কমিউনিটির নিয়মকানুন পর্যালোচনা করুন \u003E আপনার জন্য ফিডের ক্ষেত্রে অনুপযুক্ত","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"ব্যবহারকারী এবং 3য়-পক্ষ আমাদের কাছে নীতি লঙ্ঘনের রিপোর্ট করতে পারেন। আমরা একটি রিপোর্টের ভিত্তিতে এই নীতি লঙ্ঘনটি শনাক্ত করেছি যে কন্টেন্টটি আমাদের কমিউনিটির নিয়মকানুন লঙ্ঘন করেছে।","vidModAnalytics_detailPg_sectionVideoDetails_sectionLabel":"ভিডিওর বিশদ","vid_mod_analytics_appeal_detailpg_reason_title":"লঙ্ঘনের কারণ","vid_mod_analytics_detail_pg_title":"ভিডিও যোগ্য নয়","vid_mod_analytics_detail_pg_desc":"এই ভিডিওটি আপনার জন্য ফিড এর ক্ষেত্রে যোগ্য নয় কারণ এটি আমাদের কমিউনিটির নিয়মকানুন লঙ্ঘন করে।","vidModAnalytics_detailPg_sectionSuccess_header":"আবেদন অনুমোদিত হয়েছে","vid_mod_analytics_appeal_success_detail_pg_desc":"আমরা আপনার আবেদন পর্যালোচনা করেছি এবং আপনার ভিডিওটি রিস্টোর করেছি। এর ফলে কোনও অসুবিধা হয়ে থাকলে তার জন্য আমরা ক্ষমাপ্রার্থী। TikTok কমিউনিটির একটি অংশ হওয়ার জন্য ধন্যবাদ!","vid_mod_analytics_appeal_detail_pg_title":"ভিডিও অপসারণ করা হয়েছে","vid_mod_analytics_appeal_detail_pg_desc":"এই ভি
