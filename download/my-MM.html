signout_popup_no":"မလုပ်ပါ","osa_illegal_detail_reminder":"တမင်ရည်ရွယ်၍ မဟုတ်မမှန်သော သို့မဟုတ် အထင်မှားစေနိုင်သော တရားမဝင် အကြောင်းအရာများကို တိုင်ကြားပါက ဥပဒေအရ အရေးယူခံရနိုင်ပါသည်။ သိသာစွာ အခြေအမြစ်မရှိသည့် တိုင်ကြားမှုများကို အကြိမ်ကြိမ် ပေးပို့လျှင် သင်၏ တိုင်ကြားမှု ပေးပို့နိုင်စွမ်းကို ဆိုင်းငံ့ခြင်း သို့မဟုတ် သင့်အကောင့်ကို အပြီးတိုင် တားမြစ်ခြင်းတို့ကို ပြုလုပ်ပိုင်ခွင့် ကျွန်ုပ်တို့ထံတွင် ရှိသည်။","dsa_illegal_report_penalty_reminder":"အကြောင်းအရာကို လိမ်လည်၍ သို့မဟုတ် အထင်အမြင်လွဲမှားအောင် တရားမဝင်ကြောင်းသိလျက်နှင့် တိုင်ကြားခြင်းသည် ဥပဒေအရ ပြစ်ဒဏ်ကျခံရနိုင်သည်ကို မှတ်သားပါ။ သိသိသာသာ အခြေအမြစ်မရှိသည့် တိုင်ချက်များကို မကြာမကြာ ပို့နေပါက သင်၏ တိုင်ချက် ပို့နိုင်စွမ်းကို ယာယီပိတ်ထားရန် သို့မဟုတ် သင့်အကောင့်ကို အပြီးအပိုင် တားမြစ်ရန် ကျွန်ုပ်တို့တွင် လုပ်ပိုင်ခွင့်ရှိပါသည်။ နောက်ထပ်အချက်အလက်များ သိရှိရန် ကျွန်ုပ်တို့၏ ပွင့်လင်းမြင်သာမှုစင်တာတွင် ကြည့်ပါ။","Web_report_reason_select":"တိုင်ကြားရသည့် အကြောင်းရင်း-","dsa_illegal_report_email":"သင်၏ အီးမေးလ် လိပ်စာ","dsa_illegal_cite_law_optional":"(ဆန္ဒရှိလျှင်ထည့်ရန်)","dsa_illegal_report_fill_email":"သင့်အီးမေးလ်လိပ်စာကို ဖြည့်ပါ","cseReasons_reportPg_emailAddForm_body":"ဤတိုင်ချက်ကို အမည်မပါဘဲ သင် ပေးပို့နိုင်ပါသည်။ သို့သော် သင်သည် ထွက်လာသည့်ရလဒ်ကို အသိပေးခံရမည်မဟုတ်ပါ သို့မဟုတ် မေတ္တာရပ်ခံရန် ရွေးချယ်ခွင့် ရရှိမည်မဟုတ်ပါ။","dsa_illegal_report_trustedflagger_fill_email":"မှန်ကန်သည့် အီးမေးလ်လိပ်စာကို ထည့်သွင်းပါ","dsa_illegal_detail_country":"တရားဝင် တရားစီရင်ပိုင်ခွင့်","dsa_illegal_detail_law":"သက်ဆိုင်ရာ ဥပဒေ","dsa_illegal_cite_law_desc":"အကြောင်းအရာက ချိုးဖောက်သည်ဆိုသည့် ဥပဒေကို အသေးစိတ်ရှင်းပြပေးပါ။ သင်၏ တိုင်ချက်ကို ကျွန်ုပ်တို့ သင့်တော်မှန်ကန်စွာ အကဲဖြတ်ခွင့်ရစေရန် တတ်နိုင်သမျှ အတိအကျဖြစ်ပါစေ။","dsa_illegal_detail_explanation":"တိုင်ချက်အတွက် ရှင်းလင်းချက်","dsa_illegal_report_explanation_desc":"အကြောင်းအရာသည် သက်ဆိုင်ရာ ဥပဒေကို မည်သို့ ချိုးဖောက်သည်ကို ဖော်ပြပါ။ လုံလောက်သော အချက်အလက် မပါဝင်သည့် တိုင်ချက်များကို မှန်ကန်သည်ဟု ယူဆနိုင်မည်မဟုတ်ပါ။ သက်ဆိုင်ပါက သင်သည် ဤတောင်းဆိုချက်ကို သင်ကိုယ်တိုင် တင်မည်
