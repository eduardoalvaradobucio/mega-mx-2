:"Причина жалобы","dsa_illegal_report_explanation_desc":"Опишите, каким образом контент нарушает соответствующий закон. Жалобы, не содержащие достаточных сведений, могут быть признаны недействительными. Если применимо, укажите, от чьего имени вы делаете этот запрос: от себя или от другого человека.","dsa_illegal_appeal_signature":"Подпись","dsa_illegal_sign_legal_name":"Укажите здесь свое полное имя по документам.","dsa_illegal_confirm_accuracy":"Я подтверждаю, что считаю приведенные в жалобе сведения верными, точными и полными.","idpa_attachment":"Вложения","idpa_attachment_instruction":"Отчет должен быть подан правообладателем, чьи права были нарушены, или его уполномоченным представителем. Внимательно ознакомьтесь с \u003CredLink\u003Eинструкциями по подаче жалобы\u003C\u002FredLink\u003E и предоставьте все необходимые документы. Файлы должны быть в формате JPEG, JPG или PNG и иметь размер не более 20 МБ.","idpa_attachment_sec1":"Раздел 1.","idpa_identification_document_title":"Документы, касающиеся заявителя","idpa_identification_document_instruction_IP":"Представьте официальные документы, удостоверяющие личность. Например: водительское удостоверение (лицевая и оборотная сторона), паспорт (страница с фотографией и страница с именем владельца и контактной информацией на случай чрезвычайных ситуаций), карта My Number Card (только лицевая сторона) и т. д. Кроме того, если необходимо, вы должны предоставить документы, подтверждающие полномочия агентства, документы, подтверждающие согласие законного представителя, такого как опекун, а также документы, подтверждающие отношение поданных сведений к самому заявителю. Кроме того, если вы представляете юридическое лицо, вам необходимо предъявить такие документы, как свидетельство о регистрации компании и доверенность от представителя. \u003CredLink\u003EПодробнее\u003C\u002FredLink\u003E","idpa_identification_document_instruction_nonIP":"Представьте официальные документы, удостоверяющие личность. Например: водительское удостоверение (лицевая и оборотная сторона), паспорт (страница с фотографией и страница с именем владельца и контактной информацией на случай чрезвычайных ситуаций), карта My Number Card (только лицевая сторона) и т. д. Кроме того, если необходимо, вы должны предоставить документы, подтверждающие полномочия агентства, документы, подтверждающие согласие законного представителя, такого как опекун, а также документы, подтверждающие отношение поданных сведений к самому заявителю. \u003CredLink\u003EПодробнее\u003C\u002FredLink\u003E","attachment_upload_limit":"Размер каждого файла не должен превышать 20 МБ","idpa_attachment_sec2":"Раздел 2.","idpa_right_holder_status_title":"Документы, подтверждающие статус правообладателя","idpa_ric_proof_title":"Документы, касающиеся нарушения прав","idpa_right_holder_status_instruction_1":"(Нарушение прав интеллектуальной собственности)","idpa_right_holder_status_instruction_2":"Предоставьте документы, подтверждающие права интеллектуальной собственности, которые, по вашему мнению, были нарушены, а также документы, удостоверяющие, что вы являетесь владельцем предполагаемой интеллектуальной собственности. \u003CredLink\u003EПодробнее\u003C\u002FredLink\u003E","idpa_right_holder_status_instruction_3":"(Нарушение деловых интересов)","idpa_right_holder_status_instruction_4":"Перечень необходимых документов зависит от того, какие деловые интересы, как утверждается, были нарушены (например, материалы, подтверждающие репутацию или известность торговых марок, материалы, доказывающие, что публикация вводит потребителей в заблуждение относительно качества). Ознакомьтесь с \u003CredLink\u003Eподробностями\u003C\u002FredLink\u003E и отправьте соответствующие документы. Вы можете загрузить до трех файлов в формате JPEG, JPG или PNG, каждый размером не более 20 МБ.","idpa_ric_proof_instruction":"Отправьте скриншот или другое доказательство, демонстрирующее часть опубликованного контента, который, по вашему мнению, нарушает ваши права. Вы можете загрузить до трех файлов в формате JPEG, JPG или PNG, каждый размером не более 20 МБ. \u003CredLink\u003EПодробнее\u003C\u002FredLink\u003E","idpa_attachment_sec3":"Раздел 3.","idpa_other_document_title":"Другие подтверждающие документы","idpa_other_document_instruction":"Приложите любые подтверждающие документы, например материалы, доказывающие, что данный случай не подпадает под исключения из правил о клевете. Вы можете загрузить до трех файлов в формате JPEG, JPG или PNG, каждый размером не более 20 МБ. \u003CredLink\u003EПодробнее\u003C\u002FredLink\u003E","idpa_disclaimer":"Обратите внимание, что отправка заведомо ложной или вводящей в заблуждение жалобы может быть наказуема по закону. Если вы часто отправляете явно необоснованные жалобы, мы оставляем за собой право временно ограничить вашу возможность отправки жалоб или навсегда заблокировать ваш аккаунт. \u003CredLink\u003EПодробнее\u003C\u002FredLink\u003E","ad_report_detail_placeholder_75_uk":"Предоставьте подробную информацию о вашем опыте взаимодействия с этой рекламой, чтобы помочь нам принять необходимые меры. Согласно Закону Великобритании о безопасности в Интернете (OSA), к вредоносному для детей контенту относится порнография, а также материалы, демонстрирующие действия сексуального характера, самоубийство, причинение вреда себе, расстройство пищевого поведения, жестокое обращение, ненависть, насилие, травлю, опасные трюки и челленджи, вредные вещества, нездоровое восприятие тела, и депрессивный контент. При возможности укажите категорию.","ad_report_detail_placeholder_75_eea_row":"Предоставьте подробную информацию о вашем опыте взаимодействия с этой рекламой, чтобы помочь нам принять необходимые меры.","ad_report_reason_L1Misinfo_L2aigc_v2_0":"Это объявление может содержать контент, созданный или отредактированный искусственным интеллектом, который используется не по назначению, несанкционированно или неправильно маркирован. К такому контенту относится следующий.","ad_report_reason_L1Misinfo_L2aigc_v2_1":"Контент, созданный искусственным интеллектом, который не маркирован или явно не обозначен. В объявлении используется искусственный интеллект для создания контента, но нет указания на это.","ad_report_reason_L1Misinfo_L2aigc_v2_2":"Используется образ, голос или личность реального человека без его разрешения. В объявлении показан реально существующий человек или звучит его речь, но человек не давал на это согласия (например, в рекламе создается впечатление, что этот человек поддерживает политическую идею или продвигает товар, хотя на самом деле это не так).","Web_report_description":"Описание жалобы (необязательно):","report_details_toast":"Поделитесь впечатлением об этой рекламе, чтобы мы могли улучшить ее.","report_img_toast":"Загрузите изображения сведений о заказе и полученных товаров.","dsa_illegal_select_country_optional":"Правовая юрисдикция","get_tt_desktop":"Скачать TikTok для ПК","get_tt_app":"Скачать приложение TikTok","Web_leftNav_getCoins_toolTip":"Сэкономьте 25%","desktopWeb_dynamicBottom_installTikTok":"Установить TikTok","desktopWeb_dynamicBottom_installTikTok_desc":"Установите TikTok для ПК для лучшей производительности","desktopWeb_dynamicBottom_installTikTok_Cta":"Установить","desktopWeb_dynamicBottom_right_logIn":"Войти","webapp_topnav_getapp":"Скачать приложение","webapp_topnav_pcapp":"Приложение для компьютера","webapp_tootip_Viewprofile":"Смотреть профиль","View profile":"Смотреть профиль","projectU_link_logout_button":"Выйти","personalisedSearch_searchResults_moreOptions_listItem4":"Управление поиском","search_top":"Лучшее","search_account":"Аккаунты","pm_main_live_entry_final":"СТРИМ","photomode_sharing_photo":"Фото","pcWeb_search_tabName_users":"Люди","webapp_profile":"Профиль","editprofile_toast":"Профиль обновлен","blue_v_change_name_toast_request_submitted":"Запрос отправлен. Мы свяжемся с вами в течение %d ч.","podcasts_linkFullEpisodes_publishEpisodePage_confirmationBanner":"Мы сообщим, когда ваш эпизод будет опубликован","collectionsPr od_analytics_penalty_reason_minor_title":"Безопасность несовершеннолетних","vid_mod_analytics_penalty_reason_minor_desc":"Чтобы подростки могли свободно исследовать свою идентичность и искать подходящие способы самовыражения без страха осуждения, контент от пользователей младше 16 лет не попадает в рекомендации. Реклама пластических операций, направленная на подростков, может привести к увеличению случаев дисфории (отторжения собственного тела). Соответственно, контент на подобные темы, включая видео «до и после», записи операций и публикации, в которых выборочная косметическая хирургия обсуждается без предупреждений о сопутствующих рисках, не показываются в ленте «Рекомендации» у всех пользователей младше 18 лет.","vid_mod_analytics_penalty_reason_unoriginal_title":"Неоригинальный контент, контент низкого качества и QR-коды в видео","vid_mod_analytics_penalty_reason_unoriginal_desc":"Чтобы все пользователи TikTok получали удовольствие от просмотра видео, в рекомендации не попадает неоригинальный и низкокачественный контент. Неоригинальным контентом считаются видео, импортированные или загруженные из других источников (например, из социальных сетей, телешоу, фильмов или веб-трансляций) без какой-либо творческой обработки. Если на видео есть водяной знак или логотип, оно считается неоригинальным. Низкокачественным контентом считаются очень короткие видео, статичные изображения и видео, содержащие только GIF-анимацию. Кроме того, в ленту «Рекомендации» обычно не попадает контент с QR-кодами, так как они могут вести на вредоносные веб-сайты или приложения. Исключение составляют случаи, когда риск пренебрежимо мал (например, для видео, связанных с электронной коммерцией).","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"Неоригинальный контент, контент низкого качества и QR-коды в видео","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"Чтобы все пользователи TikTok получали удовольствие от просмотра видео, в рекомендации не попадает неоригинальный и низкокачественный контент. Неоригинальным контентом считаются видео, импортированные или скопированные из других источников без какой-либо творческой обработки. Если на видео есть водяной знак или логотип, оно считается неоригинальным. Низкокачественным контентом считаются очень короткие видео, статичные изображения и видео, содержащие только GIF-анимацию.","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"Скопированный аккаунт","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"Ваш аккаунт содержит неоригинальные публикации, поэтому ваши видео не появляются в ленте «Рекомендации». Подробности см. в разделе «Правила сообщества» \u003E «Неприемлемый контент в ленте \"Для вас\"» \u003E «Неоригинальный контент, контент низкого качества и QR-коды в видео».","vid_mod_analytics_penalty_reason_spam_title":"Спам, фальшивый или вводящий в заблуждение контент","vid_mod_analytics_penalty_reason_spam_desc":"В ленту «Рекомендации» не попадает контент, предназначенный для увеличения количества подписчиков, лайков, просмотров или других показателей вовлеченности на платформе мошенническим или обманным путем. Это могут быть призывы подписываться на автора или ставить ему лайки, а также контент, в котором пользователей обманом заставляют нажимать на кнопки «Лайк» или «Поделиться». Кроме того, в ленту «Рекомендации» не попадает контент, предназначенный для распространения теорий заговора и неправдивой или вредоносной информации о текущих событиях и событиях, о которых еще мало сведений.","vid_mod_analytics_penalty_reason_sexual_title":"Излишне сексуализированный контент","vid_mod_analytics_penalty_reason_sexual_desc":"Чтобы каждый пользователь видел в приложении подходящий для его мировоззрения контент, видео с сексуальными намеками могут быть исключены из рекомендаций. Это относится к контенту, в котором подразумевается нагота, сексуально демонстрируются части тела или показаны откровенно эротические или чувственные действия (например, стриптиз).","vid_mod_analytics_penalty_reason_tobacco_title":"Табак и алкоголь","vid_mod_analytics_penalty_reason_tobacco_desc":"В ленту «Рекомендации» не попадает контент, в котором пропагандируется, упоминается или демонстрируется безответственное и опасное употребление алкоголя совершеннолетними лицами. Кроме того, в рекомендации не попадает контент, в котором взрослые употребляют табачные изделия или упоминают запрещенные вещества.","vid_mod_analytics_penalty_reason_stunts_title":"Опасные трюки и виды спорта","vid_mod_analytics_penalty_reason_stunts_desc":"Некоторые действия при повторении любителями без соответствующих мер предосторожности могут быть опасными и привести к травмам. Контент с опасными трюками и видео, в которых непрофессионалы занимаются опасными видами спорта, не попадает в ленту «Рекомендации».","vid_mod_analytics_penalty_reason_graphic_title":"Жестокость и шокирующий контент","vid_mod_analytics_penalty_reason_graphic_desc":"В ленту «Рекомендации» не попадает контент, который может вызвать у зрителя дискомфорт, шок или отвращение, включая видео со страшными эффектами, скримерами, реалистичным гримом в виде кровавых ран и изображениями телесных отправлений. Большую часть контента, содержащего жестокость и насилие, в TikTok публиковать нельзя, однако в некоторых случаях мы разрешаем публикацию контента определенного типа, такого как натуралистичное изображение смерти, катастроф или военных действий, который служит для документирования реальных событий и вызывает общественный интерес. Такой контент может быть неприемлемым для некоторых пользователей, поэтому он не попадает в рекомендации. Перед просмотром такого видео зритель увидит предупреждение и должен будет подтвердить свое желание его смотреть.","vid_mod_analytics_penalty_reason_fyf_title":"Не подходит для ленты «Рекомендации»","vid_mod_analytics_penalty_reason_fyf_desc":"Ваше видео не соответствует стандартам для попадания в ленту «Рекомендации». Подробности см. в разделе Правил сообщества TikTok «Неприемлемый контент в ленте \"Рекомендации\"».","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"Пользователи и сторонние лица могут отправлять нам жалобы на контент, нарушающий Правила сообщества. Мы обнаружили это нарушение правил в результате рассмотрения такой жалобы.","vidModAnalytics_detailPg_sectionVideoDetails_sectionLabel":"Сведения о видео","vid_mod_analytics_appeal_detailpg_reason_title":"Причина нарушения","vid_mod_analytics_detail_pg_title":"Видео не попадет в рекомендации","vid_mod_analytics_detail_pg_desc":"Это видео не показывается в ленте «Рекомендации», так как оно нарушает Правила сообщества.","vidModAnalytics_detailPg_sectionSuccess_header":"Апелляция одобрена","vid_mod_analytics_appeal_success_detail_pg_desc":"Мы рассмотрели вашу апелляцию и восстановили видео. Приносим извинения за доставленные неудобства. Спасибо, что остаетесь с нами!","vid_mod_analytics_appeal_detail_pg_title":"Видео удалено","vid_mod_analytics_appeal_detail_pg_desc":"Этот видео нарушает наши Правила сообщества.","vidModAnalytics_appealSubmitted_sectionTitle_header":"Запрос получен","vid_mod_analytics_appeal_rcv_detail_pg_desc":"Мы получили ваш запрос и сообщим вам о результатах апелляции.","rIC_detailPg_violationReason_title":"Обнаруженные нарушения","dsaCGWebapp_detailPg_sectionCG_link":"Правила сообщества","dsaCGWebapp_appealExpired_emptyState_body":"Срок обжалования этого решения истек, его уже нельзя оспорить.","appeal_btn_new":"Апелляция","reasonForAppeal_appealPg_appealReasonCard_title":"Причина оспаривания решения","oSA_appealPg_appealExplain_title":"Обоснование апелляции","rIC_appealPg_appealExplain_title":"Обоснование апелляции","oSA_appealPg_appealExplain_desc":"Обстоятельно объясните, почему вы не согласны с решением, чтобы мы могли надлежащим образом рассмотреть вашу апелляцию.","rIC_appealPg_appealExplain_desc":"Обстоятельно объясните, почему вы не согласны с ограничением, чтобы мы могли надлежащим образом рассмотреть вашу апелляцию.","dsa_illegal_uploader_vio_appeal_exp
