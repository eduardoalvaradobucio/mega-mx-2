kaun anda secara kekal. Lihat Pusat Ketelusan kami untuk mendapatkan maklumat lanjut.","Web_report_reason_select":"Sebab laporan:","dsa_illegal_report_email":"Alamat e-mel anda","dsa_illegal_cite_law_optional":"(Pilihan)","dsa_illegal_report_fill_email":"Isikan alamat e-mel anda","cseReasons_reportPg_emailAddForm_body":"Anda boleh menghantar laporan ini tanpa nama. Walau bagaimanapun, anda tidak akan dimaklumkan tentang keputusan atau mempunyai pilihan untuk mengemukakan rayuan.","dsa_illegal_report_trustedflagger_fill_email":"Masukkan alamat e-mel yang sah","dsa_illegal_detail_country":"Bidang kuasa undang-undang","dsa_illegal_detail_law":"Undang-undang yang berkaitan","dsa_illegal_cite_law_desc":"Sila berikan butiran undang-undang yang didakwa dilanggar oleh kandungan. Sila jelaskan secara terperinci yang mungkin untuk membolehkan kami menilai laporan anda dengan sewajarnya.","dsa_illegal_detail_explanation":"Penerangan Laporan","dsa_illegal_report_explanation_desc":"Sila terangkan cara kandungan melanggar undang-undang berkenaan. Laporan yang tidak mengandungi maklumat yang mencukupi mungkin tidak dianggap sebagai sah. Jika berkenaan, sila jelaskan jika anda menyerahkan permohonan ini untuk diri anda atau sebagai wakil kepada orang lain.","dsa_illegal_appeal_signature":"Tandatangan","dsa_illegal_sign_legal_name":"Tandatangan nama sah anda di sini.","dsa_illegal_confirm_accuracy":"Saya mengesahkan pendapat saya bahawa laporan ini benar, tepat dan lengkap.","idpa_attachment":"Lampiran","idpa_attachment_instruction":"Laporan mesti diserahkan oleh pemegang hak yang haknya telah dilanggar, atau oleh wakil yang diberi kuasa. Sila semak \u003CredLink\u003Egaris panduan penyerahan\u003C\u002FredLink\u003E dengan teliti dan serahkan semua dokumentasi yang diperlukan. Format fail mestilah JPEG, JPG atau PNG, dan mestilah di bawah 20 MB.","idpa_attachment_sec1":"Bahagian 1:","idpa_identification_document_title":"Dokumen berkenaan dengan pihak menuntut","idpa_identification_document_instruction_IP":"Sila serahkan dokumen pengenalan rasmi. Contohnya termasuk: lesen memandu (depan dan belakang), pasport (halaman gambar dan halaman yang mengandungi nama pemegang dan maklumat hubungan kecemasan), Kad Nombor Saya (depan sahaja), dsb. Selain itu, jika perlu, anda mesti menyerahkan dokumen yang membuktikan autoriti agensi, dokumen yang membuktikan persetujuan daripada wakil sah seperti penjaga, dan dokumen yang menandakan bahawa penyerahan itu berkaitan dengan individu itu sendiri. Tambahan pula, jika anda orang juridikal, anda mesti menyerahkan dokumen seperti Sijil Pendaftaran Syarikat dan Surat Kuasa Wakil daripada wakil. \u003CredLink\u003EKetahui lebih lanjut\u003C\u002FredLink\u003E","idpa_identification_document_instruction_nonIP":"Sila serahkan dokumen pengenalan rasmi. Contohnya termasuk: lesen memandu (depan dan belakang), pasport (halaman gambar dan halaman yang mengandungi nama pemegang dan maklumat hubungan kecemasan), Kad Nombor Saya (depan sahaja), dsb. Selain itu, jika perlu, anda mesti menyerahkan dokumen yang membuktikan autoriti agensi, dokumen yang membuktikan persetujuan daripada wakil sah seperti penjaga, dan dokumen yang menandakan bahawa penyerahan itu berkaitan dengan individu itu sendiri. \u003CredLink\u003EKetahui lebih lanjut\u003C\u002FredLink\u003E","attachment_upload_limit":"Setiap satu fail mestilah kurang daripada 20MB","idpa_attachment_sec2":"Bahagian 2:","idpa_right_holder_status_title":"Dokumentasi yang membuktikan status pemegang hak","idpa_ric_proof_title":"Dokumentasi tentang pelanggaran hak","idpa_right_holder_status_instruction_1":"(Pelanggaran hak harta intelek)","idpa_right_holder_status_instruction_2":"Sila serahkan dokumen yang mengenal pasti hak harta intelek yang anda percaya telah dilanggar, dan dokumen yang menunjukkan anda ialah pemilik harta intelek dalam dakwaan itu. \u003CredLink\u003EKetahui lebih lanjut\u003C\u002FredLink\u003E","idpa_right_holder_status_instruction_3":"(Pelanggaran kepentingan perniagaan)","idpa_right_holder_status_instruction_4":"Dokumentasi yang diperlukan berbeza-beza bergantung pada kepentingan perniagaan yang didakwa telah dilanggar (cth., bahan yang menunjukkan reputasi atau kemasyhuran label produk, bahan yang menunjukkan bahawa siaran itu mengelirukan pengguna tentang kualiti). Sila semak \u003CredLink\u003Ebutiran\u003C\u002FredLink\u003E dan serahkan dokumentasi yang sesuai. Anda boleh memuat naik sebanyak tiga fail dalam format JPEG, JPG atau PNG, setiap satu di bawah 20 MB.","idpa_ric_proof_instruction":"Sila serahkan tangkapan skrin atau bukti serupa yang menunjukkan bahagian kandungan disiarkan yang anda percaya telah melanggar hak anda. Anda boleh memuat naik hingga tiga fail dalam format JPEG, JPG atau PNG, setiap satu di bawah 20 MB. \u003CredLink\u003EKetahui lebih lanjut\u003C\u002FredLink\u003E","idpa_attachment_sec3":"Bahagian 3:","idpa_other_document_title":"Dokumen sokongan lain","idpa_other_document_instruction":"Sila serahkan sebarang dokumen sokongan seperti bahan yang menunjukkan kes itu tidak termasuk di bawah pengecualian kepada fitnah. Anda boleh memuat naik hingga tiga fail dalam format JPEG, JPG atau PNG, setiap satu di bawah 20 MB. \u003CredLink\u003EKetahui lebih lanjut\u003C\u002FredLink\u003E","idpa_disclaimer":"Sila ambil maklum bahawa tindakan membuat laporan palsu atau mengelirukan secara sengaja mungkin boleh dihukum di bawah undang-undang. Jika anda sering menyerahkan laporan yang nyata tidak berasas, kami berhak untuk menggantung keupayaan anda untuk menyerahkan laporan atau melarang akaun anda secara kekal.\u003CredLink\u003EKetahui lebih lanjut\u003C\u002FredLink\u003E","ad_report_detail_placeholder_75_uk":"Sila berikan butiran tentang pengalaman anda dengan iklan ini untuk membantu kami mengambil tindakan yang diperlukan. Kandungan yang berbahaya kepada kanak-kanak di bawah OSA UK termasuk pornografi dan aktiviti seksual, bunuh diri dan mencederakan diri sendiri, makan tidak teratur, penderaan dan kebencian, keganasan, buli, aksi dan cabaran berbahaya, bahan berbahaya, imej badan yang tidak sihat dan kandungan kemurungan. Sila kenal pasti kategori jika anda boleh.","ad_report_detail_placeholder_75_eea_row":"Sila berikan butiran tentang pengalaman anda dengan iklan ini untuk membantu kami mengambil tindakan yang diperlukan.","ad_report_reason_L1Misinfo_L2aigc_v2_0":"Iklan ini mungkin mengandungi kandungan yang dijana atau diedit AI yang disalahgunakan, tidak dibenarkan atau disalah label. Ini mungkin termasuk:","ad_report_reason_L1Misinfo_L2aigc_v2_1":"Kandungan yang dijana AI yang tidak dilabel atau didedahkan. Iklan ini menggunakan AI untuk mencipta kandungan, tetapi tidak menyatakan sedemikian.","ad_report_reason_L1Misinfo_L2aigc_v2_2":"Menggunakan rupa, suara atau identiti orang sebenar tanpa kebenaran mereka. Iklan ini menunjukkan atau kedengaran seperti orang sebenar, tetapi orang itu tidak bersetuju dengan iklan (contohnya, iklan menunjukkan mereka seakan-akan menyokong suatu idea politik atau produk yang sebenarnya tidak disokong oleh mereka).","Web_report_description":"Perihal laporan (Pilihan):","report_details_toast":"Berikan butiran tentang pengalaman anda dengan iklan ini untuk membantu kami mengambil tindakan sewajarnya.","report_img_toast":"Muat naik imej butiran pesanan dan item yang diterima.","dsa_illegal_select_country_optional":"Bidang kuasa undang-undang","get_tt_desktop":"Dapatkan TikTok untuk desktop","get_tt_app":"Dapatkan apl TikTok","Web_leftNav_getCoins_toolTip":"Jimat 25% sekarang","desktopWeb_dynamicBottom_installTikTok":"Pasang TikTok","desktopWeb_dynamicBottom_installTikTok_desc":"Pasang apl desktop TikTok untuk prestasi yang lebih baik","desktopWeb_dynamicBottom_installTikTok_Cta":"Pasang","desktopWeb_dynamicBottom_right_logIn":"Log masuk","webapp_topnav_getapp":"Dapatkan Apl","webapp_topnav_pcapp":"Apl PC","webapp_tootip_Viewprofile":"Lihat profil","View profile":"Lihat profil","projectU_link_logout_button":"Log kelu tlive_previewSubtitle_tag_highlight":"Serlahan","weblive_following_btn":"Mengikuti","pm_mt_liveWeb_friend_tag":"Rakan","ttlive_AIsummary_tag":"Ringkasan","subLiveShare_webLivePage_chatTextfield_subOnlyNote":"Pelanggan sahaja","pc_web_less_btn":"kurang","collectionsProfilePage_favoritesPage_newModal_errorMessage":"Melebihi had aksara","pcWeb_add_reply":"Tambah jawapan...","comment_tray_default":"Tambah komen...","vid_mod_analytics_penalty_reason_minor_title":"Keselamatan individu bawah umur","vid_mod_analytics_penalty_reason_minor_desc":"Untuk menyediakan wadah tambahan kepada remaja untuk menerokai identiti dan meluahkan perasaan dalam ruang digital, kandungan yang dimuat naik oleh pengguna bawah umur 16 tahun tidak layak untuk pengesyoran. Promosi pembedahan kosmetik kepada orang bawah umur mungkin akan mengakibatkan kadar ketidakpuasan terhadap badan yang lebih tinggi. Oleh itu, kandungan sedemikian - termasuk video sebelum dan selepas, video prosedur pembedahan dan mesej yang membincangkan pembedahan komestik elektif tanpa risiko amaran - tidak layak untuk suapan Untuk Anda bagi semua pengguna bawah umur 18 tahun.","vid_mod_analytics_penalty_reason_unoriginal_title":"Kandungan tidak asli, berkualiti rendah dan kod QR","vid_mod_analytics_penalty_reason_unoriginal_desc":"Bagi mengekalkan persekitaran yang positif dan menyeronokkan di TikTok untuk pengguna kami, kandungan tidak asli atau yang berkualiti rendah tidak layak untuk pengesyoran. Kandungan tidak asli termasuk video yang cuma diimport atau dimuat naik daripada sumber lain (seperti platform, rancangan TV, filem atau siaran web) tanpa sebarang edit baharu atau kreatif. Kami tahu sesuatu video itu tidak asli jika mengandungi tera air atau logo yang ditindih pada video tersebut. Kandungan berkualiti rendah termasuk video yang terlalu pendek, imej statik dan video yang dibuat dengan GIF sahaja. Kandungan yang mengandungi kod QR biasanya tidak layak untuk suapan Untuk Anda kerana kod ini boleh membawa pengguna ke laman web atau apl yang berbahaya, walaupun kami memberikan pengecualian dalam keadaan tertentu yang berisiko rendah (sebagai contoh, untuk e-dagang).","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"Kandungan tidak asli, berkualiti rendah dan kod QR","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"Untuk mengekalkan pengalaman positif yang diharapkan oleh pengguna kami daripada platform TikTok, kandungan tidak asli dan berkualiti rendah tidak layak untuk pengesyoran. Kandungan tidak asli ialah kandungan yang cuma diimport atau disalin daripada sumber lain tanpa edit baharu atau kreatif. Video itu tidak asli jika mengandungi tera air atau logo pada video. Kandungan yang berkualiti rendah termasuk video yang terlalu pendek, imej statik dan video yang dibuat dengan GIF sahaja.","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"Akaun dihasil semula","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"Akaun anda mengandungi siaran yang tidak asli dan tidak layak untuk suapan Untuk Anda. Untuk mendapatkan maklumat lanjut, sila semak Garis Panduan Komuniti \u003E Tidak sesuai untuk suapan Untuk Anda \u003E Kandungan tidak asli, berkualiti rendah dan kod QR","vid_mod_analytics_penalty_reason_spam_title":"Kandungan spam, tidak asli atau mengelirukan","vid_mod_analytics_penalty_reason_spam_desc":"Kandungan yang cuba menipu atau memanipulasi pengguna untuk mendapatkan lebih ramai pengikut, suka, tontonan atau metrik interaksi pada platform tidak layak untuk suapan Untuk Anda. Kandungan ini termasuk kandungan yang menggalakkan pengguna mengikuti atau menyukai satu sama lain, atau kandungan yang menipu pengguna agar mengklik butang suka atau kongsi. Selain itu, kandungan yang mempromosikan teori konspirasi dan menyebarkan maklumat palsu atau berbahaya tentang peristiwa semasa atau peristiwa yang butiran peristiwa tersebut masih dalam perkembangan tidak layak untuk suapan Untuk Anda.","vid_mod_analytics_penalty_reason_sexual_title":"Kandungan terlalu seksual","vid_mod_analytics_penalty_reason_sexual_desc":"Untuk mengekalkan pengalaman yang selesa, kandungan seksual yang keterlaluan mungkin tidak sesuai untuk pengesyoran. Ini termasuk kandungan yang menggambarkan kebogelan secara tersirat, memaparkan bahagian badan dengan cara seksual, atau erotik atau seksual secara terang-terangan (contohnya, tarian bogel).","vid_mod_analytics_penalty_reason_tobacco_title":"Produk tembakau dan alkohol","vid_mod_analytics_penalty_reason_tobacco_desc":"Kandungan yang mempromosikan, menyebut atau memaparkan produk alkohol yang diminum oleh orang yang dalam lingkungan umur sah pengambilan minuman beralkohol di bawah undang-undang, tetapi dilakukan dengan keadaan yang berbahaya mungkin tidak layak untuk pengesyoran. Kandungan yang menggambarkan penggunaan produk tembakau oleh orang dewasa atau yang menyebut bahan yang terkawal tidak layak untuk pengesyoran.","vid_mod_analytics_penalty_reason_stunts_title":"Lagak ngeri dan sukan yang berbahaya","vid_mod_analytics_penalty_reason_stunts_desc":"Apabila ditiru tanpa pengawasan keselamatan, aktiviti tertentu mungkin mendatangkan risiko atau bahaya, yang boleh menyebabkan kecederaan fizikal. Kandungan yang mengandungi lagak ngeri berbahaya, atau sukan ekstrem yang dilakukan oleh orang bukan profesional, mungkin tidak layak.","vid_mod_analytics_penalty_reason_graphic_title":"Kandungan memaparkan keganasan dan gambaran jelas","vid_mod_analytics_penalty_reason_graphic_desc":"Kandungan yang menyebabkan penonton berasa tidak selesa, terkejut atau jelik mungkin tidak layak untuk Suapan Untuk Anda, termasuk kesan yang menakutkan, babak yang memeranjatkan, solekan yang memaparkan luka berlumuran darah yang seakan-akan benar, dan gambaran kefungsian badan. Kebanyakan kandungan ganas dan grafik tidak dibenarkan di TikTok. Namun begitu, kami mungkin membenarkan jenis kandungan tertentu, seperti gambaran kematian, kemalangan atau perkelahian yang grafik semasa memaparkan peristiwa seben
