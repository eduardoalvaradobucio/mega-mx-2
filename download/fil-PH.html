l sa resulta o magkakaroon ng opsyong mag-apela.","dsa_illegal_report_trustedflagger_fill_email":"Ilagay ang tamang email address","dsa_illegal_detail_country":"Legal na hurisdiksyon","dsa_illegal_detail_law":"Nauugnay na batas","dsa_illegal_cite_law_desc":"Magbigay ng mga detalye ng batas na nilalabag diumano ng content. Maging partikular hangga't posible para mapag-aralan naming mabuti ang report mo.","dsa_illegal_detail_explanation":"Pagpapaliwanag ng Report","dsa_illegal_report_explanation_desc":"Pakilarawan kung paano lumalabag ang content sa nauugnay na batas. Posibleng hindi ituring na valid ang mga report kung walang sapat na impormasyon. Kung nauugnay, pakitukoy kung isinusumite mo ang report na ito para sa sarili o para sa iba.","dsa_illegal_appeal_signature":"Lagda","dsa_illegal_sign_legal_name":"Ilagay ang legal na pangalan mo rito.","dsa_illegal_confirm_accuracy":"Kinukumpirma ko ang paniniwala ko na totoo, tumpak at kumpleto ang content ng report na ito.","idpa_attachment":"Mga Attachment","idpa_attachment_instruction":"Dapat isumite ang report ng may-ari ng karapatan kung saan nalabag ang kanyang mga karapatan, o ng awtorisadong kinatawan. Suriing mabuti ang \u003CredLink\u003Emga patnubay sa pagsusumite\u003C\u002FredLink\u003E at isumite ang lahat ng kinakailangang dokumentasyon. Dapat na JPEG, JPG, o PNG ang mga format ng file at dapat na mababa ito sa 20 MB.","idpa_attachment_sec1":"Seksyon 1:","idpa_identification_document_title":"Mga dokumento tungkol sa claimant","idpa_identification_document_instruction_IP":"Magsumite ng mga opisyal na dokumento ng pagkakakilanlan. Kabilang sa mga halimbawa ang: lisensya sa pagmamaneho (harap at likod), pasaporte (pahina ng larawan at pahina na naglalaman ng pangalan ng may-ari at impormasyon sa pakikipag-ugnayan para sa emerhensiya), My Number Card (harap lamang), atbp. Bukod pa rito, kung kinakailangan, dapat kang magsumite ng mga dokumentong nagpapatunay ng awtoridad ng agency, mga dokumentong nagpapatunay ng pahintulot mula sa legal na kinatawan tulad ng guardian, at mga dokumentong nagpapahiwatig na ang pagsusumite ay patungkol sa indibidwal mismo. Bukod pa rito, kung ikaw ay taong may hurisdiksyon, dapat kang magsumite ng mga dokumento tulad ng Sertipiko ng Pagpaparehistro ng Korporasyon, at Kapangyarihan ng Abugado mula sa kinatawan. \u003CredLink\u003EMatuto pa\u003C\u002FredLink\u003E","idpa_identification_document_instruction_nonIP":"Magsumite ng mga opisyal na dokumento ng pagkakakilanlan. Kabilang sa mga halimbawa ang: lisensya sa pagmamaneho (harap at likod), pasaporte (pahina ng larawan at pahina na naglalaman ng pangalan ng may-ari at impormasyon sa pakikipag-ugnayan para sa emerhensiya), My Number Card (harap lamang), atbp. Bukod pa rito, kung kinakailangan, dapat kang magsumite ng mga dokumentong nagpapatunay ng awtoridad ng agency, mga dokumentong nagpapatunay ng pahintulot mula sa legal na kinatawan tulad ng guardian, at mga dokumentong nagpapahiwatig na ang pagsusumite ay patungkol sa indibidwal mismo. \u003CredLink\u003EMatuto pa\u003C\u002FredLink\u003E","attachment_upload_limit":"Ang bawat isang file ay dapat na mas mababa sa 20MB","idpa_attachment_sec2":"Seksyon 2:","idpa_right_holder_status_title":"Dokumentasyon na nagpapatunay ng status ng may-ari ng mga karapatan","idpa_ric_proof_title":"Dokumentasyon tungkol sa paglabag sa mga karapatan","idpa_right_holder_status_instruction_1":"(Paglabag sa mga karapatan sa intelektwal na ari-arian)","idpa_right_holder_status_instruction_2":"Magsumite ng mga dokumentong tumutukoy sa mga karapatan sa intelektwal na ari-arian na sa tingin mo ay nilabag, at mga dokumentong nagpapakita na ikaw ang may-ari ng umano'y intelektwal na ari-arian. \u003CredLink\u003EMatuto pa\u003C\u002FredLink\u003E","idpa_right_holder_status_instruction_3":"(Paglabag sa interes ng negosyo)","idpa_right_holder_status_instruction_4":"Nag-iiba ang mga kinakailangang dokumentasyon depende sa mga interes ng negosyo na sinasabing nilabag (hal., mga materyal na nagpapakita ng reputasyon o kasikatan ng mga label ng produkto, mga materyal na nagpapakita na ang post ay nanlilinlang sa mga mamimili tungkol sa kalidad). Suriin ang \u003CredLink\u003Emga detalye\u003C\u002FredLink\u003E at isumite ang naaangkop na dokumentasyon. Pwede kang mag-upload ng hanggang tatlong file sa JPEG, JPG, o PNG na format, mas mababa sa 20 MB ang bawat isa.","idpa_ric_proof_instruction":"Magsumite ng screenshot o katulad na ebidensya na nagpapakita ng bahagi ng nai-post na content na sa tingin mo ay lumalabag sa iyong mga karapatan. Pwede kang mag-upload ng hanggang tatlong file sa JPEG, JPG, o PNG na format, mas mababa sa 20 MB ang bawat isa. \u003CredLink\u003EMatuto pa\u003C\u002FredLink\u003E","idpa_attachment_sec3":"Seksyon 3:","idpa_other_document_title":"Iba pang sumusuportang dokumento","idpa_other_document_instruction":"Magsumite ng anumang sumusuportang dokumento tulad ng mga materyal na nagpapakita na hindi nabibilang ang kaso sa mga eksepsiyon sa paninirang-puri. Pwede kang mag-upload ng hanggang tatlong file na nasa JPEG, JPG, o PNG na format, na mas mababa sa 20 MB ang bawat isa. \u003CredLink\u003EMatuto pa\u003C\u002FredLink\u003E","idpa_disclaimer":"Pakitandaan na ang sadyang paggawa ng mali o mapanlinlang na report ay pwedeng maparusahan sa ilalim ng batas. Kung madalas kang magsumite ng mga report na malinaw na walang batayan, may karapatan kaming suspindihin ang kakayahan mong magsumite ng mga report o permanenteng i-ban ang account mo. \u003CredLink\u003EMatuto pa\u003C\u002FredLink\u003E","ad_report_detail_placeholder_75_uk":"Pakibigay ng mga detalye tungkol sa karanasan mo sa ad na ito para matulungan kaming magsagawa ng mga kinakailangang aksyon. Kinabibilangan ng pornograpiya at mga sekswal na aktibidad, pagpapakamatay at pananakit sa sarili, hindi maayos na pagkain, pang-aabuso at poot, karahasan, pambu-bully, mapanganib na mga stunt at challenge, mga nakakapinsalang sangkap, hindi malusog na larawan ng katawan at nakaka-depress na content ang content na nakakapinsala sa mga bata sa ilalim ng UK OSA. Pakitukoy ang kategorya kung kaya mo.","ad_report_detail_placeholder_75_eea_row":"Pakibigay ng mga detalye tungkol sa karanasan mo sa ad na ito para matulungan kaming magsagawa ng mga kinakailangang aksyon.","ad_report_reason_L1Misinfo_L2aigc_v2_0":"Posibleng naglalaman ang ad na ito ng na-generate ng AI o na-edit na content na nagamit sa maling paraan, hindi awtorisado, o may maling label. Pwedeng kabilang dito ang:","ad_report_reason_L1Misinfo_L2aigc_v2_1":"Content na binuo ng AI na hindi nilagyan ng label o hindi ibinunyag. Gumagamit ang ad ng AI para gumawa ng content, pero hindi ito sinabi.","ad_report_reason_L1Misinfo_L2aigc_v2_2":"Paggamit ng pagkakahawig, boses, o pagkakakilanlan ng tunay na tao nang walang pahintulot nila. Nagpapakita o parang totoong tao ang ad, pero ang taong iyon ay hindi sumang-ayon dito (halimbawa, ginagawa itong parang sinusuportahan nila ang pampulitikang ideya o produkto kahit hindi naman).","Web_report_description":"I-report ang deskripsyon (Opsyonal):","report_details_toast":"Magbigay ng mga detalye tungkol sa iyong karanasan sa ad na ito para matulungan kaming gumawa ng kinakailangang pagkilos.","report_img_toast":"Mag-upload ng mga larawan ng mga detalye ng order at mga item na natanggap.","dsa_illegal_select_country_optional":"Legal na hurisdiksyon","get_tt_desktop":"Kunin ang TikTok para sa desktop","get_tt_app":"Kunin ang TikTok App","Web_leftNav_getCoins_toolTip":"Makatipid ng 25% ngayon","desktopWeb_dynamicBottom_installTikTok":"I-install ang TikTok","desktopWeb_dynamicBottom_installTikTok_desc":"I-install ang TikTok desktop app para sa mas mahusay na performance","desktopWeb_dynamicBottom_installTikTok_Cta":"I-install","desktopWeb_dynamicBottom_right_logIn":"Mag-log in","webapp_topnav_getapp":"Kunin ang App","webapp_topnav_pcapp":"PC App","webapp_tootip_Viewprofile":"Tingnan ang profile","View profile":"Tingnan ang profi "ttlive_pushNotification_liveAlert_body":"Naka-LIVE si {s_name}! Panoorin ngayon.","cs_webapp_notif_title_tiktokSupport":"TikTok Support","cs_webapp_notif_newReply":"Bagong reply sa ticket mo","cs_webapp_notif_view":"Tingnan","cs_webapp_notif_ticketClosed":"Sarado na ang ticket. I-rate ang karanasan mo.","web_inappNotifs_Notification_header":"Notification","Web_report_hide_video":"Para pagandahin ang iyong karanasan, itinago ang video na ito. Babawasan namin ang pagpapakita sa iyo ng mga video na tulad nito.","Web_report_show_video":"Ipakita ang Video","sticker_create_main_setinfo_last":"Huling na-update","pgc_aiComments_commentCategories_all":"Lahat","pgc_aiComments_analyticsPage_commentsCount":"{num, plural, one {{num} komento} other {{num} (na) komento}}","pgc_aiComments_analyticsPage_infoPopup_topicsTitle":"Mga Paksa","pgc_aiComments_commentCategories_insufficientComments":"Magiging available ang mga paksang binuod ng AI kapag mas marami nang komento.","pgc_aiComments_commentCategories_emptyState":"Walang komentong tumutugma sa kategoryang ito.","pm_web_fullpage_entry":"I-click para panoorin ang LIVE","webLIVE_personalPage_LIVEbanner_numViewerDesc":"Manood ngayon kasama ng {num} (na) viewer","Webapp_tooltips_play":"i-play","pm_web_fullpage_error_button":"Subukan ulit","ttlive_previewSubtitle_tag_highlight":"Highlight","weblive_following_btn":"Pina-follow","pm_mt_liveWeb_friend_tag":"Kaibigan","ttlive_AIsummary_tag":"Buod","subLiveShare_webLivePage_chatTextfield_subOnlyNote":"Subscriber lang","pc_web_less_btn":"mas kaunti","collectionsProfilePage_favoritesPage_newModal_errorMessage":"Lumampas sa limitasyon ng character","pcWeb_add_reply":"Mag-reply...","comment_tray_default":"Magdagdag ng komento...","vid_mod_analytics_penalty_reason_minor_title":"Safety ng menor de edad","vid_mod_analytics_penalty_reason_minor_desc":"Para mabigyan ang mga kabataan ng karagdagang puwang para sa pagtuklas ng pagkakakilanlan at pagpapahayag sa mga digital space, hindi kwalipikado para sa rekomendasyon ang content na na-upload ng mga user na wala pang 16 taong gulang. Maaaring humantong sa mas mataas na antas ng kawalang-kasiyahan ng katawan ang pagpapalaganap ng cosmetic surgery sa mga menor de edad. Alinsunod dito, tulad ng content na - kabilang ang mga bago at pagkatapos na mga video, mga video ng mga surgical procedure, at mga mensaheng tumatalakay sa elektibong cosmetic surgery nang walang babala ng mga panganib - ay hindi kwalipikado para sa feed na Para Sayo ng lahat ng user na mababa sa 18 taong gulang.","vid_mod_analytics_penalty_reason_unoriginal_title":"Hindi orihinal, mababa ang kalidad, at QR code na content","vid_mod_analytics_penalty_reason_unoriginal_desc":"Para mapanatiling positibo at kasiya-siya ang TikTok para sa aming mga user, ang content na hindi orihinal o mababa ang kalidad ay hindi kwalipikado para sa rekomendasyon. Kasama sa hindi orihinal na content ang mga video na kaka-import o ina-upload lang mula sa ibang source (tulad ng ibang platform, palabas sa TV, pelikula, o webcast) nang walang anumang bagong malikhaing pag-edit. Malalaman natin kung hindi orihinal ang isang video kung mayroon itong watermark o naka-superimpose na logo rito. Kabilang sa mababang kalidad na content ang mga maikling video, static na larawan, at video na gawa lang sa mga GIF. Karaniwang hindi kwalipikado ang content na may kasamang mga QR code para sa feed na Para Sayo dahil pwede itong maghatid sa mga user sa mga mapaminsalang website o app, kahit na gumagawa kami ng eksepsiyon sa mga pagkakataon kung saan mababa ang panganib (halimbawa, para sa e-commerce).","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"Hindi orihinal, mababa ang kalidad, at QR code na content","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"Para mapanatili ang positibong karanasang inaasahan ng aming mga user mula sa platform ng TikTok, hindi kwalipikado para sa rekomendasyon ang hindi orihinal at mababang kalidad na content. Ang hindi orihinal na content ay content na na-import o kinopya lang mula sa ibang source nang walang anumang bagong malikhaing pag-edit. Pwede hindi orihinal ang isang video kung may watermark o logo ito. Kasama sa mababang kalidad na content ang mga maikling video, static na larawan, at video na gawa lang sa mga GIF.","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"Ni-reproduce na account","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"Naglalaman ang account mo ng mga post na hindi orihinal at hindi kwalipikado para sa feed na Para Sayo. Para sa higit pang impormasyon, i-review ang aming Mga Patnubay sa Komunidad \u003E Hindi Angkop para sa feed na Para Sayo \u003E Hindi orihinal, mababang kalidad, at QR code na content","vid_mod_analytics_penalty_reason_spam_title":"Spam, hindi totoo, o mapanlinlang na content","vid_mod_analytics_penalty_reason_spam_desc":"Hindi kwalipikado para sa feed na Para Sayo ang content na sumusubok na linlangin o manipulahin ang mga user para makakuha ng mas maraming follower, like, view o iba pang sukatan ng engagement sa platform. Kabilang dito ang content na nanghihikayat sa mga user na i-follow o i-like ang isa't isa, o content na nanlilinlang sa mga user na i-click ang mga button na like o ibahagi. Dagdag pa rito, hindi rin kwalipikado para sa feed na Para Sayo ang content na nagpapalaganap ng mga conspiracy theory at nagpapakalat ng mali o nakakapinsalang impormasyon tungkol sa mga kasalukuyang event na kung saan patuloy pang dini-develop ang mga detalye.","vid_mod_analytics_penalty_reason_sexual_title":"Masyadong sekswal na content","vid_mod_analytics_penalty_reason_sexual_desc":"Para makatulong na mapanatili ang komportableng karanasan, maaaring maging hindi kwalipikado para sa rekomendasyon ang content na nagpapahiwatig ng tahasang sekswal. Kabilang dito ang content na naglalarawan ng ipinahiwatig na kahubaran, nagpapaseksi sa mga bahagi ng katawan, o tahasang erotiko o senswal (i.e mga panunuksong hubo't hubad).","vid_mod_analytics_penalty_reason_tobacco_title":"Mga produktong tabako at alak","vid_mod_analytics_penalty_reason_tobacco_desc":"Maaaring hindi kwalipikado para sa rekomendasyon ang content na nagpo-promote, nagbabanggit, o nagpapakita ng mga produktong alak na iniinom ng mga taong nasa legal na edad ng pag-inom pero ginagawa sa mapanganib na paraan. Hindi rin kwalipikado para sa rekomendasyon ang content na naglalarawan ng paggamit ng mga produktong tabako ng mga nasa hustong gulang o pagbanggit ng mga kontroladong substance.","vid_mod_analytics_penalty_reason_stunts_title":"Mga mapanganib na stunt at sports","vid_mod_analytics_penalty_reason_stunts_desc":"Kapag ginaya nang walang pag-iingat sa kaligtasan, pwedeng mapanganib o delikado ang ilang partikular na aktibidad, na pwedeng humantong sa pisikal na pinsala. Maaaring hindi kwalipikado ang content na kinabibilangan ng mga delikadong stunt, o mga extreme sport na ginawa ng mga hindi propesyonal.","vid_mod_analytics_penalty_reason_graphic_title":"Marahas at graphic na content","vid_mod_analytics_penalty_reason_graphic_desc":"Maaaring hindi kwalipikado para sa feed na Para Sayo ang content na nagdudulot sa viewer ng pagkabalisa, pagkagulat, o pagkasuklam, kabilang ang mga nakakatakot na effect, jump scare, makeup na makatotohanang ginagaya ang dumudugong mga sugat, at mga paglalarawan ng mga function ng katawan. Hindi pinapayagan sa TikTok ang karamihan sa marahas at graphic na content. Gayunpaman, maaari naming payagan ang ilang uri ng content, gaya ng mga graphic na larawan ng kamatayan, aksidente o away, kapag nagsisilbi itong dokumentasyon ng mga totoong event sa mundo at itinuturing na para sa pampublikong interes. Dahil maaaring hindi komportable ang lahat ng audience sa content na ito, hindi ito magiging kwalipikado para sa rekomendasyon, at magkakaroon ang content ng “mag-opt in” na screen o babala.","vid_mod_analytics_penalty_reason_fyf_title":"Hindi kwalipikado para sa feed na Para Sayo","vid_mod_analytics_penalty_reason_fyf_desc":"Hindi natugunan ng video mo ang aming mga pamantayan sa pagiging kwalipikado para sa feed na Para Sayo. I-review ang Mga Patnubay sa Komunidad ng TikTok para sa higit pang impormasyon \u003E Hindi kwalipikado para sa feed na Para Sayo","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"Pwedeng i-report sa amin ng mga user at 3rd-party ang mga paglabag sa patakaran. Natukoy namin ang paglabag sa patakarang ito batay sa report na nilabag ng content ang aming Mga Patnubay sa Komunidad.","vidModAnalytics_detailPg_sectionVideoDetails_sectionLabel":"Mga detalye ng video","vid_mod_analytics_appeal_detailpg_reason_title":"Dahilan ng paglabag","vid_mod_analytics_detail_pg_title":"Hindi kwalipikado ang video","vid_mod_analytics_detail_pg_desc":"Hindi kwalipikado ang video na ito para sa feed na Para Sayo dahil lumalabag ito sa aming Mga Patnubay sa Komunidad.","vidModAnalytics_detailPg_sectionSuccess_header":"Naaprubahan na ang apela","vid_mod_analytics_appeal_success_detail_pg_desc":"Ni-review namin ang apela mo at ibinalik ang video mo. Humihingi kami ng paumanhin para sa anumang abalang naidulot nito. Salamat sa pagiging bahagi ng komunidad ng TikTok!","vid_mod_analytics_appeal_detail_pg_title":"Inalis ang video","vid_mod_analytics_appeal_detail_pg_desc":"Lumalabag ang video na ito sa aming Mga Patnubay sa Komunidad.","vidModAnalytics_appealSubmitted_sectionTitle_header":"Natanggap na ang request","vid_mod_analytics_appeal_rcv_detail_pg_desc":"Natanggap namin ang request mo at ino-notify ka namin kapag available na ang resulta ng apela mo.","rIC_detailPg_violationReason_title":"Dahilan ng paglabag","dsaCGWebapp_detailPg_sectionCG_link":"Mga Patnubay sa Komunidad","dsaCGWebapp_appealExpired_emptyState_body":"Hindi mo na maiaapela ang desisyong ito dahil nag-expire na ang deadline ng apela.","appeal_btn_new":"Apela","reasonForAppeal_appealPg_appealReasonCard_title":"Dahilan ng pag-apela sa desisyon","oSA_appealPg_appealExplain_title":"Pagpapaliwanag
