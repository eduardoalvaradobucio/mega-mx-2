s_webapp_notif_ticketClosed":"服務單已結案。為您的體驗評分。","web_inappNotifs_Notification_header":"通知","Web_report_hide_video":"為了改善您的使用體驗，我們已隱藏這支影片。我們將為您減少顯示這類影片。","Web_report_show_video":"顯示影片","sticker_create_main_setinfo_last":"最近更新時間","pgc_aiComments_commentCategories_all":"全部","pgc_aiComments_analyticsPage_commentsCount":"{num, plural, other {{num} 則評論}}","pgc_aiComments_analyticsPage_infoPopup_topicsTitle":"主題","pgc_aiComments_commentCategories_insufficientComments":"有更多評論時，將會顯示 AI 總結的主題。","pgc_aiComments_commentCategories_emptyState":"沒有和此類別相符的評論。","pm_web_fullpage_entry":"點擊以觀看直播","webLIVE_personalPage_LIVEbanner_numViewerDesc":"{num} 人看過，立即觀看","Webapp_tooltips_play":"播放","pm_web_fullpage_error_button":"重試","ttlive_previewSubtitle_tag_highlight":"精華片段","weblive_following_btn":"關注中","pm_mt_liveWeb_friend_tag":"好友","ttlive_AIsummary_tag":"摘要","subLiveShare_webLivePage_chatTextfield_subOnlyNote":"僅限訂閱者","pc_web_less_btn":"隱藏","collectionsProfilePage_favoritesPage_newModal_errorMessage":"已超過字元數上限","pcWeb_add_reply":"新增回覆...","comment_tray_default":"新增評論...","vid_mod_analytics_penalty_reason_minor_title":"未成年安全","vid_mod_analytics_penalty_reason_minor_desc":"為了提供青少年數位環境中更多探索和表達身分的空間， 16 歲以下使用者上傳的內容不符合推薦資格。向未成年人宣傳整容外科手術可能會導致更多的未成年人對身體感到不滿。因此，此類內容 (包括整形前後的對比影片、手術過程影片，以及選擇性討論整容外科手術不給予風險警告的訊息) 不符合所有 18 歲以下使用者的「為您推薦」動態頁資格。","vid_mod_analytics_penalty_reason_unoriginal_title":"非原創、品質欠佳以及含有 QR 碼的內容","vid_mod_analytics_penalty_reason_unoriginal_desc":"為維護積極向上、舒適愉悅的 TikTok 使用環境，非原創或低品質的內容將不符合推薦資格。非原創內容包括直接從其他來源（例如其他平台、電視節目、電影或網路廣播）匯入或上傳，而不經任何全新創意編輯的影片。如果影片帶有浮水印或疊加的標誌，我們就可判斷出該影片是否為非原創影片。低品質內容包括非常短的影片、靜態圖片，以及僅由 GIF 製成的影片。含有 QR code 的內容因為可能將使用者引至有害網站或應用程式，因此通常也不符合「為您推薦」動態頁資格，但我們會在風險較低的情況下（例如，電子商務用）進行例外處理。","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"非原創、品質欠佳以及含有 QR 碼的內容","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"為了給使用者創造積極向上的 TikTok 平台使用體驗，非原創和低品質的內容不符合推薦資格。非原創內容是指直接從其他來源匯入或複製，而不經任何全新創意編輯的內容。影片若帶有浮水印或標誌，則可能為非原創影片。低品質內容包括非常短的影片、靜態圖片，以及僅由 GIF 製成的影片。","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"複製的帳號","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"您的帳號包含的貼文並非原創，因此不符合「為您推薦」動態的資格標準。欲了解更多詳情，請參閱《社群自律公約》\u003E「限制為您推薦頁面發布資格」\u003E「非原創、低品質且含有 QR code 的內容」","vid_mod_analytics_penalty_reason_spam_title":"垃圾訊息、不實或誤導性內容","vid_mod_analytics_penalty_reason_spam_desc":"試圖欺騙或操控使用者以在平台上獲得更多粉絲、按讚數、觀看數或其他參與度指標的內容不符合「為您推薦」動態頁資格。這包括鼓勵使用者互相關注或按讚的內容，或者誘騙使用者按一下讚或分享按鈕的內容。此外，宣傳陰謀論或針對時事和詳情仍在調查中的事件散播不實或有害資訊的內容也不符合「為您推薦」動態頁資格。","vid_mod_analytics_penalty_reason_sexual_title":"帶有明顯性暗示的內容","vid_mod_analytics_penalty_reason_sexual_desc":"為維護舒適的觀看體驗，具明顯性暗示的內容可能不符合推薦資格。其中包括含裸體暗示、色情化身體部位，或露骨的煽情或性挑逗 (如脫衣舞) 內容。","vid_mod_analytics_penalty_reason_tobacco_title":"菸酒產品","vid_mod_analytics_penalty_reason_tobacco_desc":"即使飲酒者已達法定年齡，宣揚、提及或描述危險性飲酒的內容也可能不符合推薦資格。描述成人使用菸草產品或提及管制物品的內容不符合推薦資格。","vid_mod_analytics_penalty_reason_stunts_title":"危險特技與運動","vid_mod_analytics_penalty_reason_stunts_desc":"在沒有安全預防措施之下模仿某些活動可能會帶來風險或危險，進而導致人身傷害。包含危險特技或由非專業人士進行的極限運動的內容可能不符合資格。","vid_mod_analytics_penalty_reason_graphic_title":"暴力與露骨內容","vid_mod_analytics_penalty_reason_graphic_desc":"讓觀眾感到不適、震驚或厭惡的內容可能不符合 [為您推薦] 動態資格，包括驚悚特效、突發驚嚇、逼真的血腥妝容，以及身體功能描述。TikTok 禁止大多數的暴力與血腥內容。然而，當內容是用來記錄真實事件並認為符合公共利益時，我們可能會允許特定類型的內容，例如死亡、事故或打鬥的圖像。由於此內容可能會讓部分觀眾感到不適，因此不符合推薦資格，而且此內容會附有「選擇觀看」畫面或警告。","vid_mod_analytics_penalty_reason_fyf_title":"不符合「為您推薦」動態頁資格","vid_mod_analytics_penalty_reason_fyf_desc":"您的影片不符合「為您推薦」動態的資格標準。欲了解更多詳情，請參閱《TikTok 社群自律公約》\u003E 不符合「為您推薦」動態頁資格","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"使用者和第三方可以向我們舉報違反政策的行為。我們根據內容違反我們《社群自律公約》的舉報，偵測到這一違反政策的行為。","vidModAnalytics_detailPg_sectionVideoDetails_sectionLabel":"影片詳細資料","vid_mod_analytics_appeal_detailpg_reason_title":"違規原因","vid_mod_analytics_detail_pg_title":"影片資格不符","vid_mod_analytics_detail_pg_desc":"由於違反《社群自律公約》，此影片不符合「為您推薦」動態頁資格。","vidModAnalytics_detailPg_sectionSuccess_header":"申訴已獲核准","vid_mod_analytics_appeal_success_detail_pg_desc":"我們已審查您的申訴並復原您的影片。造成您的不便，我們深感抱歉。感謝您成為 TikTok 社群的一員！
