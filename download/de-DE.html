"Bitte beschreibe, inwiefern der Inhalt gegen das entsprechende Gesetz verstößt. Meldungen, die keine ausreichenden Informationen enthalten, können als ungültig angesehen werden. Bitte gib gegebenenfalls an, ob du diese Meldung für dich selbst oder im Namen einer anderen Person einreichst.","dsa_illegal_appeal_signature":"Unterschrift","dsa_illegal_sign_legal_name":"Unterschreibe hier mit deinem bürgerlichen Namen.","dsa_illegal_confirm_accuracy":"Ich bestätige meine Überzeugung, dass der Inhalt dieser Meldung wahr, korrekt und vollständig ist.","idpa_attachment":"Anhänge","idpa_attachment_instruction":"Der Bericht muss von dem*der Rechteinhaber*in, dessen*deren Rechte verletzt wurden, oder von einem*einer bevollmächtigten Vertreter*in eingereicht werden. Bitte lies dir die \u003CredLink\u003EEinreichungsrichtlinien\u003C\u002FredLink\u003E sorgfältig durch und reiche alle erforderlichen Unterlagen ein. Die Dateiformate müssen JPEG, JPG oder PNG sein und müssen kleiner als 20 MB sein.","idpa_attachment_sec1":"Abschnitt 1:","idpa_identification_document_title":"Dokumente über den*die Anspruchsberechtigte*n","idpa_identification_document_instruction_IP":"Bitte reiche offizielle Ausweisdokumente ein. Beispiele hierfür sind: Führerschein (Vorder- und Rückseite), Reisepass (Fotoseite und Seite mit dem Namen des*der Inhaber*in und Notfallkontaktdaten), My Number Card (nur Vorderseite) usw. Zusätzlich musst du bei Bedarf Dokumente einreichen, die die Befugnis des*der Vertreter*in belegen, Dokumente, die die Zustimmung eines*einer gesetzlichen Vertreter*in wie eines Vormunds belegen, und Dokumente, die darauf hinweisen, dass sich die Einreichung auf die Person selbst bezieht. Wenn du eine juristische Person bist, musst du zudem Dokumente wie den Handelsregisterauszug und die Vollmacht des*der Vertreter*in einreichen. \u003CredLink\u003EMehr erfahren\u003C\u002FredLink\u003E","idpa_identification_document_instruction_nonIP":"Bitte reiche offizielle Ausweisdokumente ein. Beispiele hierfür sind: Führerschein (Vorder- und Rückseite), Reisepass (Fotoseite und Seite mit dem Namen des*der Inhaber*in und Notfallkontaktdaten), My Number Card (nur Vorderseite) usw. Zusätzlich musst du bei Bedarf Dokumente einreichen, die die Befugnis des*der Vertreter*in belegen, Dokumente, die die Zustimmung eines*einer gesetzlichen Vertreter*in wie eines Vormunds belegen, und Dokumente, die darauf hinweisen, dass sich die Einreichung auf die Person selbst bezieht. \u003CredLink\u003EMehr erfahren\u003C\u002FredLink\u003E","attachment_upload_limit":"Jede einzelne Datei muss kleiner sein als 20 MB","idpa_attachment_sec2":"Abschnitt 2:","idpa_right_holder_status_title":"Dokumentation zum Nachweis der Rechteinhaberschaft","idpa_ric_proof_title":"Dokumentation bezüglich der Rechtsverletzung","idpa_right_holder_status_instruction_1":"(Verletzung von geistigen Eigentumsrechten)","idpa_right_holder_status_instruction_2":"Bitte reiche Dokumente ein, aus denen hervorgeht, welche Rechte an geistigem Eigentum deiner Meinung nach verletzt wurden, sowie Dokumente, aus denen hervorgeht, dass du der*die Eigentümer*in des angeblichen geistigen Eigentums bist. \u003CredLink\u003EMehr erfahren\u003C\u002FredLink\u003E","idpa_right_holder_status_instruction_3":"(Verletzung von Geschäftsinteressen)","idpa_right_holder_status_instruction_4":"Die erforderlichen Unterlagen variieren je nach den angeblich verletzten Geschäftsinteressen (z. B. Materialien, die die Reputation oder Bekanntheit von Produktlabels belegen, Materialien, die zeigen, dass der Beitrag die Verbraucher*innen bezüglich der Qualität in die Irre führt). Bitte überprüfe die \u003CredLink\u003EDetails\u003C\u002FredLink\u003E und reiche die entsprechenden Unterlagen ein. Du kannst bis zu drei Dateien im JPEG-, JPG- oder PNG-Format hochladen, jeweils unter 20 MB.","idpa_ric_proof_instruction":"Bitte reiche einen Screenshot oder einen ähnlichen Beweis ein, der zeigt, welcher Teil des veröffentlichten Inhalts deiner Meinung nach deine Rechte verletzt. Du kannst bis zu drei Dateien im JPEG-, JPG- oder PNG-Format hochladen, jeweils unter 20 MB. \u003CredLink\u003EMehr erfahren\u003C\u002FredLink\u003E","idpa_attachment_sec3":"Abschnitt 3:","idpa_other_document_title":"Sonstige unterstützende Dokumente","idpa_other_document_instruction":"Bitte reiche alle unterstützenden Dokumente ein, wie beispielsweise Materialien, die belegen, dass der Fall nicht unter die Ausnahmen von der Verleumdung fällt. Du kannst bis zu drei Dateien im JPEG-, JPG- oder PNG-Format hochladen, jeweils unter 20 MB. \u003CredLink\u003EMehr erfahren\u003C\u002FredLink\u003E","idpa_disclaimer":"Bitte beachte: Eine wissentlich falsche oder irreführende Meldung zu machen, kann strafbar sein. Wenn du häufig Meldungen einreichst, die offensichtlich unbegründet sind, behalten wir uns das Recht vor, deine Möglichkeit, Meldungen einzureichen, auszusetzen oder dein Konto dauerhaft zu sperren. \u003CredLink\u003EMehr erfahren\u003C\u002FredLink\u003E","ad_report_detail_placeholder_75_uk":"Bitte gib Details zu deiner Erfahrung mit dieser Anzeige ein, damit wir die nötigen Maßnahmen ergreifen können. Inhalte, die gemäß dem UK OSA schädlich für Kinder sind, umfassen Pornografie und sexuelle Aktivitäten, Selbstmord und Selbstverletzung, Essstörungen, Missbrauch und Hass, Gewalt, Mobbing, gefährliche Stunts und Challenges, schädliche Substanzen, ungesundes Körperbild und depressive Inhalte. Bitte gib eine Kategorie an, wenn du dazu in der Lage bist.","ad_report_detail_placeholder_75_eea_row":"Bitte gib Details zu deiner Erfahrung mit dieser Anzeige ein, damit wir die nötigen Maßnahmen ergreifen können.","ad_report_reason_L1Misinfo_L2aigc_v2_0":"Diese Anzeige kann KI-generierte oder bearbeitete Inhalte enthalten, die missbräuchlich verwendet werden, nicht autorisiert oder falsch gekennzeichnet sind. Dazu kann Folgendes zählen:","ad_report_reason_L1Misinfo_L2aigc_v2_1":"KI-generierte Inhalte, die nicht gekennzeichnet sind oder off b_less_btn":"weniger","collectionsProfilePage_favoritesPage_newModal_errorMessage":"Zeichenlimit überschritten","pcWeb_add_reply":"Antwort hinzufügen ...","comment_tray_default":"Kommentar hinzufügen ...","vid_mod_analytics_penalty_reason_minor_title":"Sicherheit Minderjähriger","vid_mod_analytics_penalty_reason_minor_desc":"Um Jugendlichen zusätzlichen Raum für die Erkundung ihrer Identität und den Ausdruck in digitalen Räumen zu geben, können Inhalte, die von Nutzer*innen unter 16 Jahren hochgeladen werden, nicht empfohlen werden. Die Werbung für Schönheitsoperationen bei Minderjährigen kann zu einer höheren Rate an Körperunzufriedenheit führen. Dementsprechend sind solche Inhalte – einschließlich Vorher-Nachher-Videos, Videos von chirurgischen Eingriffen und Nachrichten, in denen elektive Schönheitsoperationen ohne Warnung vor den Risiken erörtert werden – für den Feed „Für dich“ aller Nutzer*innen unter 18 Jahren nicht geeignet.","vid_mod_analytics_penalty_reason_unoriginal_title":"Nicht originale Inhalte, Inhalte niedriger Qualität und QR-Code-Inhalte","vid_mod_analytics_penalty_reason_unoriginal_desc":"Damit TikTok für unsere Nutzer*innen positiv und angenehm bleibt, werden Inhalte, die keine Originalinhalte sind, oder Inhalte von geringer Qualität nicht empfohlen. Zu den Inhalten, die keine Originalinhalte sind, gehören Videos, die einfach aus anderen Quellen (wie anderen Plattformen, Fernsehsendungen, Filmen oder Webcasts) importiert oder hochgeladen wurden, ohne dass sie neu und kreativ bearbeitet wurden. Wir können erkennen, ob ein Video kein Originalinhalt ist, wenn es ein Wasserzeichen oder ein eingeblendetes Logo enthält. Zu den Inhalten von geringer Qualität gehören sehr kurze Videos, statische Bilder und Videos, die nur aus GIFs bestehen. Inhalte, die QR-Codes enthalten, sind für gewöhnlich nicht zugelassen im Feed „Für dich“, da diese die Nutzer*innen zu schädlichen Websites oder Apps führen könnten, auch wenn wir Ausnahmen machen, wenn das Risiko gering ist (z. B. bei Onlinehandel).","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"Nicht originale Inhalte, Inhalte niedriger Qualität und QR-Code-Inhalte","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"Um die positive Erfahrung beizubehalten, die unsere Nutzer*innen von der TikTok-Plattform erwarten, werden Inhalte, die keine Originalinhalte sind, oder Inhalte von geringer Qualität nicht empfohlen. Inhalte, die keine Originalinhalte sind, sind Videos, die einfach aus anderen Quellen importiert oder hochgeladen wurden, ohne dass sie neu und kreativ bearbeitet wurden. Ein Video kann als Inhalt gelten, der kein Originalinhalt ist, wenn es ein Wasserzeichen oder ein Logo enthält. Zu den Inhalten von geringer Qualität gehören sehr kurze Videos, statische Bilder und Videos, die nur aus GIFs bestehen.","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"Reproduzierter Inhalt","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"Dein Konto enthält Inhalte, die keine Originale und nicht berechtigt für den Feed „Für dich“ sind. Weitere Informationen findest du in unseren Community-Richtlinien \u003E Nicht geeignet für den Feed „Für dich“ \u003E Nicht originale Inhalte, Inhalte niedriger Qualität und QR-Code-Inhalte","vid_mod_analytics_penalty_reason_spam_title":"Spam, nicht authentische oder irreführende Inhalte","vid_mod_analytics_penalty_reason_spam_desc":"Inhalte, die versuchen, Nutzer*innen auszutricksen oder zu manipulieren, um mehr Follower*innen, Likes, Aufrufe oder andere Interaktionsmetriken auf der Plattform zu erhalten, sind für den Feed „Für dich“ nicht geeignet. Dazu gehören Inhalte, die Nutzer*innen dazu ermutigen, sich gegenseitig zu folgen oder Likes zu geben, oder Inhalte, die Nutzer*innen dazu verleiten, auf die Schaltflächen Like oder Teilen zu klicken. Außerdem sind Inhalte, die Verschwörungstheorien unterstützen und falsche oder schädliche Informationen über aktuelle Ereignisse und Ereignisse, bei denen sich die Einzelheiten noch entwickeln, verbreiten, nicht für den Feed „Für dich“ berechtigt.","vid_mod_analytics_penalty_reason_sexual_title":"Sexuell eindeutige Inhalte","vid_mod_analytics_penalty_reason_sexual_desc":"Um ein angenehmes Erlebnis zu gewährleisten, können Inhalte, die offenkundig sexuell anregend sind, nicht empfohlen werden. Dazu gehören Inhalte, die angedeutete Nacktheit zeigen, Körperteile sexualisieren oder unverblümt erotisch oder sinnlich sind (z. B. Striptease).","vid_mod_analytics_penalty_reason_tobacco_title":"Alkohol- oder Tabakprodukte","vid_mod_analytics_penalty_reason_tobacco_desc":"Inhalte, die Alkoholprodukte bewerben, erwähnen oder darstellen, die von Personen konsumiert werden, die zwar das gesetzliche Mindestalter erreicht haben, den Konsum aber auf gefährliche Art und Weise durchführen, können möglicherweise nicht empfohlen werden. Inhalte, die den Konsum von Tabakerzeugnissen durch Erwachsene darstellen oder kontrollierte Substanzen erwähnen, können nicht empfohlen werden.","vid_mod_analytics_penalty_reason_stunts_title":"Gefährliche Stunts und Sportarten","vid_mod_analytics_penalty_reason_stunts_desc":"Wenn sie ohne Sicherheitsvorkehrungen nachgestellt werden, können bestimmte Aktivitäten riskant oder gefährlich sein, was zu körperlichen Schäden führen kann. Inhalte, die gefährliche Stunts oder Extremsportarten beinhalten, die von Nicht-Profis ausgeführt werden, sind möglicherweise nicht zulässig.","vid_mod_analytics_penalty_reason_graphic_title":"Inhalt mit Gewalt und Grausamkeit","vid_mod_analytics_penalty_reason_graphic_desc":"Inhalte, die bei Zuschauer*innen Unbehagen, Schock oder Ekel auslösen, sind möglicherweise nicht für den Feed „Für dich“ geeignet, dazu gehören unter anderem gruselige Effekte, Jump-Scares oder Make-up, das blutige Wunden realistisch darstellt, sowie Darstellungen von Körperfunktionen. Die meisten Inhalte mit Gewalt und Grausamkeit sind bei TikTok nicht erlaubt. Bestimmte Arten von Inhalten können wir jedoch erlauben, beispielsweise Darstellungen von Todesfällen, Unfällen oder Auseinandersetzungen, wenn sie als Dokumentation von echten Ereignissen dienen und die Verbreitung im öffentlichen Interesse ist. Da dieser Inhalt nicht für alle Publikumsgruppen angemessen ist, ist er nicht für Empfehlungen zulässig, und für den Inhalt gibt es einen Bildschirm oder eine Warnung zum Aktivieren.","vid_mod_analytics_penalty_reason_fyf_title":"Nicht für den Feed „Für dich“ berechtigt","vid_mod_analytics_penalty_reason_fyf_desc":"Dein Video hat unsere Teilnahmeberechtigungsstandards für den Feed „Für dich“ nicht erfüllt. Weitere Informationen findest du in den Community-Richtlinien von TikTok \u003E Nicht für den Feed „Für dich“ berechtigt","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"Nutzer*innen und Dritte können uns Verstöße gegen die Richtlinien melden. Wir haben diesen Verstoß gegen die Richtlinien nach einer Meldung entdeckt, dass der Inhalt gegen unsere Community-Richtlinien verstößt.","vidModAnalytics_detailPg_sectionVideoDetails_sectionLabel":"Videoeinzelheiten","vid_mod_analytics_appeal_detailpg_reason_title":"Grund für den Verstoß","vid_mod_analytics_detail_pg_title":"Video nicht berechtigt","vid_mod_analytics_detail_pg_desc":"Das Video ist nicht berechtigt für den Feed „Für dich“, da es gegen unsere Community-Richtlinien verstößt.","vidModAnalytics_detailPg_sectionSuccess_header":"Widerspruch genehmigt","vid_mod_analytics_appeal_success_detail_pg_desc":"Wir haben deinen Widerspruch überprüft und dein Video wiederhergestellt. Wir entschuldigen uns für die möglicherweise entstandenen Unannehmlichkeiten. Schön, dass du Teil der TikTok-Community bist!","vid_mod_analytics_appeal_detail_pg_title":"Video entfernt","vid_mod_analytics_appeal_detail_pg_desc":"Dieses Video verstößt gegen unsere Community-Richtlinien.","vidModAnalytics_appealSubmitted_sectionTitle_header":"Anfrage erhalten","vid_mod_analytics_appeal_rcv_detail_pg_desc":"Wir haben deine Anfrage erhalten und benach
