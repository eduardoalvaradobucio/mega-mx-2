al_report_trustedflagger_signout_popup_yes":"Sí","dsa_illegal_report_trustedflagger_signout_popup_no":"No","osa_illegal_detail_reminder":"Enviar conscientment una denúncia de contingut il·legal falsa o enganyosa pot comportar sancions legals. Si envies denúncies que clarament no tenen cap fonament amb freqüència, ens reservem el dret de suspendre la teva capacitat d'enviar denúncies o de bloquejar permanentment el teu compte.","dsa_illegal_report_penalty_reminder":"Tingues en compte que enviar denúncies falses o enganyoses sobre contingut il·legal podria sancionar-se per la llei. Si envies denúncies clarament infundades sovint, ens reservem el dret de suspendre la teva capacitat per enviar denúncies o bloquejar-te el compte de forma permanent. Consulta el Centre de transparència per obtenir-ne més informació.","Web_report_reason_select":"Report reason:","dsa_illegal_report_email":"La teva adreça electrònica","dsa_illegal_cite_law_optional":"(opcional)","dsa_illegal_report_fill_email":"Emplena l'adreça electrònica","cseReasons_reportPg_emailAddForm_body":"Pots enviar aquesta denúncia de manera anònima, però no en sabràs el resultat ni en podràs presentar cap sol·licitud de revisió.","dsa_illegal_report_trustedflagger_fill_email":"Introdueix una adreça electrònica vàlida","dsa_illegal_detail_country":"Jurisdicció","dsa_illegal_detail_law":"Llei corresponent","dsa_illegal_cite_law_desc":"Proporciona els detalls de la llei que el contingut infringeix presumptament. Has d'aportar informació tan específica com sigui possible perquè puguem avaluar la denúncia adequadament.","dsa_illegal_detail_explanation":"Explicació de la denúncia","dsa_illegal_report_explanation_desc":"Descriu de quina manera el contingut infringeix la llei en qüestió. Les denúncies amb informació insuficient no es consideraran vàlides. Si correspon, especifica si estàs enviant aquesta sol·licitud en el teu propi nom o en el d'una altra persona.","dsa_illegal_appeal_signature":"Signatura","dsa_illegal_sign_legal_name":"Signa el teu nom legal aquí.","dsa_illegal_confirm_accuracy":"Confirmo el meu convenciment del fet que el contingut d'aquesta denúncia és cert, precís i complet.","idpa_attachment":"Fitxers adjunts","idpa_attachment_instruction":"La denúncia l'haurà d'enviar el propietari dels drets infringits o un representant autoritzat. Revisa atentament les \u003CredLink\u003Enormes d'enviament\u003C\u002FredLink\u003E i envia tota la documentació necessària. El format dels fitxers ha de ser JPEG, JPG o PNG, i no poden superar els 20 MB.","idpa_attachment_sec1":"Secció 1:","idpa_identification_document_title":"Documents relatius al reclamant","idpa_identification_document_instruction_IP":"Envia documents d'identificació oficials, com ara el permís de conduir (parts frontal i posterior), el passaport (la pàgina de la fotografia i la pàgina que conté el nom del titular i la informació del contacte d'emergència), la My Number Card (només la part frontal), etc. A més, si escau, hauràs de presentar documents que demostrin l'autoritat per actuar en representació d'una altra persona, documents que demostrin el consentiment d'un representant legal, com ara un tutor o tutora, i documents que indiquin que la presentació de la denúncia pertany a l'individu. A més, si ets una persona jurídica, hauràs d'enviar altres documents, com ara el certificat d’inscripció registral de l’empresa, i un poder notarial del representant. \u003CredLink\u003EMés informació\u003C\u002FredLink\u003E","idpa_identification_document_instruction_nonIP":"Envia documents d'identificació oficials, com ara el permís de conduir (parts frontal i posterior), el passaport (la pàgina de la fotografia i la pàgina que conté el nom del titular i la informació del contacte d'emergència), la My Number Card (només la part frontal), etc. A més, si escau, hauràs de presentar documents que demostrin l'autoritat per actuar en representació d'una altra persona, documents que demostrin el consentiment d'un representant legal, com ara un tutor o tutora, i documents que indiquin que la presentació de la denúncia pertany a l'individu.\u003CredLink\u003EMés informació\u003C\u002FredLink\u003E","attachment_upload_limit":"Every single file must be less than 20MB","idpa_attachment_sec2":"Secció 2:","idpa_right_holder_status_title":"Documentació que acrediti la condició de titular dels drets","idpa_ric_proof_title":"Documentació relativa a la infracció de drets","idpa_right_holder_status_instruction_1":"(Infracció dels drets de propietat intel·lectual)","idpa_right_holder_status_instruction_2":"Envia documents que identifiquin els drets de propietat intel·lectual que creus que s'han infringit, i documents que acreditin que ets el propietari de la suposada propietat intel·lectual. \u003CredLink\u003EMés informació\u003C\u002FredLink\u003E","idpa_right_holder_status_instruction_3":"(Infracció d'interessos comercials)","idpa_right_holder_status_instruction_4":"La documentació necessària varia segons els suposats interessos comercials infringits (per exemple, materials que demostrin la reputació o la notorietat de les etiquetes del producte o materials que mostrin que el missatge enganya els consumidors sobre la qualitat). Revisa els \u003CredLink\u003Edetalls\u003C\u002FredLink\u003E i envia la documentació adequada. Pots carregar fins a tres fitxers en format JPEG, JPG o PNG; cadascú de menys de 20 MB.","idpa_ric_proof_instruction":"Envia una captura de pantalla o una prova similar on es pugui veure la part del contingut publicat que creus que infringeix els teus drets. Pots carregar fins a tres fitxers en format JPEG, JPG o PNG; cadascú de menys de 20 MB. \u003CredLink\u003EMés informació\u003C\u002FredLink\u003E","idpa_attachment_sec3":"Secció 3:","idpa_other_document_title":"Altres documents de suport","idpa_other_document_instruction":"Envia documents de suport, com ara materials que demostrin que el cas no pertany a cap de les excepcions de la difamació. Pots carregar fins a tres fitxers en format JPEG, JPG o PNG; cadascú de menys de 20 MB.\u003CredLink\u003EMés informació\u003C\u002FredLink\u003E","idpa_disclaimer":"Tingues en compte que enviar conscientment una denúncia falsa o enganyosa pot comportar sancions legals. Si envies denúncies que clarament no tenen cap fonament amb freqüència, ens reservem el dret de suspendre la teva capacitat d'enviar denúncies o de bloquejar permanentment el teu compte. \u003CredLink\u003EMés informació\u003C\u002FredLink\u003E","ad_report_detail_placeholder_75_uk":"Proporciona informació sobre la teva experiència amb aquest anunci per ajudar-nos a prendre les mesures necessàries. El contingut perjudicial per als nens segons la Llei de Seguretat en Línia del Regne Unit inclou pornografia i activitats sexual, suïcidi i autolesió, trastorns de la conducta alimentària, abús i odi, violència, assetjament, acrobàcies i reptes perillosos, substàncies perjudicials, percepció corporal negativa i contingut depressiu. Si pots, identifica una categoria.","ad_report_detail_placeholder_75_eea_row":"Proporciona informació sobre la teva experiència amb aquest anunci per ajudar-nos a prendre les mesures necessàries.","ad_report_reason_L1Misinfo_L2aigc_v2_0":"Aquest anunci pot incloure contingut generat o editat per IA que s'utilitza de manera incorrecta, sense autorització o mal etiquetat. Això pot incloure:","ad_report_reason_L1Misinfo_L2aigc_v2_1":"Contingut generat per IA no etiquetat o no declarat. L'anunci fa servir la IA per crear contingut, però no ho menciona.","ad_report_reason_L1Misinfo_L2aigc_v2_2":"Ús de la imatge, la veu o la identitat d'una persona sense permís. L'anunci mostra o sona com una persona real, però aquesta persona no va donar-hi autorització (per exemple, fer veure que defensa una idea o un producte polític quan no és així).","Web_report_description":"Report description (Optional):","report_details_toast":"Dona'ns detalls de la teva experiència amb aquest anunci per ajudar-nos a prendre les mesures n ,"cs_webapp_notif_newReply":"Nova resposta a la teva incidència","cs_webapp_notif_view":"Mostra","cs_webapp_notif_ticketClosed":"S'ha tancat la incidència. Valora l'experiència.","web_inappNotifs_Notification_header":"Notificació","Web_report_hide_video":"Amb l'objectiu de millorar la teva experiència, aquest vídeo s'ha amagat. Et mostrarem menys vídeos com aquest.","Web_report_show_video":"Mostra el vídeo","sticker_create_main_setinfo_last":"Darrera actualització","pgc_aiComments_commentCategories_all":"Tots","pgc_aiComments_analyticsPage_commentsCount":"{num, plural, one {{num} comentari} other {{num} comentaris}}","pgc_aiComments_analyticsPage_infoPopup_topicsTitle":"Temes","pgc_aiComments_commentCategories_insufficientComments":"Els temes resumits amb IA estaran disponibles quan hi hagi més comentaris.","pgc_aiComments_commentCategories_emptyState":"Cap comentari coincideix amb aquesta categoria.","pm_web_fullpage_entry":"Click to watch LIVE","webLIVE_personalPage_LIVEbanner_numViewerDesc":"Mira-ho ara amb {num} espectadors","Webapp_tooltips_play":"Reprodueix","pm_web_fullpage_error_button":"Torna-ho a provar","ttlive_previewSubtitle_tag_highlight":"Moment destacat","weblive_following_btn":"Seguint","pm_mt_liveWeb_friend_tag":"Amistat","ttlive_AIsummary_tag":"Resum","subLiveShare_webLivePage_chatTextfield_subOnlyNote":"Només per a subscriptors","pc_web_less_btn":"menys","collectionsProfilePage_favoritesPage_newModal_errorMessage":"S'ha superat el límit de caràcters","pcWeb_add_reply":"Afegeix una resposta...","comment_tray_default":"Afegeix un comentari...","vid_mod_analytics_penalty_reason_minor_title":"Seguretat dels menors","vid_mod_analytics_penalty_reason_minor_desc":"Per oferir als adolescents més espai per explorar la seva identitat i formes d'expressió als espais digitals, el contingut pujat per usuaris menors de 16 anys no es recomanarà. La promoció de la cirurgia estètica per a menors pot donar lloc a índexs més elevats d'insatisfacció amb el propi cos. En conseqüència, aquest contingut (com ara vídeos de l'abans i el després, vídeos de procediments quirúrgics i missatges que parlin de cirurgia estètica electiva sense advertir dels riscos) no és apte per al canal Per a tu de cap usuari menor de 18 anys.","vid_mod_analytics_penalty_reason_unoriginal_title":"Contingut de codi QR, de baixa qualitat o no original","vid_mod_analytics_penalty_reason_unoriginal_desc":"Per fer que TikTok continuï sent un lloc positiu i agradable per als usuaris, no es recomanarà el contingut no original o de baixa qualitat. Dins del contingut no original hi ha vídeos simplement importats o pujats d'altres fonts (com altres plataformes, programes de TV, pel·lícules o difusions web) sense fer-hi cap aportació nova i creativa. Podem saber si un vídeo no és original si té una marca d'aigua o un logotip superposat. El contingut de baixa qualitat també pot ser vídeos molt curts, imatges estàtiques i vídeos fets únicament amb GIF. En general, tampoc considerem apte el contingut amb codis QR per al canal Per a tu perquè poden dirigir els usuaris a llocs web o aplicacions perjudicials, encara que fem excepcions en circumstàncies en què el risc sigui baix (per exemple, per al comerç electrònic).","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"Contingut de codi QR, de baixa qualitat o no original","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"Per mantenir l'experiència positiva que els usuaris esperen tenir a la plataforma TikTok, no es recomanarà contingut no original o de baixa qualitat. El contingut no original és aquell que simplement importa o copia material d'altres fonts sense aportar cap edició nova i creativa. Un vídeo podria no ser original si té una marca d'aigua o un logotip. Dins del contingut de baixa qualitat hi ha vídeos molt curts, imatges estàtiques i vídeos fets únicament amb GIF.","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"Compte no original","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"El teu compte conté publicacions que no són originals, per la qual cosa no són aptes per al canal Per a tu. Per obtenir més informació, revisa les Normes de la comunitat \u003E No apte per al canal Per a tu \u003E Contingut de codi QR, de baixa qualitat o no original","vid_mod_analytics_penalty_reason_spam_title":"Contingut brossa, fals o enganyós","vid_mod_analytics_penalty_reason_spam_desc":"El contingut que provi d'enganyar o manipular les persones per aconseguir més seguidors, m'agrades, visualitzacions o altres mètriques d'interacció no és apte per al canal Per a tu. Això inclou el contingut que animi els usuaris a seguir-se o fer-se m'agrada mútuament i el contingut que enganyi els usuaris perquè facin clic als botons per fer m'agrada o compartir. A més a més, el contingut que promogui teories de la conspiració i difongui informació falsa o perjudicial sobre esdeveniments actuals que encara estiguin tenint lloc tampoc no és apte per al canal Per a tu.","vid_mod_analytics_penalty_reason_sexual_title":"Contingut clarament sexualitzat","vid_mod_analytics_penalty_reason_sexual_desc":"Perquè fer que l'experiència dels usuaris continuï sent còmoda, és possible que el contingut que sigui sexualment suggerent no pugui formar part dels suggeriments. Això inclou contingut que mostri nuesa implícita, sexualitzi parts del cos o sigui descaradament eròtic o sensual (per exemple, contingut amb striptease).","vid_mod_analytics_penalty_reason_tobacco_title":"Productes de tabac i alcohol","vid_mod_analytics_penalty_reason_tobacco_desc":"Es podria excloure dels suggeriments el contingut que promogui, esmenti o mostri productes alcohòlics consumits per persones amb edat legal per prendre'n, però que ho facin de manera perillosa. No s'inclourà en els suggeriments el contingut que mostri l'ús de productes de tabac per part d'adults o que esmenti substàncies regulades.","vid_mod_analytics_penalty_reason_stunts_title":"Esports i escenes perilloses","vid_mod_analytics_penalty_reason_stunts_desc":"Quan es reprodueixen sense prendre precaucions de seguretat, certes activitats poden ser arriscades o perilloses i podrien provocar danys físics. El contingut que inclogui acrobàcies perilloses o esports extrems realitzats per no professionals podrien no ser aptes per al canal.","vid_mod_analytics_penalty_reason_graphic_title":"Contingut violent i explícit","vid_mod_analytics_penalty_reason_graphic_desc":"El contingut que resulti incòmode, ofensiu o repugnant per als espectadors es podria considerar no apte per al canal Per a tu. Això inclou els efectes de por, els ensurts, el maquillatge que recreï ferides sagnants de manera realista i les representacions de funcions corporals. La major part del contingut violent i explícit no està permès a TikTok. No obstant això, podríem permetre certs tipus de contingut, com ara imatges gràfiques relacionades amb la mort, accidents o baralles quan serveixin per documentar fets reals i es consideri que són d'interès públic. Atès que aquest tipus de contingut podria resultar incòmode per a alguns espectadors, no s'inclourà en els suggeriments i tindrà una pantalla o advertiment perquè l'espectador decideixi si el vol mirar.","vid_mod_analytics_penalty_reason_fyf_title":"No apte per al canal Per a tu","vid_mod_analytics_penalty_reason_fyf_desc":"El teu vídeo no compleix els estàndards d'aptitud del canal Per a tu. Per obtenir més informació, revisa les Normes de la comunitat de TikTok \u003E No apte per al canal Per a tu","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"Les persones que fan servir la nostra aplicació i tercers poden enviar-nos denúncies sobre les infraccions de les polítiques. Hem detectat aquesta infracció de les Normes de la comunitat gràcies a una denúncia.","vidModAnalytics_detailPg_sectionVideoDetails_sectionLabel":"Detalls del vídeo","vid_mod_analytics_appeal_detailpg_reason_title":"Motiu de la infracció","vid_mod_analytics_detail_pg_title":"Aquest vídeo no és apte","vid_
