Näitame sulle vähem selliseid videoid.","Web_report_show_video":"Kuva video","sticker_create_main_setinfo_last":"Viimati värskendatud","pgc_aiComments_commentCategories_all":"Kõik","pgc_aiComments_analyticsPage_commentsCount":"{num, plural, one {{num} kommentaar} other {{num} kommentaari}}","pgc_aiComments_analyticsPage_infoPopup_topicsTitle":"Teemad","pgc_aiComments_commentCategories_insufficientComments":"AI-ga kokkuvõetud teemad tehakse saadavaks siis, kui neil on rohkem kommentaare.","pgc_aiComments_commentCategories_emptyState":"Sellele kategooriale ei vasta ükski kommentaar.","pm_web_fullpage_entry":"Klõpsake LIVE'i vaatamiseks","webLIVE_personalPage_LIVEbanner_numViewerDesc":"Vaadake kohe koos {num} teise vaatajaga","Webapp_tooltips_play":"esita","pm_web_fullpage_error_button":"Proovi uuesti","ttlive_previewSubtitle_tag_highlight":"Tipphetk","weblive_following_btn":"Jälgitavad","pm_mt_liveWeb_friend_tag":"Sõber","ttlive_AIsummary_tag":"Kokkuvõte","subLiveShare_webLivePage_chatTextfield_subOnlyNote":"Ainult tellijatele","pc_web_less_btn":"vähem","collectionsProfilePage_favoritesPage_newModal_errorMessage":"Tähemärgilimiit on täis","pcWeb_add_reply":"Lisa vastus...","comment_tray_default":"Lisa kommentaar...","vid_mod_analytics_penalty_reason_minor_title":"Alaealise ohutus","vid_mod_analytics_penalty_reason_minor_desc":"Teistmelistele digitaalkeskkonnas identiteedi avastamisel ja väljendamisel lisaruumi pakkumiseks ei soovitata alla 16-aastaste kasutajate sisu. Kosmeetilise kirurgia reklaam alaealistele võib põhjustada oma kehaga rahulolematust. Seetõttu ei soovitata sellist sisu (sh enne-pärast-videod, videod kirurgilistest protseduuridest ja arutelu valikulise kosmeetilise kirurgia kohta ilma riske tutvustamata) vool „Sulle“ ühelegi alla 18-aastasele kasutajale.","vid_mod_analytics_penalty_reason_unoriginal_title":"Mittealgupärane, halva kvaliteediga ja QR-koodidega sisu","vid_mod_analytics_penalty_reason_unoriginal_desc":"TikToki kasutajate kogemuse positiivse ja meeldivana hoidmiseks ei soovitata sisu, mis pole algupärane või on halva kvaliteediga. Mittealgupärane sisu võib tähendada videoid, mis on ilma uute, loominguliste muudatusteta lihtsalt teistest allikatest (teistelt platvormidelt, telesarjadest, filmidest või veebiülekannetest) imporditud või alla laaditud. Saame aru, et video pole algupärane, kui sellel on vesimärk või selle peal on logo. Halva kvaliteediga videod on väga lühikesed videod, paigalpüsivad pildid ja ainult GIF-idest tehtud videod. Tavaliselt ei luba me QR-koodidega sisu voole „Sulle“, kuna see võib suunata vaatajad kahjulikele veebisaitidele või rakendustesse, kuid teeme erandeid madala riskitasemega olukordades (näiteks e-kaubandus).","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"Mittealgupärane, halva kvaliteediga ja QR-koodidega sisu","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"TikToki kasutajate kogemuse positiivsena hoidmiseks ei soovitata sisu, mis pole algupärane või on halva kvaliteediga. Mittealgupärane sisu võib tähendada videoid, mis on ilma uute, loominguliste muudatusteta lihtsalt teistest allikatest imporditud või alla laaditud. Saame aru, et video pole algupärane, kui sellel on vesimärk või selle peal on logo. Halva kvaliteediga videod on väga lühikesed videod, paigalpüsivad pildid ja ainult GIF-idest tehtud videod.","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"Taasesitatud konto","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"Sinu kontol on postitusi, mis pole algupärased ja ei sobi voole „Sulle“. Lisateabe saamiseks tutvuge meie Kogukonna juhistega \u003E Sobimatu voo „Sulle“ jaoks \u003E Mittealgupärane, halva kvaliteediga ja QR-koodidega sisu","vid_mod_analytics_penalty_reason_spam_title":"Rämpspost, võltsitud või eksitav sisu","vid_mod_analytics_penalty_reason_spam_desc":"Sisu, mis proovib manipuleerida kasutajaid platvormil rohkemate jälgijate, meeldimiste või vaatamiste saamiseks või muul viisil kasutajate kaasamiseks, ei vasta voo „Sulle“ nõuetele. Sinna hulka kuulub sisu, mis julgustab kasutajaid üksteist jälgima või meeldivaks märkima, või sisu, mis peibutab kasutajaid klõpsama meeldimise või jagamise nuppe. Lisaks ei vasta voo „Sulle“ nõuetele sisu, mis tõstab esile vandenõuteooriaid ja levitab väärinfot või kahjulikku teavet päevakohaste sündmuste kohta või sündmuste kohta, mille üksikasjad pole veel selged.","vid_mod_analytics_penalty_reason_sexual_title":"Varjamatult seksuaalne sisu","vid_mod_analytics_penalty_reason_sexual_desc":"Mugava kogemuse pakkumiseks võidakse soovitamiskõlblikuks mitte lugeda sisu, mis on varjamatult seksuaalse alatooniga, sealhulgas sisu, mis kujutab alastust, seksualiseerib kehaosi või on otseselt erootiline või sensuaalne (nt striptiis).","vid_mod_analytics_penalty_reason_tobacco_title":"Tubaka- ja alkoholitooted","vid_mod_analytics_penalty_reason_tobacco_desc":"Sisu, mis reklaamib, mainib või kujutab alkoholitoodete tarbimist inimeste poolt, kes võivad seaduslikult juua, kuid teevad seda ohtlikul viisil, ei pruugi vastata soovitamise nõuetele. Sisu, mis kujutab täiskasvanute tubakatoodete tarvitamist või mainib kontrollitavaid aineid, ei soovitata.","vid_mod_analytics_penalty_reason_stunts_title":"Ohtlikud julgustükid ja sport","vid_mod_analytics_penalty_reason_stunts_desc":"Ilma ohutusabinõueteta on teatud tegevused riskantsed või ohtlikud ja võivad tekitada kehavigastusi. Sisu, mis sisaldab ohtlikke julgustükke või ebaprofessionaalsete isikute sooritatud ekstreemsporti, ei pruugi vastata nõuetele.","vid_mod_analytics_penalty_reason_graphic_title":"Vägivaldne ja graafiline sisu","vid_mod_analytics_penalty_reason_graphic_desc":"Sisu, mis võib tekitada vaatajale ebamugavust, tülgastust või olla šokeeriv, ei pruugi vastata voo „Sulle“ nõuetele, sh hirmsad eriefektid, ehmatavad elemendid või realistlik vere imiteerimine ja kehafunktsioonide kujutamine. Enamik vägivaldset ja võigast sisu pole TikTokis lubatud. Siiski on mõnes olukorras teatavat tüüpi sisu lubatud, eriti kui see on avalikkuse huvides, näiteks reaalsete sündmuste kajastamisel surmade, õnnetuste või kakluste kujutamisel. Kuna see sisu ei pruugi olla kõigile vaatamiseks sobiv, ei soovitata seda ning sisul on viip „Näita“ või hoiatus.","vid_mod_analytics_penalty_reason_fyf_title":"Sobimatu voo „Sulle“ jaoks","vid_mod_analytics_penalty_reason_fyf_desc":"Sinu video ei vasta meie voo „Sulle“ nõuetele. Lisateabe saamiseks tutvu TikToki Kogukonna juhistega \u003E Sobimatu videote voo „Sulle“ jaoks","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"Kasutajad ja kolmandad osapooled saavad meile eeskirjade rikkumistest teatada. Tuvastasime selle eeskirjade rikkumise kaebuse põhjal, mille väitel rikkus sisu meie kogukonna juhiseid.","vidModAnalytics_detailPg_sectionVideoDetails_sectionLabel":"Video üksikasjad","vid_mod_analytics_appeal_detailpg_reason_title":"Rikkumise põhjus","vid_mod_analytics_detail_pg_title":"Video ei vasta nõuetele","vid_mod_analytics_detail_pg_desc":"See video ei vasta videote voo „Sulle“ nõuetele, kuna see rikub meie Kogukonna juhiseid.","vidModAnalytics_detailPg_sectionSuccess_header":"Vaidlustus on rahuldatud","vid_mod_analytics_appeal_success_detail_pg_desc":"Vaatasime sinu vaidlustuse üle ja taastasime sinu video. Vabanda võimalike ebamugavuste pärast. Aitäh, et kuulud TikToki kogukonda!","vid_mod_analytics_appeal_detail_pg_title":"Video on eemaldatud","vid_mod_analytics_appeal_detail_pg_desc":"See video on vastuolus meie kogukonna juhistega.","vidModAnalytics_appealSubmitted_sectionTitle_header":"Taotlus on vastu võetud","vid_mod_analytics_appeal_rcv_detail_pg_desc":"Oleme sinu taotluse kätte saanud ja teavitame sind, kui vaidlustuse tulemus on selgunud.","rIC_detailPg_violationReason_title":"Rikkumise põhjus","dsaCGWebapp_detailPg_sectionCG_link":"Kogukonna juhised","dsaCGWebapp_appealExpired_emptyState_body":"Te ei saa seda otsust enam vaidlustada, kuna vaidlustamise tähtaeg on möödas.","appeal_btn_new":"Vaidlusta","
