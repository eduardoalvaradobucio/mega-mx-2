nstruction_4":"침해되었다고 주장하는 비즈니스 이익에 따라서 다른 문서가 필요합니다(예: 상품 라벨의 명성 또는 평판을 입증하는 자료, 게시물이 품질에 대한 소비자의 잘못된 인식을 유도함을 보여주는 자료). \u003CredLink\u003E세부 정보\u003C\u002FredLink\u003E를 검토하고 적절한 문서를 제출하세요. 최대 3개의 JPEG, JPG 또는 PNG 형식 파일을 업로드할 수 있으며, 각 파일은 20MB 미만이어야 합니다.","idpa_ric_proof_instruction":"게시된 콘텐츠 중 권리를 침해한다고 판단하는 부분을 보여주는 스크린샷 또는 유사한 증거를 제출하세요. 최대 3개의 JPEG, JPG 또는 PNG 형식 파일을 업로드할 수 있으며, 각 파일은 20MB 미만이어야 합니다. \u003CredLink\u003E자세히 알아보기\u003C\u002FredLink\u003E","idpa_attachment_sec3":"섹션 3:","idpa_other_document_title":"기타 보충 문서","idpa_other_document_instruction":"명예훼손 예외 사항에 해당하지 않음을 입증하는 자료 등 보충 문서를 제출하세요. 최대 3개의 JPEG, JPG 또는 PNG 형식 파일을 업로드할 수 있으며, 각 파일은 20MB 미만이어야 합니다. \u003CredLink\u003E자세히 알아보기\u003C\u002FredLink\u003E","idpa_disclaimer":"허위 신고나 오해의 소지가 있는 신고를 고의로 제출하면 법에 따라 처벌받을 수 있음을 명심해 주시기 바랍니다. 근거 없는 신고를 자주 제출하는 경우, 당사는 회원님의 신고 제출 기능을 일시 정지하거나 계정을 영구 정지할 권리를 보유합니다. \u003CredLink\u003E자세히 알아보기\u003C\u002FredLink\u003E","ad_report_detail_placeholder_75_uk":"당사에서 필요한 조치를 할 수 있도록 이 광고 경험에 대한 자세한 내용을 제공해 주세요. 영국 OSA에 따른 아동에게 해로운 콘텐츠에는 포르노 및 성적 행동, 자살 및 자해, 섭식 장애, 학대 및 증오, 폭력, 괴롭힘, 위험한 스턴트 및 챌린지, 유해 물질, 건강하지 않은 신체 이미지 및 우울한 콘텐츠가 포함됩니다. 가능하다면 카테고리를 식별하세요.","ad_report_detail_placeholder_75_eea_row":"당사에서 필요한 조치를 할 수 있도록 이 광고 경험에 대한 자세한 내용을 제공해 주세요.","ad_report_reason_L1Misinfo_L2aigc_v2_0":"이 광고에는 오용, 무단 사용 또는 라벨이 잘못 지정된 AI 생성 콘텐츠 또는 편집된 콘텐츠가 포함되어 있을 수 있으며, 다음과 같은 경우일 수 있습니다.","ad_report_reason_L1Misinfo_L2aigc_v2_1":"AI 생성 콘텐츠임이 라벨로 지정되지 않았거나 공개되지 않았습니다. AI를 사용하여 만든 광고 콘텐츠이지만 이를 명시하지 않았습니다.","ad_report_reason_L1Misinfo_L2aigc_v2_2":"실제 인물의 외모, 목소리 또는 인격을 허락 없이 사용합니다. 광고가 실제 인물처럼 보이거나 실제 인물의 음성처럼 들리지만, 해당 인물의 동의를 받지 않았습니다(예를 들어, 해당 인물의 의지와 상관없이 정치적 의견이나 상품을 지지하는 것처럼 보이게 함).","Web_report_description":"신고 설명(선택 사항):","report_details_toast":"당사에서 필요한 조치를 취할 수 있도록 이 광고에 대한 경험을 자세히 알려주세요.","report_img_toast":"주문 세부 정보 및 받은 품목의 이미지를 업로드하세요.","dsa_illegal_select_country_optional":"사법 관할 구역","get_tt_desktop":"데스크톱용 TikTok 받기","get_tt_app":"TikTok 앱 받기","Web_leftNav_getCoin 표시될 자격이 없습니다.","vid_mod_analytics_penalty_reason_unoriginal_title":"원본이 아닌 콘텐츠, 저품질 콘텐츠 및 QR 코드가 포함된 콘텐츠","vid_mod_analytics_penalty_reason_unoriginal_desc":"사용자를 위한 긍정적이고 즐거운 TikTok이 될 수 있도록 원작이 아니거나 퀄리티가 낮은 콘텐츠는 추천 자격을 상실합니다. 원작이 아닌 콘텐츠에는 창의적인 편집을 새로 하지 않고 다른 출처(다른 플랫폼, TV 프로그램, 영화 또는 웹캐스트 등)에서 그대로 가져오거나 업로드된 동영상이 포함됩니다. 동영상에 워터마크나 겹쳐진 로고가 있으면 그 동영상이 원작이 아님을 알 수 있습니다. 낮은 퀄리티의 콘텐츠에는 매우 짧은 영상, 움직이지 않는 이미지, GIF로만 제작된 동영상 등이 포함됩니다. QR 코드가 포함된 콘텐츠는 사용자를 유해한 웹사이트나 앱으로 유도할 수 있기 때문에 일반적으로 추천 피드에 표시될 자격이 없지만 위험이 낮은 경우(전자상거래 등)에는 예외를 두고 있습니다.","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"원본이 아닌 콘텐츠, 저품질 콘텐츠 및 QR 코드가 포함된 콘텐츠","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"TikTok 플랫폼에서 사용자가 기대하는 긍정적인 경험을 제공할 수 있도록 원작이 아니거나 퀄리티가 낮은 콘텐츠는 추천 자격을 상실합니다. 원작이 아닌 콘텐츠에는 창의적인 편집을 새로 추가하지 않고 다른 출처에서 그대로 가져오거나 업로드한 동영상이 포함됩니다. 동영상에 워터마크나 겹쳐진 로고가 있으면 그 동영상이 원작이 아님을 알 수 있습니다. 퀄리티가 낮은 콘텐츠에는 매우 짧은 동영상, 움직이지 않는 이미지, GIF로만 제작된 동영상 등이 포함됩니다.","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"복제된 계정","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"회원님의 계정에 원본이 아니며 추천 피드 자격이 없는 게시물이 포함되어 있습니다. 자세한 내용은 커뮤니티 가이드라인 \u003E 추천 피드에 적합하지 않음 \u003E 원본이 아닌 콘텐츠, 저품질 콘텐츠 및 QR 코드가 포함된 콘텐츠를 검토하세요","vid_mod_analytics_penalty_reason_spam_title":"스팸, 허위 또는 오해의 소지가 있는 콘텐츠","vid_mod_analytics_penalty_reason_spam_desc":"플랫폼에서 더 많은 팔로워, 좋아요, 조회수 또는 기타 참여 지표를 얻기 위해 사용자를 속이거나 조작하려는 콘텐츠는 추천 피드에 표시될 자격이 없습니다. 여기에는 사용자가 서로 팔로우하거나 좋아요를 누르도록 유도하는 콘텐츠 또는 좋아요 누르기나 공유 버튼을 클릭하도록 사용자를 속이는 콘텐츠가 포함됩니다. 또한 음모론을 조장하고 시사나 상세 내용이 밝혀지지 않은 사건에 관한 허위 또는 유해한 정보를 유포하는 콘텐츠도 추천 피드에 표시될 자격이 없습니다.","vid_mod_analytics_penalty_reason_sexual_title":"노골적으로 성적인 콘텐츠","vid_mod_analytics_penalty_reason_sexual_desc":"편안한 경험을 제공하기 위해 노골적인 성적 암시 콘텐츠는 추천 받을 자격이 없습니다. 여기에는 나체를 암시하는 콘텐츠, 신체 부위를 성적으료 묘사하는 콘텐츠, 노골적으로 외설적이거나 관능적인 콘텐츠(예: 스트립쇼)가 포함됩니다.","vid_mod_analytics_penalty_reason_tobacco_title":"담배 및 알코올 제품","vid_mod_analytics_penalty_reason_tobacco_desc":"합법적인 음주 연령의 사람이 소비하는 알코올 제품을 홍보 또는 언급하거나 묘사하지만,
