ingizga moderatsiya uchun ustuvorlik beriladi. Chiqmoqchi boʻlsangiz, {s_tapHere}","dsa_illegal_report_trustedflaggerlink":"bu yerni bosing","dsa_illegal_report_trustedflagger":"Agar ishonchli xabar beruvchi boʻlsangiz, %s","dsa_illegal_report_trustedflagger_signout_popup":"Hisobdan chiqasizmi?","dsa_illegal_report_trustedflagger_signout_popup_desc":"Ishonchli xabar beruvchi sifatida hisobdan chiqib, doimiy foydalanuvchi sifatida xabar berishni davom ettirmoqchimisiz?","dsa_illegal_report_trustedflagger_signout_popup_yes":"Ha","dsa_illegal_report_trustedflagger_signout_popup_no":"Yoʻq","osa_illegal_detail_reminder":"Atay yolg‘on yoki chalg‘ituvchi noqonuniy kontent haqida xabar berish qonunga muvofiq jazolanishi mumkin. Agar aniq asoslanmagan hisobotlarni tez-tez yuborsangiz, biz hisobot yuborish imkoniyatini to‘xtatib qo‘yish yoki hisobingizni butunlay bloklash huquqini o‘zimizda saqlab qolamiz.","dsa_illegal_report_penalty_reminder":"Qasddan noqonuniy kontent deb yolgʻon yoki chalgʻituvchi shikoyat qilish qonun boʻyicha javobgarlikka olib kelishi mumkin. Agar qayta-qayta nooʻrin shikoyatlarni yuboraversangiz, biz shikoyat yuborish imkoniyatingizni cheklash yoki hisobingizni butunlay bloklash huquqini saqlab qolamiz. Batafsil maʼlumot uchun Shaffoflik markaziga murojaat qiling.","Web_report_reason_select":"Shikoyat sababi:","dsa_illegal_report_email":"Email manzilingiz","dsa_illegal_cite_law_optional":"(ixtiyoriy)","dsa_illegal_report_fill_email":"Email manzilingizni kiriting","cseReasons_reportPg_emailAddForm_body":"Bu xabarni anonim tarzda yuborishingiz mumkin. Shunday boʻlsa-da, natija haqida sizga xabar berilmaydi yoki shikoyat berish tanlovingiz boʻlmaydi.","dsa_illegal_report_trustedflagger_fill_email":"Yaroqli email manzil kiriting","dsa_illegal_detail_country":"Yurisdiksiya","dsa_illegal_detail_law":"Tegishli qonun","dsa_illegal_cite_law_desc":"Daʼvo qilinayotgan kontent qaysi qonunni buzayotgani tafsilotlarini bildiring. Biz shikoyatingizni baholashimiz uchun imkon qadar aniq maʼlumot taqdim eting.","dsa_illegal_detail_explanation":"Shikoyat taʼrifi","dsa_illegal_report_explanation_desc":"Kontent tegishli qonunni qanday buzishini tasvirlang. Yetarlicha maʼlumotga ega boʻlmagan shikoyatlar yaroqli deb qabul qilinmasligi mumkin. Agar mos kelsa, bu shikoyatni oʻz nomingizdan yoki boshqa birovning nomidan kiritayotganingizni bildiring.","dsa_illegal_appeal_signature":"Imzo","dsa_illegal_sign_legal_name":"Qonuniy nomingiz bilan bu yerni imzolang.","dsa_illegal_confirm_accuracy":"Bu shikoyat mundarijasi toʻgʻri, aniq va toʻliq ekaniga ishonishimni tasdiqlayman.","idpa_attachment":"Biriktirmalar","idpa_attachment_instruction":"Hisobotni huquqlari buzilgan huquq egasi yoki uning ishonchli vakili taqdim etishi lozim. \u003CredLink\u003EYuborish qoidalari\u003C\u002FredLink\u003E bilan yaxshilab tanishib, barcha kerakli hujjatlarni yuboring. Fayl formatlari JPEG, JPG yoki PNG formatida va 20 MB dan kichik boʻlishi kerak.","idpa_attachment_sec1":"1-boʻlim:","idpa_identification_document_title":"Daʼvogarga oid hujjatlar","idpa_identification_document_instruction_IP":"Rasmiy shaxsni tasdiqlovchi hujjatlarni taqdim eting. Masalan: haydovchilik guvohnomasi (old va orqa tomoni), pasport (foto sahifasi va egasining ismi va favqulodda holatlarda bogʻlanish maʼlumotlari koʻrsatilgan sahifa), Mening raqamli kartam (faqat old tomoni) va boshqalar. Bundan tashqari, zaruratga qarab, siz agentlik vakolatini tasdiqlovchi hujjatlarni, vasiy kabi qonuniy vakilning roziligini tasdiqlovchi hujjatlarni va taqdim etish shaxsning oʻziga tegishli ekanini koʻrsatuvchi hujjatlarni taqdim etishingiz kerak. Bundan tashqari, agar siz yuridik shaxs boʻlsangiz, Korporativ roʻyxatdan oʻtganlik toʻgʻrisidagi guvohnoma, vakildan ishonchnoma kabi hujjatlarni taqdim etishingiz kerak. \u003CredLink\u003EBatafsil\u003C\u002FredLink\u003E","idpa_identification_document_instruction_nonIP":"Rasmiy shaxsni tasdiqlovchi hujjatlarni taqdim eting. Masalan: haydovchilik guvohnomasi (old va orqa tomoni), pasport (foto sahifasi va egasining ismi va favqulodda holatlarda bogʻlanish maʼlumotlari koʻrsatilgan sahifa), Mening raqamli kartam (faqat old tomoni) va boshqalar. Bundan tashqari, zaruratga qarab, siz agentlik vakolatini tasdiqlovchi hujjatlarni, vasiy kabi qonuniy vakilning roziligini tasdiqlovchi hujjatlarni va taqdim etish shaxsning oʻziga tegishli ekanini koʻrsatuvchi hujjatlarni taqdim etishingiz kerak. \u003CredLink\u003EBatafsil\u003C\u002FredLink\u003E","attachment_upload_limit":"Har bir fayl 20MB dan kichik boʻlishi shart","idpa_attachment_sec2":"2-boʻlim:","idpa_right_holder_status_title":"Huquq egasi maqomini tasdiqlovchi hujjatlar","idpa_ric_proof_title":"Huquqlar buzilgani toʻgʻrisidagi hujjatlar","idpa_right_holder_status_instruction_1":"(Intellektual mulk huquqini buzish)","idpa_right_holder_status_instruction_2":"Siz buzilgan deb hisoblagan intellektual mulk huquqlarini tasdiqlovchi hujjatlarni va taxmin qilingan intellektual mulk egasi ekaningizni tasdiqlovchi hujjatlarni yuboring. \u003CredLink\u003EBatafsil\u003C\u002FredLink\u003E","idpa_right_holder_status_instruction_3":"(Biznes manfaatini buzish)","idpa_right_holder_status_instruction_4":"Talab qilinadigan hujjatlar buzilgan deb taxmin qilingan biznes manfaatlariga qarab farq qiladi (masalan, mahsulot yorliqlarining obroʻsi yoki mashhurligini koʻrsatadigan materiallar, post isteʼmolchilarni sifat haqida chalgʻitishini koʻrsatadigan materiallar). \u003CredLink\u003ETafsilotlar\u003C\u002FredLink\u003E bilan tanishib, tegishli hujjatlarni yuboring. Har biri 20 MB dan kichik uchtagacha faylni JPEG, JPG yoki PNG formatida yuklashingiz mumkin.","idpa_ric_proof_instruction":"Joylashtirilgan kontentning huquqlaringizni buzadigan qismini aks ettiruvchi skrinshot yoki shu kabi dalillarni yuboring. JPEG, JPG yoki PNG formatida har biri 20 MB dan kichik uchtagacha fayl yuklashingiz mumkin. \u003CredLink\u003EBatafsil\u003C\u002FredLink\u003E","idpa_attachment_sec3":"3-boʻlim:","idpa_other_document_title":"Boshqa tasdiqlovchi hujjatlar","idpa_other_document_instruction":"Ishni isbotlovchi materiallar kabi har qanday tasdiqlovchi hujjatlarni taqdim eting, bu tuhmat uchun istisno emas. JPEG, JPG yoki PNG formatida har biri 20 MB dan kichik uchtagacha fayl yuklashingiz mumkin. \u003CredLink\u003EBatafsil\u003C\u002FredLink\u003E","idpa_disclaimer":"Shuni esda tutingki, bila turib yolgʻon yoki chalgʻituvchi xabar berish qonunga muvofiq jazolanishi mumkin. Agar siz ochiqdan-ochiq asoslanmagan hisobotlarni tez-tez yuborsangiz, biz hisobot yuborish imkoniyatini toʻxtatib qoʻyish yoki hisobingizni butunlay bloklash huquqini oʻzimizda saqlab qolamiz. \u003CredLink\u003EBatafsil\u003C\u002FredLink\u003E","ad_report_detail_placeholder_75_uk":"Kerakli choralar koʻrishimizga yordam berish uchun bu reklama bilan taassurotlaringiz haqida tafsilotlarni taqdim eting. BQ OSA qonuniga muvofiq bolalar uchun zararli kontentga pornografiya va jinsiy tajovuz, oʻz joniga qasd qilish va oʻzini jarohatlash, tartibsiz ovqatlanish, zoʻravonlik va nafrat, shafqatsizlik, bulling, zararli tryuklar va chellenjlar, zararli moddalar, nosogʻlom tana rasmi va depressiyaga soluvchi kontent. Aniqlay olsangiz, turkumni aniqlang.","ad_report_detail_placeholder_75_eea_row":"Kerakli choralar koʻrishimizga yordam berish uchun bu reklama bilan taassurotlaringiz haqida tafsilotlarni taqdim eting.","ad_report_reason_L1Misinfo_L2aigc_v2_0":"Bu reklamada AI yaratgan yoki tahrirlagan, nomaqbul ishlatilgan, ruxsatsiz yoki notoʻgʻri yorliqlangan kontent boʻlishi mumkin. Bunga quyidagilar kirishi mumkin:","ad_report_reason_L1Misinfo_L2aigc_v2_1":"Yorliqlanmagan yoki oshkor etilmagan AI yaratgan kontent. Reklama AI yordamida kontent yaratadi, lekin bu aytilmaydi.","ad_report_reason_L1Misinfo_L2aigc_v2_2":"Haqiqiy shaxsning ruxsatisiz uning qiyofasi, ovozi yoki shaxsiyatidan foydalanish. Reklamada goʻyo haqiqiy odam tasvirlangan yoki uning ovozi eshitiladi, ammo oʻsha odam bunga ro  tanlangan kosmetik jarrohlik muhokama qilingan postlar 18 yoshdan kichik barcha foydalanuvchilarning Siz uchun tasmasida chiqarilmaydi.","vid_mod_analytics_penalty_reason_unoriginal_title":"Nooriginal, past sifatli va QR kodli kontent","vid_mod_analytics_penalty_reason_unoriginal_desc":"TikTok foydalanuvchilarimiz video tomoshasidan zavq olishi uchun original boʻlmagan yoki past sifatli kontent tavsiya etilmaydi. Original boʻlmagan kontentga boshqa manbalardan (masalan, boshqa platformalar, koʻrsatuvlar, filmlar yoki veb-translatsiyalar) yangi, ijodiy tahrirlarsiz import qilingan yoki yuklangan videolar kiradi. Agar videoda suv belgisi yoki logotip boʻlsa, biz uni original emas deb hisoblaymiz. Past sifatli kontentga juda qisqa videolar, faqat GIF animatsiyadan iborat statik rasmlar va videolar kiradi. QR kodga ega kontent odatda Siz uchun tasmasiga muvofiq kelmaydi, chunki u foydalanuvchilarni zararli veb-saytlar yoki ilovalarga yoʻnaltirishi mumkin. Xavf past boʻlgan holatlarda (masalan, elektron tijorat uchun) istisno qilamiz.","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"Nooriginal, past sifatli va QR kodli kontent","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"Foydalanuvchilarimiz TikTokdan kutgan ijobiy taassurotlarni saqlash uchun original boʻlmagan va past sifatli kontent tavsiya etishga muvofiq emas. Original boʻlmagan kontent bu yangi, ijodiy tahrirlashlarsiz boshqa manbalardan shunchaki import qilingan yoki nusxalangan kontentdir. Videoda suv belgisi yoki logotip boʻlsa ham u original boʻlmasligi mumkin. Past sifatli kontentga oʻta qisqa videolar, harakatsiz tasvirlar hamda faqat GIFlardan iborat videolar kiradi.","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"Shishirilgan hisob","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"Hisobingizda original boʻlmagan postlar mavjud va Siz uchun tasmasiga mos kelmaydi. Tafsilotlar uchun Hamjamiyat qoidalari \u003E Siz uchun tasmasi uchun mos emas \u003E Nooriginal, past sifatli va QR kodli kontent bilan tanishing","vid_mod_analytics_penalty_reason_spam_title":"Spam, soxta yoki chalgʻituvchi kontent","vid_mod_analytics_penalty_reason_spam_desc":"Platformada koʻproq obunachilar, layklar, tomoshalar yoki boshqa aloqa metrikasini olish uchun foydalanuvchilarni aldash yoki manipulyatsiya qilishga urinadigan kontent Siz uchun tasmasiga mos kelmaydi. Bunga foydalanuvchilarni bir-birini kuzatish yoki layk bosishga undaydigan kontent yoki foydalanuvchilarni aldov yoʻli bilan layk bosish yoki ulashish tugmalarini bosishga chaqiradigan kontent kiradi. Bundan tashqari, fitna nazariyalarini targʻib qiluvchi va joriy hodisalar va jarayoni yakunlanmagan voqealar haqida xato yoki zararli axborotlarni tarqatuvchi kontent Siz uchun tasmasiga mos kelmaydi.","vid_mod_analytics_penalty_reason_sexual_title":"Oʻta shahvoniy kontent","vid_mod_analytics_penalty_reason_sexual_desc":"Qulay taassurotlar muhitini saqlashga yordam berish maqsadida shahvoniy shamali videolar tavsiya etilmaydi. Bunga yalangʻochlikni aks ettiruvchi, tana aʼzolarini shahvoniy tarzda namoyish etuvchi yoki ochiqdan-ochiq erotik yoki shahvoniy harakat (masalan, striptiz) tasvirlangan kontent kiradi.","vid_mod_analytics_penalty_reason_tobacco_title":"Tamaki va alkogol mahsulotlari","vid_mod_analytics_penalty_reason_tobacco_desc":"Qonuniy ichish yoshidagi shaxslarning alkogol mahsulotlarini xavfli tarzda ichini targʻib qiluvchi, zikr qiluvchi yoki tasvirlovchi kontent tavsiya etilmaydi. Voyaga yetgan shaxslarning tamaki mahsulotlarini isteʼmol qilishi tasvirlangan yoki taqiqlangan moddalar zikr qilingan kontent tavsiya etilmaydi.","vid_mod_analytics_penalty_reason_stunts_title":"Xavfli tryuklar va sport turlari","vid_mod_analytics_penalty_reason_stunts_desc":"Xavfsizlik choralarisiz takrorlanganda ayrim harakatlar xavfli boʻlishi yoki jarohatlanishga olib kelishi mumkin. Noprofessionallar tomonidan bajarilgan xavfli tryuklar yoki ekstremal sport turlarini oʻz ichiga olgan kontent nomaqbul boʻlishi mumkin.","vid_mod_analytics_penalty_reason_graphic_title":"Zoʻravonlik yoki shafqatsiz kontent","vid_mod_analytics_penalty_reason_graphic_desc":"Tomoshabinlarda noqulaylik hissini chaqiruvchi, shokka tushiruvchi yoki jirkantiruvchi kontent, jumladan, qoʻrqinchi effektlar, skrimerlar, qonli jarohatlar realistik grimlari va tana funksiyalarining tasviri Siz uchun tasmasiga mos kelmasligi mumkin. TikTokda aksariyat zoʻravonlik va shafqatsizlik tasvirlangan kontentlarga ruxsat berilmaydi. Lekin biz oʻlim, baxtsiz hodisalar yoki janjal kabi grafik kontentga ular jamoat manfaatlariga mos boʻlsa ruxsat berishimiz mumkin. Bu kontent barcha tomoshabinlarga mos boʻlmagani sababli u tavsiya etila olmaydi va kontentda “rozilik bildirish” ekrani yoki ogohlantirish bo‘ladi.","vid_mod_analytics_penalty_reason_fyf_title":"Siz uchun tasmasiga mos emas","vid_mod_analytics_penalty_reason_fyf_desc":"Videongiz Siz uchun tasmasiga muvofiqlik standartlarimizga javob bermaydi. Tafsilotlar uchun TikTok Hamjamiyat qoidalari \u003E Siz uchun tasmasiga mos emas rukni bilan tanishing","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"Foydalanuvchilar va 3-tomonlar qoidabuzarliklar haqida bizga xabar berishi mumkin. Biz kontent Hamjamiyat qoidalarini buzgani haqidagi shikoyat asosida ushbu qoidaning buzilishini aniqladik.","vidModAnalytics_detailPg_sectionVideoDetails_sectionLabel":"Video tafsilotlari","vid_mod_analytics_appeal_detailpg_reason_title":"Qoidabuzarlik sababi","vid_mod_analytics_detail_pg_title":"Video mos emas","vid_mod_analytics_detail_pg_desc":"Bu video Siz uchun tasmasiga mos emas, chunki u Hamjamiyat qoidalarini buzadi.","vidModAnalytics_detailPg_sectionSuccess_header":"Shikoyat tasdiqlandi","vid_mod_analytics_appeal_success_detail_pg_desc":"Shikoyatingiz tekshirildi va videongiz tiklandi. Yuzaga kelgan noqulayliklar uchun uzr. TikTok hamjamiyatining bir qismi ekaningizdan mamnunmiz!","vid_mod_analytics_appeal_detail_pg_title":"Video olib tashlandi",
