gelerini gönderin. Örnekler arasında sürücü belgesi (ön ve arka), pasaport (fotoğraf sayfası ve pasaport sahibinin adını ve acil durum iletişim bilgilerini içeren sayfa), My Number Card (yalnızca ön) yer alır. Ayrıca gerektiğinde, temsil yetkisini kanıtlayan belgeleri, vasi gibi bir yasal temsilciden alınan onayı kanıtlayan belgeleri ve gönderimin bireye ait olduğunu gösteren belgeleri göndermelisiniz. Buna ek olarak, bir tüzel kişiyseniz Şirket Tescil Belgesi ve temsilciden alınan Vekaletname gibi belgeleri de göndermelisiniz. \u003CredLink\u003EDaha fazla bilgi edinin\u003C\u002FredLink\u003E","idpa_identification_document_instruction_nonIP":"Lütfen resmî kimlik belgelerini gönderin. Örnekler arasında sürücü belgesi (ön ve arka), pasaport (fotoğraf sayfası ve pasaport sahibinin adını ve acil durum iletişim bilgilerini içeren sayfa), My Number Card (yalnızca ön) yer alır. Ayrıca gerektiğinde, temsil yetkisini kanıtlayan belgeleri, vasi gibi bir yasal temsilciden alınan onayı kanıtlayan belgeleri ve gönderimin bireye ait olduğunu gösteren belgeleri göndermelisiniz. \u003CredLink\u003EDaha fazla bilgi edinin\u003C\u002FredLink\u003E","attachment_upload_limit":"Her bir dosya 20 MB'tan az olmalıdır","idpa_attachment_sec2":"2. Bölüm:","idpa_right_holder_status_title":"Hak sahibi durumunu kanıtlayan belgeler","idpa_ric_proof_title":"Hak ihlali ile ilgili belgeler","idpa_right_holder_status_instruction_1":"(Fikrî mülkiyet haklarının ihlali)","idpa_right_holder_status_instruction_2":"Lütfen ihlal edildiğini düşündüğünüz fikrî mülkiyet haklarını tanımlayan ve ihlal edildiği iddia edilen fikrî mülkiyetin sahibi olduğunuzu gösteren belgeleri gönderin. \u003CredLink\u003EDaha fazla bilgi edinin\u003C\u002FredLink\u003E","idpa_right_holder_status_instruction_3":"(Ticari çıkarların ihlali)","idpa_right_holder_status_instruction_4":"Gerekli belgeler, ihlal edildiği iddia edilen ticari çıkarlara bağlı olarak değişiklik gösterir (ör. ürün etiketlerinin tanınmışlığını veya bilinirliğini kanıtlayan materyaller, gönderinin tüketicileri ürünün kalitesi konusunda yanılttığını gösteren materyaller). Lütfen \u003CredLink\u003Eayrıntıları\u003C\u002FredLink\u003E inceleyin ve uygun belgeleri gönderin. Her biri 20 MB'nin altında olan JPEG, JPG veya PNG formatında en fazla üç dosya yükleyebilirsiniz.","idpa_ric_proof_instruction":"Lütfen haklarınızı ihlal ettiğini düşündüğünüz yayınlanan içerik bölümünü gösteren bir ekran görüntüsü veya benzer bir kanıt gönderin. Her biri 20 MB'nin altında olan JPEG, JPG veya PNG formatında en fazla üç dosya yükleyebilirsiniz. \u003CredLink\u003EDaha fazla bilgi edinin\u003C\u002FredLink\u003E","idpa_attachment_sec3":"3. Bölüm:","idpa_other_document_title":"Diğer destekleyici belgeler","idpa_other_document_instruction":"Lütfen olayın hakaret istisnaları kapsamına girmediğini gösteren diğer destekleyici belgeleri gönderin. Her biri 20 MB'nin altında olan JPEG, JPG veya PNG formatında en fazla üç dosya yükleyebilirsiniz. \u003CredLink\u003EDaha fazla bilgi edinin\u003C\u002FredLink\u003E","idpa_disclaimer":"Bilinçli bir şekilde hatalı veya yanlış yönlendiren bir bildiride bulunmanın yasalar uyarınca cezalandırılabileceğini lütfen unutmayın. Sıklıkla açıkça dayanağı olmayan bildiriler gönderirseniz bildiri gönderme özelliğinizi askıya alma veya hesabınızı kalıcı olarak yasaklama hakkımızı saklı tutarız. \u003CredLink\u003EDaha fazla bilgi edinin\u003C\u002FredLink\u003E","ad_report_detail_placeholder_75_uk":"Lütfen bu reklamla ilgili deneyiminiz hakkında ayrıntılı bilgi sağlayarak gerekli işlemleri yapmamıza yardımcı olun. Birleşik Krallık Çevrimiçi Güvenlik Yasası (OSA) kapsamında çocuklara yönelik zararlı içerikler arasında pornografi ve cinsel aktiviteler, intihar ve kendine zarar verme, yeme bozukluğu davranışları, taciz ve nefret, şiddet, zorbalık, tehlikeli numaralar ve meydan okumalar, zararlı maddeler, sağlıksız vücut algısı ve depresif içerikler bulunur. Lütfen mümkünse bir kategori belirleyin.","ad_report_detail âhil bu tür içerikler 18 yaş altı tüm kullanıcıların Sizin İçin akışına uygun değildir.","vid_mod_analytics_penalty_reason_unoriginal_title":"Özgün olmayan, düşük kaliteli ve QR kodlu içerikler","vid_mod_analytics_penalty_reason_unoriginal_desc":"Orijinal olmayan ya da düşük kaliteli içerikler, TikTok'u kullanıcılarımız için pozitif ve keyifli hale getirmek adına öneri için uygun kabul edilmez. Orijinal olmayan içerikler arasında yeni ve yaratıcı düzenleme içermeyen ve başka kaynaklardan (başka platformlar, TV programları, filmler ya da web yayınları gibi) içe aktarılan veya yüklenen videolar bulunur. Üzerinde filigran ya da üste yerleştirilmiş bir logo bulunduran videoların orijinal olmadığını anlarız. Düşük kaliteli içerikler arasında çok kısa videolar, sabit resimler ve sadece GIF'lerle hazırlanan videolar bulunur. Kullanıcıları zararlı web siteleri ya da uygulamalara yönlendirebileceğinden genelde QR kodlu içerikler Sizin İçin akışına uygun değildir. Öte yandan, riskin düşük olduğu durumlarda (örneğin, e-ticaret için) istisnalar yapabiliriz.","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"Özgün olmayan, düşük kaliteli ve QR kodlu içerikler","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"Kullanıcılarımızın TikTok platformundan beklediği pozitif deneyimi korumak adına orijinal olmayan ve düşük kaliteli içerikler tavsiye için uygun değildir. Orijinal olmayan içerik, yeni ve yaratıcı düzenlemelerin olmadığı, doğrudan başka kaynaklardan aktarılan ya da kopyalanan içeriktir. Filigran ya da logo barındıran bir video orijinal olmayabilir. Düşük kaliteli içerikler arasında çok kısa videolar, sabit resimler ve yalnızca GIF'lerden yapılmış videolar bulunur.","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"Kopyalanmış hesap","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"Hesabınız, özgün olmayan ve Sizin İçin akışına uygun bulunmayan gönderiler içeriyor. Daha fazla bilgi için Topluluk Kuralları \u003E Sizin İçin akışında izin verilmeyen içerikler \u003E Özgün olmayan, düşük kaliteli ve QR kodlu içerikler bölümünü inceleyin","vid_mod_analytics_penalty_reason_spam_title":"Spam, özgün olmayan veya yanıltıcı içerik","vid_mod_analytics_penalty_reason_spam_desc":"Platformda daha fazla takipçi, beğeni, görüntüleme veya diğer etkileşim metrikleri almak için kullanıcıları kandırmaya ya da manipüle etmeye çalışan içerikler Sizin İçin akışına uygun değildir. Bunlara, kullanıcıları birbirlerini takip etmeye ya da beğenmeye yönlendiren veya kullanıcıları beğenme veya paylaşma düğmelerine tıklamaları için kandıran içerikler dâhildir. Ek olarak, komplo teorilerini teşvik eden ve güncel olaylar ve hâlâ gelişmekte olan olaylar hakkında yanlış veya zararlı bilgiler yayan içerikler de Sizin İçin akışına uygun değildir.","vid_mod_analytics_penalty_reason_sexual_title":"Açıkça müstehcen içerikler","vid_mod_analytics_penalty_reason_sexual_desc":"Cinsel açıdan aşırı davetkar içerikler, konforlu bir deneyim sağlamak adına öneriler için uygun olmayabilir. Çıplaklık imasında bulunan, beden uzuvlarını cinselleştiren ya da bariz biçimde erotik ya da müstehcen içerikler (yani striptiz) buna dâhildir.","vid_mod_analytics_penalty_reason_tobacco_title":"Tütün ve alkol ürünleri","vid_mod_analytics_penalty_reason_tobacco_desc":"Yasal alkol tüketme yaşındaki kişilerin alkollü ürünleri tehlikeli bir şekilde tanıttığı, anlattığı ya da tasvir ettiği içerikler öneri için uygun olmayabilir. Yetişkinlerin tütün ürünü kullanımını tasvir eden ya da kontrollü maddelerden bahseden içerikler öneri için uygun olmayabilir.","vid_mod_analytics_penalty_reason_stunts_title":"Tehlikeli hareketler ve sporlar","vid_mod_analytics_penalty_reason_stunts_desc":"Güvenlik uyarıları olmadan tekrar edilen belli faaliyetler riskli veya tehlikeli olup fiziksel hasara yol açabilir. Profesyonel olmayan kişilerin gerçekleştirdiği tehlikeli numaralar ya da ekstrem sporlar uygun olmayabilir.","vid_mod_analytics_penalty_reason_graphic_title":"Şiddet içe
