paransi kita kanggo informasi liyane.","Web_report_reason_select":"Jalaran lapuran:","dsa_illegal_report_email":"Alamat email sampeyan","dsa_illegal_cite_law_optional":"(Opsional)","dsa_illegal_report_fill_email":"Isenana alamat email sampeyan","cseReasons_reportPg_emailAddForm_body":"Sampeyan bisa ngirim lapuran iki tanpa jeneng. Nanging, sampeyan ora bakal dikabari babagan asile utawa nduweni pilihan kanggo ngajokake bandhing.","dsa_illegal_report_trustedflagger_fill_email":"Lebokake alamat email sing valid","dsa_illegal_detail_country":"Yurisdiksi ukum","dsa_illegal_detail_law":"Ukum sing gegandhengan","dsa_illegal_cite_law_desc":"Sedhiyakake rincian babagan ukum sing dianggep dilanggar dening kontene. Jelasake sak rinci-rincine supaya kita bisa njajagi lapuran sampeyan.","dsa_illegal_detail_explanation":"Panjelasan Lapuran","dsa_illegal_report_explanation_desc":"Terangake kenangapa konten iku nglanggar ukum sing relevan. Lapuran sing ora ngandhut informasi sing cukup mungkin ora dianggep valid. Yen relevan, temtokake yen sampeyan ngirimake panjalukan iki kanggo awak sampeyan dhewe utawa makili wong liya.","dsa_illegal_appeal_signature":"Tapak asta","dsa_illegal_sign_legal_name":"Tulis jeneng resmi ing kene.","dsa_illegal_confirm_accuracy":"Aku ngonfirmasi yen aku yakin konten ing lapuran iki bener, akurat, lan lengkap.","idpa_attachment":"Lampiran","idpa_attachment_instruction":"Lapuran kudu diajokake dening sing duwe hak sing hake wis dilanggar, utawa dening wakil resmi. Tinjo \u003CredLink\u003Epanduan pangajuan\u003C\u002FredLink\u003E kanthi ngati-ati lan kirim kabeh dokumentasi sing dibutuhake. Format file kudu JPEG, JPG, utawa PNG, lan ukurane kudu kurang saka 20 MB.","idpa_attachment_sec1":"Bagean 1:","idpa_identification_document_title":"Dokumen sing gegandhengan karo sing ngeklaim","idpa_identification_document_instruction_IP":"Kirim dokumen identifikasi resmi. Contone kalebu: SIM (bagean ngarep lan mburi), paspor (kaca foto lan kaca sing ngandhut jenenge sing duwe lan informasi kontak darurat), My Number Card (mung bagean ngarep), lsp. Saliyane kuwi, yen dibutuhake, sampeyan kudu ngirim dokumen sing mbuktekake otoritase instansi, dokumen sing mbuktekake pasetujon saka wakil ukum kayata wali, lan dokumen sing nuduhake yen pangajuan kasebut gegandhengan karo individu kuwi dhewe. Saliyane kuwi, yen sampeyan kuwi badan hukum, sampeyan kudu nyerahake dokumen kayata Sertipikat Pandhaftaran Perusahaan, lan Layang Kuwasa saka wakil. \u003CredLink\u003ENgerteni liyane\u003C\u002FredLink\u003E","idpa_identification_document_instruction_nonIP":"Kirim dokumen identifikasi resmi. Contone kalebu: SIM (bagean ngarep lan mburi), paspor (kaca foto lan kaca sing ngandhut jenenge sing duwe lan informasi kontak darurat), My Number Card (mung bagean ngarep), lsp. Saliyane kuwi, yen dibutuhake, sampeyan kudu ngirim dokumen sing mbuktekake otoritas instansi, dokumen sing mbuktekake pasetujon saka wakil ukum kayata wali, lan dokumen sing nuduhake yen pangajuan kasebut gegandhengan karo individu kuwi dhewe. \u003CredLink\u003ENgerteni liyane\u003C\u002FredLink\u003E","attachment_upload_limit":"Saben file kudu luwih cilik saka 20MB","idpa_attachment_sec2":"Bagean 2:","idpa_right_holder_status_title":"Dokumentasi sing mbuktekake statuse sing nduwe hak","idpa_ric_proof_title":"Dokumen sing gegandhengan karo palanggaran hak","idpa_right_holder_status_instruction_1":"(Palanggaran hak kekayaan intelektual)","idpa_right_holder_status_instruction_2":"Kirim dokumen sing ngenali hak kekayaan intelektual sing sampeyan yakini wis dilanggar, lan dokumen sing nuduhake yen sampeyan sing duwe kekayaan intelektual sing diperkarakake kuwi. \u003CredLink\u003ENgerteni liyane\u003C\u002FredLink\u003E","idpa_right_holder_status_instruction_3":"(Palanggaran kapentingan bisnis)","idpa_right_holder_status_instruction_4":"Dokumentasi sing dibutuhake beda-beda, gumantung kapentingan bisnis sing diduga wis nglanggar (conto, materi sing nuduhake reputasi utawa misuwure label produk, materi sing nuduhake yen postingan kasebut mblasukake konsumen babagan kualitas). Tinjo \u003CredLink\u003Epeprincen\u003C\u002FredLink\u003E lan kirim dokumentasi sing cocog. Sampeyan bisa ngunggah nganti telung file ing format JPEG, JPG, utawa PNG, saben file ukurane kurang saka 20 MB.","idpa_ric_proof_instruction":"Kirim potret layar utawa bukti sing memper sing nuduhake bagean konten sing diposting sing sampeyan yakini nglanggar hak sampeyan. Sampeyan bisa ngunggah nganti telung file ing format JPEG, JPG, utawa PNG, saben file ukurane kurang saka 20 MB. \u003CredLink\u003ENgerteni liyane\u003C\u002FredLink\u003E","idpa_attachment_sec3":"Bagean 3:","idpa_other_document_title":"Dokumen liyane sing ndhukung","idpa_other_document_instruction":"Kirim dokumen apa wae sing ndhukung kayata materi sing nuduhake yen kasus kasebut ora kalebu ing pangejaban pitenah. Sampeyan bisa ngunggah nganti telung file ing format JPEG, JPG, utawa PNG, saben file ukurane kurang saka 20 MB. \u003CredLink\u003ENgerteni liyane\u003C\u002FredLink\u003E","idpa_disclaimer":"Elinga, yen kanthi sengaja nggawe lapuran palsu utawa mblasukake bisa uga diukum miturut ukum. Yen sampeyan kerep ngirim lapuran sing nyata-nyata ora duwe dhasar, kita duwe hak kanggo nangguhake kabisan sampeyan ngirim lapuran utawa mblokir akun sampeyan salawase. \u003CredLink\u003ENgerteni liyane\u003C\u002FredLink\u003E","ad_report_detail_placeholder_75_uk":"Wenehake peprincen babagan pangalaman sampeyan nganggo iklan iki kanggo mbantu kita nglakoni tumindak sing dibutuhake. Konten sing mbebayani kanggo bocah miturut OSA Inggris Raya sing nyakup aktivitas pornografi lan seksual, nglalu lan nglarani awake dhewe, gangguan pola mangan, nyiksa lan sengit, tumindak aniaya, reridhu, aksi lan tantangan sing mbebayani, dat sing mbebayani, gambaran awak sing ora sehat lan konten sing sipate depresif. Sebutake kategorine yen sampeyan bisa.","ad_report_detail_placeholder_75_eea_row":"Wenehake peprincen babagan p ollectionsProfilePage_favoritesPage_newModal_errorMessage":"Ngluwihi watesan karakter","pcWeb_add_reply":"Tambahake jawaban...","comment_tray_default":"Tambahake komentar...","vid_mod_analytics_penalty_reason_minor_title":"Kaslametan bocah","vid_mod_analytics_penalty_reason_minor_desc":"Kanggo nyedhiyakake forum tambahan kanggo bocah las-lasan kanggo njlajah lan ngungkab identitas ing ruang digital, konten sing diunggah dening pangguna sing umure kurang saka 16 taun ora layak direkomendasekake. Promosi operasi plastik marang bocah bisa nyebabake tingkat ora marem marang awake dhewe luwih dhuwur. Mulane, konten kaya mengkono, kalebu video gambaran sadurunge-sabanjure, video prosedur operasi, lan pesen sing ngrembug operasi plastik pilihan tanpa pepeling risiko, ora layak kanggo kabar ing Saran kanggo kabeh pangguna sing umure kurang saka 18 taun.","vid_mod_analytics_penalty_reason_unoriginal_title":"Konten ora asli, kualitas cendhek, lan kode QR","vid_mod_analytics_penalty_reason_unoriginal_desc":"Supaya TikTok tetep positif lan bisa dinikmati dening pangguna, konten sing ora asli utawa kualitase cendhek ora layak direkomendasekake. Konten ora asli nyakup video sing mung diimpor utawa diunggah saka sumber liyane (kayata platform liya, acara TV, film, utawa webcast) tanpa editan kreatif anyar. Kita bisa ngerti yen video ora asli yen nduweni watermark utawa ditempeli logo. Konten kualitas cendhek nyakup video sing cekak banget, video gambar mandheg, lan video sing digawe mung saka GIF. Konten sing ngandhut kode QR umume ora layak kanggo kabar ing Saran amarga bisa ngarahake pangguna marang situs web utawa apl mbebayani, sanajan kita nggawe pangejaban ing kahanan nalika risikone cendhek (kayata kanggo e-commerce).","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"Konten ora asli, kualitas cendhek, lan kode QR","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"Kanggo njaga pangalaman sing positif sing dikarepake pangguna saka platform TikTok, konten ora asli lan kualitase cendhek ora layak direkomendasekake. Konten ora asli yaiku konten sing mung diimpor utawa disalin saka sumber liyane tanpa editan kreatif anyar. Video klebu ora asli yen nduweni watermark utawa ditempeli logo. Konten kualitas cendhek nyakup video sing cekak banget, video gambar mandheg, lan video sing digawe mung saka GIF.","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"Akun sing diprodhuksi maneh","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"Akun sampeyan ngamot postingan sing ora asli lan ora layak kanggo kabar ing Saran. Kanggo informasi liyane, tinjo Panduan Komunitas kita \u003E Ora Cocog kanggo kabar ing Saran \u003E Konten ora asli, kualitas cendhek, lan kode QR","vid_mod_analytics_penalty_reason_spam_title":"Konten spam, palsu, utawa mblasukake","vid_mod_analytics_penalty_reason_spam_desc":"Konten sing nyoba ngakali utawa manipulasi pangguna supaya entuk luwih akeh fan, seneng, tayangan, utawa metrik interaksi ing platform ora layak kanggo kabar ing Saran. Iki kalebu konten sing ngojok-ojoki pangguna supaya padha-padha ngetutake utawa nyenengi, utawa konten sing ngakali pangguna supaya ngeklik tombol seneng utawa bage. Saliyane kuwi, konten sing mromosekake teori konspirasi lan nyebarake informasi sing kleru utawa mbebayani babagan kedadeyan sing saiki lan kedadeyan sing rinciane isih bisa dikembangake uga ora layak kanggo kabar ing Saran.","vid_mod_analytics_penalty_reason_sexual_title":"Konten sing blak-blakan sacara seksual","vid_mod_analytics_penalty_reason_sexual_desc":"Kanggo mbantu njaga pangalaman sing nyaman, konten sing wis cetha sipate seksual bisa uga ora layak direkomendasekake. Iki klebu konten sing nggambarake wong wuda, nuduhake perangan awak kanthi seksual, utawa terang-terangan erotis utawa sensual (kayata, joged wuda).","vid_mod_analytics_penalty_reason_tobacco_title":"Produk mbako lan alkohol","vid_mod_analytics_penalty_reason_tobacco_desc":"Konten sing ngiklanake, nyebut, utawa nuduhake produk alkohol sing diombe dening wong sing wis entuk ngombe miturut ukum nanging dilakoni kanthi cara sing mbebayani bisa ora direkomendasekake. Konten sing nuduhake panggunaan produk mbako dening wong diwasa utawa nyebutake bahan sing dikontrol undhang-undhang ora layak direkomendasekake.","vid_mod_analytics_penalty_reason_stunts_title":"Aksi lan olahraga sing mbebayani","vid_mod_analytics_penalty_reason_stunts_desc":"Nalika ditiru tanpa langkah-langkah keamanan, tumindak tartamtu bisa ngundang risiko utawa mbebayani, bisa nyebabake cilakane awak. Konten sing kalebu aksi mbebayani, utawa olahraga ekstrim sing dilakoni dening wong sing dudu profesional bisa ora layak.","vid_mod_analytics_penalty_reason_graphic_title":"Konten aniaya lan gambar sadis","vid_mod_analytics_penalty_reason_graphic_desc":"Konten sing nyebabake pamirsa ora nyaman, kaget, utawa jijik bisa uga ora layak kanggo Kabar ing Saran, kalebu efek medeni, ngeget-geti, dandanan kaya tatu asli sing lerah-lerah, lan gambaran fungsi awak. Konten aniaya lan eksplisit akeh-akehe ora diidini ing TikTok. Nanging, kita bisa uga ngidini jinis konten tartamtu, kayata gambar eksplisit pepati, kacilakan, utawa krengan nalika ndokumentasekake kedadeyan sing nyata lan dianggep dadi kawigatene umum. Amarga konten iki bisa uga ora nyaman kanggo kabeh audiens, konten iki ora layak direkomendasekake, lan konten iki bakal diwenehi layar \"nampa utawa nolak\" utawa tandha bebaya.","vid_mod_analytics_penalty_reason_fyf_title":"Ora mlebu syarat kanggo kabar ing Saran","vid_mod_analytics_penalty_reason_fyf_desc":"Video sampeyan ora manut karo standar kelayakan kanggo kabar ing Saran. Waca Panduan Komunitas TikTok kanggo ngerteni luwih akeh informasi \u003E Ora layak kanggo kabar ing Saran","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"Pangguna lan pihak katelu bisa nglapurake palanggaran kebijakan marang kita. Kita wis ndheteksi palanggaran kebijakan adhedhasar lapuran yen konten kuwi nglanggar Panduan Komunitas kita.","vidModAnalytics_detailPg_sectionVideoDetails_sectionLabel":"Rincian video","vid_mod_analytics_appeal_detailpg_reason_title":"Jalaran palanggaran","vid_mod_analytics_detail_pg_title":"Video ora layak","vid_mod_analytics_detail_pg_desc":"Video iki ora layak kanggo kabar ing Saran amarga nglanggar Panduan Komunitas kita.","vidModAnalytics_detailPg_sectionSuccess_header":"Bandhing disetujoni","vid_mod_analytics_appeal_success_detail_pg_desc":"Kita wis ninjo bandhing sampeyan lan wis mulihake video sampeyan. Nyuwun ngapunten yen iki ndadekake ora nyaman. Matur nuwun wis dadi bagean saka komunitas TikTok!","vid_mod_analytics_appeal_detail_pg_title":"Video dibusak","vid_mod_analytics_appeal_detail_pg_desc":"Video iki nglanggar Panduan Komunitas.","vidModAnalytics_appealSubmitted_sectionTitle_header":"Panjalukan ditampa","vid_mod_analytics_appeal_rcv_detail_pg_desc":"Kita wis nampa panjalukan sampeyan lan bakal ngabari sawise asil bandhing sumadhiya.","rIC_detailPg_violationReason_title":"Alasan palanggaran","dsaCGWebapp_detailPg_sectionCG_link":"Panduan Komunitas","dsaCGWebapp_appealExpired_emptyState_body":"Sampeyan wis ora bisa ngajokake bandhing kanggo kaputusan iki amarga watesan wektu bandhing wis kadaluwarsa.","appeal_btn_new":"Bandhing","reasonForAppeal_appealPg_appealReasonCard_title":"Alasan kanggo ngirim bandhing tumrap kaputusane","oSA_appealPg_appealExplain_title":"Panjelasan bandhing","rIC_appealPg_appealExplain_title":"Panjelasan bandhing","oSA_appealPg_appealExplain_desc":"Sedhiyakake peprincen sak akeh-akehe babagan kenangapa sampeyan ora sarujuk karo kaputusane. Iki marakake kita bisa njajagi bandhing sampeyan kanthi bener.","rIC_appealPg_appealExplain_desc":"Sedhiyakake peprincen sak akeh-akehe babagan kenangapa sampeyan ora sarujuk karo watesane. Iki ndadekake kita bisa njajagi bandhing sampeyan kanthi bener.","dsa_illegal_uploader_vio_appeal_exp_desc":"Sedhiyakake rincian sak akeh-akehe babagan kenangapa sampeyan ora sarujuk karo watesane supaya k
