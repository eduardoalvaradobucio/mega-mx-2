ginal_title":"Innhold som ikke er originalt, av lav kvalitet eller har QR-kode","vid_mod_analytics_penalty_reason_unoriginal_desc":"For å holde TikTok positivt og morsomt for brukerne våre, er innhold som er uoriginalt eller av lav kvalitet, ikke kvalifisert for anbefalinger. Uoriginalt innhold inkluderer videoer som nettopp er importert eller lastet opp fra andre kilder (som andre plattformer, TV-serier, filmer eller nettsendinger) uten noen nye, kreative redigeringer. Vi kan se om en video er uoriginal hvis den har et vannmerke eller en overliggende logo på seg. Innhold av lav kvalitet inkluderer svært korte videoer, statiske bilder og videoer som kun av er laget av GIF-er. Generelt sett tillater vi heller ikke innhold med QR-koder i For deg-strømmen da det kan videresende brukere til skadelige nettsider eller apper, selv om vi gjør unntak for dette i tilfeller der risikoen er lav (for eksempel for e-handel).","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"Innhold som ikke er originalt, av lav kvalitet eller har QR-kode","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"For å opprettholde den positive opplevelsen som brukerne våre forventer på TikTok-plattformen, kan ikke uoriginalt innhold og innhold av lav kvalitet anbefales. Uoriginalt innhold er innhold som importeres eller kopieres fra andre kilder uten ny, kreativ redigering. En video kan være uoriginal selv om den har et vannmerke eller logo på seg. Innhold av lav kvalitet er veldig korte videoer, statiske bilder og videoer som bare er GIF-er.","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"Reprodusert konto","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"Kontoen din består av innlegg som ikke er originale eller uberettiget til For deg-strømmen. For å få mer informasjon må du lese gjennom retningslinjene for fellesskapet \u003E Egner seg ikke i For deg-strømmen \u003E Innhold som ikke er originalt, av lav kvalitet og har QR-kode","vid_mod_analytics_penalty_reason_spam_title":"Nettsøppel, uekte eller villedende innhold","vid_mod_analytics_penalty_reason_spam_desc":"Innhold som prøver å lure eller manipulere brukere for å få flere følgere, likerklikk, visninger eller andre engasjementsmålinger på plattformen, er ikke berettiget til For deg-strømmen. Dette inkluderer innhold som oppfordrer brukere til å følge eller like hverandre, eller innhold som lurer brukere til å trykke på liker- eller del-knappen. I tillegg er innhold som fremmer konspirasjonsteorier og sprer falsk eller skadelig informasjon om aktuelle hendelser som fortsatt pågår, ikke berettiget til For deg-strømmen.","vid_mod_analytics_penalty_reason_sexual_title":"Overdrevent seksuelt innhold","vid_mod_analytics_penalty_reason_sexual_desc":"For å bidra til at opplevelsene forblir gode, er ikke innhold som er åpenlyst seksuelt, kvalifisert for anbefalinger. Dette inkluderer innhold som skildrer underforstått nakenhet, seksualiserer kroppsdeler eller er åpenlyst erotisk eller sensuelt (f.eks. stripping).","vid_mod_analytics_penalty_reason_tobacco_title":"Tobakk og alkoholholdige varer","vid_mod_analytics_penalty_reason_tobacco_desc":"Innhold som fremmer, omtaler eller skildrer alkoholprodukter som konsumeres av personer som er gammel nok til å drikke alkohol, men der det gjøres på en farlig måte, er ikke kvalifisert for anbefalinger. Innhold som viser bruk av tobakksprodukter av voksne eller omtaler kontrollerte stoffer, er ikke kvalifisert for anbefalinger.","vid_mod_analytics_penalty_reason_stunts_title":"Farlige stunt og idretter","vid_mod_analytics_penalty_reason_stunts_desc":"Enkelte aktiviteter kan være risikable eller farlige når de gjenskapes uten sikkerhetstiltak, noe som kan føre til fysisk skade. Innhold som inkluderer farlige stunts, eller ekstremsport utført av ikke-profesjonelle, er ikke kvalifisert.","vid_mod_analytics_penalty_reason_graphic_title":"Voldelig og grovt innhold","vid_mod_analytics_penalty_reason_graphic_desc":"Innhold som får seere til å føle ubehag, avsky eller sjokkerer dem er kanskje ikke kvalifiserte for «For deg»-strømmen, inkludert skumle effekter, skvetting, sminke som gjenskaper realistiske åpne sår og skildringer av kroppsfunksjoner. Mesteparten av voldelig og grafisk innhold er ikke tillatt på TikTok. Vi kan tillate enkelte innholdstyper, som grafiske bilder av død, ulykker eller slåssing, når det fungerer som dokumentasjon på hendelser i den ekte verden og anses å være av offentlig interesse. Siden innholdet kanskje ikke er komfortabelt for alle målgrupper, kvalifiseres det ikke for anbefaling, og innholdet har en «godta»-skjerm eller -advarsel.","vid_mod_analytics_penalty_reason_fyf_title":"Uberettiget til For deg-strømmen","vid_mod_analytics_penalty_reason_fyf_desc":"Videoen din oppfylte ikke berettigelsesstandardene til For deg-strømmen. Les gjennom TikToks retningslinjer for fellesskapet for å få mer informasjon \u003E Uberettiget til For deg-strømmen","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"Brukere og tredjeparter kan rapportere brudd på retningslinjene til oss. Vi har registrert dette bruddet basert på en rapport om at innholdet bryter med retningslinjene for fellesskapet.","vidModAnalytics_detailPg_sectionVideoDetails_sectionLabel":"Videodetaljer","vid_mod_analytics_appeal_detailpg_reason_title":"Bruddårsak","vid_mod_analytics_detail_pg_title":"Videoen er ikke berettiget","vid_mod_analytics_detail_pg_desc":"Denne videoen er ikke berettiget til For deg-strømmen, fordi den bryter med retningslinjene for fellesskapet.","vidModAnalytics_detailPg_sectionSuccess_header":"Du fikk medhold i ankesaken din","vid_mod_analytics_appeal_success_detail_pg_desc":"Vi har vurdert anken din og gjenopprettet videoen din. Vi beklager eventuelle ulemper dette kan ha medført. Takk for at du er en del av TikTok-fellesskapet!","vid_mod_analytics_appeal_detail_pg_title":"Videoen er fjernet","vid_mod_analytics_appeal_detail_pg_desc":"Denne videoen bryter med retningslinjene for fellesskape
