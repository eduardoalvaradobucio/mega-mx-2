me ma conviction que le contenu de ce signalement est véridique, exact et complet.","idpa_attachment":"Pièces jointes","idpa_attachment_instruction":"Le rapport doit être transmis par le titulaire des droits dont les droits ont été enfreints ou par un représentant autorisé. Lis attentivement les \u003CredLink\u003Edirectives d'envoi\u003C\u002FredLink\u003E et transmets tous les documents requis. Les fichiers doivent être au format JPEG, JPG ou PNG et ne pas dépasser 20 Mo.","idpa_attachment_sec1":"Section 1 :","idpa_identification_document_title":"Documents concernant le demandeur","idpa_identification_document_instruction_IP":"Merci d'envoyer tes pièces d'identité officielles. Par exemple : permis de conduire (recto et verso), passeport (page avec la photo et page contenant le nom du titulaire et les informations de contact en cas d'urgence), carte My Number Card (recto uniquement), etc. Tu devras peut-être également fournir des documents prouvant l'autorité d'agir au nom de quelqu'un, des documents attestant du consentement d'un représentant légal comme un tuteur, ainsi que tout document indiquant que la demande concerne bien la personne elle‑même. Si tu agis au nom d'une personne morale, tu devras aussi fournir des documents tels qu'un certificat d'enregistrement de l'entreprise et une procuration de son représentant. \u003CredLink\u003EEn savoir plus\u003C\u002FredLink\u003E","idpa_identification_document_instruction_nonIP":"Merci d'envoyer tes pièces d'identité officielles. Par exemple : permis de conduire (recto et verso), passeport (page avec la photo et page contenant le nom du titulaire et les informations de contact en cas d'urgence), carte My Number Card (recto uniquement), etc. Tu devras peut-être également fournir des documents prouvant l'autorité d'agir au nom de quelqu'un, des documents attestant du consentement d'un représentant légal comme un tuteur, ainsi que tout document indiquant que la demande concerne bien la personne elle‑même. \u003CredLink\u003EEn savoir plus\u003C\u002FredLink\u003E","attachment_upload_limit":"Chaque fichier doit faire moins de 20 Mo","idpa_attachment_sec2":"Section 2 :","idpa_right_holder_status_title":"Documents prouvant le statut de titulaire des droits","idpa_ric_proof_title":"Documents concernant l'atteinte aux droits","idpa_right_holder_status_instruction_1":"(Atteinte aux droits de propriété intellectuelle)","idpa_right_holder_status_instruction_2":"Merci d'envoyer les documents qui identifient les droits de propriété intellectuelle qui, selon toi, ont été enfreints, ainsi que des documents qui montrent que la propriété intellectuelle présumée t'appartient. \u003CredLink\u003EEn savoir plus\u003C\u002FredLink\u003E","idpa_right_holder_status_instruction_3":"(Atteinte aux intérêts commerciaux)","idpa_right_holder_status_instruction_4":"Les documents requis varient en fonction des intérêts commerciaux présumés avoir été enfreints (par exemple, des documents démontrant la réputation ou la notoriété des étiquettes de produits, des documents indiquant que la publication induit les consommateurs en erreur sur la qualité). Merci de consulter les \u003CredLink\u003Edétails\u003C\u002FredLink\u003E et d'envoyer les documents appropriés. Tu peux importer jusqu'à trois fichiers au format JPEG, JPG ou PNG (20 Mo maximum par fichier).","idpa_ric_proof_instruction":"Merci d'envoyer une capture d'écran ou une preuve similaire montrant la partie du contenu publié qui, selon toi, enfreint tes droits. Tu peux importer jusqu'à trois fichiers au format JPEG, JPG ou PNG (20 Mo maximum par fichier). \u003CredLink\u003EEn savoir plus\u003C\u002FredLink\u003E","idpa_attachment_sec3":"Section 3 :","idpa_other_document_title":"Autres pièces justificatives","idpa_other_document_instruction":"Merci d'envoyer toutes les pièces justificatives, telles que les documents qui démontrent que l'affaire ne relève pas des exceptions en matière de diffamation. Tu peux importer jusqu'à trois fichiers au format JPEG, JPG ou PNG (20 Mo maximum par fichier). \u003CredLink\u003EEn savoir plus\u003C\u002FredLink\u003E","idpa_disclaimer":"Le fait d'effectuer sciemment des signalements faux ou trompeurs peut être puni par la loi. Si tu envoies fréquemment des rapports manifestement infondés, nous nous réservons le droit de suspendre ta capacité à effectuer des signalements ou de bannir définitivement ton compte. \u003CredLink\u003EEn savoir plus\u003C\u002FredLink\u003E","ad_report_detail_placeholder_75_uk":"Merci de nous fournir des détails sur ton expérience avec cette annonce, afin de nous aider à prendre les mesures nécessaires. Les contenus nuisibles aux enfants, au sens de loi britannique sur la sécurité en ligne, comprennent la pornographie et les activités sexuelles, le suicide et l'automutilation, les troubles alimentaires, la maltraitance et la haine, la violence, le harcèlement, les cascades et défis dangereux, les substances nocives, l'image corporelle malsaine et les contenus poussant à la dépression. Merci d'identifier une catégorie si tu le peux.","ad_report_detail_placeholder_75_eea_row":"Merci de nous fournir des détails sur ton expérience avec cette annonce, afin de nous aider à prendre les mesures nécessaires.","ad_report_reason_L1Misinfo_L2aigc_v2_0":"Cette annonce peut contenir du contenu généré ou modifié par l'IA non autorisé, mal étiqueté ou utilisé de manière incorrecte. Par exemple :","ad_report_reason_L1Misinfo_L2aigc_v2_1":"Du contenu généré par l'IA non étiqueté ou non divulgué. L'annonce utilise l'IA pour créer du contenu, sans toutefois le mentionner.","ad_report_reason_L1Misinfo_L2aigc_v2_2":"Une utilisation de l'apparence, de la voix ou de l'identité d'une personne réelle sans son autorisation. L'annonce montre une personne réelle ou donne cette impression, sans que cette personne ait donné son accord (par exemple, en laissant croire qu'elle soutient une idée politique ou un produit alors que ce n'est pas le cas).","Web_report_description":"Descripti tle":"Contenu non original, de mauvaise qualité et contenant des codes QR","vid_mod_analytics_penalty_reason_unoriginal_desc":"Pour que l'application TikTok reste positive et agréable pour nos utilisateur(trice)s, le contenu non original ou de mauvaise qualité ne peut pas être recommandé. Le contenu non original comprend les vidéos qui sont simplement importées ou ajoutées à partir d'autres sources (comme d'autres plateformes, des émissions TV, des films ou des webcasts) sans aucune modification nouvelle et créative. Nous pouvons savoir si une vidéo n'est pas originale si elle comporte un filigrane ou un logo superposé. Le contenu de faible qualité comprend les vidéos très courtes, les images statiques et les vidéos composées uniquement de GIF. Le contenu avec des codes QR est généralement inéligible pour le fil Pour toi, car il peut conduire les utilisateurs vers des sites Web ou des applications nuisibles, même si nous faisons des exceptions dans des circonstances où le risque est faible (par exemple, pour l'e-commerce).","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"Contenu non original, de mauvaise qualité et contenant des codes QR","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"Pour maintenir l'expérience positive que nos utilisateurs attendent de la plateforme TikTok, le contenu non original et de faible qualité ne peut pas être recommandé. Le contenu non original est un contenu qui est simplement importé ou copié à partir d'autres sources sans aucune nouvelle modification créative. Une vidéo peut être non originale si elle comporte un filigrane ou un logo. Le contenu de faible qualité comprend les vidéos très courtes, les images statiques et les vidéos composées uniquement de GIF.","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"Compte reproduit","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"Ton compte contient des publications qui ne sont pas originales et donc inéligibles au fil d'actualité Pour toi. Pour en savoir plus, consulte nos Règles de la communauté \u003E Inéligible au fil d'actualité Pour toi \u003E Contenu non original, de mauvaise qualité et contenant des codes QR","vid_mod_analytics_penalty_reason_spam_title":"Spam et contenu non authentique ou trompeur","vid_mod_analytics_penalty_reason_spam_desc":"Le contenu qui tente de tromper ou de manipuler les utilisateurs pour obtenir plus de followers, de j'aime, de vues ou d'autres formes d'engagement sur la plateforme n'est pas éligible pour le fil Pour toi. Cela inclut le contenu qui encourage les utilisateurs à se suivre ou à s'aimer mutuellement, ou le contenu qui incite les utilisateurs à cliquer sur les boutons J'aime ou Partager. En outre, le contenu qui encourage les théories du complot et diffuse des informations fausses ou préjudiciables sur les événements actuels et sur des événements sur lesquels toute la lumière n'est pas encore faite n'est pas éligible au fil d'actualité Pour toi.","vid_mod_analytics_penalty_reason_sexual_title":"Contenu ouvertement sexualisé","vid_mod_analytics_penalty_reason_sexual_desc":"Pour contribuer à maintenir une expérience confortable, le contenu ouvertement suggestif sur le plan sexuel ne peut pas être recommandé. Il s'agit notamment du contenu qui montre une nudité implicite, qui sexualise des parties du corps ou qui est ouvertement érotique ou sensuel (par exemple, les strip-teases).","vid_mod_analytics_penalty_reason_tobacco_title":"Produits du tabac et de l'alcool","vid_mod_analytics_penalty_reason_tobacco_desc":"Le contenu promouvant, mentionnant ou décrivant des produits alcoolisés consommés par des personnes ayant l'âge légal de boire, mais le faisant de manière dangereuse, peut ne pas être éligible pour une recommandation. Le contenu décrivant l'utilisation de produits du tabac par des adultes ou mentionnant des substances contrôlées ne peut pas être recommandé.","vid_mod_analytics_penalty_reason_stunts_title":"Cascades et sports dangereux","vid_mod_analytics_penalty_reason_stunts_desc":"Lorsqu'elles sont reproduites sans précautions de sécurité, certaines activités peuvent être risquées ou dangereuses, ce qui pourrait entraîner des dommages physiques. Le contenu qui inclut des cascades dangereuses ou des sports extrêmes réalisés par des non-professionnels peut être inéligible.","vid_mod_analytics_penalty_reason_graphic_title":"Contenu violent et explicite","vid_mod_analytics_penalty_reason_graphic_desc":"Les contenus susceptibles de mette les spectateurs mal à l'aise, de les choquer ou de les dégoûter peut être inéligible pour le fil d'actualité Pour toi. Cela comprend notamment les effets d'épouvante, les « jump scares », les maquillages qui recréent de façon réaliste des blessures gores et les représentations de fonctions corporelles. La plupart des contenus violents et explicites ne sont pas autorisés sur TikTok. Cependant, nous pouvons autoriser certains types de contenus comme les représentations explicites de décès, d'accidents ou de bagarres s'ils servent à informer le public d'événements réels et sont considérés comme étant dans l'intérêt du public. Étant donné que ce contenu n'est pas adapté à tous les publics, il ne pourra pas être recommandé et il sera accompagné d'un écran ou d'un avertissement de type « Accepter ».","vid_mod_analytics_penalty_reason_fyf_title":"Inéligible au fil d'actualité Pour toi","vid_mod_analytics_penalty_reason_fyf_desc":"Ta vidéo ne respecte pas nos critères d'éligibilité au fil d'actualité Pour toi. Pour en savoir plus, consulte les Règles de la communauté TikTok \u003E Inéligible au fil d'actualité Pour toi","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"Les utilisateur(trice)s et les tiers peuvent nous signaler des infractions à notre politique. Nous avons détecté cette infraction à notre politique grâce à un signalement indiquant que le contenu enfreignait nos Règles de la communauté.","vidModAnalytics_detailPg_sectionVideoDetails_sectionLabel":"Détails de la vidéo","vid_
