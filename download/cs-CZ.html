ona trestné. Pokud budete často odesílat hlášení, která budou zjevně neopodstatněná, vyhrazujeme si právo pozastavit vaši možnost odesílání hlášení nebo trvale zablokovat váš účet.","dsa_illegal_report_penalty_reminder":"Měl(a) bys vědět, že vědomě falešné nebo zavádějící nahlášení obsahu může být trestné. Pokud budeš opakovaně podávat prokazatelně neodůvodnitelná nahlášení, vyhrazujeme si právo zakázat ti možnost nahlašování nebo ti trvale zakázat přístup k účtu. Přečti si víc podrobností v našem Centru transparentnosti.","Web_report_reason_select":"Důvod nahlášení:","dsa_illegal_report_email":"Tvoje e-mailová adresa","dsa_illegal_cite_law_optional":"(volitelné)","dsa_illegal_report_fill_email":"Vyplň svou e-mailovou adresu","cseReasons_reportPg_emailAddForm_body":"Toto hlášení můžeš odeslat anonymně. V takovém případě tě ale neinformujeme o výsledku ani nebudeš mít možnost se odvolat.","dsa_illegal_report_trustedflagger_fill_email":"Zadej platnou e-mailovou adresu","dsa_illegal_detail_country":"Právní jurisdikce","dsa_illegal_detail_law":"Příslušný zákon","dsa_illegal_cite_law_desc":"Uveď prosím podrobnosti o zákoně, který podle tebe nahlášený obsah porušil. Čím konkrétnější budeš, tím lépe budeme moct posoudit tvoje nahlášení.","dsa_illegal_detail_explanation":"Vysvětlení k nahlášení","dsa_illegal_report_explanation_desc":"Popiš prosím, jak nahlášený obsah podle tebe porušuje příslušný zákon. Nahlášení, která neobsahují potřebné údaje nemusí být považována za platná. V případě nutnosti uveď, jestli žádost podáváš za sebe nebo za někoho jiného.","dsa_illegal_appeal_signature":"Podpis","dsa_illegal_sign_legal_name":"Tady se podepiš celým úředním jménem.","dsa_illegal_confirm_accuracy":"Potvrzuji, že obsah mého nahlášení je pravdivý, přesný a úplný.","idpa_attachment":"Přílohy","idpa_attachment_instruction":"Hlášení musí být předloženo držitelem práv, jehož práva byla porušena, nebo autorizovaným zástupcem. Přečtěte si pozorně \u003CredLink\u003Epokyny pro podání\u003C\u002FredLink\u003E a předložte veškerou požadovanou dokumentaci. Soubory musí být ve formátu JPEG, JPG nebo PNG a musí být menší než 20 MB.","idpa_attachment_sec1":"Oddíl 1:","idpa_identification_document_title":"Dokumenty týkající se navrhovatele","idpa_identification_document_instruction_IP":"Předložte prosím úřední identifikační doklady. Příklady zahrnují: řidičský průkaz (přední a zadní strana), cestovní pas (strana s fotografií a strana obsahující jméno držitele a kontaktní údaje pro případ nouze), My Number Card (pouze přední strana) atd. Dále, pokud je to nutné, musíte předložit dokumenty prokazující oprávnění agentury, dokumenty prokazující souhlas zákonného zástupce, jako je opatrovník, a dokumenty prokazující, že se podání týká samotných osob. Dále, pokud jste právnická osoba, musíte předložit dokumenty, jako je osvědčení o registraci společnosti a plná moc od zástupce. \u003CredLink\u003EVíce informací\u003C\u002FredLink\u003E","idpa_identification_document_instruction_nonIP":"Předložte prosím úřední identifikační doklady. Příklady zahrnují: řidičský průkaz (přední a zadní strana), cestovní pas (strana s fotografií a strana obsahující jméno držitele a kontaktní údaje pro případ nouze), My |Number Card (pouze přední strana) atd. Dále, pokud je to nutné, musíte předložit dokumenty prokazující oprávnění agentury, dokumenty prokazující souhlas zákonného zástupce, jako je opatrovník, a dokumenty prokazující, že se podání týká samotných osob. \u003CredLink\u003EVíce informací\u003C\u002FredLink\u003E","attachment_upload_limit":"Jednotlivé soubory musí být menší než 20 MB.","idpa_attachment_sec2":"Oddíl 2:","idpa_right_holder_status_title":"Dokumentace prokazující status držitele práv","idpa_ric_proof_title":"Dokumentace týkající se porušení práv","idpa_right_holder_status_instruction_1":"(Porušení práv k duševnímu vlastnictví)","idpa_right_holder_status_instruction_2":"Předložte prosím dokumenty, které identifikují práva k duševnímu vlastnictví, o nichž se domníváte, že byla porušena, a dokumenty, které dokládají, že jste vlastníkem údajného duševního vlastnictví. \u003CredLink\u003EVíce informací\u003C\u002FredLink\u003E","idpa_right_holder_status_instruction_3":"(Porušení obchodního zájmu)","idpa_right_holder_status_instruction_4":"Požadovaná dokumentace se liší v závislosti na obchodních zájmech, které byly údajně porušeny (např. materiály prokazující pověst nebo proslulost štítků u výrobků, materiály prokazující, že příspěvek klame spotřebitele o kvalitě). Přečtěte si \u003CredLink\u003Epodrobnosti\u003C\u002FredLink\u003E a předložte příslušnou dokumentaci. Můžete nahrát až tři soubory ve formátu JPEG, JPG nebo PNG, každý menší než 20 MB.","idpa_ric_proof_instruction":"Předložte prosím snímek obrazovky či podobné důkazy dosvědčující část zveřejněného obsahu, o němž se domníváte, že porušuje vaše práva. Můžete nahrát až tři soubory ve formátu JPEG, JPG nebo PNG, každý menší než 20 MB. \u003CredLink\u003EVíce informací\u003C\u002FredLink\u003E","idpa_attachment_sec3":"Oddíl 3:","idpa_other_document_title":"Další podpůrné dokumenty","idpa_other_document_instruction":"Předložte prosím veškeré podpůrné dokumenty, jako jsou materiály, které prokazují, že případ nespadá pod výjimky z pomluvy. Můžete nahrát až tři soubory ve formátu JPEG, JPG nebo PNG, každý menší než 20 MB. \u003CredLink\u003EVíce informací\u003C\u002FredLink\u003E","idpa_disclaimer":"Vezměte prosím na vědomí, že vědomé podání nepravdivého nebo zavádějícího hlášení může být dle zákona trestné. Pokud budete často odesílat hlášení, která budou zjevně neopodstatněná, vyhrazujeme si právo pozastavit vaši možnost odesílání hlášení nebo trvale zablokovat váš účet. \u003CredLink\u003EVíce informací\u003C\u002FredLink\u003E","ad_report_detail_placeholder_75_uk":"Uveďte podrobnosti o svých zkušenostech s touto reklamou, abychom mohli podniknout nezbytné kroky. Obsah, který je podle britského zákona OSA škodlivý pro děti, zahrnuje pornografii a sexuální aktivity, ectionsProfilePage_favoritesPage_newModal_errorMessage":"Překročen limit znaků","pcWeb_add_reply":"Odpověz...","comment_tray_default":"Přidat komentář...","vid_mod_analytics_penalty_reason_minor_title":"Bezpečnost nezletilých","vid_mod_analytics_penalty_reason_minor_desc":"Abychom dospívajícím poskytli další prostor pro zkoumání identity a vyjádření v digitálním prostoru, obsah nahraný uživateli mladšími 16 let nelze doporučit. Propagace kosmetických operací u nezletilých může vést k vyšší míře nespokojenosti s tělem. Proto je takový obsah – včetně videí před a po zákroku, videí s chirurgickými zákroky a zpráv o dobrovolných kosmetických operacích bez upozornění na rizika – nezpůsobilý pro feed Pro tebe všech uživatelů mladších 18 let.","vid_mod_analytics_penalty_reason_unoriginal_title":"Nepůvodní a nekvalitní obsah nebo obsah obsahující QR kódy","vid_mod_analytics_penalty_reason_unoriginal_desc":"Aby byl TikTok pro naše uživatele pozitivní a příjemný, obsah, který je neoriginální nebo nekvalitní, nemůžeme doporučovat. Mezi neoriginální obsah patří videa, která jsou pouze importovaná nebo nahraná z jiných zdrojů (například z jiných platforem, televizních pořadů, filmů nebo webových vysílání) bez jakýchkoli nových, kreativních úprav. Neoriginální video poznáme podle toho, že je na něm vodoznak nebo překryté logo. Mezi nekvalitní obsah patří velmi krátká videa, statické obrázky a videa složená pouze z GIFů. Obecně taky ve feedu Pro tebe nepovolujeme obsah s QR kódy, protože může uživatele zavést na nebezpečné webové stránky nebo aplikace, i když za okolností, kdy je riziko nízké (například u e-shopů), děláme výjimky.","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"Neoriginální a nekvalitní obsah nebo obsah obsahující QR kódy","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"Naši uživatelé od TikToku očekávají pozitivní zážitek. Rozhodli jsme se proto nedoporučovat neoriginální a nekvalitní obsah. Neoriginální obsah je obsah, který importuješ nebo zkopíruješ z jiného zdroje bez jakékoli změny nebo kreativního zásahu. Když video obsahuje vodoznak nebo logo, může být neoriginální. Nekvalitní obsah jsou například velmi krátká videa, nehybné obrázky a videa vytvořená jen z GIFů.","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"Reprodukovaný účet","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"Tvůj účet obsahuje příspěvky, které nejsou originální a nejsou vhodné pro feed Pro tebe. Další informace najdeš v našich Pravidlech komunity \u003E Nevhodné pro feed Pro tebe \u003E Nepůvodní a nekvalitní obsah nebo obsah obsahující QR kódy","vid_mod_analytics_penalty_reason_spam_title":"Spam, neautentický nebo zavádějící obsah","vid_mod_analytics_penalty_reason_spam_desc":"Obsah, který se snaží oklamat uživatele nebo manipulovat s uživateli za cílem získat více sledujících, lajků, zobrazení nebo další zapojení na platformě, není způsobilý pro feed Pro tebe. Patří sem obsah, který nabádá uživatele, aby se navzájem sledovali nebo lajkovali, nebo obsah, který uživatele nutí klikat na tlačítka „Lajkovat“ nebo „Sdílet“. Kromě toho není pro feed Pro tebe způsobilý obsah, který propaguje konspirační teorie a šíří nepravdivé nebo škodlivé informace o aktuálních událostech a událostech, o nichž ještě nejsou známy podrobnosti.","vid_mod_analytics_penalty_reason_sexual_title":"Otevřeně sexualizovaný obsah","vid_mod_analytics_penalty_reason_sexual_desc":"Abychom přispěli k zachování příjemného prostředí, nemusíme doporučovat obsah se zřejmým sexuálním podtextem. To zahrnuje obsah, který zobrazuje naznačenou nahotu, sexualizuje části těla nebo je zjevně erotický nebo smyslný (např. striptýz).","vid_mod_analytics_penalty_reason_tobacco_title":"Tabákové a alkoholické výrobky","vid_mod_analytics_penalty_reason_tobacco_desc":"Obsah, který propaguje, zmiňuje nebo zobrazuje alkoholické produkty, které konzumují osoby ve věku, kdy jsou oprávněné k pití alkoholu, ale nebezpečným způsobem, nelze doporučit. Obsah zobrazující užívání tabákových výrobků dospělými osobami nebo zmiňující regulované látky není způsobilý k doporučení.","vid_mod_analytics_penalty_reason_stunts_title":"Nebezpečné kousky a sporty","vid_mod_analytics_penalty_reason_stunts_desc":"Při napodobování bez bezpečnostních opatření mohou být některé činnosti riskantní nebo nebezpečné, což může vést k fyzickému zranění. Obsah, který zahrnuje nebezpečné kaskadérské kousky nebo extrémní sporty prováděné neprofesionály, může být nezpůsobilý.","vid_mod_analytics_penalty_reason_graphic_title":"Násilný a názorný obsah","vid_mod_analytics_penalty_reason_graphic_desc":"Obsah, který v divácích vyvolává nepříjemné pocity, šok nebo znechucení, může být pro feed Pro tebe nezpůsobilý, včetně děsivých efektů, lekaček, make-upu realisticky ztvárňujícího krvavá zranění a zobrazení tělesných funkcí. Většina násilného a názorného obsahu není na TikToku povolena. Určité typy obsahu ale můžeme povolit, zejména pokud je to ve veřejném zájmu, například zobrazení úmrtí, nehod nebo rvaček při dokumentování skutečných událostí. Protože tento obsah není vhodný pro všechny diváky, nebude způsobilý k doporučení a objeví se u něj varování nebo obrazovka umožňující potvrdit, zda má být zobrazen.","vid_mod_analytics_penalty_reason_fyf_title":"Nezpůsobilé pro kanál Pro tebe","vid_mod_analytics_penalty_reason_fyf_desc":"Tvoje video nesplnilo naše standardy pro zařazení do feedu Pro tebe. Více informací najdeš v Pravidlech komunity TikTok \u003E Nevhodné pro feed Pro tebe","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"Uživatelé a třetí strany nám můžou nahlašovat porušení našich pravidel. Toto porušení pravidel jsme zjistili na základě nahlášení, které tvrdilo, že tvůj obsah porušil naše Pravidla komunity.","vidModAnalytics_detailPg_sectionVideoDetails_sectionLabel":"Údaje o videu","vid_mod_analytics_appeal_detailpg_reason_title":"Důvod porušení","vid_mod_analytics_detail_pg_title":"Video není způsobilé","vid_mod_analytics_detail_pg_desc"
