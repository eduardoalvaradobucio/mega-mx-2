"أقل","collectionsProfilePage_favoritesPage_newModal_errorMessage":"تم تجاوز الحد الأقصى للحروف","pcWeb_add_reply":"إضافة رد...","comment_tray_default":"إضافة تعليق...","vid_mod_analytics_penalty_reason_minor_title":"سلامة الُقصر","vid_mod_analytics_penalty_reason_minor_desc":"لتوفير مساحة إضافية للمراهقين لاستكشاف الهوية والتعبير عنها في المساحات الرقمية، فإن المحتوى الذي تم تحميله بواسطة مستخدمين أقل من 16 عامًا غير مؤهل للتوصية. قد يؤدي الترويج للجراحة التجميلية للقصر إلى ارتفاع معدلات عدم الرضا عن الجسم. وفقًا لذلك، فإن هذا المحتوى - بما في ذلك فيديوهات قبل وبعد، والفيديوهات الخاصة بالإجراءات الجراحية، والرسائل التي تناقش جراحة التجميل الاختيارية دون تحذير من المخاطر - غير مؤهل لصفحة لك لجميع المستخدمين دون سن 18 عامًا.","vid_mod_analytics_penalty_reason_unoriginal_title":"محتوى غير أصلي، ومنخفض الجودة، ومحتوى برمز QR","vid_mod_analytics_penalty_reason_unoriginal_desc":"للحفاظ على TikTok إيجابيًا وممتعًا لمستخدمينا، فإن المحتوى غير الأصلي أو منخفض الجودة غير مؤهل للتوصية. يتضمن المحتوى غير الأصلي الفيديوهات التي تم استيرادها أو تحميلها من مصادر أخرى (مثل المنصات الأخرى أو البرامج التلفزيونية أو الأفلام أو عمليات البث عبر الويب) دون أي تعديلات إبداعية جديدة. يمكننا معرفة ما إذا كان الفيديو غير أصلي إذا كان يحتوي على علامة مائية أو يوجد شعار متراكب عليه. يتضمن المحتوى منخفض الجودة فيديوهات قصيرة جدًا وصورًا ثابتة وفيديوهات مصنوعة من صور GIF فقط. عادةً ما يكون المحتوى الذي يتضمن رموز QR غير مؤهل لصفحة لك لأنه يمكن أن يقود المستخدمين إلى مواقع ويب أو تطبيقات ضارة، على الرغم من أننا نضع استثناءات في الظروف التي تكون فيها المخاطر منخفضة (على سبيل المثال، بالنسبة للتجارة الإلكترونية).","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"محتوى غير أصلي، ومنخفض الجودة، ومحتوى برمز QR","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"للحفاظ على التجربة الإيجابية التي يتوقعها المستخدمون من منصة TikTok، فإن المحتوى غير الأصلي ومنخفض الجودة يكون غير مؤهل للتوصية. والمحتوى غير الأصلي هو المحتوى الذي تم استيراده أو نسخه من مصادر أخرى دون أي تعديلات إبداعية جديدة. قد يكون الفيديو غير أصلي إذا كان عليه علامة مائية أو شعار. يشمل المحتوى منخفض الجودة الفيديوهات القصيرة جدًا والصور الثابتة والفيديوهات المصنوعة من صور GIF فقط.","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"حساب مستنسخ","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"يحتوي حسابك على منشورات غير أصلية وغير مؤهلة لصفحة لك. لمزيد من المعلومات، راجع إرشادات المجتمع \u003E غير مناسب لصفحة لك \u003E محتوى غير أصلي ومنخفض الجودة ورمز QR","vid_mod_analytics_penalty_reason_spam_title":"محتوى مزعج أو غير أصلي أو مضلل","vid_mod_analytics_penalty_reason_spam_desc":"المحتوى الذي يحاول خداع المستخدمين أو التلاعب بهم للحصول على المزيد من المتابعين أو الإعجابات أو المشاهدات أو مقاييس التفاعل الأخرى على المنصة غير مؤهل لصفحة لك. يتضمن هذا المحتوى الذي يشجع المستخدمين على متابعة بعضهم البعض أو تسجل الإعجاب بالمحتوى، أو المحتوى الذي يخدع المستخدمين للنقر فوق أزرار الإعجاب أو المشاركة. بالإضافة إلى ذلك، فإن المحتوى الذي يروج لنظريات المؤامرة وينشر معلومات خاطئة أو ضارة حول الأحداث الجارية حين تكون التفاصيل قيد التطوير غير مؤهل أيضًا لصفحة لك.","vid_mod_analytics_penalty_reason_sexual_title":"المحتوى الجنسي العلني","vid_mod_analytics_penalty_reason_sexual_desc":"للمساعدة في الحفاظ على تجربة مريحة، قد لا يكون المحتوى الموحي جنسيًا بشكل علني مؤهلاً للتوصية به. يتضمن هذا المحتوى الذي يصور العري الضمني، أو يظهر أجزاء الجسم بشكل موحي جنسيًا، أو مثيرًا للشهوة الجنسية أو الحسية بشكل صارخ (على سبيل المثال، التعري).","vid_mod_analytics_penalty_reason_tobacco_title":"منتجات التبغ والكحول","vid_mod_analytics_penalty_reason_tobacco_desc":"قد لا يكون المحتوى الذي يروّج لمنتجات كحول يتناولها أشخاص بلغوا العمر القانوني ولكن بطريقة خطرة، أو ذكرها أو تصويرها مؤهلاً للتوصية به. كما أن المحتوى الذي يصور استخدام منتجات التبغ من قبل البالغين أو ذكر المواد الخاضعة للرقابة غير مؤهل للتوصية.","vid_mod_analytics_penalty_reason_stunts_title":"الأفعال والرياضات الخطرة","vid_mod_analytics_penalty_reason_stunts_desc":"عند التقليد بدون احتياطات السلامة، يمكن أن تكون بعض الأنشطة محفوفة بالمخاطر أو خطيرة، مما قد يؤدي إلى ضرر جسدي. قد يكون المحتوى الذي يتضمن حركات خطيرة أو الرياضات الخطرة التي يمارسها أشخاص غير محترفين غير مؤهل.","vid_mod_analytics_penalty_reason_graphic_title":"محتوى عنيف وبشع المنظر","vid_mod_analytics_penalty_reason_graphic_desc":"المحتوى الذي يسبب انزعاج المشاهدين أو الصدمة أو الاشمئزاز قد يكون غير مؤهل للظهور في صفحة لك، بما في ذلك المؤثرات المخيفة، والفزع المفاجئ، والمكياج الذي يعيد إنشاء جروح دموية بشكل واقعي وتصوير الوظائف الجسدية. لا يُسمح بالمحتوى الأكثر عنفًا وبشع المنظر على TikTok. ومع ذلك، قد نسمح بأنواع معينة من المحتوى، مثل الصور البشعة للوفاة أو الحوادث أو العراك عندما تكون بمثابة توثيق لأحداث العالم الحقيقي وتعتبر في المصلحة العامة. نظرًا لأن هذا المحتوى قد لا يكون مريحًا لجميع الجماهير، فلن يكون مؤهلاً للتوصية، وسيكون للمحتوى شاشة \"اشتراك\" أو تحذير.","vid_mod_analytics_penalty_reason_fyf_title":"غير مؤهل لصفحة لك","vid_mod_analytics_penalty_reason_fyf_desc":"الفيديو الذي أنشأته لا يفي بمعايير التأهل لصفحة لك. راجع إرشادات المجتمع للحصول على مزيد من المعلومات \u003E غير مؤهل لصفحة لك","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"يمكن للمستخدمين والجهات الخارجية الإبلاغ عن انتهاكات السياسة إلينا. لقد اكتشفنا انتهاك هذه السياسة بناءً على إبلاغ يفيد بأن المحتوى ينتهك إرشادات المجتمع لدينا.","vidModAnalytics_detailPg_sectionVideoDetails_sectionLabel":"تفاصيل الفيديو","vid_mod_analytics_appeal_detailpg_reason_title":"سبب الانتهاك","vid_mod_analytics_detail_pg_title":"الفيديو غير مؤهل","vid_mod_analytics_detail_pg_desc":"هذا الفيديو غير مؤهل لصفحة لك لأنه ينتهك إرشادات المجتمع.","vidModAnalytics_detailPg_sectionSuccess_header":"تمت الموافقة على الطعن","vid_mod_analytics_appeal_success_detail_pg_desc":"لقد راجعنا طلب الطعن وقمنا باستعادة الفيديو. ونعتذر عن التسبب في أي إزعاج. شكرًا لكونك جزءًا من مجتمع TikTok!","vid_mod_analytics_appeal_detail_pg_title":"تمت إزالة الفيديو","vid_mod_analytics_appeal_detail_pg_desc":"هذا الفيديو ينتهك إرشادات المجتمع الخاصة بنا.","vidModAnalytics_appealSubmitted_sectionTitle_h
