y Center alang sa dugang impormasyon.","Web_report_reason_select":"Rason sa pag-report:","dsa_illegal_report_email":"Imong email address","dsa_illegal_cite_law_optional":"(Opsyonal)","dsa_illegal_report_fill_email":"Ibutang ang imong email address","cseReasons_reportPg_emailAddForm_body":"Mahimo nimong anonymous nga isumite kini nga taho. Apan, dili ka pahibaluon sa resulta o adunay kapilian nga mag-apela.","dsa_illegal_report_trustedflagger_fill_email":"Ibutang ang balidong email address","dsa_illegal_detail_country":"Legal nga hurisdiksyon","dsa_illegal_detail_law":"May kalabutan nga balaod","dsa_illegal_cite_law_desc":"Palihug paghatag og mga detalye sa balaod nga giingong gilapas sa content. Palihug himoang espisipiko kutob sa mahimo aron tugotan mi nga masusi og tarong ang imong taho.","dsa_illegal_detail_explanation":"Pagpasabot sa Taho","dsa_illegal_report_explanation_desc":"Palihug ihulagway kung sa unsang paagi nakalapas ang content sa may kalabutan nga balaod. Mahimong dili ikonsidera nga balido ang mga taho nga walay igong impormasyon. Kung may kalabutan, palihug klaroha kung gisumite ba nimo kini nga request alang sa imong kaugalingon o alang sa laing tawo.","dsa_illegal_appeal_signature":"Pirma","dsa_illegal_sign_legal_name":"Pirmahan dinhi ang imong legal nga ngalan.","dsa_illegal_confirm_accuracy":"Ginakumpirma nako ang akong pagtuo nga tinuod, tukma ug kumpleto ang content niini nga taho.","idpa_attachment":"Mga Attachment","idpa_attachment_instruction":"Kinahanglang isumite ang taho sa tag-iya sa katungod diin nalapas ang mga katungod, o sa usa ka awtorisado nga representante. Palihug susiha pag-ayo ang \u003CredLink\u003Emga tamdanan sa pagsumite\u003C\u002FredLink\u003E ug isumite ang tanang gikinahanglang dokumentasyon. Kinahanglan nga JPEG, JPG, o PNG ang mga format sa file, ug kinahanglan nga ubos sa 20 MB.","idpa_attachment_sec1":"Seksyon 1:","idpa_identification_document_title":"Mga dokumento bahin sa claimant","idpa_identification_document_instruction_IP":"Palihug pagsumite og mga opisyal nga dokumento sa identipikasyon. Lakip sa mga example mao ang: lisensya sa pagmaneho (atubangan ug likod), pasaporte (page sa hulagway ug page nga adunay ngalan sa tag-iya ug impormasyon sa kontak sa emerhensya), My Number Card (atubangan lang), ug uban pa. Dugang pa, kung gikinahanglan, kinahanglan kang magsumite og mga dokumento nga nagapamatuod sa awtoridad sa ahensya, mga dokumento nga nagapamatuod sa pagtugot gikan sa legal nga representante sama sa guardian, ug mga dokumento nga nagapakita nga may kalabutan ang pagsumite sa indibidwal mismo. Dugang pa, kung ikaw kay usa ka juridical person, kinahanglan kang magsumite og mga dokumento sama sa Sertipiko sa Pagparehistro sa Korporasyon, ug Power of Attorney gikan sa representante. \u003CredLink\u003EPagkat-on og dugang\u003C\u002FredLink\u003E","idpa_identification_document_instruction_nonIP":"Palihug pagsumite og mga opisyal nga dokumento sa identipikasyon. Lakip sa mga example mao ang: lisensya sa pagmaneho (atubangan ug likod), pasaporte (page sa hulagway ug page nga adunay ngalan sa tag-iya ug impormasyon sa kontak sa emerhensya), My Number Card (atubangan lang), ug uban pa. Dugang pa, kung gikinahanglan, kinahanglan kang magsumite og mga dokumento nga nagapamatuod sa awtoridad sa ahensya, mga dokumento nga nagapamatuod sa pagtugot gikan sa legal nga representante sama sa guardian, ug mga dokumento nga nagapakita nga may kalabutan ang pagsumite sa indibidwal mismo. \u003CredLink\u003EPagkat-on og dugang\u003C\u002FredLink\u003E","attachment_upload_limit":"Ang matag usa ka file kinahanglang dili molapas og 20MB","idpa_attachment_sec2":"Seksyon 2:","idpa_right_holder_status_title":"Dokumentasyon nga nagapamatuod sa kahimtang sa tag-iya sa mga katungod","idpa_ric_proof_title":"Dokumentasyon bahin sa paglapas sa mga katungod","idpa_right_holder_status_instruction_1":"(Paglapas sa mga katungod sa intelektwal nga panag-iya)","idpa_right_holder_status_instruction_2":"Palihug pagsumite og mga dokumento nga nagapakita sa mga katungod sa intelektwal nga panag-iya nga imong ginatuohan nga nalapas, ug mga dokumento nga nagapakita nga ikaw ang tag-iya sa intelektwal nga panag-iya. \u003CredLink\u003EPagkat-on og dugang\u003C\u002FredLink\u003E","idpa_right_holder_status_instruction_3":"(Paglapas sa interes sa negosyo)","idpa_right_holder_status_instruction_4":"Managlahi ang gikinahanglang dokumentasyon depende sa mga interes sa negosyo nga giingong nalapas (pananglitan, mga materyal nga nagapakita sa reputasyon o pagkasikat sa mga label sa produkto, mga materyal nga nagapakita nga ang post nagapahisalaag sa mga consumer bahin sa kalidad). Palihug susiha ang \u003CredLink\u003Emga detalye\u003C\u002FredLink\u003E ug isumite ang angay nga dokumentasyon. Mahimo kang mag-upload og hangtod sa tulo ka mga file nga anaa sa JPEG, JPG, o PNG nga format, diin ubos sa 20 MB ang matag usa.","idpa_ric_proof_instruction":"Palihug pagsumite og screenshot o susamang ebidensya nga nagapakita sa bahin sa na-post nga content nga ginatuohan nimong nakalapas sa imong mga katungod. Mahimo kang mag-upload og hangtod sa tulo ka mga file nga anaa sa JPEG, JPG, o PNG nga format, diin ubos sa 20 MB ang matag usa. \u003CredLink\u003EPagkat-on og dugang\u003C\u002FredLink\u003E","idpa_attachment_sec3":"Seksyon 3:","idpa_other_document_title":"Uban pang pangsuporta nga dokumento","idpa_other_document_instruction":"Palihug pagsumite og bisan unsang pangsuportang dokumento sama sa mga materyal nga nagapakita nga ang kaso wala maapil sa mga eksepsiyon sa pagpangdaot. Mahimo kang mag-upload og hangtod sa tulo ka mga file nga anaa sa JPEG, JPG, o PNG nga format, diin ubos sa 20 MB ang matag usa. \u003CredLink\u003EPagkat-on og dugang\u003C\u002FredLink\u003E","idpa_disclaimer":"Palihug timan-i nga mahimong silotan ubos sa balaod ang tinuyo nga paghimo og bakak o makapahisalaag nga taho. Kung kanunay ka nga nagsumite og mag report nga dayag nga wala’y basehanan, aduna mi katungod sa pagsuspinde sa imong abilidad sa pagsumite og mga report o permanenteng i-ban ang imong account. \u003CredLink\u003EPagkat-on og dugang\u003C\u002FredLink\u003E","ad_report_detail_placeholder_75_uk":"Palihug paghatag og mga detalye bahin sa imong kasinatian niini nga ad aron matabangan mi nga makabuhat og mga gikinahanglang aksyon. Naglakip sa pornograpiya ug sekswal nga mga aktibidad, paghikog ug pagpasakit sa kaugalingon, dili maayo nga pagkaon, pag-abuso ug pagdumot, kapintasan, pagdaogdaog, peligro nga mga stunt ug challenge, makadaot nga mga substance, dili maayo nga imahe sa lawas ug depressive nga content ang content nga makadaot sa mga bata ubos sa UK OSA. Palihug ilha ang kategorya kung mahimo nimo.","ad_report_detail_placeholder_75_eea_row":"Palihug paghatag og mga detalye bahin sa imong kasinatian niini nga ad aron matabangan mi nga makabuhat og mga gikinahanglang aksyon.","ad_report_reason_L1Misinfo_L2aigc_v2_0":"Lagmit adunay content nga hinimo sa AI o gi-edit nga content kini nga ad nga gigamit sa sayop nga paagi, walay pagtugot, o mali ang label. Mahimong maglakip kini sa:","ad_report_reason_L1Misinfo_L2aigc_v2_1":"Content nga hinimo sa AI nga wala gibutangan og label o wala gibutyag. Nagagamit ang ad og AI aron makahimo og content, apan wala kini gisulti.","ad_report_reason_L1Misinfo_L2aigc_v2_2":"Paggamit sa panagway, tingog, o pagkatawo sa tinuod nga tawo nga walay pagtugot kanila. Nagapakita ang ad o murag tinuod nga tawo, apan kana nga tawo wala mouyon niini (pananglitan, ginahimo kining murag nagasuporta sila sa politikal nga ideya o produkto apan wala diay).","Web_report_description":"I-report ang paghulagway (Opsyonal):","report_details_toast":"Paghatag og mga detalye bahin sa imong kasinatian niini nga ad aron tabangan mi nga mohimo og gikinahanglang aksyon.","report_img_toast":"I-upload ang mga hulagway sa detalye sa order ug mga item nga nadawat.","dsa_illegal_select_country_optional":"Legal nga hurisdiksyon","get_tt_desktop": nga kategorya.","pm_web_fullpage_entry":"Pindota aron tan-awon ang LIVE","webLIVE_personalPage_LIVEbanner_numViewerDesc":"Tan-awa karon uban sa {num} ka mga tumatan-aw","Webapp_tooltips_play":"i-play","pm_web_fullpage_error_button":"Sulayi pag-usab","ttlive_previewSubtitle_tag_highlight":"Highlight","weblive_following_btn":"Gi-follow","pm_mt_liveWeb_friend_tag":"Higala","ttlive_AIsummary_tag":"Summary","subLiveShare_webLivePage_chatTextfield_subOnlyNote":"Para lang sa subscriber","pc_web_less_btn":"pagamyan","collectionsProfilePage_favoritesPage_newModal_errorMessage":"Nilapas na sa limitasyon sa karakter","pcWeb_add_reply":"Magdugang og tubag...","comment_tray_default":"Pagbutang og komento...","vid_mod_analytics_penalty_reason_minor_title":"Kaluwasan sa menor de edad","vid_mod_analytics_penalty_reason_minor_desc":"Aron mahatagan ang mga teenager og dugang room alang sa pag-explore sa pagkatawo ug ekspresyon sa mga digital nga espasyo, ang content nga gi-upload sa mga user ubos sa 16 dili kwalipikado alang sa rekomendasyon. Ang promosyon sa cosmetic surgery sa mga menor de edad mahimong mosangpot sa mas taas nga rate sa pagkadiskontento sa lawas. Tungod niini, ang ingon nga content - lakip ang mga video sa wala pa ug pagkahuman, video sa mga pamaagi sa pag-opera, ug mga mensahe nga naghisgot sa elective cosmetic surgery nga walay pasidaan sa mga peligro - dili kwalipikado alang sa feed nga Para Kanimo sa tanang user ubos sa 18.","vid_mod_analytics_penalty_reason_unoriginal_title":"Dili orihinal, ubos og kalidad, ug QR code nga content","vid_mod_analytics_penalty_reason_unoriginal_desc":"Aron mapadayon nga positibo ug makalingaw ang TikTok alang sa among mga user, dili kwalipikado ang content nga dili orihinal o ubos og kalidad alang sa pagrekomenda. Ang dili orihinal nga content naglakip sa mga video nga bag-o lang gi-import o gi-upload gikan sa ubang source (sama sa ubang mga platform, salida sa TV, salida, o webcast) nga walay bisan unsang bag-o, mamugnaong pag-edit. Among mahibal-an kung ang video dili orihinal kung aduna kini watermark o gipatong nga logo niini. Ang ubos og kalidad nga content naglakip sa mubo kaayo nga mga video, static nga hulagway, ug mga video nga hinimo lamang sa mga GIF. Kasagrang dili kwalipikado ang content nga naglakip og mga QR code alang sa feed sa Para Kanimo tungod kay makadala kini sa mga user ngadto sa mga makadaot nga website o app, bisan pa nga naghimo mi og mga eksepsyon sa mga kahimtang diin gamay ang risgo (pananglitan, alang sa e-commerce).","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"Dili orihinal, ubos og kalidad, ug QR code nga content","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"Aron mapadayon ang positibo nga kasinatian nga ginalauman sa among mga user gikan sa platform sa TikTok, dili kwalipikado ang dili orihinal ug ubos og kalidad nga content alang sa pagrekomenda. Ang dili orihinal nga content mao ang content nga gi-import o gikopya gikan sa ubang mga source nga walay bag-o, mamugnaon nga pag-edit. Mahimong dili orihinal ang video kung kini adunay watermark o logo niini. Ang ubos og kalidad nga content naglakip sa mubo kaayo nga mga video, static nga hulagway, ug mga video nga hinimo lamang sa mga GIF.","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"Dili original nga account","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"Adunay mga post ang imong account nga dili orihinal ug dili kwalipikado alang sa feed sa Para Kanimo. Alang sa dugang impormasyon, susiha ang among Mga Tamdanan sa Komunidad \u003E Dili Angay alang sa feed sa Para Kanimo \u003E Dili orihinal, ubos og kalidad, ug QR code nga content","vid_mod_analytics_penalty_reason_spam_title":"Spam, dili tinuod, o makapahisalaag nga content","vid_mod_analytics_penalty_reason_spam_desc":"Dili kwalipikado alang sa feed sa Para Kanimo ang content nga mosulay sa paglimbong o pagmaniobra sa mga user aron makakuha og daghang follower, like, pagtan-aw o uban pang mga sukatan sa engagement sa platform. Naglakip kini og content nga nag-awhag sa mga user sa pag-follow o pag-like sa usag usa, o content nga naglimbong sa mga user sa pagpindot sa mga buton sa like o i-share. Dugang pa, Dili usab kwalipikado alang sa feed sa Para Kanimo ang content nga nagpasiugda sa mga teorya sa panagkunsabo ug nagpakaylap sa bakak o makadaot nga kasayoran bahin sa mga kasamtangang event ug mga event diin ang mga detalye nagapadayon pa.","vid_mod_analytics_penalty_reason_sexual_title":"Dayag nga sekswal nga content","vid_mod_analytics_penalty_reason_sexual_desc":"Aron makatabang sa pagpadayon sa komportable nga kasinatian, ang content nga dayag nga sekswal nga sugyot mahimong dili kwalipikado alang sa pagrekomenda. Lakip dinhi ang content nga nagahulagway sa gipasabot nga pagkahubo, nag-sekswal sa mga bahin sa lawas, o dayag nga erotiko o sensual (i.e. strip teases).","vid_mod_analytics_penalty_reason_tobacco_title":"Mga produktong tabako ug makahubog nga ilimnon","vid_mod_analytics_penalty_reason_tobacco_desc":"Mahimong dili kwalipikado alang sa rekomendasyon ang content nga naga-promote, nagahisgot, o nagahulagway sa mga produkto sa alkohol nga gikonsumo sa mga tawo nga legal na ang edad sa pag-inom apan gibuhat kini sa peligrosong paagi. Dili kwalipikado alang sa rekomendasyon ang content nga nagahulagway sa paggamit sa mga produkto sa tabako sa mga hamtong o naghisgut sa mga kontroladong sangkap.","vid_mod_analytics_penalty_reason_stunts_title":"Delikadong mga stunt ug sport","vid_mod_analytics_penalty_reason_stunts_desc":"Kung gisundog nga walay mga pag-amping sa kaluwasan, ang pipila ka mga kalihokan mahimong risgo o delikado, nga mahimong mosangput sa pisikal nga kadaot. Ang content nga naglakip og mga delikadong stunt, o grabeng sport nga gihimo sa dili mga propesyonal, mahimong dili kwalipikado.","vid_mod_analytics_penalty_reason_graphic_title":"Mapintas ug grapikong content","vid_mod_analytics_penalty_reason_graphic_desc":"Mahimong dili kwalipikado ang content nga hinungdan sa pagkadili komportable, kakurat, o kasuko sa mga tumatan-aw sa Feed sa Para Kanimo, lakip ang mga makahadlok nga effect, jump scares, murag tinuod tan-awon nga make-up sa mga madugo nga samad, ug mga paghulagway sa mga gimbuhaton sa lawas. Wala ginatugotan sa TikTok ang kadaghanan sa mga bayolente ug graphic nga content. Apan, mahimo namong tugotan ang pipila ka mga klase sa content, sama sa mga graphic nga hulagway sa kamatayon, mga aksidente, o panag-away, kung nagsilbi kini isip dokumentasyon sa mga event sa tinuod nga kalibutan ug giisip nga alang sa interes sa publiko. Tungod kay lagmit dili komportable alang sa tanang audience kini nga content, dili kini kwalipikado alang sa rekomendasyon, ug adunay screen sa “opt-in” o pasidaan ang content.","vid_mod_analytics_penalty_reason_fyf_title":"Dili Kwalipikado alang sa feed sa Para Kanimo","vid_mod_analytics_penalty_reason_fyf_desc":"Wala makaabot ang imong video sa among mga standard sa pagkakwalipikado alang sa feed sa Para Kanimo. Susiha ang Mga Tamdanan sa Komunidad sa TikTok para sa mas daghang impormasyon \u003E Dili Kwalipikado alang sa feed sa Para Kanimo","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"Mahimong magtaho ang mga user ug 3rd-party sa mga paglapas sa palisiya kanamo. Nabantayan namo kini nga paglapas sa palisiya base sa usa ka taho nga nakalapas ang content sa among Mga Tamdanan sa Komunidad.","vidModAnalytics_detailPg_sectionVideoDetails_sectionLabel":"Mga detalye sa video","vid_mod_analytics_appeal_detailpg_reason_title":"Rason sa paglapas","vid_mod_analytics_detail_pg_title":"Dili kwalipikado ang video","vid_mod_analytics_detail_pg_desc":"Kini nga video dili kwalipikado alang sa feed sa Para Kanimo tungod kay nakalapas kini sa among Mga Tamdanan sa Komunidad.","vidModAnalytics_detailPg_sectionSuccess_header":"Naaprubahan ang apela","vid_mod_analytics_appeal_success_detail_pg_desc":"Gisusi namo ang imong apela ug gibalik ang imong video. Mangayo mi og p
