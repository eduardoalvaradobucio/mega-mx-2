licy":"Informativa sulla privacy","By embedding this video, you confirm that you agree to our \u003Ca href={TermsHref}\u003ETerms of Use\u003C\u002Fa\u003E and acknowledge you have read and understood our \u003Ca href={PolicyHref}\u003E Privacy Policy.\u003C\u002Fa\u003E":"Integrando il video, confermi di accettare i nostri \u003Ca href={TermsHref}\u003ETermini di Utilizzo\u003C\u002Fa\u003E e dichiari di aver letto e compreso la nostra \u003Ca href={PolicyHref}\u003E Informativa sulla Privacy.\u003C\u002Fa\u003E","embed_profile_popup_btn":"Copia codice","oneColumn_feed_scrollMsg_header":"Scorri verso l'alto per vedere altro","oneColumn_feed_scrollMsg_desc":"Approfitta della modalità pagina","dWebStories_storyTip_numStories_body":"{s_numStories} Story","dsa_illegal_select_region":"Seleziona l'area","pm_mt_live_page_sth_wrong":"Si è verificato un problema","pm_mt_live_page_try_again":"Riprova","report_inbox_retry_btn":"Riprova","Please select a scenario":"Seleziona uno scenario","dsa_illegal_report_trustedflagger_signout":"Poiché sei un autore di segnalazioni attendibile, la tua segnalazione sarà indicata come prioritaria per la moderazione. Se desideri disconnetterti, {s_tapHere}","dsa_illegal_report_trustedflaggerlink":"clicca qui","dsa_illegal_report_trustedflagger":"Se sei un autore di segnalazioni attendibili, %s","dsa_illegal_report_trustedflagger_signout_popup":"Uscire?","dsa_illegal_report_trustedflagger_signout_popup_desc":"Disconnettersi come autore di segnalazioni attendibile e continuare a segnalare come un utente standard?","dsa_illegal_report_trustedflagger_signout_popup_yes":"Sì","dsa_illegal_report_trustedflagger_signout_popup_no":"No","osa_illegal_detail_reminder":"Effettuare consapevolmente una segnalazione di contenuti illegali falsi o fuorvianti può essere punibile ai sensi della legge. Se invii frequentemente segnalazioni chiaramente infondate, ci riserviamo il diritto di sospendere la tua capacità di inviare segnalazioni o chiudere definitivamente il tuo account.","dsa_illegal_report_penalty_reminder":"Nota che l'invio consapevole di segnalazioni false o fuorvianti su contenuti illegali può essere punito dalla legge. Se invii frequentemente segnalazioni manifestamente infondate, ci riserviamo il diritto di sospendere la tua capacità di inviare segnalazioni o bloccare definitivamente il tuo account. Consulta il nostro Centro per la trasparenza per ulteriori informazioni.","Web_report_reason_select":"Motivo della segnalazione:","dsa_illegal_report_email":"Il tuo indirizzo email","dsa_illegal_cite_law_optional":"(opzionale)","dsa_illegal_report_fill_email":"Compila il tuo indirizzo email","cseReasons_reportPg_emailAddForm_body":"Puoi inviare questa segnalazione in maniera anonima. Tuttavia, non riceverai notifiche in merito al risultato e non potrai presentare ricorso.","dsa_illegal_report_trustedflagger_fill_email":"Inserisci un indirizzo email valido","dsa_illegal_detail_country":"Giurisdizione legale","dsa_illegal_detail_law":"Legge pertinente","dsa_illegal_cite_law_desc":"Fornisci i dettagli della legge che i contenuti presumibilmente violano. Entra nel massimo livello di dettaglio possibile per consentirci di valutare correttamente la tua segnalazione.","dsa_illegal_detail_explanation":"Spiegazione della segnalazione","dsa_illegal_report_explanation_desc":"Descrivi in ​​che modo il contenuto viola la legge pertinente. Le segnalazioni che non contengono informazioni sufficienti potrebbero non essere considerate valide. Se rilevante, specifica se stai inviando questa richiesta per conto tuo o di qualcun altro.","dsa_illegal_appeal_signature":"Firma","dsa_illegal_sign_legal_name":"Firma qui con il tuo nome legale.","dsa_illegal_confirm_accuracy":"Confermo la mia convinzione che il contenuto di questa segnalazione sia veritiero, accurato e completo.","idpa_attachment":"Allegati","idpa_attachment_instruction":"Il report deve essere inviato dal titolare i cui diritti sono stati violati o da un rappresentante autorizzato. Rivedi attentamente le \u003CredLink\u003Elinee guida per l’invio\u003C\u002FredLink\u003E e invia tutta la documentazione richiesta. I file devono essere in formato JPEG, JPG o PNG e inferiori a 20 MB.","idpa_attachment_sec1":"Sezione 1:","idpa_identification_document_title":"Documenti riguardanti il richiedente","idpa_identification_document_instruction_IP":"Presenta documenti di identificazione ufficiali. Ad esempio: patente di guida (fronte e retro), passaporto (pagina della foto e pagina con il nome del titolare e le informazioni di contatto di emergenza), My Number Card (solo fronte), ecc. Inoltre, se necessario, devi presentare documenti che dimostrino: l’autorità dell’agenzia, il consenso di un rappresentante legale come un tutore e che la richiesta riguarda l’individuo stesso. Inoltre, se sei una persona giuridica, devi presentare documenti quali il certificato di registrazione aziendale e la procura del rappresentante.\u003CredLink\u003EUlteriori informazioni\u003C\u002FredLink\u003E","idpa_identification_document_instruction_nonIP":"Presenta documenti di identificazione ufficiali. Ad esempio: patente di guida (fronte e retro), passaporto (pagina della foto e pagina con il nome del titolare e le informazioni di contatto di emergenza), My Number Card (solo fronte), ecc. Inoltre, se necessario, devi presentare documenti che dimostrino: l’autorità dell’agenzia, il consenso di un rappresentante legale come un tutore e che la richiesta riguarda l’individuo stesso. \u003CredLink\u003EUlteriori informazioni\u003C\u002FredLink\u003E","attachment_upload_limit":"Ogni file deve essere inferiore a 20MB","idpa_attachment_sec2":"Sezione 2:","idpa_right_holder_status_title":"Documentazione comprovante lo status di titolare dei diritti","idpa_ric_proof_title":"Documentazione relativa alla violazione dei diritti","idpa_right_holder_status_instruction_1":"(Violazione dei diritti di proprietà intellettuale)","idpa_right_holder_status_instruction_2":"Invia documen ary_tag":"Resoconto","subLiveShare_webLivePage_chatTextfield_subOnlyNote":"Solo abbonati","pc_web_less_btn":"meno","collectionsProfilePage_favoritesPage_newModal_errorMessage":"Limite di caratteri superato","pcWeb_add_reply":"Aggiungi una risposta...","comment_tray_default":"Aggiungi commento...","vid_mod_analytics_penalty_reason_minor_title":"Tutela dei minori","vid_mod_analytics_penalty_reason_minor_desc":"Per fornire agli adolescenti ulteriore spazio per l'esplorazione e l'espressione della propria identità negli spazi digitali, i contenuti caricati da utenti di età inferiore ai 16 anni non sono idonei per i suggerimenti. La promozione di chirurgia estetica ai minori può portare a un incremento dei casi di insoddisfazione per l'aspetto del proprio corpo. Di conseguenza, tali contenuti, inclusi video prima e dopo interventi di chirurgia estetica, video di procedure chirurgiche e messaggi riguardanti interventi di chirurgia estetica elettiva senza preavviso di rischi, non sono idonei per la pagina Per te di tutti gli utenti di età inferiore ai 18 anni.","vid_mod_analytics_penalty_reason_unoriginal_title":"Contenuti non originali, di bassa qualità e con codice QR","vid_mod_analytics_penalty_reason_unoriginal_desc":"Per mantenere TikTok un ambiente positivo e piacevole per i nostri utenti, i contenuti non originali o di bassa qualità non sono idonei per i consigli. I contenuti non originali includono video appena importati o caricati da altre fonti (come altre piattaforme, serie TV, film o webcast) senza nuove modifiche creative. Possiamo rilevare la non originalità di un video se ha una filigrana o un logo sovrapposto. I contenuti di bassa qualità includono video molto brevi, immagini statiche e video realizzati solo con GIF. Non consentiamo contenuti con codici QR nella pagina Per te perché possono indirizzare gli utenti a siti web o app dannosi, anche se facciamo eccezioni in circostanze in cui il rischio è basso (ad esempio, per l'e-commerce).","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"Contenuti non originali, di bassa qualità e con codice QR","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"Per mantenere l'esperienza positiva che i nostri utenti si aspettano dalla piattaforma TikTok, i contenuti non originali e di bassa qualità non sono idonei per i consigli. Per contenuti non originali intendiamo contenuti che vengono semplicemente importati o copiati da altre fonti senza alcuna nuova modifica creativa. Un video potrebbe non essere originale se presenta una filigrana o un logo. I contenuti di bassa qualità includono video molto brevi, immagini statiche e video realizzati solo con GIF.","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"Account riprodotto","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"Il tuo account contiene post non originali e non idonei per la pagina Per te. Per ulteriori informazioni, consulta le Linee guida della community \u003E Non adatto alla pagina Per te \u003E Contenuti non originali, di bassa qualità e con codice QR","vid_mod_analytics_penalty_reason_spam_title":"Contenuti spam, non autentici o fuorvianti","vid_mod_analytics_penalty_reason_spam_desc":"I contenuti che tentano d'ingannare o manipolare gli utenti per ottenere più follower, Mi piace, visualizzazioni o altre metriche d'interazione sulla piattaforma non sono idonei per la pagina Per te. Tra questi ci sono contenuti che incoraggiano gli utenti a seguirsi o a mettersi Mi piace a vicenda o contenuti che inducono gli utenti a cliccare sui tasti Mi piace o condividi. Inoltre, i contenuti che promuovono teorie del complotto e diffondono informazioni false o pericolose su eventi attuali ed eventi i cui dettagli sono ancora in via di sviluppo non sono idonei per la pagina Per te.","vid_mod_analytics_penalty_reason_sexual_title":"Contenuti eccessivamente sessualizzati","vid_mod_analytics_penalty_reason_sexual_desc":"Per aiutare a mantenere un'esperienza confortevole, i contenuti sessualmente allusivi potrebbero non essere idonei per i consigli. Ciò include contenuti che raffigurano nudità implicita, sessualizzano parti del corpo o sono palesemente erotici o sensuali (ad esempio spogliarelli).","vid_mod_analytics_penalty_reason_tobacco_title":"Tabacco e prodotti alcolici","vid_mod_analytics_penalty_reason_tobacco_desc":"I contenuti che promuovono, menzionano o raffigurano prodotti alcolici consumati da persone maggiorenni ma in modo spericolato potrebbero non essere idonei per i consigli. I contenuti che descrivono l'uso di prodotti del tabacco da parte di adulti o che menzionano sostanze controllate non sono idonei per i consigli.","vid_mod_analytics_penalty_reason_stunts_title":"Acrobazie e sport pericolosi","vid_mod_analytics_penalty_reason_stunts_desc":"Se ripetute senza adottare precauzioni di sicurezza, alcune attività possono essere rischiose o pericolose, il che potrebbe causare danni fisici. I contenuti che includono acrobazie pericolose o sport estremi eseguiti da non professionisti potrebbero non essere idonei.","vid_mod_analytics_penalty_reason_graphic_title":"Contenuti violenti ed espliciti","vid_mod_analytics_penalty_reason_graphic_desc":"I contenuti che causano disagio, shock o disgusto agli spettatori potrebbero non essere idonei per la pagina Per te. Questi includono effetti spaventosi, spaventi improvvisi, trucchi che ricreano realisticamente ferite cruente e rappresentazioni di funzioni corporee. I contenuti più violenti ed espliciti non sono consentiti su TikTok. Tuttavia, potremmo consentire determinati tipi di contenuto, come immagini esplicite di decessi, incidenti o combattimenti quando documentano eventi del mondo reale e sono considerati d'interesse pubblico. Poiché questi contenuti potrebbero non risultare gradevoli per tutti i segmenti di pubblico, non verranno suggeriti e presenteranno una schermata o un avviso di \"attivazione\".","vid_mod_analytics_penalty_reason_fyf_title":"Non idoneo per la pagina Per te","vid_mod_analytics_penalty_reason_fyf_desc":"Il tuo video non soddisfa i nostri standard di idoneità per la pagina Per te. Per ulteriori informazioni consulta le Linee guida della community \u003E Non idoneo per la pagina Per te","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"Gli utenti e le terze parti possono segnalarci violazioni delle norme. Abbiamo rilevato questa violazione sulla base di una segnalazione per violazione delle Linee guida della community.","vidModAnalytics_detailPg_sectionVideoDetails_sectionLabel":"Dettagli del video","vid_mod_analytics_appeal_detailpg_reason_title":"Motivo della violazione","vid_mod_analytics_detail_pg_title":"Video non idoneo","vid_mod_analytics_detail_pg_desc":"Questo video non è idoneo per la tua pagina Per te perché viola le Linee guida della community.","vidModAnalytics_detailPg_sectionSuccess_header":"Ricorso approvato","vid_mod_analytics_appeal_success_detail_pg_desc":"Abbiamo analizzato il tuo ricorso e abbiamo ripristinato il tuo video. Ci scusiamo per eventuali inconvenienti. Grazie di far parte della community di TikTok!","vid_mod_analytics_appeal_detail_pg_title":"Video rimosso","vid_mod_analytics_appeal_detail_pg_desc":"Questo video infrange le nostre Linee guida della community.","vidModAnalytics_appealSubmitted_sectionTitle_header":"Richiesta ricevuta","vid_mod_analytics_appeal_rcv_detail_pg_desc":"Abbiamo ricevuto la tua richiesta e ti invieremo una notifica non appena sarà disponibile l'esito del ricorso.","rIC_detailPg_violationReason_title":"Motivo della violazione","dsaCGWebapp_detailPg_sectionCG_link":"Linee guida della community","dsaCGWebapp_appealExpired_emptyState_body":"Non puoi più presentare un ricorso su questa decisione in quanto la data di scadenza è passata.","appeal_btn_new":"Ricorso","reasonForAppeal_appealPg_appealReasonCard_title":"Motivo del ricorso contro la decisione","oSA_appealPg_appealExplain_title":"Spiegazione del ricorso","rIC_appealPg_appealExplain_title":"Spiegazione del ricorso","oSA_a
