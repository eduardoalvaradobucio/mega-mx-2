","dsa_illegal_cite_law_optional":"(opsional)","dsa_illegal_report_fill_email":"Plotëso adresën e emailit","cseReasons_reportPg_emailAddForm_body":"Mund ta dërgosh këtë raportim në mënyrë anonime. Megjithatë, nuk do të njoftohesh për rezultatin dhe nuk do të kesh mundësi ta apelosh vendimin.","dsa_illegal_report_trustedflagger_fill_email":"Vendos një adresë të vlefshme emaili","dsa_illegal_detail_country":"Juridiksioni ligjor","dsa_illegal_detail_law":"Ligji përkatës","dsa_illegal_cite_law_desc":"Jep detaje të ligjit që supozohet se shkel përmbajtja. Ji sa më specifik që të jetë e mundur për ta vlerësuar siç duhet raportimin tënd.","dsa_illegal_detail_explanation":"Shpjegimi i raportimit","dsa_illegal_report_explanation_desc":"Përshkruaj se si përmbajtja shkel ligjin përkatës. Raportimet që nuk përmbajnë informacione të mjaftueshme mund të mos konsiderohen të vlefshme. Nëse është e nevojshme, specifiko nëse po e bën këtë kërkesë për veten ose në emër të dikujt tjetër.","dsa_illegal_appeal_signature":"Nënshkrimi","dsa_illegal_sign_legal_name":"Nënshkruaj me emrin tënd ligjor këtu.","dsa_illegal_confirm_accuracy":"Konfirmoj bindjen time se përmbajtja e këtij raportimi është e vërtetë, e saktë dhe e plotë.","idpa_attachment":"Shtojca","idpa_attachment_instruction":"Raporti duhet të dërgohet nga titullari i të drejtave, të cilit i janë shkelur të drejtat, ose nga një përfaqësues i autorizuar. Rishiko me kujdes \u003CredLink\u003Eudhëzimet e dërgimit\u003C\u002FredLink\u003E dhe dërgo të gjithë dokumentacionin e kërkuar. Formatet e skedarëve duhet të jenë JPEG, JPG ose PNG, dhe duhet të jenë nën 20 MB.","idpa_attachment_sec1":"Seksioni 1:","idpa_identification_document_title":"Dokumente në lidhje me paditësin","idpa_identification_document_instruction_IP":"Dërgo dokumente zyrtare identifikimi. Shembujt përfshijnë: lejen e drejtimit (pjesën e përparme dhe të pasme), pasaportën (faqen me fototografi dhe faqen që përmban emrin e mbajtësit dhe të dhënat e kontaktit në rast urgjence), kartën e identitetit \"My Number Card\" (vetëm pjesën e përparme), etj. Gjithashtu, sipas nevojës, duhet të dërgosh dokumente që vërtetojnë autoritetin e përfaqësimit, dokumente që vërtetojnë pëlqimin nga një përfaqësues ligjor si p.sh. një kujdestar, dhe dokumente që tregojnë se dërgimi i përket vetë individit. Për më tepër, nëse je person juridik, duhet të dërgosh dokumente si Certifikata e Regjistrimit të Korporatës dhe Prokura nga përfaqësuesi. \u003CredLink\u003EMëso më shumë\u003C\u002FredLink\u003E","idpa_identification_document_instruction_nonIP":"Dërgo dokumente zyrtare identifikimi. Shembujt përfshijnë: lejen e drejtimit (pjesën e përparme dhe të pasme), pasaportën (faqen me fototografi dhe faqen që përmban emrin e mbajtësit dhe të dhënat e kontaktit në rast urgjence), kartën e identitetit \"My Number Card\" (vetëm pjesën e përparme), etj. Gjithashtu, sipas nevojës, duhet të dërgosh dokumente që vërtetojnë autoritetin e përfaqësimit, dokumente që vërtetojnë pëlqimin nga një përfaqësues ligjor si p.sh. një kujdestar, dhe dokumente që tregojnë se dërgimi i përket vetë individit. \u003CredLink\u003EMëso më shumë\u003C\u002FredLink\u003E","attachment_upload_limit":"Every single file must be less than 20MB","idpa_attachment_sec2":"Seksioni 2:","idpa_right_holder_status_title":"Dokumentacion që vërteton statusin e titullarit të të drejtave","idpa_ric_proof_title":"Dokumentacioni në lidhje me shkeljen e të drejtave","idpa_right_holder_status_instruction_1":"(Shkelje e të drejtave të pronësisë intelektuale)","idpa_right_holder_status_instruction_2":"Dërgo dokumente që identifikojnë të drejtat e pronësisë intelektuale që mendon se janë shkelur, dhe dokumente që tregojnë se je zotëruesi i pronësisë intelektuale të pretenduar. \u003CredLink\u003EMëso më shumë\u003C\u002FredLink\u003E","idpa_right_holder_status_instruction_3":"(Shkelje e interesave të biznesit)","idpa_right_holder_status_instruction_4":"Dokumentacioni i kërkuar ndryshon në varësi të interesave të biznesit që pretendohet se janë shkelur (p.sh. materiale që tregojnë reputacionin ose njohjen e etiketave të produkteve, materiale që tregojnë se postimi mashtron konsumatorët për cilësinë). Rishiko \u003CredLink\u003Edetajet\u003C\u002FredLink\u003E dhe dërgo dokumentacionin e duhur. Mund të ngarkosh deri në tre skedarë në formatin JPEG, JPG, ose PNG, secili nën 20 MB.","idpa_ric_proof_instruction":"Dërgo një pamje ekrani ose prova të ngjashme që tregojnë pjesën e përmbajtjes së postuar, e cila mendon se shkel të drejtat e tua. Mund të ngarkosh deri në tre skedarë në formatin JPEG, JPG, ose PNG, secili nën 20 MB. \u003CredLink\u003EMëso më shumë\u003C\u002FredLink\u003E","idpa_attachment_sec3":"Seksioni 3:","idpa_other_document_title":"Dokumente të tjera mbështetëse","idpa_other_document_instruction":"Dërgo çdo dokument mbështetës, si materiale që tregojnë se rasti nuk bën pjesë në përjashtimet për shpifje. Mund të ngarkosh deri në tre skedarë në format JPEG, JPG ose PNG, secili nën 20 MB. \u003CredLink\u003EMëso më shumë\u003C\u002FredLink\u003E","idpa_disclaimer":"Ki parasysh se bërja me vetëdije e një raportimi të rremë ose mashtrues mund të dënohet sipas ligjit. Nëse dërgon shpesh raportime që janë haptazi të pabaza, ne rezervojmë të drejtat për të të pezulluar mundësinë për të dërguar raportime ose për të të bllokuar përgjithmonë llogarinë. \u003CredLink\u003EMëso më shumë\u003C\u002FredLink\u003E","ad_report_detail_placeholder_75_uk":"Jep detaje rreth përvojës sate me këtë reklamë, në mënyrë që të marrim masat e duhura. Përmbajtja e dëmshme për fëmijët sipas OSA-së në Mbretërinë e Bashkuar përfshin pornografi dhe aktivitet seksual, vetëvrasje dhe vetëlëndim, çrregullime të të ngrënit, abuzim dhe urrejtje, dhunë, bullizëm, akrobaci dhe sfida të rrezikshme, substanca të dëmshme, perceptim i pashëndetshëm për trupin dhe përmbajtje depresive. Specifiko një kategori nëse mundesh.","ad_report_detail_placeholder_75_eea_row":"Jep detaje rreth përvojës sate me këtë reklamë, në mënyrë që të marrim masat e duhura.","ad_report_reason_L1Misinfo_L2aigc_v2_0":"Kjo reklamë mund të ketë përmbajtje të gjeneruar ose të modifikuar nga IA-ja që është keqpërdorur, është e paautorizuar ose e keqetiketuar. Kjo mund të përfshijë:","ad_report_reason_L1Misinfo_L2aigc_v2_1":"Përmbajtje të gjeneruar nga IA-ja që nuk është etiketuar ose zbuluar. Reklama përdor IA-në për të krijuar përmbajtje, por nuk e tregon këtë.","ad_report_reason_L1Misinfo_L2aigc_v2_2":"Përdorimin e ngjashmërisë, zërit ose identitetit të një personi real pa lejen e tij. Reklama shfaqet ose duket si një person i vërtetë, por ky person nuk ka rënë dakord për këtë (për shembull, e bën të duket sikur ky person mbështet një ideologji politike ose produkt, kur në të vërtetë nuk e mbështet).","Web_report_description":"Report description (Optional):","report_details_toast":"Jep detaje për përvojën tënde me këtë reklamë, sepse kështu na ndihmon të marrim masat e nevojshme.","report_img_toast":"Ngarko imazhet e detajeve të porosisë dhe të artikujve të marrë.","dsa_illegal_select_country_optional":"Juridiksioni ligjor","get_tt_desktop":"Get TikTok for desktop","get_tt_app":"Shkarko aplikacionin e TikTok-ut","Web_leftNav_getCoins_toolTip":"Kurse 25% tani","desktopWeb_dynamicBottom_installTikTok":"Instalo TikTok-un","desktopWeb_dynamicBottom_installTikTok_desc":"Instalo aplikacionin e TikTok-ut për desktop për performancë më të mirë","desktopWeb_dynamicBottom_installTikTok_Cta":"Instalo","desktopWeb_dynamicBottom_right_logIn":"Hyr","webapp_topnav_getapp":"Shkarko aplikacionin","webapp_topnav_pcapp":"Aplikacioni për PC","webapp_tootip_Viewprofile":"Shfaq profilin","View profile":"Shiko profilin","projectU_link_logout_button":"Dil","personalisedSearch_searchResults_moreOptions_listItem4":"Menaxho kërkimet","search_top":"Më të mirat","search_account":"Llogaritë","pm_main_live_entry_final":"Transmetimi DREJTPËRDREJT","photomode_sharing_photo":"Fotografi","pcWeb_search_tabName_users":"Përdo nd të dënohet sipas ligjit. Nëse dërgon shpesh raportime që janë haptazi të pabazuara, ne rezervojmë të drejtat tona për të ta pezulluar mundësinë për të dërguar raportime ose për të ta bllokuar përgjithmonë llogarinë.","rIC_reportPg_disclaimerIllegalContent_desc":"Bërja me vetëdije e një raportimi të rremë ose mashtrues mund të dënohet sipas ligjit. Nëse dërgon shpesh raportime që janë haptazi të pabazuara, ne rezervojmë të drejtat tona për të ta pezulluar mundësinë për të dërguar raportime ose për të ta bllokuar përgjithmonë llogarinë. {s_learnMore}","rIC_reportPg_disclaimer_placeholder":"Mëso më shumë","oSAAudio_reportPg_relevantLaw_desc":"Jep detaje të ligjit që supozohet se shkel përmbajtja. Ji sa më specifik që të jetë e mundur në mënyrë që ne të mund ta vlerësojmë siç duhet raportimin tënd.","oSA_reportPg_reportExplanationLIVE_desc":"Përshkruaj se si përmbajtja \"LIVE\" shkel ligjin përkatës. Raportimet që nuk përmbajnë informacione të mjaftueshme mund të mos konsiderohen të vlefshme.","oSAAudio_reportPg_reportExplanation_desc":"Përshkruaj se si përmbajtja shkel ligjin përkatës. Raportimet që nuk përmbajnë informacione të mjaftueshme mund të mos konsiderohen të vlefshme.","rIC_reportPg_reportExplanationLIVE_desc":"Përshkruaj se si përmbajtja \"LIVE\" shkel ligjin përkatës. Raportimet që nuk përmbajnë informacione të mjaftueshme mund të mos konsiderohen të vlefshme.","rIC_reportPg_reportExplanation_desc":"Përshkruaj se si përmbajtja shkel ligjin përkatës. Raportimet që nuk përmbajnë informacione të mjaftueshme mund të mos konsiderohen të vlefshme.","rIC_reportPg_attachment_title":"Bashkëngjitjet","rIC_reportPg_attachmentUpdate_desc":"Raportimet duhet të dërgohen nga zotëruesi i të drejtave ose nga një përfaqësues i autorizuar. Materialet e kërkuara ndryshojnë sipas llojit të raportimit, prandaj rishiko me kujdes {s_submissionGuidelines}. Raportimet e paplota ose ato që përmbajnë informacione të ndaluara (p.sh. \"Numrin tim\" ose të dhëna të tjera sensitive) mu o video është fshehur. Do të të shfaqim më pak video si kjo.","Web_report_show_video":"Shfaq videon","sticker_create_main_setinfo_last":"Përditësimi i fundit","pgc_aiComments_commentCategories_all":"Të gjitha","pgc_aiComments_analyticsPage_commentsCount":"{num, plural, one {{num} koment} other {{num} komente}}","pgc_aiComments_analyticsPage_infoPopup_topicsTitle":"Tema","pgc_aiComments_commentCategories_insufficientComments":"Temat e përmbledhura nga IA-ja do të jenë të disponueshme kur të ketë më shumë komente.","pgc_aiComments_commentCategories_emptyState":"Asnjë koment nuk përputhet me këtë kategori.","pm_web_fullpage_entry":"Click to watch LIVE","webLIVE_personalPage_LIVEbanner_numViewerDesc":"Shikoje tani me {num} shikues","Webapp_tooltips_play":"luaj","pm_web_fullpage_error_button":"Riprovo","ttlive_previewSubtitle_tag_highlight":"Moment kryesor","weblive_following_btn":"Duke ndjekur","pm_mt_liveWeb_friend_tag":"Shok","ttlive_AIsummary_tag":"Përmbledhje","subLiveShare_webLivePage_chatTextfield_subOnlyNote":"Vetëm për abonentët","pc_web_less_btn":"më pak","collectionsProfilePage_favoritesPage_newModal_errorMessage":"Është tejkaluar kufiri i karaktereve","pcWeb_add_reply":"Shto një përgjigje...","comment_tray_default":"Shto koment...","vid_mod_analytics_penalty_reason_minor_title":"Siguria për të miturit","vid_mod_analytics_penalty_reason_minor_desc":"Për t'u ofruar adoleshentëve hapësirë shtesë për eksplorimin dhe shprehjen e identitetit në hapësirat dixhitale, përmbajtjet e ngarkuara nga përdoruesit nën 16 vjeç nuk kualifikohen për t'u rekomanduar. Promovimi i kirurgjisë estetike te të miturit mund të çojë në përqindje më të larta të pakënaqësisë ndaj trupit. Prandaj, përmbajtje të tilla - duke përfshirë videot para dhe pas kirurgjisë estetike, videot e procedurave kirurgjikale dhe mesazhet që diskutojnë kirurgjinë kozmetike selektive pa paralajmërime për rreziqet - nuk kualifikohen për aktualitetin \"Për ty\" të të gjithë përdoruesve nën 18 vjeç.","vid_mod_analytics_penalty_reason_unoriginal_title":"Përmbajtje jo origjinale, me cilësi të dobët dhe me kod QR","vid_mod_analytics_penalty_reason_unoriginal_desc":"Për ta mbajtur TikTok-un pozitiv dhe të këndshëm për përdoruesit tanë, përmbajtjet që janë jo origjinale ose me cilësi të dobët nuk kualifikohen për t'u rekomanduar. Përmbajtjet jo origjinale përfshijnë video që sapo janë importuar ose ngarkuar nga burime të tjera (si p.sh. platforma të tjera, shfaqje televizive, filma ose transmetime në internet) pa ndonjë modifikim të ri krijues. Ne mund ta dallojmë nëse një video është jo origjinale nëse ka një filigran ose një logo të mbivendosur në të. Në përmbajtjet me cilësi të ulët përfshihen video shumë të shkurtra, imazhe statike dhe video të bëra vetëm me GIF. Përmbajtjet që përfshijnë kode QR zakonisht nuk kualifikohen për aktualitetin \"Për ty\", sepse mund t'i çojnë përdoruesit drejt faqeve të internetit ose aplikacioneve të dëmshme, edhe pse ne bëjmë përjashtime në rastet kur rreziku është i ulët (për shembull, për tregtinë elektronike).","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"Përmbajtje jo origjinale, me cilësi të dobët dhe me kod QR","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"Për të ruajtur përvojën pozitive që përdoruesit tanë presin nga platforma TikTok, përmbajtjet jo origjinale dhe me cilësi të dobët nuk kualifikohen për t'u rekomanduar. Përmbajtjet jo origjinale janë përmbajtjet që thjesht importohen ose kopjohen nga burime të tjera pa ndonjë modifikim të ri krijues. Një video mund të jetë jo origjinale nëse ka një filigran ose logo në të. Në përmbajtjet me cilësi të dobët përfshihen videot shumë të shkurtra, imazhet statike dhe videot e bëra vetëm me GIF.","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"Llogari e riprodhuar","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"Llogaria jote përmban postime që nuk janë origjinale dhe nuk kualifikohen për aktualitetin \"Për ty\". Për më shumë informacione, rishiko \"Udhëzimet e komunitetit\" \u003E I papërshtatshëm për aktualitetin \"Për ty\" \u003E Përmbajtje jo origjinale, me cilësi të dobët dhe me kod QR","vid_mod_analytics_penalty_reason_spam_title":"Përmbajtje e padëshiruar, joautentike ose mashtruese","vid_mod_analytics_penalty_reason_spam_desc":"Përmbajtjet që përpiqen t'i mashtrojnë ose t'i manipulojnë përdoruesit për të marrë më shumë ndjekës, pëlqime, shikime ose metrika të tjera të angazhimit në platformë, nuk kualifikohen për aktualitetin \"Për ty\". Këtu përfshihen përmbajtjet që i nxitin përdoruesit të ndjekin ose të pëlqejnë njëri-tjetrin ose përmbajtjet që i mashtrojnë përdoruesit të klikojnë butonat e pëlqimit ose të shpërndarjes. Për më tepër, edhe përmbajtjet që promovojnë teori konspirative dhe përhapin informacione të rreme ose të dëmshme rreth ngjarjeve aktuale dhe ngjarjeve ku detajet janë ende në zhvillim, nuk kualifikohen për aktualitetin \"Për ty\".","vid_mod_analytics_penalty_reason_sexual_title":"Përmbajtje haptazi e seksualizuar","vid_mod_analytics_penalty_reason_sexual_desc":"Për të ndihmuar që të kemi një përvojë të rehatshme, përmbajtjet që janë haptazi sugjestive në kuptimin seksual mund të mos kualifikohen për t'u rekomanduar. Këtu përfshihen përmbajtjet që përshkruajnë lakuriqësi të nënkuptuar, që seksualizojnë pjesët e trupit ose që janë haptazi erotike ose sensuale (p.sh. zhveshjet).","vid_mod_analytics_penalty_reason_tobacco_title":"Duhan dhe produkte alkoolike","vid_mod_analytics_penalty_reason_tobacco_desc":"Përmbajtjet që promovojnë, përmendin ose përshkruajnë produktet alkoolike që konsumohen nga persona të moshës së ligjshme për të pirë alkool, por që e bëjnë këtë në mënyrë të rrezikshme, mund të mos kualifikohen për t'u rekomanduar. Përmbajtjet që përshkruajnë përdorimin e produkteve të duhanit nga të rriturit ose që përmendin substanca të kontrolluara, nuk kualifikohen për t'u rekomanduar.","vid_mod_analytics_penalty_reason_stunts_title":"Akrobaci dhe sporte të rrezikshme","vid_mod_analytics_penalty_reason_stunts_desc":"Kur përsëriten pa marrë masa paraprake sigurie, disa aktivitete mund të jenë të rrezikshme dhe mund të shkaktojnë lëndime fizike. Përmbajtjet që përfshijnë akrobaci të rrezikshme ose sporte ekstreme të kryera nga joprofesionistë, mund të mos kualifikohen.","vid_mod_analytics_penalty_reason_graphic_title":"Përmbajtje e dhunshme dhe grafike","vid_mod_analytics_penalty_reason_graphic_desc":"Përmbajtjet që i shkaktojnë shikuesit siklet, tronditje ose neveri mund të jenë të papërshtatshme për aktualitetin \"Për ty\". Këtu përfshihen edhe efektet e frikshme, aktet e trembjes, makijazhi realist që rikrijon plagë të rënda dhe përshkrimet e funksioneve trupore. Shumica e përmbajtjeve të dhunshme dhe grafike nuk lejohen në TikTok. Megjithatë, ne mund të lejojmë disa lloje të caktuara përmbajtjesh, të tilla si imazhet grafike të vdekjes, aksidenteve ose luftimeve, kur shërbejnë si dokumentacion i ngjarjeve të botës reale dhe konsiderohen të jenë në interesin publik. Meqë këto përmbajtje mund të mos u pëlqejnë të gjitha audiencave, nuk do të kualifikohen për rekomandim dhe në përmbajtje do të ketë një ekran ose paralajmërim \"pranoje\".","vid_mod_analytics_penalty_reason_fyf_title":"E papërshtatshme për aktualitetin \"Për ty\"","vid_mod_analytics_penalty_reason_fyf_desc":"Videoja jote nuk i plotësonte standardet tona për t'u kualifikuar për aktualitetin \"Për ty\". Për më shumë informacione, rishiko \"Udhëzimet e komunitetit\" të TikTok-ut \u003E E papërshtatshme për aktualitetin \"Për ty\"","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"Përdoruesit dhe palët e treta mund të na raportojnë shkelje të politikave. E kemi zbuluar këtë shkelje të politikës bazuar në një raportim se përmbajtja ka shkelur \"Udhëzimet e komunitetit\".","vidModAnalytics_detailPg_sectionVideoDetails_sectionLabel":"Detajet e videos","vid_mod_analytics_appeal_detailpg_reason_title":"Arsyeja e shkeljes","vid_mod_analytics_detail_pg_title":"Videoja nuk kualifikohet","vid_mod_analytics_detail_pg_desc":"Kjo video nuk kualifikohet për aktualitetin \"Për ty\", sepse shkel \"Udhëzimet e komunitetit\".","vidModAnalytics_detailPg_sectionSuccess_header":"Ankesa u miratua","vid_mod_analytics_appeal_success_detail_pg_desc":"E shqyrtuam ankesën tënde dhe ta rivendosëm videon. Të kërkojmë ndjesë për çdo lloj shqetësimi që mund të të kemi shkaktuar. Faleminderit që je pjesë e komunitetit të TikTok-ut!","vid_mod_analytics_appeal_detail_pg_title":"Videoja u hoq","vid_mod_analytics_appeal_detail_pg_desc":"Kjo video shkel \"Udhëzimet e komunitetit\".","vidModAnalytics_appealSubmitted_sectionTitle_header":"Kërkesa u mor","vid_mod_analytics_appeal_rcv_detail_pg_desc":"E kemi marrë kërkesën dhe do të të njoftojmë sapo të jetë i disponueshëm rezultati i ankesës sate.","rIC_detailPg_violationReason_title":"Arsyeja e shkeljes","dsaCGWebapp_detailPg_sectionCG_link":"Udhëzimet e komunitetit","dsaCGWebapp_appealExpired_emptyState_body":"Nuk mund ta apelosh më këtë vendim, sepse afati i apelimit ka përfunduar.","appeal_btn_new":"Ankesë","reasonForAppeal_appealPg_appealReasonCard_title":"Arsyeja për apelim të vendimit","oSA_appealPg_appealExplain_title":"Shpjegimi i ankesës","rIC_appealPg_appealExplain_title":"Shpjegimi i ankesës","oSA_appealPg_appealExplain_desc":"Jep sa më shumë detaje që të jetë e mundur se përse nuk je dakord me vendimin. Kjo na ndihmon ta vlerësojmë siç duhet ankesën tënde.","rIC_appealPg_appealExplain_desc":"Jep sa më shumë detaje që të jetë e mundur se përse nuk je dakord me kufizimin. Kjo na ndihmon ta vlerësojmë siç duhet ankesën tënde.","dsa_illegal_uploader_vio_appeal_exp_desc":"Jep sa më shumë detaje që të jetë e mundur se përse nuk je dakord me kufizimin. Kjo na ndihmon ta vlerësojmë siç duhet ankesën tënde.","common_registration_phone_input_error":"Vendos një numër të vlefshëm telefoni","common_login_email_error":"Llogari ose fjalëkalim i pasaktë","common_login_reset_phone_input_error":"Numri i telefonit nuk
