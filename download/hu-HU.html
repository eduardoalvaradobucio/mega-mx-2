arázata","dsa_illegal_report_explanation_desc":"Írd le, hogy a tartalom hogyan sérti a vonatkozó törvényt. Az olyan jelentés nem tekinthető érvényesnek, amely nem tartalmaz elegendő információt. Adott esetben tüntesd fel, hogy ezt a kérelmet saját nevedben vagy valaki más nevében nyújtod be.","dsa_illegal_appeal_signature":"Aláírás","dsa_illegal_sign_legal_name":"Itt írd alá a hivatalos neveddel.","dsa_illegal_confirm_accuracy":"Megerősítem, hogy meggyőződésem szerint a jelentés tartalma igaz, pontos és teljes.","idpa_attachment":"Mellékletek","idpa_attachment_instruction":"A jelentést annak a jogtulajdonosnak kell benyújtania, akinek jogait megsértették, vagy annak meghatalmazott képviselőjének. Kérjük, figyelmesen olvasd el a \u003CredLink\u003Ebeküldési útmutatót\u003C\u002FredLink\u003E, és küldd be az összes szükséges dokumentumot. A fájlok formátuma JPEG, JPG vagy PNG lehet, és méretük nem haladhatja meg a 20 MB-ot.","idpa_attachment_sec1":"1. szakasz:","idpa_identification_document_title":"A kérelmezőre vonatkozó dokumentumok","idpa_identification_document_instruction_IP":"Kérjük, küldd be a hivatalos személyazonosító okmányaidat. Példák: vezetői engedély (előlap és hátlap), útlevél (fényképes oldal és a tulajdonos nevét és sürgősségi elérhetőségét tartalmazó oldal), My Number Card (csak előlap) stb. Ezenkívül szükség szerint be kell nyújtanod az ügynökség jogkörét igazoló dokumentumokat, a törvényes képviselő, például a gyám hozzájárulását igazoló dokumentumokat, valamint azokat a dokumentumokat, amelyek igazolják, hogy a benyújtás magára az érintett személyre vonatkozik. Továbbá, ha jogi személy vagy, be kell nyújtanod olyan dokumentumokat, mint a cégbejegyzési igazolás és a képviselő meghatalmazása. \u003CredLink\u003ETovábbi információ\u003C\u002FredLink\u003E","idpa_identification_document_instruction_nonIP":"Kérjük, küldd be a hivatalos személyazonosító okmányaidat. Példák: vezetői engedély (előlap és hátlap), útlevél (fényképes oldal és a tulajdonos nevét és sürgősségi elérhetőségét tartalmazó oldal), My Number Card (csak előlap) stb. Ezenkívül szükség szerint be kell nyújtanod az ügynökség jogkörét igazoló dokumentumokat, a törvényes képviselő, például a gyám hozzájárulását igazoló dokumentumokat, valamint azokat a dokumentumokat, amelyek igazolják, hogy a benyújtás magára az érintett személyre vonatkozik. \u003CredLink\u003ETovábbi információ\u003C\u002FredLink\u003E","attachment_upload_limit":"Minden egyes fájlnak 20 MB-nál kisebbnek kell lennie","idpa_attachment_sec2":"2. szakasz:","idpa_right_holder_status_title":"A jogosult státuszt igazoló dokumentumok","idpa_ric_proof_title":"A jogsértéssel kapcsolatos dokumentáció","idpa_right_holder_status_instruction_1":"(Szellemi tulajdonjogok megsértése)","idpa_right_holder_status_instruction_2":"Kérjük, küldd be azokat a dokumentumokat, amelyek igazolják az általad megsértettnek tartott szellemi tulajdonjogokat, valamint azokat a dokumentumokat, amelyek igazolják, hogy az állítólagos szellemi tulajdon tulajdonosa te vagy. \u003CredLink\u003ETovábbi információ\u003C\u002FredLink\u003E","idpa_right_holder_status_instruction_3":"(Üzleti érdekek megsértése)","idpa_right_holder_status_instruction_4":"A szükséges dokumentáció az állítólagosan megsértett üzleti érdekektől függően változik (pl. a termékcímkék hírnevét vagy ismertségét igazoló anyagok, a bejegyzés minőségét illetően a fogyasztókat félrevezető anyagok). Kérjük, olvasd el a \u003CredLink\u003Erészleteket\u003C\u002FredLink\u003E, és küldd be a megfelelő dokumentációt. Legfeljebb három, JPEG, JPG vagy PNG formátumú fájlt tölthetsz fel, amelyek mérete nem haladhatja meg a 20 MB-ot.","idpa_ric_proof_instruction":"Kérjük, küldj be egy képernyőképet vagy hasonló bizonyítékot, amelyen látható a jogaidat sértő tartalom része. Legfeljebb három, JPEG, JPG vagy PNG formátumú fájlt tölthetsz fel, amelyek mérete nem haladhatja meg a 20 MB-ot. \u003CredLink\u003ETovábbi információ\u003C\u002FredLink\u003E","idpa_attachment_sec3":"3. szakasz:","idpa_other_document_title":"Egyéb igazoló dokumentumok","idpa_other_document_instruction":"Kérjük, küldj be minden olyan igazoló dokumentumot, amely bizonyítja, hogy az eset nem tartozik a rágalmazás kivételei közé. Legfeljebb három fájlt tölthetsz fel JPEG, JPG vagy PNG formátumban, amelyek mérete nem haladhatja meg a 20 MB-ot. \u003CredLink\u003ETovábbi információ\u003C\u002FredLink\u003E","idpa_disclaimer":"Felhívjuk figyelmed, hogy a tudatosan hamis vagy félrevezető tartalom bejelentése törvény által büntethető. Ha gyakran nyújtasz be nyilvánvalóan alaptalan bejelentéseket, fenntartjuk a jogot, hogy felfüggesszük a bejelentés benyújtásának lehetőségét, vagy véglegesen letiltsuk a fiókod. \u003CredLink\u003ETovábbi információ\u003C\u002FredLink\u003E","ad_report_detail_placeholder_75_uk":"Kérjük, add meg a részleteket a hirdetéssel kapcsolatos tapasztalataidról, hogy segíts nekünk megtenni a szükséges lépéseket. Az Egyesült Királyság online biztonsági törvénye szerint gyermekek számára káros tartalomnak minősül a pornográfia és szexuális tevékenységek, öngyilkosság és önkárosítás, étkezési rendellenességek, bántalmazás és gyűlölet, erőszak, zaklatás, veszélyes mutatványok és kihívások, káros anyagok, egészségtelen testkép és depressziós tartalom. Kérjük, ha lehetséges, jelöld meg a kategóriát.","ad_report_detail_placeholder_75_eea_row":"Kérjük, add meg a részleteket a hirdetéssel kapcsolatos tapasztalataidról, hogy segíts nekünk megtenni a szükséges lépéseket.","ad_report_reason_L1Misinfo_L2aigc_v2_0":"Ez a hirdetés tartalmazhat MI által generált vagy szerkesztett tartalmat, amely visszaélés, jogosulatlan vagy rosszul van felcímkézve. Ez magában foglalhatja:","ad_report_reason_L1Misinfo_L2aigc_v2_1":"MI által generált tartalom, amely nincs felcímkézve vagy megjelölve. A hirdetés MI-t használ a tartalom létrehozásához, de ezt nem hozza nyilvánosságra.","ad_report_reason_L1Misinfo_L2aigc_v2_2":"Valódi személy hasonlóságának, hangjának vagy ide s_Notification_header":"Értesítés","Web_report_hide_video":"Az élményed javítása érdekében ezt a videót elrejtettük. Kevesebb ilyen videót mutatunk majd neked.","Web_report_show_video":"Videó megjelenítése","sticker_create_main_setinfo_last":"Utoljára frissítve","pgc_aiComments_commentCategories_all":"Összes","pgc_aiComments_analyticsPage_commentsCount":"{num, plural, one {{num} hozzászólás} other {{num} hozzászólás}}","pgc_aiComments_analyticsPage_infoPopup_topicsTitle":"Témák","pgc_aiComments_commentCategories_insufficientComments":"Az MI által összegzett tartalmak akkor lesznek elérhetők, ha több hozzászólás van.","pgc_aiComments_commentCategories_emptyState":"Egy hozzászólás sem felel meg ennek a kategóriának.","pm_web_fullpage_entry":"Koppints az ÉLŐ adás nézéséhez","webLIVE_personalPage_LIVEbanner_numViewerDesc":"Nézd meg most {num} nézővel","Webapp_tooltips_play":"lejátszás","pm_web_fullpage_error_button":"Újrapróbálkozás","ttlive_previewSubtitle_tag_highlight":"Kiemelés","weblive_following_btn":"Követés","pm_mt_liveWeb_friend_tag":"Ismerős","ttlive_AIsummary_tag":"Összefoglaló","subLiveShare_webLivePage_chatTextfield_subOnlyNote":"Csak előfizetőknek","pc_web_less_btn":"kevesebb","collectionsProfilePage_favoritesPage_newModal_errorMessage":"A karakterszám-korlátozás túllépve","pcWeb_add_reply":"Válasz írása...","comment_tray_default":"Hozzászólás hozzáadása...","vid_mod_analytics_penalty_reason_minor_title":"Kiskorúak biztonsága","vid_mod_analytics_penalty_reason_minor_desc":"Annak érdekében, hogy a tizenévesek számára további teret biztosítsunk az identitás felfedezéséhez és kifejezéséhez a digitális terekben, a 16 éven aluli felhasználók által feltöltött tartalmakat nem lehet ajánlani. A szépészeti műtétek népszerűsítése kiskorúak körében a testtel való elégedetlenség magasabb előfordulásához vezethet. Ennek megfelelően az ilyen tartalmak - beleértve az előtte-utána videókat, a műtéti eljárásokról készült videókat és a kockázatokra való figyelmeztetés nélküli, elektív szépészeti műtéteket tárgyaló üzeneteket - nem ajánlhatóak a Neked hírcsatornán egy 18 év alatti felhasználó számára sem.","vid_mod_analytics_penalty_reason_unoriginal_title":"Nem eredeti, rossz minőségű és QR-kód tartalom","vid_mod_analytics_penalty_reason_unoriginal_desc":"Azt szeretnénk, hogy a TikTok pozitív és élvezetes maradjon a felhasználóink számára, ezért a nem eredeti vagy alacsony minőségű tartalmakat nem ajánljuk. A nem eredeti tartalmak közé tartoznak az olyan videók, amelyeket csak importáltak vagy feltöltöttek más forrásokból (például más platformokról, tévéműsorokból, filmekből vagy webcastokból) új, kreatív szerkesztés nélkül. Meg tudjuk állapítani, hogy egy videó nem eredeti, ha vízjelet vagy ráhelyezett logót tartalmaz. A gyenge minőségű tartalmak közé tartoznak a nagyon rövid videók, a statikus képek és a csak GIF-ekből álló videók. A QR-kódokkal ellátott tartalmakat általában nem ajánljuk a Neked hírcsatornában, mivel ezek káros weboldalakra vagy alkalmazásokhoz vezethetik a felhasználókat, noha alacsony kockázatú körülmények között (például e-kereskedelem esetén) kivételt teszünk.","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"Nem eredeti, rossz minőségű és QR-kód tartalom","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"Azt szeretnénk, hogy a TikTok a felhasználóink által elvárt pozitív élmény maradjon, ezért a nem eredeti vagy alacsony minőségű tartalmakat nem ajánljuk. A nem eredeti tartalmak közé tartoznak az olyan videók, amelyeket csak importáltak vagy feltöltöttek más forrásokból új, kreatív szerkesztés nélkül. Lehet, hogy egy videó nem eredeti, ha vízjelet vagy logót tartalmaz. A gyenge minőségű tartalmak közé tartoznak a nagyon rövid videók, a statikus képek és a csak GIF-ekből álló videók.","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"Nem eredeti fiók","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"A fiókod olyan közléseket tartalmaz, amelyek nem eredetiek, és nem megfelelőek a Neked hírcsatorna számára. További információért tekintsd meg Közösségi irányelveinket \u003E Nem jogosult a „Neked” hírcsatornára \u003E Nem eredeti, rossz minőségű és QR-kód tartalom","vid_mod_analytics_penalty_reason_spam_title":"Spam, nem hiteles vagy félrevezető tartalom","vid_mod_analytics_penalty_reason_spam_desc":"Az olyan tartalmak, amelyek megpróbálják becsapni vagy manipulálni a felhasználókat abból a célból, hogy feltöltőjük a platformon több követőt, lájkot vagy megtekintést szerezzen, vagy növelje az aktivitásmutatókat, nem jogosultak a Neked hírcsatornára. Ide tartoznak az olyan tartalmak, amelyek arra ösztönzik a felhasználókat, hogy kövessék vagy lájkolják egymást, illetve az olyan tartalmak, amelyek a felhasználókat csaló módszerekkel vezetik rá a Kedvelés vagy a Megosztás gombra való kattintásra. Továbbá a Neked hírcsatornán nem támogathatóak az olyan tartalmak, amelyek összeesküvés-elméleteket népszerűsítenek, illetve hamis vagy káros információkat terjesztenek aktuális vagy még alakulóban lévő eseményekről.","vid_mod_analytics_penalty_reason_sexual_title":"Nyíltan szexuális tartalom","vid_mod_analytics_penalty_reason_sexual_desc":"A kellemes élmény fenntartása érdekében a nyíltan szexuális tartalmak nem ajánlhatók. Ez magában foglalja a burkolt meztelenséget ábrázoló, a testrészeket szexualizáló vagy a nyilvánvalóan erotikus vagy érzéki tartalmakat (pl. sztriptíz).","vid_mod_analytics_penalty_reason_tobacco_title":"Dohánytermékek és alkohol","vid_mod_analytics_penalty_reason_tobacco_desc":"Az alkoholfogyasztásra jogszabály szerint jogosult életkorú személyek általi, de veszélyes módon alkoholtermékeket fogyasztó, népszerűsítő, említő vagy ábrázoló tartalmak nem ajánlhatóak. A dohánytermékek felnőttek általi használatát ábrázoló vagy szabályozott szereket említő tartalom nem jogosult ajánlásra.","vid_mod_analytics_penalty_reason_stunts_title":"Veszélyes mutatványok és sportok","vid_mod_analytics_penalty_reason_stunts_desc":"Bizonyos tevékenységek biztonsági óvintézkedések nélkül megismételve kockázatosak vagy veszélyesek lehetnek, ami fizikai sérüléshez vezethet. Az olyan tartalmak, amelyek veszélyes mutatványokat vagy nem profik által végzett extrém sportokat tartalmaznak, nem támogathatók.","vid_mod_analytics_penalty_reason_graphic_title":"Erőszakos vagy durva tartalom","vid_mod_analytics_penalty_reason_graphic_desc":"Az olyan tartalmak, amelyek kellemetlenséget, sokkot vagy undort okoznak a nézőknek, nem támogathatók a Neked hírcsatornában, beleértve az ijesztő effekteket, a hirtelen ijesztgetéseket, a véres sebeket valósághűen megjelenítő sminket és a testi funkciók ábrázolását. A legtöbb erőszakos és durva tartalom nem engedélyezett a TikTokon. Azonban engedélyezhetünk bizonyos típusú tartalmakat, például haláleseteket, baleseteket vagy harcokat ábrázoló grafikus képeket, ha azok a valós események dokumentálására szolgálnak, és közérdekűnek tekinthetők. Mivel az ilyen tartalmak kellemetlen érzéseket válthatnak ki bizonyos közönségben, nem lesznek ajánlhatók, és a tartalom egy „engedélyezési” képernyővel vagy figyelmeztetéssel lesz ellátva.","vid_mod_analytics_penalty_reason_fyf_title":"Nem jogosult a Neked hírcsatornára","vid_mod_analytics_penalty_reason_fyf_desc":"A videód nem felelt meg a Neked hírcsatornára vonatkozó megfelelőségi feltételeinknek. További információkért tekintsd meg a TikTok Közösségi irányelvekben \u003E Nem jogosult a „Neked” hírcsatornára","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"A felhasználók és harmadik felek jelenthetik nekünk az irányelvek megsértését. Ezt a szabályszegést egy olyan bejelentés alapján észleltük, mely szerint a tartalom megsértette a Közösségi irányelveinket.","vidModAnalytics_detailPg_sectionVideoDetails_sectionLabel":"A videó részletei","vid_mod_analytics_appeal_detailpg_reason_title":"Szabálysértés oka","vid_mod_analytics_detail_pg_title":"A videó nem megfelelő","vid_mod_analytics_detail_pg_desc":"Ez a videó nem megfelelő a Neked hírcsatorna számára, mivel sérti Közösségi irányelveinket.","vidModAnalytics_detailPg_sectionSuccess_header":"Fellebbezés jóváhagyva","vid_mod_analytics_appeal_success_detail_pg_desc":"Kivizsgáltuk fellebbezésedet, és helyreállítottuk a videódat. Elnézést kérünk az esetleges kellemetlenségekért. Köszönjük, hogy a TikTok közösségének része vagy!","vid_mod_analytics_appeal_detail_pg_title":"Videó eltávolítva","vid_mod_analytics_appeal_detail_pg_desc":"Ez a videó sérti Közösségi irányelveinket.","vidModAnalytics_appealSubmitted_sectionTitle_header":"A kérelmet megkaptuk","vid_mod_analytics_appeal_rcv_detail_pg_desc":"Megkaptuk a kérelmedet, és értesítünk, amint a fellebbezésed eredménye rendelkezésre áll.","rIC_detailPg_violationReason_title":"Szabálysértés oka","dsaCGWebapp_detailPg_sectionCG_link":"Közösségi irányelvek","dsaCGWebapp_appealExpired_emptyState_body":"Már nem fellebbezheted meg ezt a döntést, mert a fellebbezési határidő lejárt.","appeal_btn_new":"Fellebbezés","reasonForAppeal_appealPg_appealReasonCard_title":"A döntés elleni fellebbezés indoklása","oSA_appealPg_appealExplain_title":"A fellebbezés magyarázata","rIC_appealPg_appealExplain_title":"A fellebbezés magyarázata","oSA_appealPg_appealExplain_desc":"A lehető legrészletesebben fejtsd ki, hogy miért nem értesz egyet a döntéssel. Ez lehetővé teszi, hogy megfelelően ki tudjuk értékelni a fellebbezésed.","rIC_appealPg_appealExplain_desc":"A lehető legrészletesebben fejtsd ki, hogy miért nem értesz egyet a korlátozással. Ez lehetővé teszi, hogy megfelelően ki tudjuk értékelni a fellebbezésed.","dsa_illegal_uploader_vio_appeal_exp_desc":"Kérjük, a lehető legrészletesebben fejtsd ki, hogy miért nem értesz egyet a korlátozással, hogy megfelelően ki tudjuk értékelni a fellebbezést.","common_registration_phone_input_error":"Adj meg érvényes telefonszámot","common_login_email_error":"Hibás fiók vagy jelszó","common_login_reset_phone_input_error":"A telefonszám még nincs regisztrálva","common_login_reset_email_
