cation_document_title":"Documente privind reclamantul","idpa_identification_document_instruction_IP":"Trimite documente oficiale de identificare. Exemplele includ: permisul de conducere (față și verso), pașaportul (pagina cu fotografia și pagina care conține numele titularului și informațiile de contact în caz de urgență), cardul My Number Card (doar față) etc. În plus, după caz, trebuie să trimiți documente care dovedesc autoritatea agenției, documente care dovedesc consimțământul unui reprezentant legal, cum ar fi un tutore, și documente care indică faptul că procesul de trimitere se referă la persoana respectivă. În plus, dacă ești o persoană juridică, trebuie să trimiți documente precum Certificatul de înregistrare corporativă și Procură de la reprezentant\u003CredLink\u003EAflă mai multe\u003C\u002FredLink\u003E","idpa_identification_document_instruction_nonIP":"Trimite documente oficiale de identificare. Exemplele includ: permisul de conducere (față și verso), pașaportul (pagina cu fotografia și pagina care conține numele titularului și informațiile de contact în caz de urgență), cardul My Number Card (doar față) etc. În plus, după caz, trebuie să trimiți documente care dovedesc autoritatea agenției, documente care dovedesc consimțământul unui reprezentant legal, cum ar fi un tutore, și documente care indică faptul că procesul de trimitere se referă la persoana respectivă. \u003CredLink\u003EAflă mai multe\u003C\u002FredLink\u003E","attachment_upload_limit":"Fiecare fișier trebuie să fie mai mic de 20 MB","idpa_attachment_sec2":"Secțiunea 2:","idpa_right_holder_status_title":"Documentație care atestă statutul de titular al drepturilor","idpa_ric_proof_title":"Documentație privind încălcarea drepturilor","idpa_right_holder_status_instruction_1":"(încălcarea drepturilor de proprietate intelectuală)","idpa_right_holder_status_instruction_2":"Trimite documente care identifică drepturile de proprietate intelectuală despre care crezi că au fost încălcate și document are","pgc_aiComments_commentCategories_all":"Toate","pgc_aiComments_analyticsPage_commentsCount":"{num, plural, one {{num} comentariu} few {{num} comentarii} other {{num} de comentarii}}","pgc_aiComments_analyticsPage_infoPopup_topicsTitle":"Subiecte","pgc_aiComments_commentCategories_insufficientComments":"Subiectele rezumate de IA vor fi disponibile atunci când vor exista mai multe comentarii.","pgc_aiComments_commentCategories_emptyState":"Niciun comentariu nu se potrivește acestei categorii.","pm_web_fullpage_entry":"Dă clic pentru a urmări LIVE","webLIVE_personalPage_LIVEbanner_numViewerDesc":"Vizionează acum, are {num} de spectatori","Webapp_tooltips_play":"redă","pm_web_fullpage_error_button":"Reîncearcă","ttlive_previewSubtitle_tag_highlight":"Reper","weblive_following_btn":"Urmărești","pm_mt_liveWeb_friend_tag":"Prieten","ttlive_AIsummary_tag":"Rezumat","subLiveShare_webLivePage_chatTextfield_subOnlyNote":"Doar pentru abonați","pc_web_less_btn":"mai puțin","collectionsProfilePage_favoritesPage_newModal_errorMessage":"Limita de caractere a fost depășită","pcWeb_add_reply":"Adaugă un răspuns...","comment_tray_default":"Adaugă un comentariu...","vid_mod_analytics_penalty_reason_minor_title":"Siguranța minorilor","vid_mod_analytics_penalty_reason_minor_desc":"Pentru a le oferi adolescenților un spațiu suplimentar de explorare și exprimare a identității în spațiile digitale, conținutul încărcat de utilizatorii sub 16 ani nu este eligibil pentru recomandare. Promovarea chirurgiei estetice în rândul minorilor poate duce la creșterea nemulțumirii față de corpul propriu. În consecință, un astfel de conținut - inclusiv videoclipurile care prezintă aspectul înainte și după, videoclipurile cu proceduri chirurgicale și mesajele care abordează chirurgia estetică electivă fără a avertiza asupra riscurilor - nu este eligibil pentru fluxul Pentru tine afișat utilizatorilor sub 18 ani.","vid_mod_analytics_penalty_reason_unoriginal_title":"Conținut neoriginal, de calitate slabă și cu cod QR","vid_mod_analytics_penalty_reason_unoriginal_desc":"Pentru ca TikTok să rămână o platformă pozitivă și plăcută pentru utilizatorii noștri, conținutul care nu este original sau care este de calitate scăzută nu este eligibil pentru recomandare. Conținutul neoriginal include videoclipuri care sunt doar importate sau încărcate din alte surse (cum ar fi alte platforme, emisiuni TV, filme sau emisiuni web) fără nicio editare nouă și creativă. Putem determina dacă un videoclip este neoriginal dacă are o inscripție sau un logo suprapus pe el. Conținutul de calitate scăzută include videoclipuri foarte scurte, imagini statice și videoclipuri realizate doar din GIF-uri. Conținutul cu coduri QR este de obicei neeligibil în fluxul Pentru tine, deoarece acesta poate conduce utilizatorii către site-uri web sau aplicații dăunătoare, deși facem excepții în circumstanțe în care riscul este scăzut (de exemplu, pentru comerțul electronic).","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"Conținut neoriginal, de calitate slabă și cu cod QR","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"Pentru a menține experiența pozitivă așteptată de utilizatorii noștri de pe platforma TikTok, conținutul neoriginal și de calitate scăzută nu este eligibil pentru recomandare. Conținutul neoriginal este conținut care este doar importat sau copiat din alte surse fără modificări creative noi. Un videoclip poate fi neoriginal dacă are o inscripție sau o siglă pe el. Conținutul de calitate scăzută include videoclipuri foarte scurte, imagini statice și videoclipuri realizate numai din GIF-uri.","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"Cont reprodus","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"Contul tău conține postări care nu sunt originale și care sunt neeligibile pentru fluxul Pentru tine. Pentru mai multe informații, consultă Regulile comunității \u003E Nu este potrivit pentru fluxul Pentru tine \u003E Conținut neoriginal, de calitate proastă și cu cod QR","vid_mod_analytics_penalty_reason_spam_title":"Conținut spam, neautentic sau înșelător","vid_mod_analytics_penalty_reason_spam_desc":"Conținutul care încearcă să păcălească sau să manipuleze utilizatorii pentru a obține mai mulți urmăritori, mai multe aprecieri, vizualizări sau alte interacțiuni pe platformă nu este eligibil pentru fluxul Pentru tine. Acesta include conținutul care încurajează utilizatorii să se urmărească sau să se aprecieze reciproc sau conținutul care îi păcălește pe utilizatori să dea clic pe butoanele de apreciere sau de distribuire. În plus, conținutul care promovează teorii ale conspirației și care răspândește informații false sau periculoase despre evenimente actuale și evenimente aflate încă în curs de desfășurare nu este eligibil pentru fluxul Pentru tine.","vid_mod_analytics_penalty_reason_sexual_title":"Conținut sexualizat în mod evident","vid_mod_analytics_penalty_reason_sexual_desc":"Pentru a contribui la menținerea unei experiențe confortabile, conținutul care prezintă sugestii sexuale evidente ar putea să nu fie eligibil pentru recomandare. Acesta include conținut care prezintă nuditate implicită, sexualizează părți ale corpului sau sunt în mod evident erotice sau senzuale (de exemplu, striptease).","vid_mod_analytics_penalty_reason_tobacco_title":"Tutun și produse alcoolice","vid_mod_analytics_penalty_reason_tobacco_desc":"Conținutul care promovează, menționează sau descrie produse alcoolice consumate de persoane care au vârsta legală pentru a bea, dar care sunt consumate într-un mod periculos, nu poate fi eligibil pentru recomandare. Conținutul care descrie consumul de produse din tutun de către adulți sau care menționează substanțe controlate nu este eligibil pentru recomandare.","vid_mod_analytics_penalty_reason_stunts_title":"Cascadorii și sporturi periculoase","vid_mod_analytics_penalty_reason_stunts_desc":"Atunci când sunt reproduse fără măsuri de siguranță, anumite activități pot fi riscante sau periculoase și pot duce la vătămări fizice. Conținutul care include cascadorii periculoase sau sporturi extreme efectuate de neprofesioniști poate fi neeligibil.","vid_mod_analytics_penalty_reason_graphic_title":"Conținut explicit și violent","vid_mod_analytics_penalty_reason_graphic_desc":"Conținutul care provoacă disconfort, șoc sau dezgust spectatorilor poate fi neeligibil pentru fluxul Pentru tine, inclusiv efectele înfricoșătoare, sperieturile de tip jump scares, machiajul care recreează în mod realist răni sângeroase și reprezentările funcțiilor corporale. Majoritatea materialelor cu conținut violent și grafic nu este permisă pe TikTok. Cu toate acestea, în anumite situații, putem permite anumite tipuri de conținut, mai ales dacă este în interesul public, cum ar fi reprezentarea unor decese, accidente sau bătăi în timpul documentării unor evenimente reale. Deoarece acest conținut nu este recomandat pentru toate categoriile de public, acesta nu va fi eligibil pentru recomandare, iar conținutul va implica un ecran „optativ” sau un avertisment.","vid_mod_analytics_penalty_reason_fyf_title":"Neeligibil pentru fluxul Pentru tine","vid_mod_analytics_penalty_reason_fyf_desc":"Videoclipul tău nu a îndeplinit standardele noastre de eligibilitate pentru fluxul Pentru tine. Consultă Regulile comunității TikTok pentru mai multe informații \u003E Neeligibil pentru fluxul Pentru tine","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"Utilizatorii și terții ne pot raporta încălcările politicii. Am detectat această încălcare a politicii pe baza unei raportări conform căreia conținutul a încălcat Regulile comunității noastre.","vidModAnalytics_detailPg_sectionVideoDetails_sectionLabel":"Detalii videoclip","vid_mod_analytics_appeal_detailpg_reason_title":"Motivul încălcării","vid_mod_analytics_detail_pg_title":"Videoclipul nu este eligibil","vid_mod_analytics_detail_pg_desc":"Acest videoclip nu este eligibil pentru fluxul Pentru tine deoarece încalcă Regulile Comunității noastre.","vidModAnalytics_detailPg_sectionSuccess_header":"Contestație aprobată","vid_mod_analytics_appeal_success_detail_pg_desc":"Am examinat contestația ta și ți-am restabilit videoclipul. Ne cerem scuze pentru neplăcerile pe care le-ar fi putut provoca această situație. Îți mulțumim că faci parte din comunitatea TikTok!","vid_mod_analytics_appeal_detail_pg_title":"Videoclip șters","vid_mod_analytics_appeal_detail_pg_desc":"Acest videoclip încalcă Regulile comunității.","vidModAnalytics_appealSubmitted_sectionTitle_header":"Cerere primită","vid_mod_analytics_appeal_rcv_detail_pg_desc":"Am primit solicitarea ta și te vom anunța imediat ce rezultatul contestației tale este disponibil.","rIC_detailPg_violationReason_title":"Motivul încălcării","dsaCGWebapp_detailPg_sectionCG_link":"Regulile comunității","dsaCGWebapp_appealExpired_emptyState_body":"Nu mai poți face contestație împotriva acestei decizii, deoarece termenul de contestare a expirat.","appeal_btn_new":"Fă contestație","reasonForAppeal_appealPg_appealReasonCard_title":"Motivele pentru contestarea deciziei","oSA_appealPg_appealExplain_title":"Explicații despre contestație","rIC_appealPg_appealExplain_title":"Explicație privind contestația","oSA_appealPg_appealExplain_desc":"Furnizează cât mai multe detalii posibil despre motivul pentru care nu ești de acord cu decizia. Aceasta ne permite să evaluăm corect contestația ta.","rIC_appealPg_appealExplain_desc":"Furnizează cât mai multe detalii posibil despre motivul pentru care nu ești de acord cu restricția. Aceasta ne permite să evaluăm corect contestația ta.","dsa_illegal_uploader_vio_appeal_exp_desc":"Furnizează cât mai multe detalii posibil despre motivul pentru care nu ești de acord cu restricția, ceea ce ne permite să evaluăm corect contestația ta.","common_registration_phone_input_error":"Introdu un număr de telefon valabil","common_login_email_error":"Cont sau parolă incorecte","common_login_reset_phone_input_error":"Numărul de telefon nu este încă înreg
