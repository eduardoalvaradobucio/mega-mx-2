如其它平台、电视节目、电影或网络广播）导入或上传，而不经任何创意改编的视频。如果视频中含有水印或叠加的徽标，我们可以判断出该视频并非原创视频。低质量内容包括非常短的视频、静态图片，以及仅由 GIF 制作而成的视频。一般而言，包含二维码的内容也不符合在【推荐】页展示的资格，因为这可能会导致用户进入有害网站或应用，但我们会在风险较低的前提下（如电商用途）允许例外情况。","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"非原创内容、劣质内容和二维码内容","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"为了给用户创造积极向上的 TikTok 平台体验，非原创或低质量的内容不符合推荐资格。非原创内容是指直接从其它来源导入或复制，而不经任何创意改编的视频。如果视频中含有水印或徽标，则可能是非原创视频。低质量内容包括非常短的视频、静态图片，以及仅由 GIF 制作而成的视频。","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"重制账号","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"你的账号包含非原创的发布内容，因此无法在【推荐】页展示。如需更多信息，请参阅《社区自律公约》\u003E 不适合【推荐】页 \u003E 非原创内容、劣质内容和二维码内容","vid_mod_analytics_penalty_reason_spam_title":"垃圾信息、虚假内容或误导性内容","vid_mod_analytics_penalty_reason_spam_desc":"试图通过欺骗或操控用户在平台上获得更多粉丝、点赞、播放量或其它互动指标的内容，不符合在【推荐】页上展示的资格标准。其中包括鼓动用户互相关注或点赞的内容，或是诱骗用户按下点赞或分享按钮的内容。此外，宣扬阴谋论，以及针对时事和细节有待考证的事件散播谣言或有害信息的内容，亦不符合在【推荐】页上展示的资格标准。","vid_mod_analytics_penalty_reason_sexual_title":"公开的涉性内容","vid_mod_analytics_penalty_reason_sexual_desc":"为帮助维护舒适的观看体验，公开的性暗示内容可能不符合推荐资格。其中包括描述隐含裸体、利用身体部位进行色诱的内容，或是露骨的情色或色情内容（例如脱衣舞）。","vid_mod_analytics_penalty_reason_tobacco_title":"烟酒商品","vid_mod_analytics_penalty_reason_tobacco_desc":"即使达到法定饮酒年龄，宣传、提及或描述以危险方式饮用酒精类产品的内容也可能不符合推荐资格。描述成年人吸食烟草制品或提及管制物品的内容不符合推荐资格。","vid_mod_analytics_penalty_reason_stunts_title":"危险的特技或运动","vid_mod_analytics_penalty_reason_stunts_desc":"在没有安全防护措施的情况下模仿某些动作可能会带来风险或危险，进而导致人身伤害。因此，包含危险特技或由非专业人士进行的极限运动的内容可能不符合推荐资格。","vid_mod_analytics_penalty_reason_graphic_title":"暴力和血腥内容","vid_mod_analytics_penalty_reason_graphic_desc":"令观众感到不适、震惊或厌恶的内容可能不符合在【推荐】页展示的资格标准，其中包括惊悚特效、突然惊吓、逼真的血腥妆容，以及对身体功能的描述。TikTok 原则上禁止暴力血腥内容。然而，当内容用于记录真实事件，且被认定符合公共利益时，我们可能会允许特定类型的内容，例如死亡、事故或打斗的图像画面。由于此类内容会令部分观众感到不适，因此不符合推荐资格条件，这些内容还会随附“选择观看”的提示或警告。","vid_mod_analytics_penalty_reason_fyf_title":"不符合【推荐】页资格","vid_mod_analytics_penalty_reason_fyf_desc":"你的视频不符合在【推荐】页展示的资格标准。详情请参阅 TikTok《社区自律公约》\u003E 不符合【推荐】页资格","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"用户和第三方可以向平台举报违反政策的行为。我们是根据内容违反《社区自律公约》的举报，检测出这一违反政策的行为。","vidModAnalytics_detailPg_sectionVideoDetails_sectionLabel":"视频详细信息","vid_mod_analytics_appeal_detailpg_reason_title":"违规原因","vid_mod_analytics_detail_pg_title":"视频不符合资格","vid_mod_analytics_detail_pg_desc":"由于违反《社区自律公约》，此视频无法在【推荐】页展示。","vidModAnalytics_detailPg_sectionSuccess_header":"申诉已通过","vid_mod_analytics_appeal_success_detail_pg_desc":"我们已审查你的申诉，并且恢复了你的视频。对此造成的任何不便，我们深表歉意。感谢加入 TikTok 社区！","vid_mod_analytics_appeal_detail_pg_title":"视频已移除","vid_mod_analytics_appeal_detail_pg_desc":"此视频违反了我们的《社区自律公约》。","vidModAnalytics_appealSubmitted_sectionTitle_header":"已收到申请","vid_mod_analytics_appeal_rcv_detail_pg_desc":"我们已收到你的申诉，申诉结果出来后，我们会通知你。","rIC_detailPg_violationReason_title":"违规原因","dsaCGWebapp_detailPg_sectionCG_link":"社区自律公约","dsaCGWebapp_appealExpired_emptyState_body":"由于申诉截止期限已过，无法再对此判定提出申诉。","appeal_btn_new":"申诉","reasonForAppeal_appealPg_appealReasonCard_title":"对该判定提出申诉的理由","oSA_appealPg_appealExplain_title":"申诉说明","rIC_appealPg_appealExplain_title":"申诉说明","oSA_appealPg_appealExplain_desc":"为了帮助我们对你的申诉做出正确判定，请尽可能详细说明你不同意此判定的原因。","rIC_appealPg_appealExplain_desc":"为了帮助我们对你的申诉做出正确判定，请尽可能详细说明你不同意此限制的原因。","dsa_illegal_uploader_vio_appeal_exp_desc":"为了帮助我们对你的申诉做出正确判定，请尽可能详细说明你不同意此限制的原因。","common_registration_phone_input_error":"输入有效的手机号码","common_login_email_error":"账号或密码有误","common_login_reset_phone_input_error":"手机号码尚未注册","common_login_reset_email_input_error":"电子邮箱尚未注册","common_registration_password_error":"使用 8-20 个字符，且至少包含以下两种类别：字母、数字、特殊字符。","incorrect_code":"验证码不正确，请重试。","err_service":"内部服务器错误，请稍后重试。","pc_web_speed_btn":"倍速","web_login_seeRecommended_title":"查看为你推荐的视频","web_login_login_btn":"登录","web_login_notNow_btn":"暂时不要","pcWeb_UpNextMoreVidsFromCreator_title":"下一条：此创作者的更多视频","pcWeb_moreVidsFromCreator_title":"此创作者的更多视频","pcWeb_seeAllVids":"查看所有视频","web_visitExplorePage_upNext_exploreNow":"立即探索","web_visitExplorePage_upNext_moreTrending":"接下来：更多热门视频","web_visitExplorePage_upNext_moreCate
