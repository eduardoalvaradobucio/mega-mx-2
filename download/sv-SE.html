 uttrycka sin identitet i digitala rum går det inte att rekommendera innehåll som har laddats upp av användare under 16 år. Främjande av plastikkirurgi för minderåriga kan leda till att fler känner sig missnöjda med sin kropp. Därför är sådant innehåll, vilket inkluderar före- och eftervideor, videor med plastikkirurgi och meddelanden där plastikkirurgi diskuteras utan att varna för riskerna, inte behörigt till För dig-flödet för användare under 18 år.","vid_mod_analytics_penalty_reason_unoriginal_title":"Innehåll som är ooriginellt, lågkvalitativt eller har QR-kod","vid_mod_analytics_penalty_reason_unoriginal_desc":"För att TikTok ska fortsätta att vara en positiv och trevlig miljö för våra användare går det inte att rekommendera innehåll som är ooriginellt eller av låg kvalitet. Ooriginellt innehåll inkluderar videor som importeras eller laddas upp från andra källor (som andra plattformar, TV-serier, filmer eller webbsändningar) utan nya eller kreativa ändringar. Vi vet att en video är ooriginell om den har en vattenstämpel eller logotyp. Innehåll av låg kvalitet inkluderar väldigt korta videor, statiska bilder och videor som bara består av GIF-filer. Innehåll som inkluderar QR-koder är vanligtvis inte tillgängligt i För dig-flödet eftersom det kan ta användare till skadliga webbplatser eller appar, men vi gör undantag när risken är låg (till exempel för e-handel).","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"Innehåll som är ooriginellt, lågkvalitativt eller har QR-kod","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"För att fortsätta erbjuda den positiva upplevelsen som våra användare förväntar sig på TikToks plattform är innehåll som är ooriginellt eller av låg kvalitet inte tillgängligt för rekommendationer. Ooriginellt innehåll är innehåll som importeras eller kopieras från andra källor utan nya innehållsändringar. En video är ooriginell om den har en vattenstämpel eller logotyp. Innehåll av låg kvalitet inkluderar väldigt korta videor, statiska bilder och videor som bara består av GIF-filer.","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"Reproducerat konto","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"Ditt konto innehåller inlägg som inte är originalinnehåll och är inte behörigt till För dig-flödet. Mer information finns i våra communityregler \u003E Inte lämpligt i För dig-flödet \u003E Innehåll som är ooriginellt, lågkvalitativt eller har QR-kod","vid_mod_analytics_penalty_reason_spam_title":"Skräppost, falskt eller vilseledande innehåll","vid_mod_analytics_penalty_reason_spam_desc":"Innehåll som försöker lura eller manipulera användare för att få fler följare, gilla-markeringar eller andra interaktionsmått på plattformen är inte behörigt till För dig-flödet. Detta inkluderar innehåll som uppmuntrar användare att följa eller gilla varandra, eller innehåll som lurar användare att klicka på gilla- eller dela-knapparna. Dessutom är innehåll som främjar konspirationsteorier eller sprider falsk eller skadlig information om aktuella händelser och händelser där det ännu saknas information inte tillåtet i För dig-flödet.","vid_mod_analytics_penalty_reason_sexual_title":"Uppenbart sexuellt innehåll","vid_mod_analytics_penalty_reason_sexual_desc":"För att hjälpa oss att bibehålla en trevlig upplevelse kanske det inte går att rekommendera uppenbart sexuellt suggestivt innehåll. Det inkluderar innehåll som visar antydningar till naket innehåll, sexualiserar kroppsdelar eller som är uppenbart erotiskt eller sensuellt (t.ex. striptease).","vid_mod_analytics_penalty_reason_tobacco_title":"Tobaks- och alkoholprodukter","vid_mod_analytics_penalty_reason_tobacco_desc":"Innehåll som främjar, nämner eller skildrar alkoholhaltiga varor som konsumeras av människor som uppfyller lagstadgade ålderskrav för att få dricka alkohol, men som gör det på ett farligt sätt, kanske inte får rekommenderas. Innehåll som visar vuxna som använder tobak eller nämner narkotikaklassade substanser är inte behörigt att rekommenderas.","vid_mod_analytics_penalty_reason_stunts_title":"Farliga stunttrick och sporter","vid_mod_analytics_penalty_reason_stunts_desc":"Det kan vara riskabelt eller farligt att imitera vissa aktiviteter utan att vidta säkerhetsåtgärder, vilket kan leda till fysisk skada. Innehåll som inkluderar farliga stunts, eller extremsporter som inte utförs av proffs, kanske inte är behörigt.","vid_mod_analytics_penalty_reason_graphic_title":"Våldsamt och grafiskt innehåll","vid_mod_analytics_penalty_reason_graphic_desc":"Innehåll som får tittare att känna obehag, chock eller avsmak kanske inte är tillgängligt i För dig-flödet. Detta inkluderar läskiga effekter, chockeffekter, smink som återskapar blodiga sår på ett realistiskt sätt och visar kroppsfunktioner. Det mest våldsamma och grova innehållet tillåts inte på TikTok. Men vi tillåter vissa typer av innehåll, som till exempel grova bilder på död, olyckor eller slagsmål om de dokumenterar verkliga händelser och anses vara i allmänhetens intresse. Eftersom det här innehållet kanske inte är lämpligt för alla målgrupper kommer det inte att rekommenderas och innehållet kommer att visas med en uppmaning om godkännande eller en varning.","vid_mod_analytics_penalty_reason_fyf_title":"Ej behörig till För dig-flödet","vid_mod_analytics_penalty_reason_fyf_desc":"Din video uppfyllde inte våra behörighetsstandarder i För dig-flödet. Granska TikToks communityregler för mer information \u003E Ej behörig till För dig-flödet","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"Användare och tredje part kan anmäla policyöverträdelser till oss. Vi upptäckte policyöverträdelsen baserat på en anmälan om att innehållet bryter mot våra communityregler.","vidModAnalytics_detailPg_sectionVideoDetails_sectionLabel":"Information om video","vid_mod_analytics_appeal_detailpg_reason_title":"Orsak till överträdelse","vid_mod_analytics_detail_pg_title":"Videon är inte behörig","vid_mod_analytics_detail_pg_desc":"Den här videon
