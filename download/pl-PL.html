ub trwałego zablokowania konta. Więcej informacji można znaleźć w naszym Centrum przejrzystości.","Web_report_reason_select":"Zgłoś powód:","dsa_illegal_report_email":"Twój adres e-mail","dsa_illegal_cite_law_optional":"(opcjonalnie)","dsa_illegal_report_fill_email":"Wpisz swój adres e-mail","cseReasons_reportPg_emailAddForm_body":"Możesz przesłać to zgłoszenie anonimowo. Nie zostaniesz jednak powiadomiony\u002F-a o wyniku ani nie będziesz mieć możliwości złożenia odwołania.","dsa_illegal_report_trustedflagger_fill_email":"Wprowadź prawidłowy adres e-mail","dsa_illegal_detail_country":"Jurysdykcja prawna","dsa_illegal_detail_law":"Przepis","dsa_illegal_cite_law_desc":"Prosimy o podanie szczegółów przepisów, które rzekomo narusza treść. Podaj jak najwięcej dokładnych informacji, abyśmy mogli właściwie ocenić zgłoszenie.","dsa_illegal_detail_explanation":"Wyjaśnienie zgłoszenia","dsa_illegal_report_explanation_desc":"Opisz, w jaki sposób treść narusza konkretne przepisy. Zgłoszenia, które nie zawierają dokładnych informacji, mogą zostać uznane za nieważne. W stosownych przypadkach określ, czy składasz ten wniosek we własnym imieniu, czy w imieniu innej osoby.","dsa_illegal_appeal_signature":"Podpis","dsa_illegal_sign_legal_name":"Podpisz się swoim imieniem i nazwiskiem.","dsa_illegal_confirm_accuracy":"Potwierdzam moje przekonanie, że treść niniejszego zgłoszenia jest prawdziwa, dokładna i kompletna.","idpa_attachment":"Załączniki","idpa_attachment_instruction":"Zgłoszenie musi zostać złożone przez właściciela praw, którego prawa zostały naruszone, lub przez upoważnionego przedstawiciela. Prosimy o dokładne zapoznanie się z \u003CredLink\u003Ewytycznymi dotyczącymi zgłoszeń\u003C\u002FredLink\u003E i przesłanie wszystkich wymaganych dokumentów. Pliki muszą być w formacie JPEG, JPG lub PNG i nie mogą przekraczać 20 MB.","idpa_attachment_sec1":"Sekcja 1:","idpa_identification_document_title":"Dokumenty dotyczące zgłaszającego","idpa_identification_document_instruction_IP":"Prosimy o przesłanie oficjalnych dokumentów tożsamości. Przykłady: prawo jazdy (przód i tył), paszport (strona ze zdjęciem oraz strona zawierająca imię i nazwisko posiadacza oraz dane kontaktowe w nagłych wypadkach), Karta z numerem osobistym (tylko przód) itp. Dodatkowo, w razie potrzeby, należy przedłożyć dokumenty potwierdzające uprawnienia agencji, dokumenty potwierdzające zgodę przedstawiciela prawnego, takiego jak opiekun, oraz dokumenty wskazujące, że zgłoszenie dotyczy danej osoby. Ponadto w przypadku osób prawnych należy przedłożyć dokumenty takie jak zaświadczenie o rejestracji spółki oraz pełnomocnictwo od przedstawiciela.\u003CredLink\u003EDowiedz się więcej\u003C\u002FredLink\u003E","idpa_identification_document_instruction_nonIP":"Prosimy o przesłanie oficjalnych dokumentów tożsamości. Przykłady: prawo jazdy (przód i tył), paszport (strona ze zdjęciem oraz strona zawierająca imię i nazwisko posiadacza oraz dane kontaktowe w nagłych wypadkach), Karta z numerem osobistym (tylko przód) itp. Dodatkowo, w razie potrzeby, należy przedłożyć dokumenty potwierdzające uprawnienia agencji, dokumenty potwierdzające zgodę przedstawiciela prawnego, takiego jak opiekun, oraz dokumenty wskazujące, że zgłoszenie dotyczy danej osoby. \u003CredLink\u003EDowiedz się więcej\u003C\u002FredLink\u003E","attachment_upload_limit":"Każdy pojedynczy plik musi być mniejszy niż 20MB","idpa_attachment_sec2":"Sekcja 2:","idpa_right_holder_status_title":"Dokumentacja potwierdzająca status posiadacza praw","idpa_ric_proof_title":"Dokumentacja dotycząca naruszenia praw","idpa_right_holder_status_instruction_1":"(Naruszenie praw własności intelektualnej)","idpa_right_holder_status_instruction_2":"Prosimy o przedłożenie dokumentów potwierdzających prawa własności intelektualnej, które Twoim zdaniem zostały naruszone, oraz dokumenty potwierdzające, że jesteś właścicielem przedmiotowej własności intelektualnej. \u003CredLink\u003EDowiedz się więcej\u003C\u002FredLink\u003E","idpa_right_holder_status_instruction_3":"(Naruszenie interesów biznesowych)","idpa_right_holder_status_instruction_4":"Wymagana dokumentacja różni się w zależności od rzekomo naruszonych interesów biznesowych (np. materiały potwierdzające renomę lub rozpoznawalność marek produktów, materiały wskazujące, że post wprowadza konsumentów w błąd co do jakości). Prosimy zapoznać się ze \u003CredLink\u003Eszczegółowymi informacjami\u003C\u002FredLink\u003E i przesłać odpowiednią dokumentację. Można przesłać maksymalnie trzy pliki w formacie JPEG, JPG lub PNG, każdy o rozmiarze poniżej 20 MB.","idpa_ric_proof_instruction":"Prosimy o przesłanie zrzutu ekranu lub innego dowodu pokazującego część opublikowanej treści, która Twoim zdaniem narusza Twoje prawa. Można przesłać maksymalnie trzy pliki w formacie JPEG, JPG lub PNG; każdy o rozmiarze poniżej 20 MB. \u003CredLink\u003EDowiedz się więcej\u003C\u002FredLink\u003E","idpa_attachment_sec3":"Sekcja 3:","idpa_other_document_title":"Inne dokumenty pomocnicze","idpa_other_document_instruction":"Prosimy o przesłanie wszelkich dokumentów pomocniczych, takich jak materiały potwierdzające, że sprawa nie podlega wyjątkom od zniesławienia. Można przesłać maksymalnie trzy pliki w formacie JPEG, JPG lub PNG, każdy o wielkości poniżej 20 MB. \u003CredLink\u003EDowiedz się więcej\u003C\u002FredLink\u003E","idpa_disclaimer":"Należy pamiętać, że świadome składanie fałszywych lub wprowadzających w błąd zgłoszeń może podlegać karze zgodnie z prawem. Jeśli często składasz zgłoszenia, które są ewidentnie bezpodstawne, zastrzegamy sobie prawo do zawieszenia Twojej możliwości składania zgłoszeń lub trwałego zablokowania Twojego konta. \u003CredLink\u003EDowiedz się więcej\u003C\u002FredLink\u003E","ad_report_detail_placeholder_75_uk":"Podaj szczegółowe informacje o swoich doświadczeniach z tą reklamą, aby pomóc nam w podjęciu niezbędnych działań. Treści szkodliwe dla dzieci zgodnie z brytyjską ustawą OSA obejmują pornografię i czynności seksualne, samobójst page_entry":"Kliknij, by obejrzeć LIVE","webLIVE_personalPage_LIVEbanner_numViewerDesc":"Obejrzyj teraz z {num} widzami","Webapp_tooltips_play":"odtwarzanie","pm_web_fullpage_error_button":"Spróbuj ponownie","ttlive_previewSubtitle_tag_highlight":"Wyróżniony moment","weblive_following_btn":"Obserwowani","pm_mt_liveWeb_friend_tag":"Znajomy","ttlive_AIsummary_tag":"Podsumowanie","subLiveShare_webLivePage_chatTextfield_subOnlyNote":"Tylko dla subskrybentów","pc_web_less_btn":"mniej","collectionsProfilePage_favoritesPage_newModal_errorMessage":"Przekroczono limit znaków","pcWeb_add_reply":"Dodaj odpowiedź...","comment_tray_default":"Dodaj komentarz...","vid_mod_analytics_penalty_reason_minor_title":"Bezpieczeństwo nieletnich","vid_mod_analytics_penalty_reason_minor_desc":"Aby dać nastolatkom więcej przestrzeni na odkrywanie własnej tożsamości i wyrażanie siebie w przestrzeni cyfrowej, nie będziemy polecać treści przesyłanych przez użytkowników poniżej 16. roku życia. Promowanie operacji plastycznych wśród nieletnich może prowadzić do wyższego odsetka młodych osób niezadowolonych z własnego wyglądu. W związku z tym, treści dotyczące tej tematyki, w tym filmy przed i po, filmy ukazujące zabiegi chirurgiczne oraz wiadomości omawiające dobrowolne operacje plastyczne bez ostrzeżeń o związanym z nimi ryzyku, nie kwalifikują się do kanału Dla Ciebie użytkowników poniżej 18. roku życia.","vid_mod_analytics_penalty_reason_unoriginal_title":"Treści nieoryginalne i niskiej jakości lub treści z kodem QR","vid_mod_analytics_penalty_reason_unoriginal_desc":"Dbamy o to, aby TikTok był pozytywną i przyjemną przestrzenią dla naszych użytkowników. Dlatego treści nieoryginalne i niskiej jakości nie kwalifikują się do polecania. Treści nieoryginalne to na przykład filmy, które zostały po prostu zaimportowane lub przesłane z innego źródła (innej platformy, programu telewizyjnego, filmu, webcastu itp.) bez wprowadzenia jakichkolwiek nowych, kreatywnych elementów. Za nieoryginalny może zostać uznany film zawierający znak wodny lub nałożone logo. Treści niskiej jakości to na przykład bardzo krótkie filmy, nieruchome obrazy czy filmy stworzone wyłącznie z GIF-ów. W większości przypadków nie zezwalamy również na wyświetlanie na kanale Dla Ciebie treści z kodami QR, ponieważ użytkownicy mogą w ten sposób zostać przekierowani do szkodliwych witryn internetowych lub aplikacji, choć czasami robimy wyjątki w sytuacjach o niskim stopniu zagrożenia (np. handel elektroniczny).","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"Treści nieoryginalne i niskiej jakości lub treści z kodem QR","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"Staramy się utrzymać wysoki poziom pozytywnych wrażeń, jakiego użytkownicy oczekują od TikToka. Dlatego treści nieoryginalne i niskiej jakości nie kwalifikują się do polecania. Treści nieoryginalne to takie, które zostały po prostu zaimportowane lub skopiowane z innego źródła bez wprowadzenia jakichkolwiek nowych, kreatywnych elementów. Za nieoryginalny może zostać uznany film zawierający znak wodny lub logo. Treści niskiej jakości to na przykład bardzo krótkie filmy, nieruchome obrazy czy filmy stworzone wyłącznie z GIF-ów.","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"Nieoryginalne konto","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"Twoje konto zawiera posty, które nie są oryginalne i nie spełniają wymogów kanału Dla Ciebie. Aby uzyskać więcej informacji, sprawdź nasze Zasady społeczności \u003E Nie kwalifikuje się do kanału Dla Ciebie \u003E Treści nieoryginalne i niskiej jakości lub treści z kodem QR","vid_mod_analytics_penalty_reason_spam_title":"Spam, fałszywe lub mylące treści","vid_mod_analytics_penalty_reason_spam_desc":"Treści, które oszukują użytkowników lub manipulują nimi w celu zdobycia większej liczby obserwujących, polubień, wyświetleń lub innych wskaźników zaangażowania na platformie nie są odpowiednie dla aktualności Dla Ciebie. Takie treści to m. in. treści zachęcające użytkowników do wymiany polubień lub zaobserwowania się nawzajem lub treści, które oszukują użytkownika w celu nakłonienia go do dotknięcia przycisku polubienia lub udostępnienia. Ponadto treści promujące teorie spiskowe lub rozpowszechniające fałszywe bądź szkodliwe informacje o wydarzeniach aktualnych lub takich, których szczegóły są jeszcze jasne również nie są odpowiednie dla aktualności Dla Ciebie.","vid_mod_analytics_penalty_reason_sexual_title":"Treści o charakterze jawnie seksualnym","vid_mod_analytics_penalty_reason_sexual_desc":"Staramy się dbać o komfort naszych użytkowników. Dlatego treści o wyraźnym podtekście seksualnym mogą nie kwalifikować się do polecania. Są to na przykład treści pośrednio przedstawiające nagość, przedstawiające części ciała w seksualny sposób bądź treści w jawny sposób erotyczne lub zmysłowe (np. striptiz).","vid_mod_analytics_penalty_reason_tobacco_title":"Wyroby tytoniowe i alkoholowe","vid_mod_analytics_penalty_reason_tobacco_desc":"Treści promujące, omawiające lub przedstawiające spożywanie alkoholu przez osoby pełnoletnie w niebezpieczny sposób mogą nie być polecane. Treści przedstawiające używanie produktów tytoniowych przez osoby pełnoletnie lub dotyczące substancji nielegalnych nie będą polecane.","vid_mod_analytics_penalty_reason_stunts_title":"Niebezpieczne akrobacje lub sporty","vid_mod_analytics_penalty_reason_stunts_desc":"Niektóre aktywności, jeśli są powtarzane bez zachowania środków aktywności, mogą być ryzykowne, niebezpieczne i prowadzić do obrażeń fizycznych. Treści przedstawiające niebezpieczne popisy i sporty ekstremalne z udziałem amatorów mogą nie być odpowiednie.","vid_mod_analytics_penalty_reason_graphic_title":"Treści drastyczne i zawierające przemoc","vid_mod_analytics_penalty_reason_graphic_desc":"Treści, które są szokujące lub wywołują dyskomfort albo obrzydzenie mogą nie kwalifikować się do wyświetlania w aktualnościach Dla Ciebie. Takie treści to m. in. przerażające efekty, straszenie widza znienacka (tzw. jump scare), realistyczny makijaż ran i obrażeń oraz treści przedstawiające funkcje fizjologiczne. W większości przypadków nie zezwalamy na brutalne treści na TikToku. Możemy jednak dopuścić pewne rodzaje treści, np. graficzne obrazy śmierci, wypadków lub walk, jeśli służą one jako dokumentacja rzeczywistych wydarzeń i są uznawane za leżące w interesie publicznym. Ponieważ treści te mogą nie być odpowiednie dla wszystkich odbiorców, nie będą kwalifikować się do rekomendacji i będą zawierały ekran umożliwiający podjęcie decyzji o włączeniu lub ostrzeżenie.","vid_mod_analytics_penalty_reason_fyf_title":"Nie kwalifikuje się do aktualności Dla Ciebie","vid_mod_analytics_penalty_reason_fyf_desc":"Twój film nie spełnia wymogów kanału Dla Ciebie. Zapoznaj się z Zasadami społeczności TikToka, aby uzyskać więcej informacji \u003E Nie kwalifikuje się do kanału Dla Ciebie","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"Naruszenia zasad mogą zgłaszać użytkownicy i strony trzecie. Wykryliśmy to naruszenie na podstawie zgłoszenia informującego, że treść narusza nasze Zasady społeczności.","vidModAnalytics_detailPg_sectionVideoDetails_sectionLabel":"Szczegóły filmu","vid_mod_analytics_appeal_detailpg_reason_title":"Przyczyna naruszenia","vid_mod_analytics_detail_pg_title":"Film nie spełnia wymogów","vid_mod_analytics_detail_pg_desc":"Ten film nie spełnia wymogów kanału Dla Ciebie, ponieważ narusza nasze Zasady społeczności.","vidModAnalytics_detailPg_sectionSuccess_header":"Odwołanie zatwierdzone","vid_mod_analytics_appeal_success_detail_pg_desc":"Przeanalizowaliśmy Twoje odwołanie i przywróciliśmy Twój film. Przepraszamy za wszelkie niedogodności, jakie mogło to spowodować. Dziękujemy za to, że jesteś członkiem społeczności TikTok!","vid_mod_analytics_appeal_detail_pg_title":"Usunięto film","vid_mod_analytics_appeal_detail_pg_desc":"Ten film narusza nasze Zasady społeczności.","vidModAnalytics_appealSubmitted_sectionTitle_header":"Otrzymaliśmy Twój wniosek",
