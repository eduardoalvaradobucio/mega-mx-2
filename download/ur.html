ی ہے۔ کم معیاری مواد میں بہت مختصر ویڈیوز، ساکن تصاویر، اور صرف GIFs سے بنائی گئی ویڈیوز شامل ہوتی ہیں۔ QR کوڈز پر مشتمل مواد عمومی طور پر آپ کے لیے فیڈ کے اہل نہیں ہوتا کیونکہ یہ صارفین کو نقصان دہ ویب سائٹس یا ایپس کی طرف لے جا سکتا ہے، اگرچہ ہم ایسے حالات میں استثنات بھی دیتے ہیں جہاں خطرہ کم ہو (بطور مثال، ای کامرس کے لیے)۔","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"نقلی، کم معیاری، اور QR کوڈ مواد","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"ہمارے صارفین کی توقع کے مطابق TikTok پلیٹ فارم سے مثبت تجربہ برقرار رکھنے کی غرض سے، ایسا مواد جو نقلی یا کم معیاری ہو تجویز کرنے کے لیے نااہل ہوتا ہے۔ نقلی مواد ایسا مواد ہوتا ہے جو کسی نئی، تخلیقی ترامیم کے بغیر دیگر ذرائع سے درآمد یا کاپی کیا گیا ہو۔ اگر ویڈیو پر واٹر مارک یا لوگوموجود ہو تو وہ نقلی ہو سکتی ہے۔ کم معیاری مواد میں بہت مختصر ویڈیوز، ساکن تصاویر، اور صرف GIFs سے بنائی گئی ویڈیوز شامل ہوتی ہیں۔","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"دوبارہ بنایا گیا اکاؤنٹ","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"آپ کا اکاؤنٹ ایسی پوسٹس پر مشتمل ہے جو اصل نہیں ہیں اور آپ کے لیے فیڈ کی اہل نہیں ہیں۔ مزید معلومات کے لیے، ہماری ‏‫کمیونٹی کے رہنما اصول‬وں کا جائزہ لیں \u003E آپ کے لیے فیڈ کے لیے نامناسب ہے \u003E نقلی، کم معیاری، اور QR کوڈ کا مواد","vid_mod_analytics_penalty_reason_spam_title":"اسپام پر مبنی، غیر مستند، یا گمراہ کن مواد","vid_mod_analytics_penalty_reason_spam_desc":"ایسا مواد جو پلیٹ فارم پر صارفین کو مزید فالوورز، لائکس، ویوز یا دیگر مشغولیت کے میٹرکس حاصل کرنے کے لیے دھوکہ دینے یا استحصال کرنے کی کوشش کرتا ہو آپ کے لیے فیڈ کے لیے اہل نہیں ہے۔ اس میں ایسا مواد شامل ہوتا ہے جو ایک دوسرے کو فالو یا لائک کرنے کے لیے صارفین کی حوصلہ افزائی کرتا ہو، یا ایسا مواد جو لائک یا شیئر کرنے کے بٹنز کو کلک کرنے کے لیے صارفین کو دھوکہ دیتا ہو۔ اس کے علاوہ، ایسا مواد جو سازشی نظریات کو پروموٹ کرتا ہو اور حالیہ واقعات کے متعلق غلط یا نقصان دہ معلومات پھیلاتا ہو اور ایسے ایونٹس جن میں تفصیلات ابھی جاری ہوں بھی آپ کے لیے فیڈ کے لیے اہل نہیں ہے۔","vid_mod_analytics_penalty_reason_sexual_title":"واضح جنسی مواد","vid_mod_analytics_penalty_reason_sexual_desc":"خوشگوار تجرے کو برقرار رکھنے میں مدد کی غرض سے، ایسا مواد جو واضح طور پر جنسیت کی تجویز دیتا ہو تجویز کرنے کے لیے اہل نہیں ہو سکتا۔ اس میں ایسا مواد شامل ہوتا ہے جو عریانیت کے تاثر، جنسی جسمانی اعضاء، یا واضح طور پر شہوت انگیز یا جنسی لذت کی عکاسی کرتا ہو (بطور مثال اسٹرپ ٹیزز)۔","vid_mod_analytics_penalty_reason_tobacco_title":"تمباکو اور الکوحل کی پراڈکٹس","vid_mod_analytics_penalty_reason_tobacco_desc":"ایسا مواد جو شراب پینے کی قانونی عمر کے حامل افراد کی جانب سے الکوحل کی پراڈکٹس کے استعمال کو پروموٹ کرتے، مینشن کرتے، یا اس کی عکاسی کرتے ہوں لیکن کسی خطرناک فیشن کے طور پر کیا گیا ہو، تجویز کرنے کے لیے اہل نہیں ہو سکتا۔ بالغ افراد کی جانب سے تمباکو کی پراڈکٹس کے استعمال کی عکاسی کرنے یا ممنوعہ مادوں کو مینشن کرنے والا مواد تجویز کرنے کے لیے اہل نہیں ہے۔","vid_mod_analytics_penalty_reason_stunts_title":"خطرناک کرتب اور کھیل","vid_mod_analytics_penalty_reason_stunts_desc":"حفاظتی تدابیر کے بغیر نقل کرنے پر، کچھ سرگرمیاں پُرخطر یا مُہلک ہو سکتی ہیں، جو کہ نقصان دہ ثابت ہو سکتی ہیں۔ ایسا مواد جو خطرناک کرتب، یا غیر پیشہ ور افراد کی جانب سے سرانجام دیے گئے خطرناک کھیل پر مشتمل ہوتا ہے، نااہل ہو سکتا ہے۔","vid_mod_analytics_penalty_reason_graphic_title":"متشدد اور گرافک مواد","vid_mod_analytics_penalty_reason_graphic_desc":"ایسا مواد جو ناظرین کے لیے پریشانی، صدمے، یا بیزاری کا سبب بنے، بشمول خوفناک اثرات، جمپ سکیئرز،ایسا میک اپ جو حقیقی خون رستے زخموں کو دوبارہ تخلیق کرے، اور جسمانی افعال کی عکاسی کرتا ہو وہ آپ کے لیے فیڈ کے لیے نااہل ہو سکتا ہے۔ TikTok پر بہت متشدد اور گرافک مواد کی اجازت نہیں ہے۔ تاہم، ہم مخصوص اقسام کے مواد کی اجازت دے سکتے ہیں، جیسا کہ موت، حادثات یا جھگڑوں کی گرافک تصاویر جبکہ یہ حقیقی دنیا کی دستاویز کے طور پر پیش کی جاتی ہو اور عوامی مفاد کے طور پر سمجھی جائے۔ یہ مواد تمام سامعین کے لیے مناسب نہ ہونے کی وجہ سے، یہ تجویز کرنے کے لیے اہل نہیں ہو گا، اور مواد میں \"آپٹ ان\" اسکرین یا انتباہ موجود ہو گی۔","vid_mod_analytics_penalty_reason_fyf_t
